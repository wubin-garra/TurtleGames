name: Deploy Game Library to Pages

on:
  push:
    branches: [main]
    paths:
      - 'deploy-game-library/**'
      - 'projects/**/*.html'
      - 'projects/**/*.mp3'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync game files to deploy directory
        run: |
          cp projects/turtle-race/turtle-race.html deploy-game-library/turtle-race.html
          cp projects/merge-turtle/merge-turtle.html deploy-game-library/merge-turtle.html
          cp projects/street-basketball/street-basketball.html deploy-game-library/street-basketball.html
          cp projects/portfolio/index.html deploy-game-library/index.html
          # Copy street-basketball music files
          cp projects/street-basketball/*.mp3 deploy-game-library/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy-game-library
      - id: deployment
        uses: actions/deploy-pages@v4
