<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>合成大乌龟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block}
body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// Prevent pull-to-refresh and bounce scroll in WeChat
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
// Prevent double-tap zoom
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// === ROUNDRECT POLYFILL ===
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

// === CANVAS SETUP ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// === CONSTANTS & CONFIG ===
const TURTLES = [
  { name: '草龟',          radius: 20, score: 10,  color: '#8BC34A', darkColor: '#689F38' },
  { name: '巴西龟',        radius: 26, score: 30,  color: '#66BB6A', darkColor: '#43A047' },
  { name: '花龟',          radius: 32, score: 60,  color: '#FFCA28', darkColor: '#F9A825' },
  { name: '锦龟',          radius: 39, score: 100, color: '#FF7043', darkColor: '#E64A19' },
  { name: '鳄龟',          radius: 47, score: 150, color: '#78909C', darkColor: '#546E7A' },
  { name: '海龟',          radius: 56, score: 210, color: '#42A5F5', darkColor: '#1E88E5' },
  { name: '苏卡达陆龟',    radius: 63, score: 280, color: '#D4A574', darkColor: '#B8895A' },
  { name: '象龟',          radius: 70, score: 360, color: '#A1887F', darkColor: '#795548' },
  { name: '加拉帕戈斯象龟',radius: 80, score: 500, color: '#FFD54F', darkColor: '#FF8F00' },
];

const DIFFICULTY = {
  easy:   { name: '简单', maxDrop: 7 },
  normal: { name: '普通', maxDrop: 6 },
  hard:   { name: '困难', maxDrop: 5 },
};

const PHYSICS = {
  gravity: 980,
  restitution: 0.3,
  friction: 0.4,
  groundFriction: 0.6,
  damping: 0.995,
  sleepThreshold: 2.0,    // higher threshold to stop jitter sooner
  sleepDelay: 0.3,         // faster sleep
  solverIterations: 6,     // more iterations for stable stacking
  fixedDt: 1 / 60,
  slop: 0.5,               // allowed penetration depth before correction
  correctionRate: 0.4,     // only correct 40% of overlap per iteration (Baumgarte)
};

const GAME = {
  dropCooldown: 0.5,
  gameOverDelay: 2.0,
  wallThickness: 2,
};

// === LAYOUT ===
const layout = {};

function computeLayout() {
  const W = canvas.width;
  const H = canvas.height;
  const topBarH = 44;
  const diffBarH = 28;
  const previewH = 30;
  const dropZoneH = 50;
  const bottomBarH = 46;

  layout.width = W;
  layout.height = H;
  layout.topBar    = { x: 0, y: 0,                                  w: W, h: topBarH };
  layout.diffBar   = { x: 0, y: topBarH,                            w: W, h: diffBarH };
  layout.preview   = { x: 0, y: topBarH + diffBarH,                 w: W, h: previewH };
  layout.dropZone  = { x: 0, y: topBarH + diffBarH + previewH,      w: W, h: dropZoneH };

  const gameTop    = topBarH + diffBarH + previewH + dropZoneH;
  const gameBottom = H - bottomBarH;
  layout.gameArea      = { x: 0, y: gameTop,    w: W, h: gameBottom - gameTop };
  layout.gameOverLineY = gameTop + 30;
  layout.bottomBar     = { x: 0, y: gameBottom, w: W, h: bottomBarH };
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  computeLayout();
}
window.addEventListener('resize', resize);
resize();

// === TURTLE RENDERER ===
function drawTurtle(ctx, x, y, level, scale = 1) {
  const t = TURTLES[level];
  const r = t.radius * scale;
  const s = r / 30; // scale to fill collision radius visually

  ctx.save();
  ctx.translate(x, y);

  // Shell (outer)
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 28 * s, 22 * s, 0, 0, Math.PI * 2);
  ctx.fillStyle = t.color;
  ctx.fill();

  // Shell (inner, darker)
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 22 * s, 17 * s, 0, 0, Math.PI * 2);
  ctx.fillStyle = t.darkColor;
  ctx.fill();

  // Shell pattern (varies by level)
  drawShellPattern(ctx, level, s);

  // Legs
  ctx.fillStyle = t.color;
  ctx.beginPath(); ctx.ellipse(-20 * s, 10 * s, 7 * s, 5 * s, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 20 * s, 10 * s, 7 * s, 5 * s,  0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-16 * s, 20 * s, 6 * s, 4 * s, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 16 * s, 20 * s, 6 * s, 4 * s,  0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,       26 * s, 3 * s, 5 * s,    0, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -16 * s, 10 * s, 0, Math.PI * 2);
  ctx.fillStyle = t.color;
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-4 * s, -18 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 4 * s, -18 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();

  // Smile
  ctx.beginPath();
  ctx.arc(0, -14 * s, 5 * s, 0.1, Math.PI - 0.1, false);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5 * s;
  ctx.stroke();

  // Silver crown for level 6 (Sulcata)
  if (level === 6) {
    drawCrown(ctx, s, true);
  }
  // Gold crown for level 8 (Galapagos)
  if (level === 8) {
    drawCrown(ctx, s, false);
  }

  ctx.restore();
}

function drawShellPattern(ctx, level, s) {
  if (level === 2) { // 花龟 - spots
    ctx.fillStyle = TURTLES[level].darkColor;
    ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.arc(-6 * s, -2 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 5 * s,  5 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (level === 3) { // 锦龟 - zigzag
    ctx.strokeStyle = TURTLES[level].darkColor;
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(-12 * s, -2 * s); ctx.lineTo(-6 * s, -8 * s); ctx.lineTo(0, -2 * s);
    ctx.lineTo(6 * s, -8 * s);   ctx.lineTo(12 * s, -2 * s);
    ctx.stroke();
  } else if (level >= 6 && level <= 8) { // 苏卡达/象龟/加拉帕戈斯 - grid
    ctx.fillStyle = TURTLES[level].darkColor;
    ctx.globalAlpha = 0.4;
    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < 2; col++) {
        const bx = (-8 + col * 14) * s;
        const by = (-6 + row * 14) * s;
        ctx.fillRect(bx, by, 10 * s, 10 * s);
      }
    }
    ctx.globalAlpha = 1;
  }
}

function drawCrown(ctx, s, silver) {
  ctx.fillStyle = silver ? '#C0C0C0' : '#FFD700';
  ctx.strokeStyle = silver ? '#888' : '#FFA000';
  ctx.lineWidth = 1 * s;
  ctx.beginPath();
  ctx.moveTo(-10 * s, -24 * s);
  ctx.lineTo( -7 * s, -32 * s);
  ctx.lineTo( -3 * s, -26 * s);
  ctx.lineTo(  0,     -34 * s);
  ctx.lineTo(  3 * s, -26 * s);
  ctx.lineTo(  7 * s, -32 * s);
  ctx.lineTo( 10 * s, -24 * s);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Glow ring
  ctx.strokeStyle = silver ? 'rgba(192, 192, 192, 0.25)' : 'rgba(255, 213, 79, 0.3)';
  ctx.lineWidth = 4 * s;
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 34 * s, 28 * s, 0, 0, Math.PI * 2);
  ctx.stroke();
}

// === END OF TURTLE RENDERER ===

// === PHYSICS ENGINE ===
class Body {
  constructor(x, y, level) {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.level = level;
    this.radius = TURTLES[level].radius;
    this.mass = this.radius * this.radius;
    this.invMass = 1 / this.mass;
    this.sleeping = false;
    this.sleepTimer = 0;
    this.mergeFlag = false;
    this.age = 0;
    this.id = Body.nextId++;
  }
}
Body.nextId = 0;

const world = {
  bodies: [],
  mergeQueue: [],
  addBody(x, y, level) {
    const b = new Body(x, y, level);
    this.bodies.push(b);
    return b;
  },
  removeBody(body) {
    const idx = this.bodies.indexOf(body);
    if (idx !== -1) this.bodies.splice(idx, 1);
  },
};

function detectCollisions(bodies, area) {
  const pairs = [];
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i], b = bodies[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.radius + b.radius;
      if (dist < minDist) {
        const nx = dist > 0.0001 ? dx / dist : 0;
        const ny = dist > 0.0001 ? dy / dist : 1;
        pairs.push({ a, b, nx, ny, overlap: minDist - dist });
      }
    }
  }
  const left = area.x + GAME.wallThickness;
  const right = area.x + area.w - GAME.wallThickness;
  const bottom = area.y + area.h;
  for (const body of bodies) {
    if (body.x - body.radius < left)
      pairs.push({ a: body, b: null, nx: 1, ny: 0, overlap: left - (body.x - body.radius), wall: 'left' });
    if (body.x + body.radius > right)
      pairs.push({ a: body, b: null, nx: -1, ny: 0, overlap: (body.x + body.radius) - right, wall: 'right' });
    if (body.y + body.radius > bottom)
      pairs.push({ a: body, b: null, nx: 0, ny: -1, overlap: (body.y + body.radius) - bottom, wall: 'bottom' });
  }
  return pairs;
}

function detectCollisionsOptimized(bodies, area) {
  if (bodies.length < 20) return detectCollisions(bodies, area);

  const cellSize = 160; // larger than biggest turtle diameter
  const grid = new Map();

  for (const body of bodies) {
    const cx = Math.floor(body.x / cellSize);
    const cy = Math.floor(body.y / cellSize);
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const key = `${cx+dx},${cy+dy}`;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push(body);
      }
    }
  }

  const pairs = [];
  const checked = new Set();

  for (const cell of grid.values()) {
    for (let i = 0; i < cell.length; i++) {
      for (let j = i + 1; j < cell.length; j++) {
        const a = cell[i], b = cell[j];
        const pairKey = a.id < b.id ? `${a.id}-${b.id}` : `${b.id}-${a.id}`;
        if (checked.has(pairKey)) continue;
        checked.add(pairKey);

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = a.radius + b.radius;
        if (dist < minDist) {
          const nx = dist > 0.0001 ? dx / dist : 0;
          const ny = dist > 0.0001 ? dy / dist : 1;
          pairs.push({ a, b, nx, ny, overlap: minDist - dist });
        }
      }
    }
  }

  // Wall collisions
  const left = area.x + GAME.wallThickness;
  const right = area.x + area.w - GAME.wallThickness;
  const bottom = area.y + area.h;
  for (const body of bodies) {
    if (body.x - body.radius < left)
      pairs.push({ a: body, b: null, nx: 1, ny: 0, overlap: left - (body.x - body.radius), wall: 'left' });
    if (body.x + body.radius > right)
      pairs.push({ a: body, b: null, nx: -1, ny: 0, overlap: (body.x + body.radius) - right, wall: 'right' });
    if (body.y + body.radius > bottom)
      pairs.push({ a: body, b: null, nx: 0, ny: -1, overlap: (body.y + body.radius) - bottom, wall: 'bottom' });
  }

  return pairs;
}

function solveCollision(pair) {
  const { a, b, nx, ny, overlap } = pair;
  if (!b) {
    // Wall collision
    const isGround = pair.wall === 'bottom';
    const fric = isGround ? PHYSICS.groundFriction : PHYSICS.friction;
    const e = PHYSICS.restitution;

    // Full position correction for walls (no slop needed)
    a.x += nx * overlap;
    a.y += ny * overlap;

    const vn = a.vx * nx + a.vy * ny;
    if (vn < 0) {
      // Only bounce if velocity is significant, otherwise just zero it
      if (Math.abs(vn) < 20) {
        // Kill tiny bounces to prevent jitter
        a.vx -= vn * nx;
        a.vy -= vn * ny;
      } else {
        a.vx -= (1 + e) * vn * nx;
        a.vy -= (1 + e) * vn * ny;
      }
      // Tangent friction
      const tx = -ny, ty = nx;
      const vt = a.vx * tx + a.vy * ty;
      const maxFric = Math.abs(vn) * fric;
      const fricImpulse = Math.max(-maxFric, Math.min(maxFric, -vt));
      a.vx += fricImpulse * tx;
      a.vy += fricImpulse * ty;
    }
    a.sleeping = false;
    a.sleepTimer = 0;
    return;
  }

  // Circle-circle collision
  // Merge check
  if (a.level === b.level && a.level < TURTLES.length - 1 && !a.mergeFlag && !b.mergeFlag) {
    a.mergeFlag = true;
    b.mergeFlag = true;
    world.mergeQueue.push({ a, b });
  }

  // Position correction with slop (Baumgarte stabilization)
  const totalInvMass = a.invMass + b.invMass;
  if (totalInvMass > 0) {
    const corrAmount = Math.max(0, overlap - PHYSICS.slop) * PHYSICS.correctionRate;
    const corrA = (a.invMass / totalInvMass) * corrAmount;
    const corrB = (b.invMass / totalInvMass) * corrAmount;
    a.x -= nx * corrA;
    a.y -= ny * corrA;
    b.x += nx * corrB;
    b.y += ny * corrB;
  }

  // Relative velocity along normal
  const dvx = a.vx - b.vx;
  const dvy = a.vy - b.vy;
  const vn = dvx * nx + dvy * ny;
  if (vn > 0) return; // separating

  // Normal impulse — kill tiny bounces
  const e = Math.abs(vn) < 20 ? 0 : PHYSICS.restitution;
  const j = -(1 + e) * vn / totalInvMass;
  a.vx += j * a.invMass * nx;
  a.vy += j * a.invMass * ny;
  b.vx -= j * b.invMass * nx;
  b.vy -= j * b.invMass * ny;

  // Tangent friction
  const tx = -ny, ty = nx;
  const vt = dvx * tx + dvy * ty;
  const maxFric = Math.abs(j) * PHYSICS.friction;
  let jt = -vt / totalInvMass;
  jt = Math.max(-maxFric, Math.min(maxFric, jt));
  a.vx += jt * a.invMass * tx;
  a.vy += jt * a.invMass * ty;
  b.vx -= jt * b.invMass * tx;
  b.vy -= jt * b.invMass * ty;

  // Wake both
  a.sleeping = false; a.sleepTimer = 0;
  b.sleeping = false; b.sleepTimer = 0;
}

let physicsAccumulator = 0;

function physicsStep(dt) {
  physicsAccumulator += dt;
  const fixedDt = PHYSICS.fixedDt;
  while (physicsAccumulator >= fixedDt) {
    physicsAccumulator -= fixedDt;
    for (const body of world.bodies) {
      if (body.sleeping) continue;
      body.vy += PHYSICS.gravity * fixedDt;
      // Stronger damping at low speeds to help settle
      const speed = Math.sqrt(body.vx * body.vx + body.vy * body.vy);
      const damp = speed < 30 ? 0.95 : PHYSICS.damping;
      body.vx *= damp;
      body.vy *= damp;
      body.x += body.vx * fixedDt;
      body.y += body.vy * fixedDt;
    }
    for (let iter = 0; iter < PHYSICS.solverIterations; iter++) {
      const pairs = detectCollisionsOptimized(world.bodies, layout.gameArea);
      for (const pair of pairs) {
        solveCollision(pair);
      }
    }
    processMerges();
    for (const body of world.bodies) {
      if (body.sleeping) continue;
      const speed = Math.sqrt(body.vx * body.vx + body.vy * body.vy);
      if (speed < PHYSICS.sleepThreshold) {
        body.sleepTimer += fixedDt;
        if (body.sleepTimer >= PHYSICS.sleepDelay) body.sleeping = true;
      } else {
        body.sleepTimer = 0;
      }
    }
  }
}

// === MERGE & PARTICLES ===
const particles = [];
const scorePopups = [];
let chainCount = 0;

// === GAME STATE ===
const game = {
  state: 'menu',
  difficulty: 'normal',
  score: 0,
  highScore: parseInt(localStorage.getItem('turtle_merge_high_score') || '0'),
  currentTurtle: null,
  nextLevel: 0,
  dropX: 0,
  canDrop: true,
  dropCooldownTimer: 0,
  gameOverTimer: 0,
  discoveredLevels: new Set(),

  reset() {
    this.score = 0;
    this.state = 'playing';
    this.canDrop = true;
    this.dropCooldownTimer = 0;
    this.gameOverTimer = 0;
    this.discoveredLevels = new Set();
    world.bodies = [];
    world.mergeQueue = [];
    particles.length = 0;
    scorePopups.length = 0;
    this.spawnNext();
  },

  spawnNext() {
    const maxDrop = DIFFICULTY[this.difficulty].maxDrop;
    this.nextLevel = Math.floor(Math.random() * maxDrop);
    if (this.currentTurtle === null) {
      this.currentTurtle = { level: this.nextLevel, x: layout.width / 2 };
      this.nextLevel = Math.floor(Math.random() * maxDrop);
    }
  },

  dropTurtle() {
    if (!this.canDrop || this.state !== 'playing') return;
    const t = this.currentTurtle;
    const dropY = layout.dropZone.y + layout.dropZone.h;
    world.addBody(t.x, dropY, t.level);
    this.discoveredLevels.add(t.level);
    playDropSound();
    this.canDrop = false;
    this.dropCooldownTimer = GAME.dropCooldown;
    this.currentTurtle = { level: this.nextLevel, x: layout.width / 2 };
    const maxDrop = DIFFICULTY[this.difficulty].maxDrop;
    this.nextLevel = Math.floor(Math.random() * maxDrop);
  },
};

function processMerges() {
  for (const { a, b } of world.mergeQueue) {
    const newLevel = a.level + 1;
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    world.removeBody(a);
    world.removeBody(b);
    const newBody = world.addBody(mx, my, newLevel);
    newBody.vx = ((a.vx + b.vx) / 2) * 0.5;
    newBody.vy = Math.min(((a.vy + b.vy) / 2) * 0.5, -50);
    const points = TURTLES[newLevel].score;
    game.score += points;
    chainCount++;
    const particleCount = chainCount > 1 ? 16 : 10;
    spawnMergeParticles(mx, my, TURTLES[newLevel].color, particleCount);
    const fontSize = chainCount > 1 ? 24 + chainCount * 4 : 20;
    scorePopups.push({ x: mx, y: my, text: `+${points}`, life: 0.8, maxLife: 0.8, fontSize });
    if (navigator.vibrate) navigator.vibrate(chainCount > 1 ? 100 : 50);
    if (typeof playMergeSound === 'function') playMergeSound(newLevel, chainCount);
    if (newLevel === TURTLES.length - 1) spawnCelebration(mx, my);
  }
  if (world.mergeQueue.length === 0) chainCount = 0;
  world.mergeQueue = [];
}

function spawnMergeParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = 80 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius: 3 + Math.random() * 3, color, life: 0.5, maxLife: 0.5 });
  }
}

function spawnCelebration(x, y) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 100 + Math.random() * 200;
    particles.push({ x: x + (Math.random() - 0.5) * 100, y: y + (Math.random() - 0.5) * 100, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 100, radius: 4 + Math.random() * 4, color: ['#FFD54F', '#FFD700', '#FFA000', '#FF8F00'][Math.floor(Math.random() * 4)], life: 2.0, maxLife: 2.0 });
  }
  if (navigator.vibrate) navigator.vibrate(200);
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const sp = scorePopups[i]; sp.y -= 40 * dt; sp.life -= dt;
    if (sp.life <= 0) scorePopups.splice(i, 1);
  }
}

function renderParticles(ctx) {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const sp of scorePopups) {
    ctx.globalAlpha = sp.life / sp.maxLife;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${sp.fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === AUDIO ENGINE ===
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playDropSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function playMergeSound(level, chain) {
  if (!audioCtx) return;
  const baseFreq = 300 + level * 80;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine'; osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + 0.15);
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
  osc.start(t); osc.stop(t + 0.3);
  if (chain > 1) {
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle'; osc2.connect(gain2); gain2.connect(audioCtx.destination);
    osc2.frequency.setValueAtTime(baseFreq * 1.25, t);
    osc2.frequency.exponentialRampToValueAtTime(baseFreq * 1.75, t + 0.2);
    gain2.gain.setValueAtTime(0.2, t);
    gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    osc2.start(t); osc2.stop(t + 0.3);
  }
}

function playFinalMergeSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  [523, 659, 784].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square'; osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, t + i * 0.15);
    gain.gain.setValueAtTime(0.2, t + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.15 + 0.4);
    osc.start(t + i * 0.15); osc.stop(t + i * 0.15 + 0.4);
  });
}

function playGameOverSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth'; osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
  osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// === INPUT HANDLER ===
let touching = false;

function getEventX(e) {
  if (e.touches && e.touches.length > 0) return e.touches[0].clientX;
  return e.clientX;
}
function getEventY(e) {
  if (e.touches && e.touches.length > 0) return e.touches[0].clientY;
  return e.clientY;
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  touching = true;
  const x = getEventX(e), y = getEventY(e);
  handleTap(x, y);
  handlePointerMove(x);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (touching) handlePointerMove(getEventX(e));
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (touching && game.state === 'playing') game.dropTurtle();
  touching = false;
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  initAudio();
  touching = true;
  handleTap(e.clientX, e.clientY);
  handlePointerMove(e.clientX);
});
canvas.addEventListener('mousemove', (e) => {
  if (touching) handlePointerMove(e.clientX);
});
canvas.addEventListener('mouseup', () => {
  if (touching && game.state === 'playing') game.dropTurtle();
  touching = false;
});

function handlePointerMove(x) {
  if (game.state === 'playing' && game.currentTurtle) {
    const r = TURTLES[game.currentTurtle.level].radius;
    const left = layout.gameArea.x + GAME.wallThickness + r;
    const right = layout.gameArea.x + layout.gameArea.w - GAME.wallThickness - r;
    game.currentTurtle.x = Math.max(left, Math.min(right, x));
  }
}

function handleTap(x, y) {
  if (game.state === 'gameover') {
    if (hitTest(x, y, game.restartBtn)) { game.reset(); return; }
    if (hitTest(x, y, game.shareBtn)) { shareScore(); return; }
    return;
  }
  if (world.bodies.length === 0) {
    const db = layout.diffBar;
    const diffs = ['easy', 'normal', 'hard'];
    const btnW = 50, btnH = 18;
    const startX = db.x + (db.w - diffs.length * (btnW + 8)) / 2;
    diffs.forEach((d, i) => {
      const bx = startX + i * (btnW + 8);
      const by = db.y + (db.h - btnH) / 2;
      if (x >= bx && x <= bx + btnW && y >= by && y <= by + btnH) {
        game.difficulty = d;
        localStorage.setItem('turtle_merge_difficulty', d);
        game.reset();
      }
    });
  }
}

function hitTest(x, y, rect) {
  return rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

function shareScore() {
  const maxTurtle = Math.max(...game.discoveredLevels);
  const name = TURTLES[maxTurtle]?.name || '草龟';
  const text = `🐢 我在【合成大乌龟】中获得了 ${game.score} 分！最高合成到了${name}！来挑战我吧 →`;
  navigator.clipboard?.writeText(text).then(() => {
    scorePopups.push({ x: layout.width / 2, y: layout.height / 2 - 50, text: '已复制到剪贴板!', life: 1.5, maxLife: 1.5, fontSize: 16 });
  });
}

// === UI LAYER ===
function renderHUD(ctx) {
  const tb = layout.topBar;
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(tb.x, tb.y, tb.w, tb.h);
  ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('分数', tb.x + 12, tb.y + 14);
  ctx.fillStyle = '#FFD54F'; ctx.font = 'bold 18px sans-serif';
  ctx.fillText(game.score.toLocaleString(), tb.x + 12, tb.y + 34);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🐢 合成大乌龟', tb.x + tb.w / 2, tb.y + 28);
  ctx.fillStyle = '#888'; ctx.font = '10px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('最高', tb.x + tb.w - 12, tb.y + 14);
  ctx.fillStyle = '#aaa'; ctx.font = '14px sans-serif';
  ctx.fillText(game.highScore.toLocaleString(), tb.x + tb.w - 12, tb.y + 34);
}

function renderDifficultyBar(ctx) {
  const db = layout.diffBar;
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(db.x, db.y, db.w, db.h);
  const diffs = ['easy', 'normal', 'hard'];
  const labels = ['简单', '普通', '困难'];
  const colors = ['#8BC34A', '#FFD54F', '#FF5252'];
  const btnW = 50, btnH = 18;
  const startX = db.x + (db.w - diffs.length * (btnW + 8)) / 2;
  diffs.forEach((d, i) => {
    const bx = startX + i * (btnW + 8);
    const by = db.y + (db.h - btnH) / 2;
    const active = game.difficulty === d;
    ctx.fillStyle = active ? colors[i] : '#2a2a4a';
    ctx.beginPath(); ctx.roundRect(bx, by, btnW, btnH, 9); ctx.fill();
    ctx.fillStyle = active ? (d === 'normal' ? '#333' : '#fff') : '#888';
    ctx.font = `${active ? 'bold ' : ''}10px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(labels[i], bx + btnW / 2, by + 13);
  });
}

function renderPreview(ctx) {
  const pv = layout.preview;
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(pv.x, pv.y, pv.w, pv.h);
  ctx.fillStyle = '#666'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('下一个:', pv.x + pv.w / 2 - 15, pv.y + 19);
  drawTurtle(ctx, pv.x + pv.w / 2 + 20, pv.y + 15, game.nextLevel, 0.35);
}

function renderDropZone(ctx) {
  const dz = layout.dropZone;
  if (game.currentTurtle && game.canDrop) {
    const t = game.currentTurtle;
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = `${TURTLES[t.level].color}44`;
    ctx.beginPath(); ctx.moveTo(t.x, dz.y); ctx.lineTo(t.x, layout.gameArea.y + layout.gameArea.h);
    ctx.stroke(); ctx.setLineDash([]);
    drawTurtle(ctx, t.x, dz.y + dz.h / 2, t.level, 0.8);
  }
}

// === OCEAN BACKGROUND ===
const bubbles = [];
for (let i = 0; i < 15; i++) {
  bubbles.push({
    x: Math.random(),        // 0-1 relative to game area width
    y: Math.random(),        // 0-1 relative to game area height
    r: 2 + Math.random() * 5,
    speed: 15 + Math.random() * 25,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.5 + Math.random() * 1.5,
  });
}

function renderGameArea(ctx) {
  const ga = layout.gameArea;

  // Ocean gradient background
  const grad = ctx.createLinearGradient(0, ga.y, 0, ga.y + ga.h);
  grad.addColorStop(0, '#0a1628');   // deep dark blue (surface)
  grad.addColorStop(0.3, '#0d2137'); // mid ocean
  grad.addColorStop(0.7, '#0f2b4a'); // lighter deep
  grad.addColorStop(1, '#133a5e');   // ocean floor
  ctx.fillStyle = grad;
  ctx.fillRect(ga.x, ga.y, ga.w, ga.h);

  // Sandy ocean floor
  const floorH = 8;
  const floorGrad = ctx.createLinearGradient(0, ga.y + ga.h - floorH, 0, ga.y + ga.h);
  floorGrad.addColorStop(0, 'rgba(194, 178, 128, 0.15)');
  floorGrad.addColorStop(1, 'rgba(194, 178, 128, 0.3)');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(ga.x, ga.y + ga.h - floorH, ga.w, floorH);

  // Seaweed (static, drawn from bottom)
  ctx.globalAlpha = 0.2;
  const seaweedPositions = [0.1, 0.25, 0.55, 0.75, 0.9];
  seaweedPositions.forEach((xRatio, idx) => {
    const sx = ga.x + ga.w * xRatio;
    const sy = ga.y + ga.h;
    const height = 40 + (idx % 3) * 20;
    ctx.strokeStyle = idx % 2 === 0 ? '#1a6b3a' : '#1a5c2e';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    const time = Date.now() / 1000;
    for (let h = 0; h < height; h += 4) {
      const sway = Math.sin(time * 0.8 + h * 0.08 + idx) * 6;
      ctx.lineTo(sx + sway, sy - h);
    }
    ctx.stroke();
  });
  ctx.globalAlpha = 1;

  // Animated bubbles
  ctx.globalAlpha = 0.15;
  const time = Date.now() / 1000;
  for (const b of bubbles) {
    b.y -= b.speed * PHYSICS.fixedDt / ga.h;
    if (b.y < -0.05) { b.y = 1.05; b.x = Math.random(); }
    const bx = ga.x + b.x * ga.w + Math.sin(time * b.wobbleSpeed + b.wobble) * 8;
    const by = ga.y + b.y * ga.h;
    ctx.strokeStyle = '#7ec8e3';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx, by, b.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Light rays from top
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < 3; i++) {
    const rx = ga.x + ga.w * (0.2 + i * 0.3);
    const rw = 30 + i * 15;
    const rayGrad = ctx.createLinearGradient(0, ga.y, 0, ga.y + ga.h * 0.7);
    rayGrad.addColorStop(0, '#7ec8e3');
    rayGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = rayGrad;
    ctx.beginPath();
    ctx.moveTo(rx - rw / 2, ga.y);
    ctx.lineTo(rx + rw / 2, ga.y);
    ctx.lineTo(rx + rw, ga.y + ga.h * 0.7);
    ctx.lineTo(rx - rw, ga.y + ga.h * 0.7);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Walls
  ctx.fillStyle = 'rgba(42, 62, 90, 0.6)';
  ctx.fillRect(ga.x, ga.y, GAME.wallThickness, ga.h);
  ctx.fillRect(ga.x + ga.w - GAME.wallThickness, ga.y, GAME.wallThickness, ga.h);

  // Game over line
  ctx.setLineDash([6, 4]); ctx.strokeStyle = 'rgba(255,80,80,0.3)';
  ctx.beginPath(); ctx.moveTo(ga.x, layout.gameOverLineY); ctx.lineTo(ga.x + ga.w, layout.gameOverLineY);
  ctx.stroke(); ctx.setLineDash([]);

  // Bodies
  for (const body of world.bodies) {
    drawTurtle(ctx, body.x, body.y, body.level);
    game.discoveredLevels.add(body.level);
  }
  renderParticles(ctx);
}

function renderBottomBar(ctx) {
  const bb = layout.bottomBar;
  ctx.fillStyle = '#0a1220'; ctx.fillRect(bb.x, bb.y, bb.w, bb.h);
  const spacing = 38;
  const totalW = TURTLES.length * spacing;
  let startX = bb.x + (bb.w - totalW) / 2;
  TURTLES.forEach((t, i) => {
    ctx.globalAlpha = game.discoveredLevels.has(i) ? 1 : 0.25;
    drawTurtle(ctx, startX + i * spacing + spacing / 2, bb.y + bb.h / 2, i, 0.28);
  });
  ctx.globalAlpha = 1;
}

function renderGameOverPanel(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, layout.width, layout.height);
  const pw = 260, ph = 220;
  const px = (layout.width - pw) / 2, py = (layout.height - ph) / 2;
  ctx.fillStyle = '#1e1e3a'; ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.fill();
  ctx.strokeStyle = '#3a3a6a'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('游戏结束', px + pw / 2, py + 40);
  ctx.fillStyle = '#FFD54F'; ctx.font = 'bold 36px sans-serif';
  ctx.fillText(game.score.toLocaleString(), px + pw / 2, py + 90);
  ctx.fillStyle = '#888'; ctx.font = '13px sans-serif';
  ctx.fillText(`最高分: ${game.highScore.toLocaleString()}`, px + pw / 2, py + 115);
  ctx.fillStyle = '#4CAF50'; ctx.beginPath(); ctx.roundRect(px + 20, py + 140, 100, 40, 10); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 15px sans-serif';
  ctx.fillText('再来一局', px + 70, py + 165);
  ctx.fillStyle = '#2196F3'; ctx.beginPath(); ctx.roundRect(px + 140, py + 140, 100, 40, 10); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillText('分享', px + 190, py + 165);
  game.restartBtn = { x: px + 20, y: py + 140, w: 100, h: 40 };
  game.shareBtn = { x: px + 140, y: py + 140, w: 100, h: 40 };
}

// === GAME LOOP ===
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (game.state === 'playing') {
    if (!game.canDrop) {
      game.dropCooldownTimer -= dt;
      if (game.dropCooldownTimer <= 0) game.canDrop = true;
    }
    physicsStep(dt);
    for (const body of world.bodies) body.age += dt;
    let anyAbove = false;
    for (const body of world.bodies) {
      if (body.age > 1.0 && body.y - body.radius < layout.gameOverLineY) { anyAbove = true; break; }
    }
    if (anyAbove) {
      game.gameOverTimer += dt;
      if (game.gameOverTimer >= GAME.gameOverDelay) {
        game.state = 'gameover';
        if (game.score > game.highScore) {
          game.highScore = game.score;
          localStorage.setItem('turtle_merge_high_score', game.highScore.toString());
        }
        playGameOverSound();
        if (navigator.vibrate) navigator.vibrate(200);
      }
    } else {
      game.gameOverTimer = 0;
    }
  }

  updateParticles(dt);

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  renderHUD(ctx);
  renderDifficultyBar(ctx);
  renderPreview(ctx);
  renderDropZone(ctx);
  renderGameArea(ctx);
  renderBottomBar(ctx);

  if (game.state === 'gameover') renderGameOverPanel(ctx);

  requestAnimationFrame(gameLoop);
}

// === INIT ===
game.difficulty = localStorage.getItem('turtle_merge_difficulty') || 'normal';
computeLayout();
game.reset();
requestAnimationFrame(gameLoop);
</script>
