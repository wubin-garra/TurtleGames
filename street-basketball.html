<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Street Basketball</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #222;
  display: flex; justify-content: center; align-items: center;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CONFIG = {
  WIDTH: 800,
  HEIGHT: 450,
  GROUND_Y: 340,
  GRAVITY: 800,
  COLORS: {
    paper:    '#f5f0e0',
    ink:      '#333333',
    red:      '#ff3366',
    blue:     '#3366ff',
    orange:   '#ff8833',
    green:    '#44cc44',
    yellow:   '#ffcc00',
    purple:   '#6666cc',
    brown:    '#8B7355',
    white:    '#ffffff',
    rimRed:   '#ff3300',
  }
};

CONFIG.ENDLESS = {
  INITIAL_TIME: 60,
  BONUS_TIME: 5,
  BONUS_EVERY: 5,
};

CONFIG.LEVELS = [
  // Area 1: Street Corner (1-5)
  { id:1,  area:'street',  name:'初试身手', target:300,  balls:10, playerX:200, wind:0, weather:'clear', rimMove:false, obstacles:false, stars:[300,500,800] },
  { id:2,  area:'street',  name:'左右开弓', target:400,  balls:10, playerX:0,   wind:0, weather:'clear', rimMove:false, obstacles:false, stars:[400,700,1000], randomPos:true },
  { id:3,  area:'street',  name:'移动目标', target:500,  balls:12, playerX:180, wind:0, weather:'clear', rimMove:true,  obstacles:false, stars:[500,800,1200] },
  { id:4,  area:'street',  name:'逆风投篮', target:500,  balls:12, playerX:160, wind:2, weather:'windy', rimMove:false, obstacles:false, stars:[500,900,1300] },
  { id:5,  area:'street',  name:'街角之王', target:800,  balls:0,  playerX:180, wind:1, weather:'clear', rimMove:false, obstacles:false, stars:[800,1200,1800], timeLimit:30 },
  // Area 2: City Park (6-10)
  { id:6,  area:'park',    name:'远距离',   target:600,  balls:10, playerX:120, wind:1, weather:'clear', rimMove:false, obstacles:false, stars:[600,1000,1500] },
  { id:7,  area:'park',    name:'雨中作战', target:600,  balls:12, playerX:150, wind:0, weather:'rain',  rimMove:false, obstacles:false, stars:[600,1000,1500] },
  { id:8,  area:'park',    name:'夜幕降临', target:700,  balls:12, playerX:160, wind:1, weather:'night', rimMove:false, obstacles:false, stars:[700,1100,1600] },
  { id:9,  area:'park',    name:'风雨交加', target:700,  balls:12, playerX:140, wind:3, weather:'rain',  rimMove:true,  obstacles:false, stars:[700,1200,1800] },
  { id:10, area:'park',    name:'公园霸主', target:1000, balls:0,  playerX:130, wind:3, weather:'rain',  rimMove:true,  obstacles:false, stars:[1000,1600,2400], timeLimit:30 },
  // Area 3: Rooftop (11-15)
  { id:11, area:'rooftop', name:'天台初探', target:800,  balls:12, playerX:130, wind:2, weather:'windy', rimMove:false, obstacles:true,  stars:[800,1300,1900] },
  { id:12, area:'rooftop', name:'摇晃篮筐', target:900,  balls:12, playerX:140, wind:2, weather:'clear', rimMove:true,  obstacles:true,  stars:[900,1400,2100], rimShake:true },
  { id:13, area:'rooftop', name:'暴风之夜', target:900,  balls:12, playerX:120, wind:4, weather:'night', rimMove:false, obstacles:true,  stars:[900,1500,2200] },
  { id:14, area:'rooftop', name:'极限挑战', target:1000, balls:14, playerX:110, wind:3, weather:'rain',  rimMove:true,  obstacles:true,  stars:[1000,1600,2400], rimShake:true },
  { id:15, area:'rooftop', name:'街球传奇', target:1500, balls:0,  playerX:110, wind:4, weather:'rain',  rimMove:true,  obstacles:true,  stars:[1500,2200,3200], timeLimit:35, rimShake:true },
];

// ─── STORAGE HELPERS ──────────────────────────────────────────────────────────
function loadSave() {
  try { return JSON.parse(localStorage.getItem('streetball') || '{}'); } catch(e) { return {}; }
}
function writeSave(data) {
  try { localStorage.setItem('streetball', JSON.stringify(data)); } catch(e) {}
}

// ─── MENU SCENE ───────────────────────────────────────────────────────────────
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'MenuScene' }); }

  create() {
    this.drawBackground();
    this.drawTitle();
    this.drawModeButtons();
    this.drawHighScore();
    this.drawBottomBar();
    this.drawBouncer();
  }

  drawBackground() {
    const g = this.add.graphics();

    // Paper fill
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Notebook lines
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    // Red margin line
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();

    // Random paint splashes
    const splashes = [
      { x: 80,  y: 60,  r: 28, c: 0xff3366, a: 0.12 },
      { x: 720, y: 90,  r: 20, c: 0x3366ff, a: 0.13 },
      { x: 150, y: 380, r: 22, c: 0x44cc44, a: 0.11 },
      { x: 650, y: 350, r: 18, c: 0xffcc00, a: 0.15 },
      { x: 400, y: 30,  r: 16, c: 0xff8833, a: 0.13 },
      { x: 760, y: 230, r: 24, c: 0x6666cc, a: 0.12 },
      { x: 30,  y: 200, r: 20, c: 0xff3366, a: 0.10 },
    ];
    splashes.forEach(s => {
      g.fillStyle(s.c, s.a);
      g.fillCircle(s.x, s.y, s.r);
      g.fillRect(s.x - 3, s.y, 6, s.r * 0.7);
    });
  }

  drawTitle() {
    // Main title
    const title = this.add.text(CONFIG.WIDTH / 2, 90, '🏀 街头篮球', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '56px',
      color: CONFIG.COLORS.ink,
      stroke: '#888866',
      strokeThickness: 3,
    });
    title.setOrigin(0.5);
    title.setAngle(-2);

    // Subtitle
    const sub = this.add.text(CONFIG.WIDTH / 2, 150, 'STREET BASKETBALL', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '22px',
      color: CONFIG.COLORS.red,
      stroke: '#440011',
      strokeThickness: 3,
    });
    sub.setOrigin(0.5);
    sub.setAngle(1);
  }

  drawModeButtons() {
    const btnW = 300, btnH = 60, btnR = 14;
    const centerX = CONFIG.WIDTH / 2;
    const btnY1 = 220, btnY2 = 310;

    // ── Endless mode button ──
    const endlessBg = this.add.graphics();
    endlessBg.fillStyle(0xff3333, 0.12);
    endlessBg.fillRoundedRect(centerX - btnW / 2, btnY1 - btnH / 2, btnW, btnH, btnR);
    endlessBg.lineStyle(3, 0xff3333, 0.9);
    endlessBg.strokeRoundedRect(centerX - btnW / 2, btnY1 - btnH / 2, btnW, btnH, btnR);

    const endlessTxt = this.add.text(centerX, btnY1 - 8, '⏱ 无尽挑战', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '22px',
      color: '#cc2200',
      stroke: '#ffffff',
      strokeThickness: 2,
    });
    endlessTxt.setOrigin(0.5);
    endlessTxt.setInteractive({ useHandCursor: true });

    const endlessSub = this.add.text(centerX, btnY1 + 16, '60秒 · 冲击最高分', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px',
      color: '#885533',
    });
    endlessSub.setOrigin(0.5);

    // ── Level mode button ──
    const levelBg = this.add.graphics();
    levelBg.fillStyle(0x3366ff, 0.12);
    levelBg.fillRoundedRect(centerX - btnW / 2, btnY2 - btnH / 2, btnW, btnH, btnR);
    levelBg.lineStyle(3, 0x3366ff, 0.9);
    levelBg.strokeRoundedRect(centerX - btnW / 2, btnY2 - btnH / 2, btnW, btnH, btnR);

    const levelTxt = this.add.text(centerX, btnY2 - 8, '🏆 关卡模式', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '22px',
      color: '#1133aa',
      stroke: '#ffffff',
      strokeThickness: 2,
    });
    levelTxt.setOrigin(0.5);
    levelTxt.setInteractive({ useHandCursor: true });

    const levelSub = this.add.text(centerX, btnY2 + 16, '15关挑战 · 3大区域', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px',
      color: '#224488',
    });
    levelSub.setOrigin(0.5);

    // ── Character select placeholder ──
    const charTxt = this.add.text(centerX, 385, '👤 角色选择', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '15px',
      color: '#888877',
      stroke: '#f5f0e0',
      strokeThickness: 2,
    });
    charTxt.setOrigin(0.5);
    charTxt.setInteractive({ useHandCursor: true });

    // ── Hover effects ──
    const addHover = (txt, scale) => {
      txt.on('pointerover', () => this.tweens.add({ targets: txt, scaleX: scale, scaleY: scale, duration: 100 }));
      txt.on('pointerout',  () => this.tweens.add({ targets: txt, scaleX: 1,     scaleY: 1,     duration: 100 }));
    };
    addHover(endlessTxt, 1.07);
    addHover(levelTxt,   1.07);
    addHover(charTxt,    1.1);

    // ── Click handlers ──
    endlessTxt.on('pointerdown', () => {
      this.scene.start('GameScene', { mode: 'endless', level: 1 });
    });
    levelTxt.on('pointerdown', () => {
      this.scene.start('LevelSelectScene');
    });
  }

  drawHighScore() {
    const save = loadSave();
    const hs = save.highScore || 0;
    if (hs <= 0) return;

    const hsTxt = this.add.text(CONFIG.WIDTH / 2, 175, '🏆 最高分: ' + hs, {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '16px',
      color: '#cc8800',
      stroke: '#f5f0e0',
      strokeThickness: 3,
    });
    hsTxt.setOrigin(0.5);
  }

  drawBottomBar() {
    // Back to game library
    const backTxt = this.add.text(14, CONFIG.HEIGHT - 22, '← 返回游戏库', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px',
      color: '#888877',
      stroke: '#f5f0e0',
      strokeThickness: 2,
    });
    backTxt.setOrigin(0, 1);
    backTxt.setInteractive({ useHandCursor: true });
    backTxt.on('pointerover', () => backTxt.setColor('#444433'));
    backTxt.on('pointerout',  () => backTxt.setColor('#888877'));
    backTxt.on('pointerdown', () => { window.location.href = 'index.html'; });

    // Sound toggle
    const save = loadSave();
    let soundOn = save.soundOn !== false; // default true
    const soundTxt = this.add.text(CONFIG.WIDTH - 14, CONFIG.HEIGHT - 22, soundOn ? '🔊' : '🔇', {
      fontSize: '22px',
    });
    soundTxt.setOrigin(1, 1);
    soundTxt.setInteractive({ useHandCursor: true });
    soundTxt.on('pointerdown', () => {
      soundOn = !soundOn;
      soundTxt.setText(soundOn ? '🔊' : '🔇');
      const s = loadSave();
      s.soundOn = soundOn;
      writeSave(s);
    });
  }

  drawBouncer() {
    // Bouncing basketball decoration
    const ball = this.add.text(CONFIG.WIDTH - 80, 240, '🏀', { fontSize: '40px' });
    ball.setOrigin(0.5);
    this.tweens.add({
      targets: ball,
      y: 270,
      duration: 400,
      yoyo: true,
      repeat: -1,
      ease: 'Bounce.easeOut',
    });
  }
}

// ─── RESULT SCENE ─────────────────────────────────────────────────────────────
class ResultScene extends Phaser.Scene {
  constructor() { super({ key: 'ResultScene' }); }

  init(data) {
    this.resultScore = data?.score   || 0;
    this.resultCombo = data?.combo   || 0;
    this.resultBasks = data?.baskets || 0;
    this.resultMode  = data?.mode    || 'endless';
    this.resultLevel = data?.level   || 1;
    this.isNewHigh   = data?.isNewHigh || false;
    this.resultStars = data?.stars   ?? null;
    this.resultPassed = data?.passed ?? null;
  }

  create() {
    this.drawBackground();
    this.drawTitle();
    this.drawScore();
    this.drawStats();
    if (this.resultMode === 'level') {
      this.drawLevelResult();
    }
    this.drawButtons();
  }

  drawBackground() {
    const g = this.add.graphics();

    // Paper fill
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Notebook lines
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    // Red margin
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();
  }

  drawTitle() {
    // Shadow
    const shadow = this.add.text(CONFIG.WIDTH / 2 + 3, 78, 'GAME OVER', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '64px',
      color: '#ffcc00',
    });
    shadow.setOrigin(0.5);
    shadow.setAngle(-4);

    // Main title
    const title = this.add.text(CONFIG.WIDTH / 2, 75, 'GAME OVER', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '64px',
      color: '#cc2233',
      stroke: '#440011',
      strokeThickness: 5,
    });
    title.setOrigin(0.5);
    title.setAngle(-4);
  }

  drawScore() {
    const cx = CONFIG.WIDTH / 2;
    const isLevel = this.resultMode === 'level';

    // Score number
    const scoreTxt = this.add.text(cx, isLevel ? 140 : 165, '' + this.resultScore, {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: isLevel ? '56px' : '72px',
      color: CONFIG.COLORS.ink,
      stroke: '#888866',
      strokeThickness: 3,
    });
    scoreTxt.setOrigin(0.5);

    // POINTS label
    const label = this.add.text(cx, isLevel ? 182 : 215, 'POINTS', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#888877',
    });
    label.setOrigin(0.5);

    // New high score
    if (this.isNewHigh) {
      const hsTxt = this.add.text(cx, 248, '★ NEW HIGH SCORE! ★', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '20px',
        color: '#ffcc00',
        stroke: '#884400',
        strokeThickness: 3,
      });
      hsTxt.setOrigin(0.5);
      // Pulsing tween
      this.tweens.add({
        targets: hsTxt,
        scaleX: 1.12, scaleY: 1.12,
        duration: 500,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut',
      });
    }
  }

  drawStats() {
    const cardW = 150, cardH = 72, cardR = 12;
    const y = this.resultMode === 'level' ? 240 : 290;
    const cx = CONFIG.WIDTH / 2;
    const gap = 30;
    const x1 = cx - cardW - gap / 2;
    const x2 = cx + gap / 2;

    // Card helper
    const drawCard = (x, icon, topLabel, value) => {
      const bg = this.add.graphics();
      bg.fillStyle(0xffffff, 0.85);
      bg.fillRoundedRect(x, y, cardW, cardH, cardR);
      bg.lineStyle(2, 0xccccbb, 0.8);
      bg.strokeRoundedRect(x, y, cardW, cardH, cardR);

      this.add.text(x + cardW / 2, y + 14, icon + ' ' + topLabel, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '13px',
        color: '#888877',
      }).setOrigin(0.5);

      this.add.text(x + cardW / 2, y + 44, '' + value, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '28px',
        color: CONFIG.COLORS.ink,
        stroke: '#ccccaa',
        strokeThickness: 2,
      }).setOrigin(0.5);
    };

    drawCard(x1, '🏀', 'BASKETS', this.resultBasks);
    drawCard(x2, '🔥', 'MAX COMBO', this.resultCombo);
  }

  drawButtons() {
    const btnW = 170, btnH = 50, btnR = 12;
    const y = this.resultMode === 'level' ? 355 : 385;
    const cx = CONFIG.WIDTH / 2;
    const gap = 20;
    const x1 = cx - btnW - gap / 2;
    const x2 = cx + gap / 2;

    // Replay button
    const replayBg = this.add.graphics();
    replayBg.fillStyle(0x3366ff, 0.15);
    replayBg.fillRoundedRect(x1, y - btnH / 2, btnW, btnH, btnR);
    replayBg.lineStyle(3, 0x3366ff, 0.9);
    replayBg.strokeRoundedRect(x1, y - btnH / 2, btnW, btnH, btnR);

    const replayTxt = this.add.text(x1 + btnW / 2, y, '🔄 REPLAY', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#1133aa',
      stroke: '#ffffff',
      strokeThickness: 2,
    });
    replayTxt.setOrigin(0.5);
    replayTxt.setInteractive({ useHandCursor: true });

    // Menu button
    const menuBg = this.add.graphics();
    menuBg.fillStyle(0x6666cc, 0.15);
    menuBg.fillRoundedRect(x2, y - btnH / 2, btnW, btnH, btnR);
    menuBg.lineStyle(3, 0x6666cc, 0.9);
    menuBg.strokeRoundedRect(x2, y - btnH / 2, btnW, btnH, btnR);

    const menuTxt = this.add.text(x2 + btnW / 2, y, '🏠 MENU', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#444499',
      stroke: '#ffffff',
      strokeThickness: 2,
    });
    menuTxt.setOrigin(0.5);
    menuTxt.setInteractive({ useHandCursor: true });

    // Hover effects
    const addHover = (txt, scale) => {
      txt.on('pointerover', () => this.tweens.add({ targets: txt, scaleX: scale, scaleY: scale, duration: 100 }));
      txt.on('pointerout',  () => this.tweens.add({ targets: txt, scaleX: 1,     scaleY: 1,     duration: 100 }));
    };
    addHover(replayTxt, 1.08);
    addHover(menuTxt,   1.08);

    // Click handlers
    replayTxt.on('pointerdown', () => {
      this.scene.start('GameScene', { mode: this.resultMode, level: this.resultLevel });
    });
    menuTxt.on('pointerdown', () => {
      if (this.resultMode === 'level') {
        this.scene.start('LevelSelectScene');
      } else {
        this.scene.start('MenuScene');
      }
    });

    // Next level button (level mode, passed, not last level)
    if (this.resultMode === 'level' && this.resultPassed && this.resultLevel < 15) {
      const nextBtnW = 170, nextBtnH = 50, nextBtnR = 12;
      const nextY = y + 60;
      const nextX = cx - nextBtnW / 2;

      const nextBg = this.add.graphics();
      nextBg.fillStyle(0xff8833, 0.2);
      nextBg.fillRoundedRect(nextX, nextY - nextBtnH / 2, nextBtnW, nextBtnH, nextBtnR);
      nextBg.lineStyle(3, 0xff8833, 0.9);
      nextBg.strokeRoundedRect(nextX, nextY - nextBtnH / 2, nextBtnW, nextBtnH, nextBtnR);

      const nextTxt = this.add.text(nextX + nextBtnW / 2, nextY, '▶ 下一关', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '18px',
        color: '#884400',
        stroke: '#ffffff',
        strokeThickness: 2,
      });
      nextTxt.setOrigin(0.5);
      nextTxt.setInteractive({ useHandCursor: true });
      nextTxt.on('pointerover', () => this.tweens.add({ targets: nextTxt, scaleX: 1.08, scaleY: 1.08, duration: 100 }));
      nextTxt.on('pointerout',  () => this.tweens.add({ targets: nextTxt, scaleX: 1, scaleY: 1, duration: 100 }));
      nextTxt.on('pointerdown', () => {
        this.scene.start('GameScene', { mode: 'level', level: this.resultLevel + 1 });
      });
    }
  }

  drawLevelResult() {
    const cx = CONFIG.WIDTH / 2;
    const cfg = CONFIG.LEVELS[this.resultLevel - 1];
    const stars = this.resultStars || 0;
    const passed = this.resultPassed;

    // PASSED / FAILED label
    const statusTxt = this.add.text(cx, 248, passed ? 'PASSED!' : 'FAILED...', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '26px',
      color: passed ? '#44cc44' : '#cc4444',
      stroke: passed ? '#004400' : '#440000',
      strokeThickness: 3,
    });
    statusTxt.setOrigin(0.5);
    if (passed) {
      this.tweens.add({ targets: statusTxt, scaleX: 1.1, scaleY: 1.1, duration: 400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    }

    // Star display
    const starStr = [0,1,2].map(i => i < stars ? '⭐' : '☆').join(' ');
    this.add.text(cx, 278, starStr, { fontSize: '28px' }).setOrigin(0.5);

    // Target score info
    if (cfg) {
      const targetTxt = this.add.text(cx, 310, '目标: ' + cfg.stars[0] + ' / ' + cfg.stars[1] + ' / ' + cfg.stars[2], {
        fontFamily: 'Arial, sans-serif',
        fontSize: '12px',
        color: '#888877',
      });
      targetTxt.setOrigin(0.5);
    }
  }
}

// ─── LEVEL SELECT SCENE ───────────────────────────────────────────────────────
class LevelSelectScene extends Phaser.Scene {
  constructor() { super({ key: 'LevelSelectScene' }); }

  create() {
    this.drawBackground();
    this.drawTitle();
    this.drawAreas();
    this.drawBackButton();
  }

  drawBackground() {
    const g = this.add.graphics();
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();
  }

  drawTitle() {
    const title = this.add.text(CONFIG.WIDTH / 2, 30, '🏆 选择关卡', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '30px',
      color: '#333333',
      stroke: '#888866',
      strokeThickness: 3,
    });
    title.setOrigin(0.5);
    title.setAngle(-1);
  }

  drawAreas() {
    const save = loadSave();
    const levelStars = save.levelStars || {};

    const areas = [
      { key: 'street',  label: '🏙 街角球场', color: 0xff3333, ids: [1,2,3,4,5],    y: 90  },
      { key: 'park',    label: '🌳 城市公园', color: 0x44aa44, ids: [6,7,8,9,10],   y: 220 },
      { key: 'rooftop', label: '🏢 天台球场', color: 0x3366ff, ids: [11,12,13,14,15], y: 350 },
    ];

    areas.forEach(area => {
      // Area header
      const hg = this.add.graphics();
      hg.fillStyle(area.color, 0.15);
      hg.fillRoundedRect(80, area.y, 640, 28, 8);
      hg.lineStyle(2, area.color, 0.7);
      hg.strokeRoundedRect(80, area.y, 640, 28, 8);

      this.add.text(CONFIG.WIDTH / 2, area.y + 14, area.label, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '14px',
        color: '#333333',
      }).setOrigin(0.5);

      // Level boxes
      const boxW = 96, boxH = 90, boxR = 10;
      const totalW = area.ids.length * boxW + (area.ids.length - 1) * 16;
      const startX = (CONFIG.WIDTH - totalW) / 2;

      area.ids.forEach((levelId, i) => {
        const bx = startX + i * (boxW + 16);
        const by = area.y + 35;

        // Check lock state: level 1 always unlocked, others need prev level stars > 0
        const isUnlocked = levelId === 1 || (levelStars[levelId - 1] || 0) > 0;
        const stars = levelStars[levelId] || 0;

        const bg = this.add.graphics();
        bg.fillStyle(isUnlocked ? 0xffffff : 0xddddcc, 0.9);
        bg.fillRoundedRect(bx, by, boxW, boxH, boxR);
        bg.lineStyle(2, isUnlocked ? area.color : 0xaaaaaa, isUnlocked ? 0.8 : 0.4);
        bg.strokeRoundedRect(bx, by, boxW, boxH, boxR);

        if (!isUnlocked) {
          this.add.text(bx + boxW / 2, by + boxH / 2 - 6, '🔒', { fontSize: '24px' }).setOrigin(0.5);
          this.add.text(bx + boxW / 2, by + boxH / 2 + 16, 'LV.' + levelId, {
            fontFamily: "'Arial Black', sans-serif",
            fontSize: '11px', color: '#aaaaaa',
          }).setOrigin(0.5);
        } else {
          // Level number
          this.add.text(bx + boxW / 2, by + 14, 'LV.' + levelId, {
            fontFamily: "'Arial Black', sans-serif",
            fontSize: '13px', color: '#333333',
            stroke: '#ffffff', strokeThickness: 2,
          }).setOrigin(0.5);

          // Level name
          const cfg = CONFIG.LEVELS[levelId - 1];
          this.add.text(bx + boxW / 2, by + 32, cfg.name, {
            fontFamily: 'Arial, sans-serif',
            fontSize: '10px', color: '#555544',
          }).setOrigin(0.5);

          // Star display
          const starStr = ['⭐','⭐','⭐'].map((s, si) => si < stars ? '⭐' : '☆').join('');
          this.add.text(bx + boxW / 2, by + 54, starStr, {
            fontSize: '14px',
          }).setOrigin(0.5);

          // Click zone
          const zone = this.add.zone(bx, by, boxW, boxH).setOrigin(0, 0).setInteractive({ useHandCursor: true });
          zone.on('pointerover', () => {
            bg.clear();
            bg.fillStyle(area.color, 0.2);
            bg.fillRoundedRect(bx, by, boxW, boxH, boxR);
            bg.lineStyle(3, area.color, 1);
            bg.strokeRoundedRect(bx, by, boxW, boxH, boxR);
          });
          zone.on('pointerout', () => {
            bg.clear();
            bg.fillStyle(0xffffff, 0.9);
            bg.fillRoundedRect(bx, by, boxW, boxH, boxR);
            bg.lineStyle(2, area.color, 0.8);
            bg.strokeRoundedRect(bx, by, boxW, boxH, boxR);
          });
          zone.on('pointerdown', () => {
            this.scene.start('GameScene', { mode: 'level', level: levelId });
          });
        }
      });
    });
  }

  drawBackButton() {
    const backTxt = this.add.text(14, CONFIG.HEIGHT - 22, '← 返回菜单', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px',
      color: '#888877',
      stroke: '#f5f0e0',
      strokeThickness: 2,
    });
    backTxt.setOrigin(0, 1);
    backTxt.setInteractive({ useHandCursor: true });
    backTxt.on('pointerover', () => backTxt.setColor('#444433'));
    backTxt.on('pointerout',  () => backTxt.setColor('#888877'));
    backTxt.on('pointerdown', () => { this.scene.start('MenuScene'); });
  }
}

// ─── GAME SCENE ───────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  // ── Init (receives mode data from scene transitions) ──────────────────────
  init(data) {
    this.gameMode     = data?.mode  || 'endless';
    this.currentLevel = data?.level || 1;

    // Load level config if in level mode
    if (this.gameMode === 'level') {
      this.levelConfig = CONFIG.LEVELS[this.currentLevel - 1] || CONFIG.LEVELS[0];
    } else {
      this.levelConfig = null;
    }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  initState() {
    this.score        = 0;
    this.combo        = 0;
    this.maxCombo     = 0;
    this.isShooting   = false;
    this.scored       = false;
    this.hitBackboard = false;
    this.swipeStart   = null;
    this.ball         = null;
    this.ballColliders = [];

    // Timer / mode state
    this.timeLeft    = CONFIG.ENDLESS.INITIAL_TIME;
    this.basketCount = 0;
    this.isGameOver  = false;
    this.gameStarted = false;
    this.timerFrozen = false;

    // Level mode state
    if (this.gameMode === 'level' && this.levelConfig) {
      const cfg = this.levelConfig;
      if (cfg.balls > 0 && !cfg.timeLimit) {
        // Ball counter mode
        this.ballsLeft = cfg.balls;
        this.levelMode = 'balls';
        this.timeLeft  = 999; // no time limit
      } else if (cfg.timeLimit) {
        // Timed mode
        this.ballsLeft = -1;
        this.levelMode = 'time';
        this.timeLeft  = cfg.timeLimit;
      }
    } else {
      this.ballsLeft = -1;
      this.levelMode = 'time';
    }

    // Weather state
    this.windForce      = 0;
    this.windDirection  = 1;
    this.weatherType    = 'clear';
    this.rainEmitter    = null;
    this.nightOverlay   = null;
    this.nightRimGlow   = null;
    this.nightBallGlow  = null;
    this.windChangeTimer = null;
    this.weatherTimer   = null;

    // Combo effect state
    this.comboEmitter   = null;
  }

  // ── Preload ───────────────────────────────────────────────────────────────
  preload() {
    // Basketball texture generated via canvas
    const bCanvas = document.createElement('canvas');
    bCanvas.width = bCanvas.height = 56;
    const ctx = bCanvas.getContext('2d');

    // Orange gradient
    const grad = ctx.createRadialGradient(20, 18, 4, 28, 28, 28);
    grad.addColorStop(0, '#ffaa44');
    grad.addColorStop(0.6, '#ff8833');
    grad.addColorStop(1, '#cc5500');
    ctx.beginPath();
    ctx.arc(28, 28, 26, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Dark seam lines
    ctx.strokeStyle = '#442200';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(28, 3);
    ctx.bezierCurveTo(42, 14, 42, 42, 28, 53);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(28, 3);
    ctx.bezierCurveTo(14, 14, 14, 42, 28, 53);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, 28);
    ctx.bezierCurveTo(14, 16, 42, 16, 53, 28);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, 28);
    ctx.bezierCurveTo(14, 40, 42, 40, 53, 28);
    ctx.stroke();

    // Dark outline
    ctx.beginPath();
    ctx.arc(28, 28, 26, 0, Math.PI * 2);
    ctx.strokeStyle = '#331100';
    ctx.lineWidth = 2;
    ctx.stroke();

    this.textures.addCanvas('basketball', bCanvas);
  }

  // ── Create ────────────────────────────────────────────────────────────────
  create() {
    this.initState();
    this.drawBackground();
    this.drawHoop();
    this.drawPlayer();
    this.createPhysicsBodies();
    this.createTextures();
    this.createBall();
    this.setupInput();
    this.createHUD();
    this.startTimer();
    this.setupWeather();
  }

  // ── Background ────────────────────────────────────────────────────────────
  drawBackground() {
    const g = this.add.graphics();

    // Paper fill
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Notebook lines (faint blue)
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    // Red margin line
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();

    // Brick wall — upper 60%
    const brickH = CONFIG.HEIGHT * 0.6;
    g.lineStyle(1.5, 0x886655, 0.35);
    const bH = 24, bW = 52;
    for (let row = 0; row * bH < brickH; row++) {
      const offsetX = (row % 2) * (bW / 2);
      for (let col = -1; col * bW < CONFIG.WIDTH + bW; col++) {
        const x = col * bW + offsetX;
        const y = row * bH;
        g.strokeRect(x, y, bW, bH);
      }
    }

    // Ground
    g.fillStyle(0x8B7355, 1);
    g.fillRect(0, CONFIG.GROUND_Y, CONFIG.WIDTH, CONFIG.HEIGHT - CONFIG.GROUND_Y);
    g.lineStyle(3, 0x5a4a30, 1);
    g.beginPath(); g.moveTo(0, CONFIG.GROUND_Y); g.lineTo(CONFIG.WIDTH, CONFIG.GROUND_Y); g.strokePath();

    // Ground texture lines
    g.lineStyle(1, 0x7a6345, 0.5);
    for (let x = 0; x < CONFIG.WIDTH; x += 15) {
      g.beginPath();
      g.moveTo(x, CONFIG.GROUND_Y + 4);
      g.lineTo(x + 8, CONFIG.HEIGHT);
      g.strokePath();
    }

    // Three-point arc
    g.lineStyle(2, 0xffffff, 0.18);
    g.beginPath();
    g.arc(180, CONFIG.GROUND_Y, 180, -Math.PI * 0.75, Math.PI * 0.05);
    g.strokePath();

    // Paint splashes
    const splashes = [
      { x: 120, y: 80,  r: 30, c: 0xff3366, a: 0.18 },
      { x: 400, y: 140, r: 22, c: 0x3366ff, a: 0.15 },
      { x: 650, y: 290, r: 18, c: 0x44cc44, a: 0.14 },
      { x: 290, y: 60,  r: 14, c: 0xffcc00, a: 0.2  },
      { x: 510, y: 200, r: 26, c: 0xff8833, a: 0.12 },
    ];
    splashes.forEach(s => {
      g.fillStyle(s.c, s.a);
      g.fillCircle(s.x, s.y, s.r);
      g.fillRect(s.x - 3, s.y, 6, s.r * 0.8);
    });

    // Graffiti text "BALL IS LIFE"
    const graffiti = this.add.text(380, 155, 'BALL IS LIFE', {
      fontFamily: "'Arial Black', 'Impact', sans-serif",
      fontSize: '38px',
      color: '#cc3355',
      stroke: '#440011',
      strokeThickness: 4,
      alpha: 0.22
    });
    graffiti.setOrigin(0.5);
    graffiti.setAngle(-8);

    // Secondary tag
    const tag2 = this.add.text(110, 240, 'GAME ON', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '20px',
      color: '#3344bb',
      stroke: '#001133',
      strokeThickness: 3,
      alpha: 0.2
    });
    tag2.setAngle(-15);
  }

  // ── Hoop ──────────────────────────────────────────────────────────────────
  drawHoop() {
    const g = this.add.graphics();
    const POLE_X   = 610;
    const RIM_Y    = 185;
    const RIM_W    = 52;
    const RIM_CX   = POLE_X - 10;
    const BOARD_X  = POLE_X + 8;
    const BOARD_Y  = RIM_Y - 60;
    const BOARD_W  = 14;
    const BOARD_H  = 80;

    // Pole
    g.lineStyle(5, 0x555544, 1);
    this.drawWobblyLine(g, POLE_X, CONFIG.GROUND_Y, POLE_X + 2, RIM_Y + 10, 6);

    // Backboard
    g.fillStyle(0xfafaf5, 1);
    g.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
    g.lineStyle(3, 0x333322, 1);
    this.drawWobblyRect(g, BOARD_X, BOARD_Y, BOARD_W, BOARD_H, 3);

    // Inner square on backboard
    g.lineStyle(1.5, 0xcc3333, 0.8);
    g.strokeRect(BOARD_X + 2, BOARD_Y + BOARD_H * 0.3, BOARD_W - 4, BOARD_H * 0.35);

    // Rim arm
    g.lineStyle(4, 0xcc2200, 1);
    g.beginPath();
    g.moveTo(BOARD_X, RIM_Y);
    g.lineTo(RIM_CX - RIM_W * 0.5 + 4, RIM_Y);
    g.strokePath();

    // Rim
    g.lineStyle(5, 0xff3300, 1);
    g.beginPath();
    g.moveTo(RIM_CX - RIM_W / 2, RIM_Y);
    g.lineTo(RIM_CX + RIM_W / 2, RIM_Y);
    g.strokePath();
    g.fillStyle(0xff3300, 1);
    g.fillCircle(RIM_CX - RIM_W / 2, RIM_Y, 5);
    g.fillCircle(RIM_CX + RIM_W / 2, RIM_Y, 5);

    // Net
    g.lineStyle(1.5, 0xf5f0e0, 0.85);
    const netTop = RIM_Y + 4;
    const netBot = RIM_Y + 38;
    const netSegments = 7;
    for (let i = 0; i <= netSegments; i++) {
      const nx = (RIM_CX - RIM_W / 2) + (RIM_W * i / netSegments);
      const wobble = Math.sin(i * 1.3) * 3;
      g.beginPath();
      g.moveTo(nx, netTop);
      g.lineTo(nx + wobble, netBot);
      g.strokePath();
    }
    for (let row = 1; row <= 3; row++) {
      const ry = netTop + (netBot - netTop) * row / 4;
      const shrink = row * 2;
      g.beginPath();
      g.moveTo(RIM_CX - RIM_W / 2 + shrink, ry);
      g.lineTo(RIM_CX + RIM_W / 2 - shrink, ry);
      g.strokePath();
    }

    this.hoopGeom = { RIM_CX, RIM_Y, RIM_W, BOARD_X, BOARD_Y, BOARD_W, BOARD_H, POLE_X };
  }

  drawWobblyLine(g, x1, y1, x2, y2, segments) {
    const pts = [];
    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const wx = x1 + (x2 - x1) * t + (i > 0 && i < segments ? (Math.random() - 0.5) * 3 : 0);
      const wy = y1 + (y2 - y1) * t + (i > 0 && i < segments ? (Math.random() - 0.5) * 3 : 0);
      pts.push({ x: wx, y: wy });
    }
    g.beginPath();
    g.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) g.lineTo(pts[i].x, pts[i].y);
    g.strokePath();
  }

  drawWobblyRect(g, x, y, w, h, wobble) {
    const r = wobble;
    g.beginPath();
    g.moveTo(x + (Math.random() - 0.5) * r,     y + (Math.random() - 0.5) * r);
    g.lineTo(x + w + (Math.random() - 0.5) * r, y + (Math.random() - 0.5) * r);
    g.lineTo(x + w + (Math.random() - 0.5) * r, y + h + (Math.random() - 0.5) * r);
    g.lineTo(x + (Math.random() - 0.5) * r,     y + h + (Math.random() - 0.5) * r);
    g.closePath();
    g.strokePath();
  }

  // ── Player ────────────────────────────────────────────────────────────────
  drawPlayer() {
    this.playerGfx = this.add.graphics();
    // Use levelConfig playerX if available; 0 means random
    let px = 160;
    if (this.levelConfig) {
      px = this.levelConfig.playerX || 160;
      if (this.levelConfig.randomPos) px = Phaser.Math.Between(80, 300);
    }
    this.playerX   = px;
    this.playerY   = CONFIG.GROUND_Y - 4;
    this.redrawPlayer(this.playerX, this.playerY, false);
  }

  redrawPlayer(px, py, shooting) {
    const g = this.playerGfx;
    g.clear();

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    // Shadow
    g.fillStyle(0x000000, 0.15);
    g.fillEllipse(px, py, 44, 10);

    // Legs
    g.lineStyle(3.5, 0x222222, 1);
    g.beginPath();
    g.moveTo(px, torsoB);
    g.lineTo(px - 10, legBot);
    g.strokePath();
    g.beginPath();
    g.moveTo(px, torsoB);
    g.lineTo(px + 6, legBot);
    g.strokePath();

    // Shoes
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px - 12, legBot + 2, 16, 6);
    g.fillEllipse(px + 4,  legBot + 2, 16, 6);

    // Jersey body
    g.fillStyle(0x3366ff, 1);
    g.fillRect(px - 14, torsoT, 28, torsoB - torsoT);
    g.lineStyle(2, 0x1133aa, 1);
    g.strokeRect(px - 14, torsoT, 28, torsoB - torsoT);

    // Jersey number "23"
    const numTxt = this.add.text(px, torsoT + (torsoB - torsoT) / 2, '23', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#1133aa', strokeThickness: 2
    });
    numTxt.setOrigin(0.5);

    // Non-shooting arm
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath();
    g.moveTo(px - 14, torsoT + 8);
    g.lineTo(px - 26, torsoT + 24);
    g.strokePath();

    // Shooting arm
    if (shooting) {
      g.lineStyle(3.5, 0xffcc99, 1);
      g.beginPath();
      g.moveTo(px + 14, torsoT + 8);
      g.lineTo(px + 28, torsoT - 12);
      g.strokePath();
      g.fillStyle(0xffcc99, 1);
      g.fillCircle(px + 28, torsoT - 14, 5);
    } else {
      g.lineStyle(3, 0xffcc99, 1);
      g.beginPath();
      g.moveTo(px + 14, torsoT + 8);
      g.lineTo(px + 24, torsoT + 20);
      g.strokePath();
    }

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath();
    g.moveTo(px, torsoT);
    g.lineTo(px, headY + 14);
    g.strokePath();

    // Head
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px, headY + 7, 14);

    // Eyes
    g.fillStyle(0x333333, 1);
    g.fillCircle(px - 5, headY + 4, 2.5);
    g.fillCircle(px + 5, headY + 4, 2.5);

    // Smile
    g.lineStyle(2, 0x553322, 1);
    g.beginPath();
    g.arc(px, headY + 8, 6, 0.2, Math.PI - 0.2);
    g.strokePath();

    // Headband
    g.lineStyle(5, 0xff66aa, 1);
    g.beginPath();
    g.arc(px, headY + 7, 14, -Math.PI * 0.75, -Math.PI * 0.1);
    g.strokePath();
  }

  // ── Physics Bodies ────────────────────────────────────────────────────────
  createPhysicsBodies() {
    const { RIM_CX, RIM_Y, RIM_W, BOARD_X, BOARD_Y, BOARD_W, BOARD_H } = this.hoopGeom;

    // Ground
    this.ground = this.physics.add.staticGroup();
    const groundBody = this.ground.create(CONFIG.WIDTH / 2, CONFIG.GROUND_Y + 20, null);
    groundBody.setVisible(false);
    groundBody.body.setSize(CONFIG.WIDTH, 40);
    groundBody.refreshBody();

    // Backboard
    this.backboard = this.physics.add.staticGroup();
    const bb = this.backboard.create(BOARD_X + BOARD_W / 2, BOARD_Y + BOARD_H / 2, null);
    bb.setVisible(false);
    bb.body.setSize(BOARD_W + 2, BOARD_H);
    bb.refreshBody();

    // Left rim edge
    this.rimLeft = this.physics.add.staticGroup();
    const rl = this.rimLeft.create(RIM_CX - RIM_W / 2, RIM_Y, null);
    rl.setVisible(false);
    rl.body.setSize(8, 8);
    rl.refreshBody();

    // Right rim edge
    this.rimRight = this.physics.add.staticGroup();
    const rr = this.rimRight.create(RIM_CX + RIM_W / 2, RIM_Y, null);
    rr.setVisible(false);
    rr.body.setSize(8, 8);
    rr.refreshBody();

    // Score zone (sensor)
    this.scoreZone = this.physics.add.staticGroup();
    const sz = this.scoreZone.create(RIM_CX, RIM_Y + 14, null);
    sz.setVisible(false);
    sz.body.setSize(RIM_W - 12, 12);
    sz.refreshBody();
  }

  // ── Colliders ─────────────────────────────────────────────────────────────
  setupHoopColliders() {
    if (!this.ball || !this.ball.active) return;

    this.ballColliders.forEach(c => { if (c) this.physics.world.removeCollider(c); });
    this.ballColliders = [];

    const gc = this.physics.add.collider(this.ball, this.ground, () => {
      if (!this.isShooting) return;
      this.onMiss();
    });
    this.ballColliders.push(gc);

    const bc = this.physics.add.collider(this.ball, this.backboard, () => {
      this.hitBackboard = true;
    });
    this.ballColliders.push(bc);

    const rlc = this.physics.add.collider(this.ball, this.rimLeft);
    this.ballColliders.push(rlc);
    const rrc = this.physics.add.collider(this.ball, this.rimRight);
    this.ballColliders.push(rrc);

    const sc = this.physics.add.overlap(this.ball, this.scoreZone, () => {
      if (!this.isShooting || this.scored) return;
      if (this.ball.body.velocity.y > 0) {
        this.onScore();
      }
    });
    this.ballColliders.push(sc);
  }

  // ── Ball ──────────────────────────────────────────────────────────────────
  createBall() {
    const spawnX = this.playerX + 30;
    const spawnY = CONFIG.GROUND_Y - 80;

    this.ball = this.physics.add.sprite(spawnX, spawnY, 'basketball');
    this.ball.setDisplaySize(56, 56);
    this.ball.body.setAllowGravity(false);
    this.ball.body.setBounce(0.6);
    this.ball.body.setCircle(26, 2, 2);

    this.isShooting   = false;
    this.scored       = false;
    this.hitBackboard = false;

    this.setupHoopColliders();

    if (this.ballTween) this.ballTween.stop();
    this.ballTween = this.tweens.add({
      targets: this.ball,
      y: spawnY - 8,
      duration: 700,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });
  }

  // ── Input / Swipe ─────────────────────────────────────────────────────────
  setupInput() {
    this.trajectoryGfx = this.add.graphics();

    this.input.on('pointerdown', (ptr) => {
      if (this.isShooting || this.isGameOver) return;
      this.swipeStart = { x: ptr.x, y: ptr.y, time: this.time.now };
    });

    this.input.on('pointermove', (ptr) => {
      if (!this.swipeStart || this.isShooting) return;
      this.drawTrajectoryPreview(ptr.x, ptr.y);
    });

    this.input.on('pointerup', (ptr) => {
      if (!this.swipeStart || this.isShooting) return;
      this.trajectoryGfx.clear();

      const dx   = ptr.x - this.swipeStart.x;
      const dy   = ptr.y - this.swipeStart.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const dt   = this.time.now - this.swipeStart.time;

      if (dist < 30 || dt > 1000) {
        this.swipeStart = null;
        return;
      }

      // Start timer on first swipe
      if (!this.gameStarted && this.gameMode === 'endless') {
        this.gameStarted = true;
      }

      this.shootBall(dx, dy, dist, dt);
      this.swipeStart = null;
    });
  }

  drawTrajectoryPreview(ex, ey) {
    if (!this.swipeStart) return;
    const g = this.trajectoryGfx;
    g.clear();

    const sx = this.ball.x;
    const sy = this.ball.y;

    const dx    = ex - this.swipeStart.x;
    const dy    = ey - this.swipeStart.y;
    const dist  = Math.sqrt(dx * dx + dy * dy);
    const speed = Math.min(dist * 4, 1400);
    const vx    = -(dx / dist) * speed;
    const vy    = -(dy / dist) * speed;

    const g_accel = CONFIG.GRAVITY;
    const dt      = 1 / 60;
    let px = sx, py = sy, pvx = vx, pvy = vy;

    g.fillStyle(0xff8833, 0.7);
    for (let i = 0; i < 90; i++) {
      pvy += g_accel * dt;
      px  += pvx * dt;
      py  += pvy * dt;
      if (py > CONFIG.GROUND_Y || px < 0 || px > CONFIG.WIDTH) break;
      if (i % 5 === 0) {
        const r = Phaser.Math.Lerp(5, 2, i / 90);
        g.fillCircle(px, py, r);
      }
    }
  }

  shootBall(dx, dy, dist, dt) {
    if (this.ballTween) { this.ballTween.stop(); this.ballTween = null; }

    const speed = Math.min((dist / Math.max(dt, 50)) * 1200, 1400);
    const vx    = -(dx / dist) * speed;
    const vy    = -(dy / dist) * speed;

    this.ball.body.setAllowGravity(true);
    this.ball.body.setVelocity(vx, vy);
    this.ball.body.setAngularVelocity(vx * 0.4);

    this.isShooting   = true;
    this.scored       = false;
    this.hitBackboard = false;

    const rimX = this.hoopGeom.RIM_CX;
    const dToRim = Math.abs(this.ball.x - rimX);
    if (dToRim < 150)       this.shotZone = 'near';
    else if (dToRim < 280)  this.shotZone = 'mid';
    else                    this.shotZone = 'far';

    this.tweens.add({
      targets: this.playerGfx,
      y: -16,
      duration: 130,
      yoyo: true,
      ease: 'Quad.easeOut'
    });
  }

  // ── Score / Miss ──────────────────────────────────────────────────────────
  onScore() {
    if (this.scored) return;
    this.scored = true;

    // Track baskets and combo
    this.basketCount++;
    this.combo = Math.min(this.combo + 1, 10);
    if (this.combo > this.maxCombo) this.maxCombo = this.combo;

    // Base points
    let pts = this.shotZone === 'far' ? 200 : this.shotZone === 'mid' ? 150 : 100;
    let bonusLabel = '';

    if (!this.hitBackboard) {
      pts += 50;
      bonusLabel = 'SWISH! +50';
    } else {
      pts += 30;
      bonusLabel = 'BANK! +30';
    }

    pts *= this.combo;
    this.score += pts;

    const rimX = this.hoopGeom.RIM_CX;
    const rimY = this.hoopGeom.RIM_Y;

    // Main score popup
    const colors  = ['#ff3366','#3366ff','#ff8833','#44cc44','#ffcc00'];
    const color   = colors[Math.floor(Math.random() * colors.length)];
    const ptsTxt  = this.add.text(rimX, rimY - 20, '+' + pts, {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '36px',
      color: color,
      stroke: '#ffffff',
      strokeThickness: 4
    });
    ptsTxt.setOrigin(0.5);
    ptsTxt.setAngle(Phaser.Math.Between(-15, 15));

    this.tweens.add({
      targets: ptsTxt,
      y: rimY - 90,
      alpha: 0,
      duration: 1100,
      ease: 'Quad.easeOut',
      onComplete: () => ptsTxt.destroy()
    });

    // Bonus label
    if (bonusLabel) {
      const bTxt = this.add.text(rimX + 10, rimY - 55, bonusLabel, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '18px',
        color: '#ffcc00',
        stroke: '#333300',
        strokeThickness: 3
      });
      bTxt.setOrigin(0.5);
      bTxt.setAngle(Phaser.Math.Between(-8, 8));
      this.tweens.add({
        targets: bTxt,
        y: rimY - 110,
        alpha: 0,
        duration: 1000,
        ease: 'Quad.easeOut',
        onComplete: () => bTxt.destroy()
      });
    }

    // Combo text
    if (this.combo > 1) {
      const cTxt = this.add.text(rimX - 40, rimY - 80, 'x' + this.combo + ' COMBO!', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '22px',
        color: '#ff3366',
        stroke: '#440011',
        strokeThickness: 3
      });
      cTxt.setOrigin(0.5);
      cTxt.setAngle(Phaser.Math.Between(-12, 12));
      this.tweens.add({
        targets: cTxt,
        y: rimY - 130,
        scaleX: 1.4, scaleY: 1.4,
        alpha: 0,
        duration: 1000,
        ease: 'Back.easeOut',
        onComplete: () => cTxt.destroy()
      });
    }

    // Endless: bonus time every BONUS_EVERY baskets
    if (this.gameMode === 'endless' && this.gameStarted &&
        this.basketCount % CONFIG.ENDLESS.BONUS_EVERY === 0) {
      this.timeLeft += CONFIG.ENDLESS.BONUS_TIME;
      this.showBonusTime();
    }

    // Combo visual effects
    this.updateComboEffects();
    // Score splash
    this.doScoreSplash(rimX, rimY);

    this.updateHUD();

    // Level ball-counter mode
    if (this.gameMode === 'level' && this.levelMode === 'balls') {
      this.ballsLeft = Math.max(0, this.ballsLeft - 1);
      this.updateHUD();
      if (this.ballsLeft <= 0) {
        this.time.delayedCall(1600, () => this.levelComplete());
        return;
      }
    }

    this.time.delayedCall(1600, () => this.respawnBall());
  }

  showBonusTime() {
    const popup = this.add.text(CONFIG.WIDTH - 80, 65, '+' + CONFIG.ENDLESS.BONUS_TIME + 's!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '26px',
      color: '#44cc44',
      stroke: '#003300',
      strokeThickness: 3,
    });
    popup.setOrigin(0.5);
    this.tweens.add({
      targets: popup,
      y: popup.y - 50,
      alpha: 0,
      duration: 1200,
      ease: 'Quad.easeOut',
      onComplete: () => popup.destroy(),
    });
  }

  onMiss() {
    if (this.scored) return;

    this.combo = 0;
    const missWords = ['MISS...', 'NOPE', 'AIR BALL', 'BRICK!', 'OH NO'];
    const word = missWords[Math.floor(Math.random() * missWords.length)];

    const mTxt = this.add.text(
      this.ball ? this.ball.x : 400,
      this.ball ? this.ball.y - 20 : 200,
      word,
      {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '28px',
        color: '#888888',
        stroke: '#444444',
        strokeThickness: 3
      }
    );
    mTxt.setOrigin(0.5);
    mTxt.setAngle(Phaser.Math.Between(-10, 10));
    this.tweens.add({
      targets: mTxt,
      y: mTxt.y - 60,
      alpha: 0,
      duration: 900,
      ease: 'Quad.easeOut',
      onComplete: () => mTxt.destroy()
    });

    this.updateHUD();

    // Level ball-counter mode: miss also costs a ball
    if (this.gameMode === 'level' && this.levelMode === 'balls') {
      this.ballsLeft = Math.max(0, this.ballsLeft - 1);
      this.updateHUD();
      if (this.ballsLeft <= 0) {
        this.time.delayedCall(800, () => this.levelComplete());
        return;
      }
    }

    this.time.delayedCall(800, () => this.respawnBall());
  }

  respawnBall() {
    if (this.isGameOver) return;
    if (this.ball) {
      this.ball.destroy();
      this.ball = null;
    }
    this.ballColliders.forEach(c => { if (c) this.physics.world.removeCollider(c); });
    this.ballColliders = [];
    this.createBall();
  }

  // ── Timer ─────────────────────────────────────────────────────────────────
  startTimer() {
    // Endless mode: timer starts on first swipe
    // Level timed mode: timer starts immediately
    const needsTimer = this.gameMode === 'endless' ||
      (this.gameMode === 'level' && this.levelMode === 'time');
    if (!needsTimer) return;

    this.timerEvent = this.time.addEvent({
      delay: 1000,
      callback: this.tickTimer,
      callbackScope: this,
      loop: true,
    });

    // Level timed mode starts immediately
    if (this.gameMode === 'level' && this.levelMode === 'time') {
      this.gameStarted = true;
    }
  }

  tickTimer() {
    if (!this.gameStarted || this.isGameOver || this.timerFrozen) return;

    this.timeLeft = Math.max(0, this.timeLeft - 1);
    this.updateHUD();

    if (this.timeLeft <= 0) {
      if (this.gameMode === 'level') {
        this.levelComplete();
      } else {
        this.gameOver();
      }
    }
  }

  gameOver() {
    if (this.isGameOver) return;
    this.isGameOver = true;

    if (this.timerEvent) this.timerEvent.remove();
    this.cleanupWeather();

    // Save to localStorage
    const save = loadSave();
    const prevHigh = save.highScore || 0;
    const isNewHigh = this.score > prevHigh;
    if (isNewHigh) save.highScore = this.score;
    writeSave(save);

    // Brief flash before transition
    const overlay = this.add.graphics();
    overlay.fillStyle(0xff0000, 0);
    overlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    this.tweens.add({
      targets: overlay,
      alpha: 0.3,
      duration: 200,
      yoyo: true,
      repeat: 2,
      onComplete: () => {
        this.scene.start('ResultScene', {
          score:     this.score,
          combo:     this.maxCombo,
          baskets:   this.basketCount,
          mode:      this.gameMode,
          level:     this.currentLevel,
          isNewHigh: isNewHigh,
        });
      }
    });
  }

  levelComplete() {
    if (this.isGameOver) return;
    this.isGameOver = true;
    if (this.timerEvent) this.timerEvent.remove();

    const cfg = this.levelConfig;
    let stars = 0;
    if (cfg && cfg.stars) {
      if (this.score >= cfg.stars[2])      stars = 3;
      else if (this.score >= cfg.stars[1]) stars = 2;
      else if (this.score >= cfg.stars[0]) stars = 1;
    }
    const passed = stars > 0;

    // Save stars to localStorage
    const save = loadSave();
    const levelStars = save.levelStars || {};
    if ((levelStars[this.currentLevel] || 0) < stars) {
      levelStars[this.currentLevel] = stars;
    }
    save.levelStars = levelStars;
    writeSave(save);

    this.cleanupWeather();

    const overlay = this.add.graphics();
    overlay.fillStyle(passed ? 0x00cc44 : 0xff0000, 0);
    overlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    this.tweens.add({
      targets: overlay,
      alpha: 0.25,
      duration: 200,
      yoyo: true,
      repeat: 2,
      onComplete: () => {
        this.scene.start('ResultScene', {
          score:     this.score,
          combo:     this.maxCombo,
          baskets:   this.basketCount,
          mode:      this.gameMode,
          level:     this.currentLevel,
          isNewHigh: false,
          stars:     stars,
          passed:    passed,
        });
      }
    });
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  createHUD() {
    // Score bg
    const scoreBg = this.add.graphics();
    scoreBg.fillStyle(0xffffff, 0.75);
    scoreBg.fillRoundedRect(10, 10, 130, 46, 10);
    scoreBg.lineStyle(2, 0x333333, 0.6);
    scoreBg.strokeRoundedRect(10, 10, 130, 46, 10);

    this.add.text(18, 16, '⭐', { fontSize: '20px' });

    this.scoreTxt = this.add.text(44, 18, 'SCORE: 0', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '14px',
      color: '#333333'
    });

    // Timer / ball HUD (top-right)
    const showTimer = this.gameMode === 'endless' ||
      (this.gameMode === 'level' && this.levelMode === 'time');
    const showBalls = this.gameMode === 'level' && this.levelMode === 'balls';

    if (showTimer) {
      this.timerBg = this.add.graphics();
      this.timerBg.fillStyle(0xffffff, 0.75);
      this.timerBg.fillRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
      this.timerBg.lineStyle(2, 0x333333, 0.6);
      this.timerBg.strokeRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);

      this.add.text(CONFIG.WIDTH - 132, 16, '⏱', { fontSize: '20px' });

      const initSecs = Math.ceil(this.timeLeft);
      const im = Math.floor(initSecs / 60), is = initSecs % 60;
      this.timerTxt = this.add.text(CONFIG.WIDTH - 106, 18, im + ':' + (is < 10 ? '0' : '') + is, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '20px',
        color: '#333333',
      });

      // Waiting for first shot indicator (endless only)
      if (this.gameMode === 'endless') {
        this.waitTxt = this.add.text(CONFIG.WIDTH / 2, 40, 'SWIPE TO START!', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '16px',
          color: '#cc6600',
          stroke: '#f5f0e0',
          strokeThickness: 3,
        });
        this.waitTxt.setOrigin(0.5);
        this.tweens.add({
          targets: this.waitTxt,
          alpha: 0.3,
          duration: 600,
          yoyo: true,
          repeat: -1,
        });
      }
    }

    if (showBalls) {
      this.ballsBg = this.add.graphics();
      this.ballsBg.fillStyle(0xffffff, 0.75);
      this.ballsBg.fillRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
      this.ballsBg.lineStyle(2, 0x333333, 0.6);
      this.ballsBg.strokeRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);

      this.add.text(CONFIG.WIDTH - 132, 16, '🏀', { fontSize: '20px' });

      this.ballsTxt = this.add.text(CONFIG.WIDTH - 104, 18, 'x' + this.ballsLeft, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '20px',
        color: '#333333',
      });
    }

    // Level info header (level mode)
    if (this.gameMode === 'level' && this.levelConfig) {
      const cfg = this.levelConfig;
      this.add.text(CONFIG.WIDTH / 2, 18, 'LV.' + cfg.id + ' ' + cfg.name, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '13px',
        color: '#444433',
        stroke: '#f5f0e0',
        strokeThickness: 2,
      }).setOrigin(0.5);
    }

    // Combo counter
    this.comboTxt = this.add.text(CONFIG.WIDTH / 2, 16, '', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#ff3366',
      stroke: '#440011',
      strokeThickness: 3
    });
    this.comboTxt.setOrigin(0.5, 0);

    // Instructions
    this.instrTxt = this.add.text(CONFIG.WIDTH / 2, CONFIG.HEIGHT - 22, 'SWIPE TO SHOOT', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '14px',
      color: '#888877',
      stroke: '#f5f0e0',
      strokeThickness: 3
    });
    this.instrTxt.setOrigin(0.5);
  }

  updateHUD() {
    this.scoreTxt.setText('SCORE: ' + this.score);

    if (this.combo > 1) {
      this.comboTxt.setText('🔥 x' + this.combo);
      this.comboTxt.setVisible(true);
    } else {
      this.comboTxt.setVisible(false);
    }

    // Timer display
    if (this.timerTxt) {
      const secs = Math.max(0, Math.ceil(this.timeLeft));
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      const formatted = m + ':' + (s < 10 ? '0' : '') + s;
      this.timerTxt.setText(formatted);

      // Flash red when <= 10 seconds
      if (secs <= 10 && this.gameStarted) {
        const flash = secs % 2 === 0;
        this.timerTxt.setColor(flash ? '#ff2222' : '#cc0000');
        if (this.timerBg) {
          this.timerBg.clear();
          this.timerBg.fillStyle(flash ? 0xff4444 : 0xff0000, flash ? 0.25 : 0.35);
          this.timerBg.fillRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
          this.timerBg.lineStyle(2, 0xff0000, 0.9);
          this.timerBg.strokeRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
        }
      } else {
        this.timerTxt.setColor('#333333');
      }
    }

    // Balls counter display
    if (this.ballsTxt) {
      this.ballsTxt.setText('x' + Math.max(0, this.ballsLeft));
    }

    // Wind indicator display
    if (this.windTxt) {
      const dir = this.windDirection > 0 ? '→' : '←';
      this.windTxt.setText('💨 ' + dir + ' ' + this.windForce + '级');
    }

    // Hide wait text once started
    if (this.gameStarted && this.waitTxt) {
      this.waitTxt.setVisible(false);
    }
  }

  // ── Update ────────────────────────────────────────────────────────────────
  update() {
    if (this.isGameOver) return;
    if (!this.ball || !this.ball.active) return;

    // Wind physics when ball is in flight
    if (this.isShooting && this.windForce > 0) {
      this.ball.body.velocity.x += this.windDirection * this.windForce * 0.5;
    }

    // Rain wobble
    if (this.isShooting && this.weatherType === 'rain') {
      this.ball.body.velocity.x += (Math.random() - 0.5) * 2;
    }

    // Night: move ball glow to follow ball
    if (this.nightBallGlow && this.ball) {
      this.nightBallGlow.x = this.ball.x;
      this.nightBallGlow.y = this.ball.y;
    }

    if (!this.isShooting) return;

    const b = this.ball;
    if (
      b.x < -80 || b.x > CONFIG.WIDTH + 80 ||
      b.y > CONFIG.HEIGHT + 60
    ) {
      this.onMiss();
    }
  }

  // ── Textures (particles) ──────────────────────────────────────────────────
  createTextures() {
    // fireparticle: 8x8 radial gradient yellow→orange→transparent
    if (!this.textures.exists('fireparticle')) {
      const fc = document.createElement('canvas');
      fc.width = fc.height = 8;
      const fctx = fc.getContext('2d');
      const fg = fctx.createRadialGradient(4, 4, 0, 4, 4, 4);
      fg.addColorStop(0,   'rgba(255,220,0,1)');
      fg.addColorStop(0.5, 'rgba(255,100,0,0.8)');
      fg.addColorStop(1,   'rgba(255,50,0,0)');
      fctx.fillStyle = fg;
      fctx.fillRect(0, 0, 8, 8);
      this.textures.addCanvas('fireparticle', fc);
    }

    // spark: 4x4 bright cross
    if (!this.textures.exists('spark')) {
      const sc = document.createElement('canvas');
      sc.width = sc.height = 4;
      const sctx = sc.getContext('2d');
      sctx.fillStyle = '#ffffff';
      sctx.fillRect(1, 0, 2, 4);
      sctx.fillRect(0, 1, 4, 2);
      this.textures.addCanvas('spark', sc);
    }

    // inksplat: 10x10 pink circle
    if (!this.textures.exists('inksplat')) {
      const ic = document.createElement('canvas');
      ic.width = ic.height = 10;
      const ictx = ic.getContext('2d');
      ictx.beginPath();
      ictx.arc(5, 5, 4.5, 0, Math.PI * 2);
      ictx.fillStyle = '#ff66aa';
      ictx.fill();
      this.textures.addCanvas('inksplat', ic);
    }

    // raindrop: 3x12 blue-white rectangle, alpha 0.5
    if (!this.textures.exists('raindrop')) {
      const rc = document.createElement('canvas');
      rc.width = 3; rc.height = 12;
      const rctx = rc.getContext('2d');
      rctx.fillStyle = 'rgba(180,210,255,0.5)';
      rctx.fillRect(0, 0, 3, 12);
      this.textures.addCanvas('raindrop', rc);
    }
  }

  // ── Weather Setup ─────────────────────────────────────────────────────────
  setupWeather() {
    // Determine weather type
    if (this.gameMode === 'level' && this.levelConfig) {
      this.weatherType  = this.levelConfig.weather || 'clear';
      this.windForce    = this.levelConfig.wind    || 0;
      this.windDirection = 1;
    } else if (this.gameMode === 'endless') {
      // Start clear, cycle every 20s
      this.weatherType  = 'clear';
      this.windForce    = 0;
      this.windDirection = 1;
      this.weatherTimer = this.time.addEvent({
        delay: 20000,
        callback: this.cycleEndlessWeather,
        callbackScope: this,
        loop: true,
      });
    }

    this.applyWeather();

    // Wind direction changes every 4s
    if (this.windForce > 0) {
      this.windChangeTimer = this.time.addEvent({
        delay: 4000,
        callback: () => {
          this.windDirection *= -1;
          this.updateHUD();
        },
        loop: true,
      });
    }
  }

  cycleEndlessWeather() {
    const options = ['clear', 'windy', 'rain', 'night'];
    const next = options[Math.floor(Math.random() * options.length)];
    this.cleanupWeatherEffects();
    this.weatherType = next;
    this.windForce = next === 'windy' ? 2 : next === 'rain' ? 1 : 0;
    this.applyWeather();
    if (this.windChangeTimer) this.windChangeTimer.remove();
    if (this.windForce > 0) {
      this.windChangeTimer = this.time.addEvent({
        delay: 4000,
        callback: () => { this.windDirection *= -1; this.updateHUD(); },
        loop: true,
      });
    }
    this.updateHUD();
  }

  applyWeather() {
    // Wind HUD indicator
    if (this.windForce > 0) {
      if (!this.windTxt) {
        this.windTxt = this.add.text(14, CONFIG.HEIGHT - 40, '', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '13px',
          color: '#446688',
          stroke: '#f5f0e0',
          strokeThickness: 2,
        }).setDepth(10);
      }
      this.updateHUD();
    } else if (this.windTxt) {
      this.windTxt.setVisible(false);
    }

    // Rain
    if (this.weatherType === 'rain') {
      if (!this.rainEmitter && this.textures.exists('raindrop')) {
        this.rainEmitter = this.add.particles(0, -10, 'raindrop', {
          x: { min: 0, max: CONFIG.WIDTH },
          y: -10,
          speedY: { min: 300, max: 500 },
          speedX: { min: -20, max: 20 },
          lifespan: 2000,
          quantity: 4,
          frequency: 30,
          alpha: 0.6,
        });
        this.rainEmitter.setDepth(5);
      }
    }

    // Night
    if (this.weatherType === 'night') {
      if (!this.nightOverlay) {
        this.nightOverlay = this.add.graphics().setDepth(4);
        this.nightOverlay.fillStyle(0x000022, 0.6);
        this.nightOverlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      }
      if (!this.nightRimGlow && this.hoopGeom) {
        const { RIM_CX, RIM_Y } = this.hoopGeom;
        this.nightRimGlow = this.add.graphics().setDepth(5);
        this.nightRimGlow.fillStyle(0xffff00, 0.15);
        this.nightRimGlow.fillCircle(RIM_CX, RIM_Y, 50);
      }
      if (!this.nightBallGlow) {
        this.nightBallGlow = this.add.graphics().setDepth(5);
        this.nightBallGlow.fillStyle(0xff8800, 0.2);
        this.nightBallGlow.fillCircle(0, 0, 36);
        if (this.ball) {
          this.nightBallGlow.x = this.ball.x;
          this.nightBallGlow.y = this.ball.y;
        }
      }
      // HUD to high depth so it's visible above night overlay
      if (this.scoreTxt)  this.scoreTxt.setDepth(20);
      if (this.comboTxt)  this.comboTxt.setDepth(20);
      if (this.timerTxt)  this.timerTxt.setDepth(20);
      if (this.ballsTxt)  this.ballsTxt.setDepth(20);
      if (this.instrTxt)  this.instrTxt.setDepth(20);
      if (this.windTxt)   this.windTxt.setDepth(20);
      if (this.timerBg)   this.timerBg.setDepth(19);
      if (this.ballsBg)   this.ballsBg.setDepth(19);
    }
  }

  cleanupWeatherEffects() {
    if (this.rainEmitter)   { this.rainEmitter.destroy();   this.rainEmitter   = null; }
    if (this.nightOverlay)  { this.nightOverlay.destroy();  this.nightOverlay  = null; }
    if (this.nightRimGlow)  { this.nightRimGlow.destroy();  this.nightRimGlow  = null; }
    if (this.nightBallGlow) { this.nightBallGlow.destroy(); this.nightBallGlow = null; }
    if (this.windTxt)       { this.windTxt.destroy();       this.windTxt       = null; }
  }

  cleanupWeather() {
    this.cleanupWeatherEffects();
    if (this.windChangeTimer) { this.windChangeTimer.remove(); this.windChangeTimer = null; }
    if (this.weatherTimer)    { this.weatherTimer.remove();    this.weatherTimer    = null; }
  }

  // ── Combo Visual Effects ──────────────────────────────────────────────────
  updateComboEffects() {
    // Destroy previous emitter if exists
    if (this.comboEmitter) {
      this.comboEmitter.destroy();
      this.comboEmitter = null;
    }

    // Clear ball tint
    if (this.ball) this.ball.clearTint();

    const c = this.combo;

    if (c >= 10) {
      // BEAST MODE
      this.doBeastMode();
    } else if (c >= 7) {
      // Lightning sparks + blue ball tint
      if (this.ball && this.textures.exists('spark')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'spark', {
          follow: this.ball,
          speedX: { min: -80, max: 80 },
          speedY: { min: -80, max: 80 },
          lifespan: 300,
          quantity: 3,
          frequency: 40,
          blendMode: 'ADD',
          alpha: { start: 1, end: 0 },
        });
        this.comboEmitter.setDepth(8);
      }
      if (this.ball) this.ball.setTint(0x4488ff);
    } else if (c >= 4) {
      // Fire trail + screen shake
      if (this.ball && this.textures.exists('fireparticle')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
          follow: this.ball,
          speedX: { min: -30, max: 30 },
          speedY: { min: -30, max: 30 },
          lifespan: 400,
          quantity: 4,
          frequency: 30,
          alpha: { start: 0.9, end: 0 },
          scale: { start: 1.2, end: 0.2 },
        });
        this.comboEmitter.setDepth(8);
      }
      this.cameras.main.shake(100, 0.003);
    } else if (c >= 2) {
      // Orange trail
      if (this.ball && this.textures.exists('fireparticle')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
          follow: this.ball,
          speedX: { min: -20, max: 20 },
          speedY: { min: -20, max: 20 },
          lifespan: 300,
          quantity: 2,
          frequency: 50,
          alpha: { start: 0.7, end: 0 },
          tint: 0xff8833,
        });
        this.comboEmitter.setDepth(8);
      }
    }
  }

  doBeastMode() {
    const cx = CONFIG.WIDTH / 2;
    const cy = CONFIG.HEIGHT / 2;

    // Yellow screen flash
    const flash = this.add.graphics().setDepth(30);
    flash.fillStyle(0xffff00, 0.3);
    flash.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    this.tweens.add({
      targets: flash,
      alpha: 0,
      duration: 500,
      onComplete: () => flash.destroy()
    });

    // Camera shake
    this.cameras.main.shake(300, 0.006);

    // BEAST MODE!! text
    const bTxt = this.add.text(cx, cy - 40, 'BEAST MODE!!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '40px',
      color: '#ff2200',
      stroke: '#ffff00',
      strokeThickness: 5,
    }).setOrigin(0.5).setDepth(32).setAngle(Phaser.Math.Between(-8, 8));
    this.tweens.add({
      targets: bTxt,
      scaleX: 1.6, scaleY: 1.6,
      alpha: 0,
      duration: 1200,
      ease: 'Back.easeOut',
      onComplete: () => bTxt.destroy()
    });

    // 10 colored graffiti splats
    const splatColors = [0xff3366, 0x3366ff, 0xffcc00, 0x44cc44, 0xff8833, 0xcc44ff];
    for (let i = 0; i < 10; i++) {
      const sx = Phaser.Math.Between(50, CONFIG.WIDTH - 50);
      const sy = Phaser.Math.Between(40, CONFIG.HEIGHT - 80);
      const sc = splatColors[i % splatColors.length];
      const sg = this.add.graphics().setDepth(31);
      sg.fillStyle(sc, 0.7);
      sg.fillCircle(0, 0, Phaser.Math.Between(12, 24));
      sg.x = sx; sg.y = sy;
      sg.setScale(0.1);
      this.tweens.add({
        targets: sg,
        scaleX: 1, scaleY: 1,
        alpha: 0,
        duration: Phaser.Math.Between(600, 1200),
        delay: i * 60,
        ease: 'Back.easeOut',
        onComplete: () => sg.destroy()
      });
    }

    // Fire emitter on ball
    if (this.ball && this.textures.exists('fireparticle')) {
      if (this.comboEmitter) { this.comboEmitter.destroy(); this.comboEmitter = null; }
      this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
        follow: this.ball,
        speedX: { min: -60, max: 60 },
        speedY: { min: -60, max: 60 },
        lifespan: 500,
        quantity: 6,
        frequency: 20,
        alpha: { start: 1, end: 0 },
        scale: { start: 1.5, end: 0.2 },
        blendMode: 'ADD',
      });
      this.comboEmitter.setDepth(9);
      if (this.ball) this.ball.setTint(0xff4400);
    }
  }

  // ── Score Splash ──────────────────────────────────────────────────────────
  doScoreSplash(rimX, rimY) {
    if (!this.textures.exists('inksplat')) return;
    const colors = [0xff3366, 0x3366ff, 0xffcc00, 0x44cc44, 0xff8833, 0x6644ff];
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const dist  = Phaser.Math.Between(20, 55);
      const sx    = rimX + Math.cos(angle) * dist;
      const sy    = rimY + Math.sin(angle) * dist;
      const g     = this.add.graphics().setDepth(15);
      g.fillStyle(colors[i % colors.length], 0.8);
      g.fillCircle(0, 0, Phaser.Math.Between(6, 14));
      g.x = sx; g.y = sy; g.setScale(0.2);
      this.tweens.add({
        targets: g,
        scaleX: 1.2, scaleY: 1.2,
        alpha: 0,
        duration: 700,
        delay: i * 40,
        ease: 'Quad.easeOut',
        onComplete: () => g.destroy()
      });
    }
  }
}

// ─── PHASER CONFIG ────────────────────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.CANVAS,
  width:  CONFIG.WIDTH,
  height: CONFIG.HEIGHT,
  backgroundColor: CONFIG.COLORS.paper,
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: CONFIG.GRAVITY },
      debug: false
    }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: [MenuScene, GameScene, ResultScene, LevelSelectScene]
});
</script>
