  // ── Hoop ──────────────────────────────────────────────────────────────────
  drawHoop() {
    const g = this.add.graphics();
    const POLE_X   = 610;
    const RIM_Y    = 185;
    const RIM_W    = 60;
    const RIM_CX   = POLE_X - 10;
    const BOARD_X  = POLE_X + 8;
    const BOARD_Y  = RIM_Y - 60;
    const BOARD_W  = 16;
    const BOARD_H  = 85;

    // Pole — thick dark gray
    g.fillStyle(0x555555);
    g.fillRect(POLE_X - 3, RIM_Y + 10, 8, CONFIG.GROUND_Y - RIM_Y - 10);
    g.lineStyle(2, 0x333333);
    g.strokeRect(POLE_X - 3, RIM_Y + 10, 8, CONFIG.GROUND_Y - RIM_Y - 10);

    // Backboard — white with thick border
    g.fillStyle(0xffffff);
    g.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
    g.lineStyle(3, 0x222222);
    g.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);

    // Inner target square on backboard (red)
    g.lineStyle(2, 0xee2222, 0.9);
    g.strokeRect(BOARD_X + 3, BOARD_Y + BOARD_H * 0.25, BOARD_W - 6, BOARD_H * 0.4);

    // Rim arm (connects backboard to rim)
    g.lineStyle(4, 0xdd2200);
    g.beginPath();
    g.moveTo(BOARD_X, RIM_Y);
    g.lineTo(RIM_CX - RIM_W * 0.5 + 4, RIM_Y);
    g.strokePath();

    // Rim — bright orange-red, thick and visible
    g.lineStyle(6, 0xff4400);
    g.beginPath();
    g.moveTo(RIM_CX - RIM_W / 2, RIM_Y);
    g.lineTo(RIM_CX + RIM_W / 2, RIM_Y);
    g.strokePath();
    // Rim end caps
    g.fillStyle(0xff4400);
    g.fillCircle(RIM_CX - RIM_W / 2, RIM_Y, 5);
    g.fillCircle(RIM_CX + RIM_W / 2, RIM_Y, 5);

    // Net — white threads with tapered shape
    const netTop = RIM_Y + 5;
    const netBot = RIM_Y + 42;
    const netSegments = 8;
    g.lineStyle(1.5, 0xffffff, 0.7);
    for (let i = 0; i <= netSegments; i++) {
      const topX = (RIM_CX - RIM_W / 2) + (RIM_W * i / netSegments);
      const taper = 6;
      const botX = (RIM_CX - RIM_W / 2 + taper) + ((RIM_W - taper * 2) * i / netSegments);
      const wobble = Math.sin(i * 1.5) * 2;
      g.beginPath();
      g.moveTo(topX, netTop);
      g.lineTo(botX + wobble, netBot);
      g.strokePath();
    }
    // Horizontal net rungs
    g.lineStyle(1, 0xffffff, 0.5);
    for (let row = 1; row <= 3; row++) {
      const t = row / 4;
      const ry = netTop + (netBot - netTop) * t;
      const shrink = row * 3;
      g.beginPath();
      g.moveTo(RIM_CX - RIM_W / 2 + shrink, ry);
      g.lineTo(RIM_CX + RIM_W / 2 - shrink, ry);
      g.strokePath();
    }

    this.hoopGeom = { RIM_CX, RIM_Y, RIM_W, BOARD_X, BOARD_Y, BOARD_W, BOARD_H, POLE_X };
  }

  drawWobblyLine(g, x1, y1, x2, y2, segments) {
    const pts = [];
    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const wx = x1 + (x2 - x1) * t + (i > 0 && i < segments ? (Math.random() - 0.5) * 3 : 0);
      const wy = y1 + (y2 - y1) * t + (i > 0 && i < segments ? (Math.random() - 0.5) * 3 : 0);
      pts.push({ x: wx, y: wy });
    }
    g.beginPath();
    g.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) g.lineTo(pts[i].x, pts[i].y);
    g.strokePath();
  }

  drawWobblyRect(g, x, y, w, h, wobble) {
    const r = wobble;
    g.beginPath();
    g.moveTo(x + (Math.random() - 0.5) * r,     y + (Math.random() - 0.5) * r);
    g.lineTo(x + w + (Math.random() - 0.5) * r, y + (Math.random() - 0.5) * r);
    g.lineTo(x + w + (Math.random() - 0.5) * r, y + h + (Math.random() - 0.5) * r);
    g.lineTo(x + (Math.random() - 0.5) * r,     y + h + (Math.random() - 0.5) * r);
    g.closePath();
    g.strokePath();
  }

  // ── Moving Rim ────────────────────────────────────────────────────────────
  setupMovingRim() {
    this.rimMoving    = true;
    this.rimBaseX     = this.hoopGeom.RIM_CX;
    this.rimMoveRange = 40;
    this.rimMoveSpeed = 0.02;
    this.rimMovePhase = 0;

    // Create a graphics layer for the animated hoop (above static)
    this.hoopGraphics = this.add.graphics().setDepth(2);
    // Hide the static hoop's visual elements by redrawing them clear
    // (static hoop is already drawn; we just overlay with hoopGraphics each frame)
    // We hide via a covering graphics rect that matches background in the hoop area
    // Actually: the static hoop graphics object cannot be easily hidden post-create,
    // so we cover it with an area-matching fill and redraw on top.
    // We'll draw a background patch over the static hoop to erase it.
    this.hoopCoverGfx = this.add.graphics().setDepth(1);
    this._coverStaticHoop();
  }

  _coverStaticHoop() {
    if (!this.hoopCoverGfx) return;
    const g = this.hoopCoverGfx;
    g.clear();
    // Cover the hoop area with a paper-colored rect
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(560, 120, 120, 240);
    // Re-apply notebook lines over the covered area
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      if (y < 360) {
        g.beginPath(); g.moveTo(560, y); g.lineTo(680, y); g.strokePath();
      }
    }
    // Re-apply area background texture in the hoop column
    const area = this.currentArea || 'street';
    if (area === 'street') {
      g.lineStyle(1.5, 0x886655, 0.35);
      const bH = 24, bW = 52;
      for (let row = 0; row * bH < CONFIG.HEIGHT * 0.6; row++) {
        const offsetX = (row % 2) * (bW / 2);
        for (let col = 10; col < 14; col++) {
          const x = col * bW + offsetX;
          const y2 = row * bH;
          if (x >= 550 && x <= 690) g.strokeRect(x, y2, bW, bH);
        }
      }
    } else if (area === 'park') {
      g.fillStyle(0xbbbbaa, 0.25);
      g.fillRect(560, 120, 120, CONFIG.HEIGHT * 0.6 - 120);
    } else if (area === 'rooftop') {
      g.fillStyle(0x111833, 1);
      g.fillRect(560, 120, 120, CONFIG.HEIGHT * 0.4 * 0.5 - 120 < 0 ? 0 : CONFIG.HEIGHT * 0.2 - 120 < 0 ? 0 : 10);
      g.fillStyle(0x111122, 1);
      // redraw one building column
      g.fillRect(560, 200, 120, CONFIG.GROUND_Y - 200);
    }
    // Ground continuation
    g.fillStyle(0x8B7355, 1);
    g.fillRect(560, CONFIG.GROUND_Y, 120, CONFIG.HEIGHT - CONFIG.GROUND_Y);
    g.lineStyle(3, 0x5a4a30, 1);
    g.beginPath(); g.moveTo(560, CONFIG.GROUND_Y); g.lineTo(680, CONFIG.GROUND_Y); g.strokePath();
  }

  updateMovingRim() {
    if (!this.rimMoving) return;
    this.rimMovePhase += this.rimMoveSpeed;
    const offsetX = Math.sin(this.rimMovePhase) * this.rimMoveRange;
    const newRimCX = this.rimBaseX + offsetX;
    this.redrawHoopAt(newRimCX);
  }

  redrawHoopAt(rimCX) {
    if (!this.hoopGraphics) return;
    const g = this.hoopGraphics;
    g.clear();

    const { RIM_Y, RIM_W, BOARD_W, BOARD_H, POLE_X } = this.hoopGeom;
    // Compute new board position based on offset from original
    const origRimCX = this.hoopGeom.RIM_CX;
    const delta = rimCX - origRimCX;
    const BOARD_X = this.hoopGeom.BOARD_X + delta;
    const BOARD_Y = this.hoopGeom.BOARD_Y;

    // Rim shake Y offset
    let rimShake = 0;
    if (this.gameMode === 'level' && this.levelConfig && this.levelConfig.rimShake) {
      rimShake = Math.sin(Date.now() * 0.01) * 3;
    }
    const rimY = RIM_Y + rimShake;

    // Pole
    g.lineStyle(5, 0x555544, 1);
    g.beginPath();
    g.moveTo(POLE_X + delta, CONFIG.GROUND_Y);
    g.lineTo(POLE_X + delta + 2, rimY + 10);
    g.strokePath();

    // Backboard
    g.fillStyle(0xfafaf5, 1);
    g.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
    g.lineStyle(3, 0x333322, 1);
    g.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
    g.lineStyle(1.5, 0xcc3333, 0.8);
    g.strokeRect(BOARD_X + 2, BOARD_Y + BOARD_H * 0.3, BOARD_W - 4, BOARD_H * 0.35);

    // Rim arm
    g.lineStyle(4, 0xcc2200, 1);
    g.beginPath();
    g.moveTo(BOARD_X, rimY);
    g.lineTo(rimCX - RIM_W * 0.5 + 4, rimY);
    g.strokePath();

    // Rim
    g.lineStyle(5, 0xff3300, 1);
    g.beginPath();
    g.moveTo(rimCX - RIM_W / 2, rimY);
    g.lineTo(rimCX + RIM_W / 2, rimY);
    g.strokePath();
    g.fillStyle(0xff3300, 1);
    g.fillCircle(rimCX - RIM_W / 2, rimY, 5);
    g.fillCircle(rimCX + RIM_W / 2, rimY, 5);

    // Net
    g.lineStyle(1.5, 0xf5f0e0, 0.85);
    const netTop = rimY + 4;
    const netBot = rimY + 38;
    const netSegments = 7;
    for (let i = 0; i <= netSegments; i++) {
      const nx = (rimCX - RIM_W / 2) + (RIM_W * i / netSegments);
      const wobble = Math.sin(i * 1.3) * 3;
      g.beginPath();
      g.moveTo(nx, netTop);
      g.lineTo(nx + wobble, netBot);
      g.strokePath();
    }
    for (let row = 1; row <= 3; row++) {
      const ry = netTop + (netBot - netTop) * row / 4;
      const shrink = row * 2;
      g.beginPath();
      g.moveTo(rimCX - RIM_W / 2 + shrink, ry);
      g.lineTo(rimCX + RIM_W / 2 - shrink, ry);
      g.strokePath();
    }

    // Update physics bodies
    const sz = this.scoreZoneBody;
    if (sz) {
      sz.body.reset(rimCX, RIM_Y + rimShake + 14);
    }
    const bb = this.backboardBody;
    if (bb) {
      bb.body.reset(BOARD_X + BOARD_W / 2, this.hoopGeom.BOARD_Y + BOARD_H / 2);
    }
    const rl = this.rimLeft.getChildren()[0];
    if (rl) rl.body.reset(rimCX - RIM_W / 2, RIM_Y + rimShake);
    const rr = this.rimRight.getChildren()[0];
    if (rr) rr.body.reset(rimCX + RIM_W / 2, RIM_Y + rimShake);
  }

  // ── Obstacles ─────────────────────────────────────────────────────────────
  setupObstacles() {
    this._scheduleNextObstacle();
  }

  _scheduleNextObstacle() {
    const delay = Phaser.Math.Between(5000, 8000);
    this.obstacleTimer = this.time.delayedCall(delay, () => {
      if (!this.isGameOver) {
        this.spawnObstacle();
        this._scheduleNextObstacle();
      }
    });
  }

  spawnObstacle() {
    const spawnY = Phaser.Math.Between(100, 250);
    const goLeft = Math.random() > 0.5;
    const spawnX = goLeft ? CONFIG.WIDTH + 20 : -20;
    const velX   = goLeft ? -Phaser.Math.Between(80, 150) : Phaser.Math.Between(80, 150);

    const bird = this.add.text(spawnX, spawnY, '🐦', {
      fontSize: '28px',
    }).setOrigin(0.5).setDepth(7);
    bird.setFlipX(goLeft ? false : true);

    const birdBody = this.physics.add.staticGroup();
    const bz = birdBody.create(spawnX, spawnY, null);
    bz.setVisible(false);
    bz.body.setSize(24, 24);
    bz.refreshBody();

    const obstacleObj = { text: bird, physGroup: birdBody, velX, alive: true };
    this.obstacles.push(obstacleObj);

    // Move the bird manually in update via stored velocity
    obstacleObj._startX = spawnX;
    obstacleObj._startTime = this.time.now;

    // Collide with ball
    if (this.ball && this.ball.active) {
      const oc = this.physics.add.overlap(this.ball, birdBody, () => {
        if (!obstacleObj.alive) return;
        // Deflect ball downward
        if (this.ball && this.ball.body) {
          this.ball.body.velocity.y += 50;
        }
        this._destroyObstacle(obstacleObj);
      });
      this.ballColliders.push(oc);
    }

    // Auto-destroy after 8 seconds
    this.time.delayedCall(8000, () => {
      if (obstacleObj.alive) this._destroyObstacle(obstacleObj);
    });
  }

  _destroyObstacle(obs) {
    if (!obs.alive) return;
    obs.alive = false;
    if (obs.text)       obs.text.destroy();
    if (obs.physGroup)  obs.physGroup.clear(true, true);
    const idx = this.obstacles.indexOf(obs);
    if (idx >= 0) this.obstacles.splice(idx, 1);
  }

  cleanupObstacles() {
    if (this.obstacleTimer) { this.obstacleTimer.remove(); this.obstacleTimer = null; }
    this.obstacles.slice().forEach(obs => this._destroyObstacle(obs));
    this.obstacles = [];
  }

  // ── Player ────────────────────────────────────────────────────────────────
  drawPlayer() {
    this.playerGfx = this.add.graphics();
    // Use levelConfig playerX if available; 0 means random
    let px = 160;
    if (this.levelConfig) {
      px = this.levelConfig.playerX || 160;
      if (this.levelConfig.randomPos) px = Phaser.Math.Between(80, 300);
    }
    this.playerX   = px;
    this.playerY   = CONFIG.GROUND_Y - 4;
    this.redrawPlayer(this.playerX, this.playerY, false);
  }

  redrawPlayer(px, py, shooting) {
    const g = this.playerGfx;
    g.clear();
    // Destroy previous jersey number text to prevent accumulation
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    // Char colors
    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    // Darken jersey for outline: mix with black
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Shadow
    g.fillStyle(0x000000, 0.15);
    g.fillEllipse(px, py, 44, 10);

    // Legs
    g.lineStyle(3.5, 0x222222, 1);
    g.beginPath();
    g.moveTo(px, torsoB);
    g.lineTo(px - 10, legBot);
    g.strokePath();
    g.beginPath();
    g.moveTo(px, torsoB);
    g.lineTo(px + 6, legBot);
    g.strokePath();

    // Shoes
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px - 12, legBot + 2, 16, 6);
    g.fillEllipse(px + 4,  legBot + 2, 16, 6);

    // Jersey body
    g.fillStyle(jerseyHex, 1);
    g.fillRect(px - 14, torsoT, 28, torsoB - torsoT);
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokeRect(px - 14, torsoT, 28, torsoB - torsoT);

    // Jersey number "23"
    this.jerseyNumTxt = this.add.text(px, torsoT + (torsoB - torsoT) / 2, '23', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 2
    });
    this.jerseyNumTxt.setOrigin(0.5);

    // Non-shooting arm
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath();
    g.moveTo(px - 14, torsoT + 8);
    g.lineTo(px - 26, torsoT + 24);
    g.strokePath();

    // Shooting arm
    if (shooting) {
      g.lineStyle(3.5, 0xffcc99, 1);
      g.beginPath();
      g.moveTo(px + 14, torsoT + 8);
      g.lineTo(px + 28, torsoT - 12);
      g.strokePath();
      g.fillStyle(0xffcc99, 1);
      g.fillCircle(px + 28, torsoT - 14, 5);
    } else {
      g.lineStyle(3, 0xffcc99, 1);
      g.beginPath();
      g.moveTo(px + 14, torsoT + 8);
      g.lineTo(px + 24, torsoT + 20);
      g.strokePath();
    }

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath();
    g.moveTo(px, torsoT);
    g.lineTo(px, headY + 14);
    g.strokePath();

    // Head
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px, headY + 7, 14);

    // Eyes
    g.fillStyle(0x333333, 1);
    g.fillCircle(px - 5, headY + 4, 2.5);
    g.fillCircle(px + 5, headY + 4, 2.5);

    // Smile
    g.lineStyle(2, 0x553322, 1);
    g.beginPath();
    g.arc(px, headY + 8, 6, 0.2, Math.PI - 0.2);
    g.strokePath();

    // Headband (char color)
    g.lineStyle(5, bandHex, 1);
    g.beginPath();
    g.arc(px, headY + 7, 14, -Math.PI * 0.75, -Math.PI * 0.1);
    g.strokePath();
  }

  // ── Physics Bodies ────────────────────────────────────────────────────────
  createPhysicsBodies() {
    const { RIM_CX, RIM_Y, RIM_W, BOARD_X, BOARD_Y, BOARD_W, BOARD_H } = this.hoopGeom;

    // Ground
    this.ground = this.physics.add.staticGroup();
    const groundBody = this.ground.create(CONFIG.WIDTH / 2, CONFIG.GROUND_Y + 20, null);
    groundBody.setVisible(false);
    groundBody.body.setSize(CONFIG.WIDTH, 40);
    groundBody.refreshBody();

    // Backboard
    this.backboard = this.physics.add.staticGroup();
    const bb = this.backboard.create(BOARD_X + BOARD_W / 2, BOARD_Y + BOARD_H / 2, null);
    bb.setVisible(false);
    bb.body.setSize(BOARD_W + 2, BOARD_H);
    bb.refreshBody();

    // Left rim edge
    this.rimLeft = this.physics.add.staticGroup();
    const rl = this.rimLeft.create(RIM_CX - RIM_W / 2, RIM_Y, null);
    rl.setVisible(false);
    rl.body.setSize(4, 4);
    rl.refreshBody();

    // Right rim edge
    this.rimRight = this.physics.add.staticGroup();
    const rr = this.rimRight.create(RIM_CX + RIM_W / 2, RIM_Y, null);
    rr.setVisible(false);
    rr.body.setSize(4, 4);
    rr.refreshBody();

    // Score zone (sensor) — generous size for easier scoring
    this.scoreZone = this.physics.add.staticGroup();
    const sz = this.scoreZone.create(RIM_CX, RIM_Y + 16, null);
    sz.setVisible(false);
    sz.body.setSize(RIM_W + 8, 24);
    sz.refreshBody();
    this.scoreZoneBody = sz;
    this.defaultScoreZoneW = RIM_W + 8;

    // Store backboard body ref for bankBoost
    this.backboardBody = bb;
    this.defaultBackboardW = BOARD_W + 2;
  }

  // ── Colliders ─────────────────────────────────────────────────────────────
  setupHoopColliders() {
    if (!this.ball || !this.ball.active) return;

    this.ballColliders.forEach(c => { if (c) this.physics.world.removeCollider(c); });
    this.ballColliders = [];

    const gc = this.physics.add.collider(this.ball, this.ground, () => {
      if (!this.isShooting) return;
      this.onMiss();
    });
    this.ballColliders.push(gc);

    const bc = this.physics.add.collider(this.ball, this.backboard, () => {
      this.hitBackboard = true;
    });
    this.ballColliders.push(bc);

    const rlc = this.physics.add.collider(this.ball, this.rimLeft);
    this.ballColliders.push(rlc);
    const rrc = this.physics.add.collider(this.ball, this.rimRight);
    this.ballColliders.push(rrc);

    const sc = this.physics.add.overlap(this.ball, this.scoreZone, () => {
      if (!this.isShooting || this.scored) return;
      if (this.ball.body.velocity.y > 0) {
        this.onScore();
      }
    });
    this.ballColliders.push(sc);

    // Power-up collection overlap (set up if powerUpZone exists)
    this._setupPowerUpOverlap();
  }

  _setupPowerUpOverlap() {
    if (!this.powerUpZone || !this.ball || !this.ball.active) return;
    const pc = this.physics.add.overlap(this.ball, this.powerUpZone, () => {
      if (!this.powerUpSprite) return;
      const type = this.powerUpSprite.puType;
      this.collectPowerUp(type);
    });
    this.ballColliders.push(pc);
  }

  // ── Character Loading ─────────────────────────────────────────────────────
  loadCharacter() {
    const save = loadSave();
    const id = save.selectedChar || 'default';
    this.charConfig = CONFIG.CHARACTERS.find(c => c.id === id) || CONFIG.CHARACTERS[0];

    // Apply bankBoost: widen backboard
    if (this.charConfig.skill === 'bankBoost' && this.backboardBody) {
      this.backboardBody.body.setSize(this.defaultBackboardW * 1.5, this.backboardBody.body.height);
      this.backboardBody.refreshBody();
    }

    // luckyDrop: reduce power-up gap
    if (this.charConfig.skill === 'luckyDrop') {
      this.nextPowerUpAt = Math.max(2, Math.floor(this.nextPowerUpAt * 0.7));
    }
  }

  checkUnlocks() {
    const save = loadSave();
    const unlockedChars = save.unlockedChars || ['default'];
    const levelStars    = save.levelStars    || {};
    const highScore     = save.highScore     || 0;
    const totalStars    = Object.values(levelStars).reduce((a, b) => a + b, 0);
    let changed = false;

    CONFIG.CHARACTERS.forEach(char => {
      if (!char.unlock || unlockedChars.indexOf(char.id) !== -1) return;
      const u = char.unlock;
      let unlocked = false;
      if (u.type === 'level') {
        const maxLevel = Object.keys(levelStars).reduce((a, k) => {
          return (levelStars[k] || 0) > 0 ? Math.max(a, parseInt(k)) : a;
        }, 0);
        unlocked = maxLevel >= u.value;
      } else if (u.type === 'stars') {
        unlocked = totalStars >= u.value;
      } else if (u.type === 'score') {
        unlocked = highScore >= u.value;
      }
      if (unlocked) { unlockedChars.push(char.id); changed = true; }
    });

    if (changed) {
      save.unlockedChars = unlockedChars;
      writeSave(save);
    }
  }

  // ── Power-Up System ────────────────────────────────────────────────────────
  setupPowerUps() {
    // Nothing extra needed — state already init'd in initState
  }

  trySpawnPowerUp() {
    if (this.powerUpSprite) return; // already one on screen
    if (this.basketCount < this.nextPowerUpAt) return;

    // Pick a random power-up type
    const keys = Object.keys(CONFIG.POWERUPS);
    const type = keys[Phaser.Math.Between(0, keys.length - 1)];
    const cfg  = CONFIG.POWERUPS[type];

    // Spawn position: mid-air area
    const spawnX = Phaser.Math.Between(200, 500);
    const spawnY = Phaser.Math.Between(100, 220);

    // Glow circle behind
    this.powerUpGlow = this.add.graphics().setDepth(12);
    const glowColor = Phaser.Display.Color.HexStringToColor(cfg.color).color;
    this.powerUpGlow.fillStyle(glowColor, 0.3);
    this.powerUpGlow.fillCircle(0, 0, 26);
    this.powerUpGlow.x = spawnX;
    this.powerUpGlow.y = spawnY;

    // Emoji sprite
    this.powerUpSprite = this.add.text(spawnX, spawnY, cfg.icon, {
      fontSize: '28px',
    }).setOrigin(0.5).setDepth(13);

    // Store type on sprite
    this.powerUpSprite.puType = type;

    // Bob animation
    if (this.powerUpBobTween) this.powerUpBobTween.stop();
    this.powerUpBobTween = this.tweens.add({
      targets: [this.powerUpSprite, this.powerUpGlow],
      y: '-=12',
      duration: 600,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut',
    });

    // Physics zone for collection
    this.powerUpZone = this.physics.add.staticGroup();
    const puz = this.powerUpZone.create(spawnX, spawnY, null);
    puz.setVisible(false);
    puz.body.setSize(44, 44);
    puz.refreshBody();

    // Set next spawn
    this.nextPowerUpAt = this.basketCount + Phaser.Math.Between(3, 6);
    if (this.charConfig && this.charConfig.skill === 'luckyDrop') {
      this.nextPowerUpAt = this.basketCount + Math.max(2, Math.floor(Phaser.Math.Between(3, 6) * 0.7));
    }

    // Wire ball overlap now that zone exists
    if (this.ball && this.ball.active) {
      const pc = this.physics.add.overlap(this.ball, this.powerUpZone, () => {
        if (!this.powerUpSprite) return;
        const type = this.powerUpSprite.puType;
        this.collectPowerUp(type);
      });
      this.ballColliders.push(pc);
    }
  }

  collectPowerUp(type) {
    const cfg = CONFIG.POWERUPS[type];
    soundManager.play('pickup');

    // Destroy visuals
    if (this.powerUpBobTween) { this.powerUpBobTween.stop(); this.powerUpBobTween = null; }
    if (this.powerUpSprite) { this.powerUpSprite.destroy(); this.powerUpSprite = null; }
    if (this.powerUpGlow)   { this.powerUpGlow.destroy();   this.powerUpGlow   = null; }
    if (this.powerUpZone)   { this.powerUpZone.clear(true, true); this.powerUpZone = null; }

    // Show pickup popup
    const rimX = this.hoopGeom.RIM_CX;
    const popup = this.add.text(rimX, 130, cfg.icon + ' ' + cfg.name + '!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '22px',
      color: cfg.color,
      stroke: '#ffffff',
      strokeThickness: 3,
    }).setOrigin(0.5).setDepth(25);
    this.tweens.add({
      targets: popup,
      y: 80, alpha: 0,
      duration: 1200,
      ease: 'Quad.easeOut',
      onComplete: () => popup.destroy(),
    });

    // Apply effect
    if (type === 'bigRim') {
      this.activePowerUps.bigRim = { shotsLeft: cfg.duration };
      if (this.scoreZoneBody) {
        this.scoreZoneBody.body.setSize(this.defaultScoreZoneW * 1.5, 12);
        this.scoreZoneBody.refreshBody();
      }
    } else if (type === 'magnet') {
      this.activePowerUps.magnet = { shotsLeft: cfg.duration };
    } else if (type === 'freeze') {
      this.activePowerUps.freeze = { shotsLeft: 1 };
      this.timerFrozen = true;
      this.time.delayedCall(5000, () => {
        this.timerFrozen = false;
        delete this.activePowerUps.freeze;
        this.updatePowerUpHUD();
      });
    } else if (type === 'doubleScore') {
      this.activePowerUps.doubleScore = { shotsLeft: cfg.duration };
    } else if (type === 'graffitiBomb') {
      this.activePowerUps.graffitiBomb = { shotsLeft: 1 };
      this.autoScore = true;
    }

    this.updatePowerUpHUD();
  }

  consumePowerUpShots() {
    const toRemove = [];

    if (this.activePowerUps.bigRim) {
      this.activePowerUps.bigRim.shotsLeft--;
      if (this.activePowerUps.bigRim.shotsLeft <= 0) {
        toRemove.push('bigRim');
        if (this.scoreZoneBody) {
          this.scoreZoneBody.body.setSize(this.defaultScoreZoneW, 12);
          this.scoreZoneBody.refreshBody();
        }
      }
    }
    if (this.activePowerUps.magnet) {
      this.activePowerUps.magnet.shotsLeft--;
      if (this.activePowerUps.magnet.shotsLeft <= 0) toRemove.push('magnet');
    }
    if (this.activePowerUps.doubleScore) {
      this.activePowerUps.doubleScore.shotsLeft--;
      if (this.activePowerUps.doubleScore.shotsLeft <= 0) toRemove.push('doubleScore');
    }
    if (this.activePowerUps.graffitiBomb) {
      this.activePowerUps.graffitiBomb.shotsLeft--;
      if (this.activePowerUps.graffitiBomb.shotsLeft <= 0) {
        toRemove.push('graffitiBomb');
        this.autoScore = false;
      }
    }

    toRemove.forEach(k => delete this.activePowerUps[k]);
    this.updatePowerUpHUD();
  }

  updatePowerUpHUD() {
    // Destroy old HUD items
    this.powerUpHudItems.forEach(item => item.destroy());
    this.powerUpHudItems = [];

    const active = Object.entries(this.activePowerUps);
    if (active.length === 0) return;

    const baseX = CONFIG.WIDTH - 12;
    const baseY = CONFIG.HEIGHT - 55;
    const lineH = 22;

    active.forEach(([type, state], i) => {
      const cfg = CONFIG.POWERUPS[type];
      let label = cfg.icon;
      if (type === 'freeze') {
        label += ' ❄️';
      } else {
        label += ' x' + state.shotsLeft;
      }
      const t = this.add.text(baseX, baseY - i * lineH, label, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '14px',
        color: cfg.color,
        stroke: '#ffffff',
        strokeThickness: 2,
      }).setOrigin(1, 0.5).setDepth(25);
      this.powerUpHudItems.push(t);
    });
  }

  cleanupPowerUps() {
    if (this.powerUpBobTween) { this.powerUpBobTween.stop(); this.powerUpBobTween = null; }
    if (this.powerUpSprite)   { this.powerUpSprite.destroy(); this.powerUpSprite = null; }
    if (this.powerUpGlow)     { this.powerUpGlow.destroy();   this.powerUpGlow   = null; }
    if (this.powerUpZone)     { this.powerUpZone.clear(true, true); this.powerUpZone = null; }
    this.powerUpHudItems.forEach(item => item.destroy());
    this.powerUpHudItems = [];
    this.activePowerUps = {};
    this.autoScore = false;
  }

  // ── Ball ──────────────────────────────────────────────────────────────────
  createBall() {
    const spawnX = this.playerX + 30;
    const spawnY = CONFIG.GROUND_Y - 80;

    this.ball = this.physics.add.sprite(spawnX, spawnY, 'basketball');
    this.ball.setDisplaySize(30, 30);
    this.ball.body.setAllowGravity(false);
    this.ball.body.setBounce(0.4);
    this.ball.body.setCircle(14, 14, 14);

    this.isShooting   = false;
    this.scored       = false;
    this.hitBackboard = false;

    this.setupHoopColliders();

    if (this.ballTween) this.ballTween.stop();
    this.ballTween = this.tweens.add({
      targets: this.ball,
      y: spawnY - 8,
      duration: 700,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });
  }

  // ── Input / Swipe ─────────────────────────────────────────────────────────
  setupInput() {
    this.trajectoryGfx = this.add.graphics();

    this.input.on('pointerdown', (ptr) => {
      if (this.isShooting || this.isGameOver) return;
      this.swipeStart = { x: ptr.x, y: ptr.y, time: this.time.now };
    });

    this.input.on('pointermove', (ptr) => {
      if (!this.swipeStart || this.isShooting) return;
      this.drawTrajectoryPreview(ptr.x, ptr.y);
    });

    this.input.on('pointerup', (ptr) => {
      if (!this.swipeStart || this.isShooting) return;
      this.trajectoryGfx.clear();

      const dx   = ptr.x - this.swipeStart.x;
      const dy   = ptr.y - this.swipeStart.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const dt   = this.time.now - this.swipeStart.time;

      if (dist < 20 || dt > 1500) {
        this.swipeStart = null;
        return;
      }

      // Start timer on first swipe
      if (!this.gameStarted && this.gameMode === 'endless') {
        this.gameStarted = true;
      }

      this.shootBall(dx, dy, dist, dt);
      this.swipeStart = null;
    });
  }

  drawTrajectoryPreview(ex, ey) {
    if (!this.swipeStart) return;
    const g = this.trajectoryGfx;
    g.clear();

    const sx = this.ball.x;
    const sy = this.ball.y;

    const dx    = ex - this.swipeStart.x;
    const dy    = ey - this.swipeStart.y;
    const dist  = Math.sqrt(dx * dx + dy * dy);
    const speed = Math.min(dist * 3.5, 900);
    const vx    = (dx / dist) * speed;
    const vy    = (dy / dist) * speed;

    const g_accel = CONFIG.GRAVITY;
    const dt      = 1 / 60;
    let px = sx, py = sy, pvx = vx, pvy = vy;

    g.fillStyle(0xff8833, 0.7);
    for (let i = 0; i < 90; i++) {
      pvy += g_accel * dt;
      px  += pvx * dt;
      py  += pvy * dt;
      if (py > CONFIG.GROUND_Y || px < 0 || px > CONFIG.WIDTH) break;
      if (i % 5 === 0) {
        const r = Phaser.Math.Lerp(5, 2, i / 90);
        g.fillCircle(px, py, r);
      }
    }
  }

  shootBall(dx, dy, dist, dt) {
    if (this.ballTween) { this.ballTween.stop(); this.ballTween = null; }

    soundManager.play('shoot');

    // autoScore (graffiti bomb): teleport ball to score zone
    if (this.autoScore) {
      this.autoScore = false;
      const { RIM_CX, RIM_Y } = this.hoopGeom;
      this.ball.body.setAllowGravity(true);
      this.ball.setPosition(RIM_CX, RIM_Y + 6);
      this.ball.body.setVelocity(0, 80);
      this.isShooting   = true;
      this.scored       = false;
      this.hitBackboard = false;
      this.shotZone     = 'near';
      // Explosion effect
      this.doScoreSplash(RIM_CX, RIM_Y);
      this.cameras.main.shake(150, 0.005);
      this.tweens.add({ targets: this.playerGfx, y: -16, duration: 130, yoyo: true, ease: 'Quad.easeOut' });
      return;
    }

    // Use distance-based speed (less sensitive to swipe speed, more forgiving)
    const speed = Math.min(dist * 3.5, 900);
    const vx    = (dx / dist) * speed;
    const vy    = (dy / dist) * speed;

    this.ball.body.setAllowGravity(true);
    this.ball.body.setVelocity(vx, vy);
    this.ball.body.setAngularVelocity(vx * 0.4);

    this.isShooting   = true;
    this.scored       = false;
    this.hitBackboard = false;

    const rimX = this.hoopGeom.RIM_CX;
    const dToRim = Math.abs(this.ball.x - rimX);
    if (dToRim < 150)       this.shotZone = 'near';
    else if (dToRim < 280)  this.shotZone = 'mid';
    else                    this.shotZone = 'far';

    this.tweens.add({
      targets: this.playerGfx,
      y: -16,
      duration: 130,
      yoyo: true,
      ease: 'Quad.easeOut'
    });
  }

  // ── Score / Miss ──────────────────────────────────────────────────────────
  onScore() {
    if (this.scored) return;
    this.scored = true;

    // Track baskets and combo
    this.basketCount++;
    this.combo = Math.min(this.combo + 1, 10);
    if (this.combo > this.maxCombo) this.maxCombo = this.combo;

    // Sound
    soundManager.play(this.hitBackboard ? 'bank' : 'swish');
    if (this.combo > 2) soundManager.play('combo');

    // Base points
    let pts = this.shotZone === 'far' ? 200 : this.shotZone === 'mid' ? 150 : 100;
    let bonusLabel = '';

    if (!this.hitBackboard) {
      pts += 50;
      bonusLabel = 'SWISH! +50';
    } else {
      pts += 30;
      bonusLabel = 'BANK! +30';
    }

    pts *= this.combo;

    // doubleScore power-up
    if (this.activePowerUps.doubleScore) {
      pts *= 2;
      bonusLabel += bonusLabel ? ' x2!' : 'x2!';
    }

    // scoreBoost character skill (+10%)
    if (this.charConfig && this.charConfig.skill === 'scoreBoost') {
      pts = Math.floor(pts * 1.1);
    }

    this.score += pts;

    // Consume shot-based power-ups
    this.consumePowerUpShots();

    // Try spawn new power-up
    this.trySpawnPowerUp();

    const rimX = this.hoopGeom.RIM_CX;
    const rimY = this.hoopGeom.RIM_Y;

    // Main score popup
    const colors  = ['#ff3366','#3366ff','#ff8833','#44cc44','#ffcc00'];
    const color   = colors[Math.floor(Math.random() * colors.length)];
    const ptsTxt  = this.add.text(rimX, rimY - 20, '+' + pts, {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '36px',
      color: color,
      stroke: '#ffffff',
      strokeThickness: 4
    });
    ptsTxt.setOrigin(0.5);
    ptsTxt.setAngle(Phaser.Math.Between(-15, 15));

    this.tweens.add({
      targets: ptsTxt,
      y: rimY - 90,
      alpha: 0,
      duration: 1100,
      ease: 'Quad.easeOut',
      onComplete: () => ptsTxt.destroy()
    });

    // Bonus label
    if (bonusLabel) {
      const bTxt = this.add.text(rimX + 10, rimY - 55, bonusLabel, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '18px',
        color: '#ffcc00',
        stroke: '#333300',
        strokeThickness: 3
      });
      bTxt.setOrigin(0.5);
      bTxt.setAngle(Phaser.Math.Between(-8, 8));
      this.tweens.add({
        targets: bTxt,
        y: rimY - 110,
        alpha: 0,
        duration: 1000,
        ease: 'Quad.easeOut',
        onComplete: () => bTxt.destroy()
      });
    }

    // Combo text
    if (this.combo > 1) {
      const cTxt = this.add.text(rimX - 40, rimY - 80, 'x' + this.combo + ' COMBO!', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '22px',
        color: '#ff3366',
        stroke: '#440011',
        strokeThickness: 3
      });
      cTxt.setOrigin(0.5);
      cTxt.setAngle(Phaser.Math.Between(-12, 12));
      this.tweens.add({
        targets: cTxt,
        y: rimY - 130,
        scaleX: 1.4, scaleY: 1.4,
        alpha: 0,
        duration: 1000,
        ease: 'Back.easeOut',
        onComplete: () => cTxt.destroy()
      });
    }

    // Endless: bonus time every BONUS_EVERY baskets
    if (this.gameMode === 'endless' && this.gameStarted &&
        this.basketCount % CONFIG.ENDLESS.BONUS_EVERY === 0) {
      this.timeLeft += CONFIG.ENDLESS.BONUS_TIME;
      this.showBonusTime();
    }

    // Combo visual effects
    this.updateComboEffects();
    // Score splash
    this.doScoreSplash(rimX, rimY);

    this.updateHUD();

    // Level ball-counter mode
    if (this.gameMode === 'level' && this.levelMode === 'balls') {
      this.ballsLeft = Math.max(0, this.ballsLeft - 1);
      this.updateHUD();
      if (this.ballsLeft <= 0) {
        this.time.delayedCall(1600, () => this.levelComplete());
        return;
      }
    }

    this.time.delayedCall(1600, () => this.respawnBall());
  }

  showBonusTime() {
    const popup = this.add.text(CONFIG.WIDTH - 80, 65, '+' + CONFIG.ENDLESS.BONUS_TIME + 's!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '26px',
      color: '#44cc44',
      stroke: '#003300',
      strokeThickness: 3,
    });
    popup.setOrigin(0.5);
    this.tweens.add({
      targets: popup,
      y: popup.y - 50,
      alpha: 0,
      duration: 1200,
      ease: 'Quad.easeOut',
      onComplete: () => popup.destroy(),
    });
  }

  onMiss() {
    if (this.scored) return;
    if (!this.isShooting) return;
    this.isShooting = false; // prevent double-call from ground + off-screen checks

    soundManager.play('miss');
    this.combo = 0;

    // Destroy combo effects emitter since combo resets
    if (this.comboEmitter) { this.comboEmitter.destroy(); this.comboEmitter = null; }
    if (this.ball) this.ball.clearTint();
    const missWords = ['MISS...', 'NOPE', 'AIR BALL', 'BRICK!', 'OH NO'];
    const word = missWords[Math.floor(Math.random() * missWords.length)];

    const mTxt = this.add.text(
      this.ball ? this.ball.x : 400,
      this.ball ? this.ball.y - 20 : 200,
      word,
      {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '28px',
        color: '#888888',
        stroke: '#444444',
        strokeThickness: 3
      }
    );
    mTxt.setOrigin(0.5);
    mTxt.setAngle(Phaser.Math.Between(-10, 10));
    this.tweens.add({
      targets: mTxt,
      y: mTxt.y - 60,
      alpha: 0,
      duration: 900,
      ease: 'Quad.easeOut',
      onComplete: () => mTxt.destroy()
    });

    this.updateHUD();

    // Level ball-counter mode: miss also costs a ball
    if (this.gameMode === 'level' && this.levelMode === 'balls') {
      this.ballsLeft = Math.max(0, this.ballsLeft - 1);
      this.updateHUD();
      if (this.ballsLeft <= 0) {
        this.time.delayedCall(800, () => this.levelComplete());
        return;
      }
    }

    this.time.delayedCall(800, () => this.respawnBall());
  }

  respawnBall() {
    if (this.isGameOver) return;
    // Destroy combo emitter before ball, so it doesn't follow a destroyed sprite
    if (this.comboEmitter) { this.comboEmitter.destroy(); this.comboEmitter = null; }
    if (this.ball) {
      this.ball.clearTint();
      this.ball.destroy();
      this.ball = null;
    }
    this.ballColliders.forEach(c => { if (c) this.physics.world.removeCollider(c); });
    this.ballColliders = [];

    // Randomize player position per shot if level has randomPos
    if (this.gameMode === 'level' && this.levelConfig && this.levelConfig.randomPos) {
      this.playerX = Phaser.Math.Between(80, 250);
      this.redrawPlayer(this.playerX, this.playerY, false);
    }

    // Endless mode progressive difficulty
    if (this.gameMode === 'endless') {
      this.applyEndlessDifficulty();
    }

    this.createBall();
    // Re-apply combo effects on the new ball if combo is still active
    if (this.combo > 1) this.updateComboEffects();
  }

  applyEndlessDifficulty() {
    const bc = this.basketCount;

    // Shrink score zone
    if (this.scoreZoneBody) {
      const newW = (this.defaultScoreZoneW - 10) * Math.max(0.7, 1 - bc * 0.005);
      this.scoreZoneBody.body.setSize(newW, 12);
      this.scoreZoneBody.refreshBody();
    }

    // Increase wind after 10 baskets
    if (bc > 10) {
      this.windForce = Math.min(1 + (bc - 10) * 0.15, 5);
      this.updateHUD();
      if (!this.windTxt) {
        this.windTxt = this.add.text(14, CONFIG.HEIGHT - 40, '', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '13px',
          color: '#446688',
          stroke: '#f5f0e0',
          strokeThickness: 2,
        }).setDepth(10);
      }
      this.windTxt.setVisible(true);
      this.updateHUD();
    }

    // Moving rim after 15 baskets
    if (bc >= 15 && !this.rimMoving) {
      this.setupMovingRim();
    }

    // Obstacles after 25 baskets
    if (bc >= 25 && !this.obstacleTimer && this.obstacles.length === 0) {
      this.setupObstacles();
    }

    // Shift player further away
    const newPX = Math.max(80, 160 - bc * 2);
    if (Math.abs(newPX - this.playerX) > 2) {
      this.playerX = newPX;
      this.redrawPlayer(this.playerX, this.playerY, false);
    }
  }

  // ── Timer ─────────────────────────────────────────────────────────────────
  startTimer() {
    // Endless mode: timer starts on first swipe
    // Level timed mode: timer starts immediately
    const needsTimer = this.gameMode === 'endless' ||
      (this.gameMode === 'level' && this.levelMode === 'time');
    if (!needsTimer) return;

    this.timerEvent = this.time.addEvent({
      delay: 1000,
      callback: this.tickTimer,
      callbackScope: this,
      loop: true,
    });

    // Level timed mode starts immediately
    if (this.gameMode === 'level' && this.levelMode === 'time') {
      this.gameStarted = true;
    }
  }

  tickTimer() {
    if (!this.gameStarted || this.isGameOver || this.timerFrozen) return;

    this.timeLeft = Math.max(0, this.timeLeft - 1);
    this.updateHUD();

    if (this.timeLeft <= 0) {
      if (this.gameMode === 'level') {
        this.levelComplete();
      } else {
        this.gameOver();
      }
    }
  }

  gameOver() {
    if (this.isGameOver) return;
    this.isGameOver = true;

    if (this.timerEvent) this.timerEvent.remove();
    this.cleanupWeather();
    this.cleanupPowerUps();
    this.cleanupObstacles();

    // Save to localStorage
    const save = loadSave();
    const prevHigh = save.highScore || 0;
    const isNewHigh = this.score > prevHigh;
    if (isNewHigh) save.highScore = this.score;
    writeSave(save);
    this.checkUnlocks();

    // Brief flash before transition
    const overlay = this.add.graphics();
    overlay.fillStyle(0xff0000, 0);
    overlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    this.tweens.add({
      targets: overlay,
      alpha: 0.3,
      duration: 200,
      yoyo: true,
      repeat: 2,
      onComplete: () => {
        this.scene.start('ResultScene', {
          score:     this.score,
          combo:     this.maxCombo,
          baskets:   this.basketCount,
          mode:      this.gameMode,
          level:     this.currentLevel,
          isNewHigh: isNewHigh,
        });
      }
    });
  }

  levelComplete() {
    if (this.isGameOver) return;
    this.isGameOver = true;
    if (this.timerEvent) this.timerEvent.remove();

    const cfg = this.levelConfig;
    let stars = 0;
    if (cfg && cfg.stars) {
      if (this.score >= cfg.stars[2])      stars = 3;
      else if (this.score >= cfg.stars[1]) stars = 2;
      else if (this.score >= cfg.stars[0]) stars = 1;
    }
    const passed = stars > 0;

    // Save stars to localStorage
    const save = loadSave();
    const levelStars = save.levelStars || {};
    if ((levelStars[this.currentLevel] || 0) < stars) {
      levelStars[this.currentLevel] = stars;
    }
    save.levelStars = levelStars;
    writeSave(save);

    this.cleanupWeather();
    this.cleanupPowerUps();
    this.cleanupObstacles();
    this.checkUnlocks();

    const overlay = this.add.graphics();
    overlay.fillStyle(passed ? 0x00cc44 : 0xff0000, 0);
    overlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    this.tweens.add({
      targets: overlay,
      alpha: 0.25,
      duration: 200,
      yoyo: true,
      repeat: 2,
      onComplete: () => {
        this.scene.start('ResultScene', {
          score:     this.score,
          combo:     this.maxCombo,
          baskets:   this.basketCount,
          mode:      this.gameMode,
          level:     this.currentLevel,
          isNewHigh: false,
          stars:     stars,
          passed:    passed,
        });
      }
    });
  }

  // ── HUD ───────────────────────────────────────────────────────────────────
  createHUD() {
    // Score bg
    this.scoreBg = this.add.graphics();
    this.scoreBg.fillStyle(0xffffff, 0.75);
    this.scoreBg.fillRoundedRect(10, 10, 130, 46, 10);
    this.scoreBg.lineStyle(2, 0x333333, 0.6);
    this.scoreBg.strokeRoundedRect(10, 10, 130, 46, 10);

    this.scoreIcon = this.add.text(18, 16, '⭐', { fontSize: '20px' });

    this.scoreTxt = this.add.text(44, 18, 'SCORE: 0', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '14px',
      color: '#333333'
    });

    // Timer / ball HUD (top-right)
    const showTimer = this.gameMode === 'endless' ||
      (this.gameMode === 'level' && this.levelMode === 'time');
    const showBalls = this.gameMode === 'level' && this.levelMode === 'balls';

    if (showTimer) {
      this.timerBg = this.add.graphics();
      this.timerBg.fillStyle(0xffffff, 0.75);
      this.timerBg.fillRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
      this.timerBg.lineStyle(2, 0x333333, 0.6);
      this.timerBg.strokeRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);

      this.timerIcon = this.add.text(CONFIG.WIDTH - 132, 16, '⏱', { fontSize: '20px' });

      const initSecs = Math.ceil(this.timeLeft);
      const im = Math.floor(initSecs / 60), is = initSecs % 60;
      this.timerTxt = this.add.text(CONFIG.WIDTH - 106, 18, im + ':' + (is < 10 ? '0' : '') + is, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '20px',
        color: '#333333',
      });

      // Waiting for first shot indicator (endless only)
      if (this.gameMode === 'endless') {
        this.waitTxt = this.add.text(CONFIG.WIDTH / 2, 40, 'SWIPE TO START!', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '16px',
          color: '#cc6600',
          stroke: '#f5f0e0',
          strokeThickness: 3,
        });
        this.waitTxt.setOrigin(0.5);
        this.tweens.add({
          targets: this.waitTxt,
          alpha: 0.3,
          duration: 600,
          yoyo: true,
          repeat: -1,
        });
      }
    }

    if (showBalls) {
      this.ballsBg = this.add.graphics();
      this.ballsBg.fillStyle(0xffffff, 0.75);
      this.ballsBg.fillRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
      this.ballsBg.lineStyle(2, 0x333333, 0.6);
      this.ballsBg.strokeRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);

      this.ballsIcon = this.add.text(CONFIG.WIDTH - 132, 16, '🏀', { fontSize: '20px' });

      this.ballsTxt = this.add.text(CONFIG.WIDTH - 104, 18, 'x' + this.ballsLeft, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '20px',
        color: '#333333',
      });
    }

    // Level info header (level mode)
    if (this.gameMode === 'level' && this.levelConfig) {
      const cfg = this.levelConfig;
      this.levelTxt = this.add.text(CONFIG.WIDTH / 2, 18, 'LV.' + cfg.id + ' ' + cfg.name, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '13px',
        color: '#444433',
        stroke: '#f5f0e0',
        strokeThickness: 2,
      }).setOrigin(0.5);
    }

    // Combo counter
    this.comboTxt = this.add.text(CONFIG.WIDTH / 2, 16, '', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#ff3366',
      stroke: '#440011',
      strokeThickness: 3
    });
    this.comboTxt.setOrigin(0.5, 0);

    // Instructions
    this.instrTxt = this.add.text(CONFIG.WIDTH / 2, CONFIG.HEIGHT - 22, 'SWIPE TO SHOOT', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '14px',
      color: '#888877',
      stroke: '#f5f0e0',
      strokeThickness: 3
    });
    this.instrTxt.setOrigin(0.5);
  }

  updateHUD() {
    this.scoreTxt.setText('SCORE: ' + this.score);

    if (this.combo > 1) {
      this.comboTxt.setText('🔥 x' + this.combo);
      this.comboTxt.setVisible(true);
    } else {
      this.comboTxt.setVisible(false);
    }

    // Timer display
    if (this.timerTxt) {
      const secs = Math.max(0, Math.ceil(this.timeLeft));
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      const formatted = m + ':' + (s < 10 ? '0' : '') + s;
      this.timerTxt.setText(formatted);

      // Flash red when <= 10 seconds
      if (secs <= 10 && this.gameStarted) {
        const flash = secs % 2 === 0;
        this.timerTxt.setColor(flash ? '#ff2222' : '#cc0000');
        if (this.timerBg) {
          this.timerBg.clear();
          this.timerBg.fillStyle(flash ? 0xff4444 : 0xff0000, flash ? 0.25 : 0.35);
          this.timerBg.fillRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
          this.timerBg.lineStyle(2, 0xff0000, 0.9);
          this.timerBg.strokeRoundedRect(CONFIG.WIDTH - 140, 10, 130, 46, 10);
        }
      } else {
        this.timerTxt.setColor('#333333');
      }
    }

    // Balls counter display
    if (this.ballsTxt) {
      this.ballsTxt.setText('x' + Math.max(0, this.ballsLeft));
    }

    // Wind indicator display
    if (this.windTxt) {
      const dir = this.windDirection > 0 ? '→' : '←';
      this.windTxt.setText('💨 ' + dir + ' ' + this.windForce + '级');
    }

    // Hide wait text once started
    if (this.gameStarted && this.waitTxt) {
      this.waitTxt.setVisible(false);
    }
  }

  // ── Update ────────────────────────────────────────────────────────────────
  update() {
    if (this.isGameOver) return;
    if (!this.ball || !this.ball.active) return;

    // Moving rim update
    if (this.rimMoving) this.updateMovingRim();

    // Move obstacle birds
    const now = this.time.now;
    for (let i = this.obstacles.length - 1; i >= 0; i--) {
      const obs = this.obstacles[i];
      if (!obs.alive) continue;
      const elapsed = (now - obs._startTime) / 1000;
      const newX = obs._startX + obs.velX * elapsed;
      obs.text.x = newX;
      const bz = obs.physGroup.getChildren()[0];
      if (bz) bz.body.reset(newX, obs.text.y);
      // Remove when off screen
      if (newX < -100 || newX > CONFIG.WIDTH + 100) {
        this._destroyObstacle(obs);
      }
    }

    // Wind physics when ball is in flight
    if (this.isShooting && this.windForce > 0) {
      // windResist character skill: halve wind
      const wf = (this.charConfig && this.charConfig.skill === 'windResist')
        ? this.windForce * 0.25
        : this.windForce * 0.5;
      this.ball.body.velocity.x += this.windDirection * wf;
    }

    // Rain wobble
    if (this.isShooting && this.weatherType === 'rain') {
      this.ball.body.velocity.x += (Math.random() - 0.5) * 2;
    }

    // Subtle aim-assist: gentle nudge toward rim when ball is close
    if (this.isShooting) {
      const { RIM_CX, RIM_Y } = this.hoopGeom;
      const dx = RIM_CX - this.ball.x;
      const dy = (RIM_Y + 10) - this.ball.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Magnet power-up: strong pull
      if (this.activePowerUps.magnet && dist < 150 && dist > 1) {
        this.ball.body.velocity.x += (dx / dist) * 4;
        this.ball.body.velocity.y += (dy / dist) * 3;
      }
      // Default aim-assist: very gentle nudge within 100px
      else if (dist < 100 && dist > 1) {
        this.ball.body.velocity.x += (dx / dist) * 1.2;
        this.ball.body.velocity.y += (dy / dist) * 0.8;
      }
    }

    // Night: move ball glow to follow ball
    if (this.nightBallGlow && this.ball) {
      this.nightBallGlow.x = this.ball.x;
      this.nightBallGlow.y = this.ball.y;
    }

    // Power-up glow follows sprite (both already use bob tween but keep glow synced)
    // (tween handles it via targets array)

    if (!this.isShooting) return;

    const b = this.ball;
    if (
      b.x < -80 || b.x > CONFIG.WIDTH + 80 ||
      b.y > CONFIG.HEIGHT + 60
    ) {
      this.onMiss();
    }
  }

  // ── Textures (particles) ──────────────────────────────────────────────────
  createTextures() {
    // fireparticle: 8x8 radial gradient yellow→orange→transparent
    if (!this.textures.exists('fireparticle')) {
      const fc = document.createElement('canvas');
      fc.width = fc.height = 8;
      const fctx = fc.getContext('2d');
      const fg = fctx.createRadialGradient(4, 4, 0, 4, 4, 4);
      fg.addColorStop(0,   'rgba(255,220,0,1)');
      fg.addColorStop(0.5, 'rgba(255,100,0,0.8)');
      fg.addColorStop(1,   'rgba(255,50,0,0)');
      fctx.fillStyle = fg;
      fctx.fillRect(0, 0, 8, 8);
      this.textures.addCanvas('fireparticle', fc);
    }

    // spark: 4x4 bright cross
    if (!this.textures.exists('spark')) {
      const sc = document.createElement('canvas');
      sc.width = sc.height = 4;
      const sctx = sc.getContext('2d');
      sctx.fillStyle = '#ffffff';
      sctx.fillRect(1, 0, 2, 4);
      sctx.fillRect(0, 1, 4, 2);
      this.textures.addCanvas('spark', sc);
    }

    // inksplat: 10x10 pink circle
    if (!this.textures.exists('inksplat')) {
      const ic = document.createElement('canvas');
      ic.width = ic.height = 10;
      const ictx = ic.getContext('2d');
      ictx.beginPath();
      ictx.arc(5, 5, 4.5, 0, Math.PI * 2);
      ictx.fillStyle = '#ff66aa';
      ictx.fill();
      this.textures.addCanvas('inksplat', ic);
    }

    // raindrop: 3x12 blue-white rectangle, alpha 0.5
    if (!this.textures.exists('raindrop')) {
      const rc = document.createElement('canvas');
      rc.width = 3; rc.height = 12;
      const rctx = rc.getContext('2d');
      rctx.fillStyle = 'rgba(180,210,255,0.5)';
      rctx.fillRect(0, 0, 3, 12);
      this.textures.addCanvas('raindrop', rc);
    }
  }

  // ── Weather Setup ─────────────────────────────────────────────────────────
  setupWeather() {
    // Determine weather type
    if (this.gameMode === 'level' && this.levelConfig) {
      this.weatherType  = this.levelConfig.weather || 'clear';
      this.windForce    = this.levelConfig.wind    || 0;
      this.windDirection = 1;
    } else if (this.gameMode === 'endless') {
      // Start clear, cycle every 20s
      this.weatherType  = 'clear';
      this.windForce    = 0;
      this.windDirection = 1;
      this.weatherTimer = this.time.addEvent({
        delay: 20000,
        callback: this.cycleEndlessWeather,
        callbackScope: this,
        loop: true,
      });
    }

    this.applyWeather();

    // Wind direction changes every 4s
    if (this.windForce > 0) {
      this.windChangeTimer = this.time.addEvent({
        delay: 4000,
        callback: () => {
          this.windDirection *= -1;
          this.updateHUD();
        },
        loop: true,
      });
    }
  }

  cycleEndlessWeather() {
    const options = ['clear', 'windy', 'rain', 'night'];
    const next = options[Math.floor(Math.random() * options.length)];
    this.cleanupWeatherEffects();
    this.weatherType = next;
    this.windForce = next === 'windy' ? 2 : next === 'rain' ? 1 : 0;
    this.applyWeather();
    if (this.windChangeTimer) this.windChangeTimer.remove();
    if (this.windForce > 0) {
      this.windChangeTimer = this.time.addEvent({
        delay: 4000,
        callback: () => { this.windDirection *= -1; this.updateHUD(); },
        loop: true,
      });
    }
    this.updateHUD();
  }

  applyWeather() {
    // Wind HUD indicator
    if (this.windForce > 0) {
      if (!this.windTxt) {
        this.windTxt = this.add.text(14, CONFIG.HEIGHT - 40, '', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '13px',
          color: '#446688',
          stroke: '#f5f0e0',
          strokeThickness: 2,
        }).setDepth(10);
      }
      this.updateHUD();
    } else if (this.windTxt) {
      this.windTxt.setVisible(false);
    }

    // Rain
    if (this.weatherType === 'rain') {
      if (!this.rainEmitter && this.textures.exists('raindrop')) {
        this.rainEmitter = this.add.particles(0, -10, 'raindrop', {
          x: { min: 0, max: CONFIG.WIDTH },
          y: -10,
          speedY: { min: 300, max: 500 },
          speedX: { min: -20, max: 20 },
          lifespan: 2000,
          quantity: 4,
          frequency: 30,
          alpha: 0.6,
        });
        this.rainEmitter.setDepth(5);
      }
    }

    // Night
    if (this.weatherType === 'night') {
      if (!this.nightOverlay) {
        this.nightOverlay = this.add.graphics().setDepth(4);
        this.nightOverlay.fillStyle(0x000022, 0.6);
        this.nightOverlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      }
      if (!this.nightRimGlow && this.hoopGeom) {
        const { RIM_CX, RIM_Y } = this.hoopGeom;
        this.nightRimGlow = this.add.graphics().setDepth(5);
        this.nightRimGlow.fillStyle(0xffff00, 0.15);
        this.nightRimGlow.fillCircle(RIM_CX, RIM_Y, 50);
      }
      if (!this.nightBallGlow) {
        this.nightBallGlow = this.add.graphics().setDepth(5);
        this.nightBallGlow.fillStyle(0xff8800, 0.2);
        this.nightBallGlow.fillCircle(0, 0, 36);
        if (this.ball) {
          this.nightBallGlow.x = this.ball.x;
          this.nightBallGlow.y = this.ball.y;
        }
      }
      // HUD to high depth so it's visible above night overlay
      if (this.scoreBg)   this.scoreBg.setDepth(19);
      if (this.scoreIcon) this.scoreIcon.setDepth(20);
      if (this.scoreTxt)  this.scoreTxt.setDepth(20);
      if (this.comboTxt)  this.comboTxt.setDepth(20);
      if (this.timerTxt)  this.timerTxt.setDepth(20);
      if (this.ballsTxt)  this.ballsTxt.setDepth(20);
      if (this.instrTxt)  this.instrTxt.setDepth(20);
      if (this.windTxt)   this.windTxt.setDepth(20);
      if (this.waitTxt)   this.waitTxt.setDepth(20);
      if (this.timerBg)   this.timerBg.setDepth(19);
      if (this.timerIcon) this.timerIcon.setDepth(20);
      if (this.ballsBg)   this.ballsBg.setDepth(19);
      if (this.ballsIcon) this.ballsIcon.setDepth(20);
      if (this.levelTxt)  this.levelTxt.setDepth(20);
    }
  }

  cleanupWeatherEffects() {
    if (this.rainEmitter)   { this.rainEmitter.destroy();   this.rainEmitter   = null; }
    if (this.nightOverlay)  { this.nightOverlay.destroy();  this.nightOverlay  = null; }
    if (this.nightRimGlow)  { this.nightRimGlow.destroy();  this.nightRimGlow  = null; }
    if (this.nightBallGlow) { this.nightBallGlow.destroy(); this.nightBallGlow = null; }
    if (this.windTxt)       { this.windTxt.destroy();       this.windTxt       = null; }
  }

  cleanupWeather() {
    this.cleanupWeatherEffects();
    if (this.windChangeTimer) { this.windChangeTimer.remove(); this.windChangeTimer = null; }
    if (this.weatherTimer)    { this.weatherTimer.remove();    this.weatherTimer    = null; }
  }

  // ── Combo Visual Effects ──────────────────────────────────────────────────
  updateComboEffects() {
    // Destroy previous emitter if exists
    if (this.comboEmitter) {
      this.comboEmitter.destroy();
      this.comboEmitter = null;
    }

    // Clear ball tint
    if (this.ball) this.ball.clearTint();

    const c = this.combo;

    if (c >= 10) {
      // BEAST MODE
      this.doBeastMode();
    } else if (c >= 7) {
      // Lightning sparks + blue ball tint
      if (this.ball && this.textures.exists('spark')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'spark', {
          follow: this.ball,
          speedX: { min: -80, max: 80 },
          speedY: { min: -80, max: 80 },
          lifespan: 300,
          quantity: 3,
          frequency: 40,
          blendMode: 'ADD',
          alpha: { start: 1, end: 0 },
        });
        this.comboEmitter.setDepth(8);
      }
      if (this.ball) this.ball.setTint(0x4488ff);
    } else if (c >= 4) {
      // Fire trail + screen shake
      const fireQty = (this.charConfig && this.charConfig.skill === 'fireBoost') ? 8 : 4;
      if (this.ball && this.textures.exists('fireparticle')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
          follow: this.ball,
          speedX: { min: -30, max: 30 },
          speedY: { min: -30, max: 30 },
          lifespan: 400,
          quantity: fireQty,
          frequency: 30,
          alpha: { start: 0.9, end: 0 },
          scale: { start: 1.2, end: 0.2 },
        });
        this.comboEmitter.setDepth(8);
      }
      this.cameras.main.shake(100, 0.003);
    } else if (c >= 2) {
      // Orange trail
      if (this.ball && this.textures.exists('fireparticle')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
          follow: this.ball,
          speedX: { min: -20, max: 20 },
          speedY: { min: -20, max: 20 },
          lifespan: 300,
          quantity: 2,
          frequency: 50,
          alpha: { start: 0.7, end: 0 },
          tint: 0xff8833,
        });
        this.comboEmitter.setDepth(8);
      }
    }
  }

  doBeastMode() {
    const cx = CONFIG.WIDTH / 2;
    const cy = CONFIG.HEIGHT / 2;

    soundManager.play('beast');

    // Yellow screen flash
    const flash = this.add.graphics().setDepth(30);
    flash.fillStyle(0xffff00, 0.3);
    flash.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    this.tweens.add({
      targets: flash,
      alpha: 0,
      duration: 500,
      onComplete: () => flash.destroy()
    });

    // Camera shake
    this.cameras.main.shake(300, 0.006);

    // BEAST MODE!! text
    const bTxt = this.add.text(cx, cy - 40, 'BEAST MODE!!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '40px',
      color: '#ff2200',
      stroke: '#ffff00',
      strokeThickness: 5,
    }).setOrigin(0.5).setDepth(32).setAngle(Phaser.Math.Between(-8, 8));
    this.tweens.add({
      targets: bTxt,
      scaleX: 1.6, scaleY: 1.6,
      alpha: 0,
      duration: 1200,
      ease: 'Back.easeOut',
      onComplete: () => bTxt.destroy()
    });

    // 10 colored graffiti splats
    const splatColors = [0xff3366, 0x3366ff, 0xffcc00, 0x44cc44, 0xff8833, 0xcc44ff];
    for (let i = 0; i < 10; i++) {
      const sx = Phaser.Math.Between(50, CONFIG.WIDTH - 50);
      const sy = Phaser.Math.Between(40, CONFIG.HEIGHT - 80);
      const sc = splatColors[i % splatColors.length];
      const sg = this.add.graphics().setDepth(31);
      sg.fillStyle(sc, 0.7);
      sg.fillCircle(0, 0, Phaser.Math.Between(12, 24));
      sg.x = sx; sg.y = sy;
      sg.setScale(0.1);
      this.tweens.add({
        targets: sg,
        scaleX: 1, scaleY: 1,
        alpha: 0,
        duration: Phaser.Math.Between(600, 1200),
        delay: i * 60,
        ease: 'Back.easeOut',
        onComplete: () => sg.destroy()
      });
    }

    // Fire emitter on ball
    if (this.ball && this.textures.exists('fireparticle')) {
      if (this.comboEmitter) { this.comboEmitter.destroy(); this.comboEmitter = null; }
      this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
        follow: this.ball,
        speedX: { min: -60, max: 60 },
        speedY: { min: -60, max: 60 },
        lifespan: 500,
        quantity: 6,
        frequency: 20,
        alpha: { start: 1, end: 0 },
        scale: { start: 1.5, end: 0.2 },
        blendMode: 'ADD',
      });
      this.comboEmitter.setDepth(9);
      if (this.ball) this.ball.setTint(0xff4400);
    }
  }

  // ── Score Splash ──────────────────────────────────────────────────────────
  doScoreSplash(rimX, rimY) {
    if (!this.textures.exists('inksplat')) return;
    const colors = [0xff3366, 0x3366ff, 0xffcc00, 0x44cc44, 0xff8833, 0x6644ff];
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const dist  = Phaser.Math.Between(20, 55);
      const sx    = rimX + Math.cos(angle) * dist;
      const sy    = rimY + Math.sin(angle) * dist;
      const g     = this.add.graphics().setDepth(15);
      g.fillStyle(colors[i % colors.length], 0.8);
      g.fillCircle(0, 0, Phaser.Math.Between(6, 14));
      g.x = sx; g.y = sy; g.setScale(0.2);
      this.tweens.add({
        targets: g,
        scaleX: 1.2, scaleY: 1.2,
        alpha: 0,
        duration: 700,
        delay: i * 40,
        ease: 'Quad.easeOut',
        onComplete: () => g.destroy()
      });
    }
  }
}

// ─── PHASER CONFIG ────────────────────────────────────────────────────────────
const _dpr = Math.min(window.devicePixelRatio || 1, 2);

const _game = new Phaser.Game({
  type: Phaser.CANVAS,
  width:  CONFIG.WIDTH,
  height: CONFIG.HEIGHT,
  backgroundColor: CONFIG.COLORS.paper,
  resolution: _dpr,
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: CONFIG.GRAVITY },
      debug: false
    }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: [MenuScene, GameScene, ResultScene, LevelSelectScene, CharSelectScene],
  callbacks: {
    postBoot: (game) => {
      // Patch text factory so all text renders at device pixel ratio for crisp display
      const origText = Phaser.GameObjects.GameObjectFactory.prototype.text;
      Phaser.GameObjects.GameObjectFactory.prototype.text = function(x, y, text, style) {
        const t = origText.call(this, x, y, text, style);
        t.setResolution(_dpr);
        return t;
      };
      // No camera zoom needed — resolution: _dpr handles graphics rendering
    }
  }
});
</script>
</body>
</html>
