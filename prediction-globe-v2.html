<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Globe v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    #globe-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    /* Top Bar */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 150;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      pointer-events: none;
    }
    #top-bar > * { pointer-events: auto; }
    #logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    #logo span { color: #7db4ff; }
    #controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(100,150,255,0.25); border-color: rgba(100,150,255,0.5);
    }
    #search-input {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 13px;
      outline: none; width: 180px; transition: border-color 0.2s;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.3); }
    #search-input:focus { border-color: rgba(100,150,255,0.5); }

    /* Sidebar */
    #sidebar {
      position: fixed; top: 0; right: -420px; width: 420px; height: 100%;
      background: rgba(10, 15, 30, 0.92); backdrop-filter: blur(20px);
      border-left: 1px solid rgba(100, 150, 255, 0.2);
      z-index: 200; padding: 28px; overflow-y: auto;
      transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #sidebar.open { right: 0; }
    #sidebar-close {
      position: absolute; top: 16px; right: 16px; background: none; border: none;
      color: #fff; font-size: 24px; cursor: pointer; opacity: 0.6; line-height: 1;
    }
    #sidebar-close:hover { opacity: 1; }
    #sidebar-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; padding-right: 32px; line-height: 1.4; }
    #sidebar-desc { font-size: 14px; opacity: 0.7; margin-bottom: 20px; line-height: 1.6; }
    .prob-bar-container { margin-bottom: 24px; }
    .prob-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; opacity: 0.8; }
    .prob-bar { height: 32px; border-radius: 16px; overflow: hidden; display: flex; background: rgba(255,255,255,0.1); }
    .prob-bar-yes { background: #22c55e; transition: width 0.5s; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .prob-bar-no { background: #ef4444; transition: width 0.5s; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .sidebar-stat { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14px; }
    .sidebar-stat-label { opacity: 0.5; }
    .sidebar-stat-value { font-weight: 600; }
    #sidebar-link {
      display: block; text-align: center; margin-top: 28px; padding: 14px;
      background: rgba(100, 150, 255, 0.2); border: 1px solid rgba(100, 150, 255, 0.4);
      border-radius: 10px; color: #7db4ff; text-decoration: none; font-weight: 600; font-size: 14px;
      transition: background 0.2s;
    }
    #sidebar-link:hover { background: rgba(100, 150, 255, 0.35); }

    /* Bottom Bar */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px; font-size: 12px; opacity: 0.5;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
      pointer-events: none;
    }

    /* Loading */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; background: #000; transition: opacity 0.8s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid rgba(100,150,255,0.2);
      border-top-color: #7db4ff; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { margin-top: 16px; font-size: 14px; opacity: 0.6; }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar { width: 100%; right: auto; bottom: -100%; left: 0; top: auto; height: 70%;
        border-left: none; border-top: 1px solid rgba(100,150,255,0.2);
        transition: bottom 0.4s cubic-bezier(0.4,0,0.2,1); border-radius: 16px 16px 0 0; }
      #sidebar.open { bottom: 0; right: auto; }
      #top-bar { flex-direction: column; gap: 10px; padding: 12px 16px; }
      #controls { gap: 6px; }
      .filter-btn { padding: 5px 10px; font-size: 12px; }
      #search-input { width: 100%; }
      #bottom-bar { flex-direction: column; gap: 4px; text-align: center; }
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loading">
    <div class="loading-spinner"></div>
    <div id="loading-text">Loading prediction markets...</div>
  </div>

  <!-- Top Bar -->
  <div id="top-bar">
    <div id="logo">Prediction <span>Globe</span></div>
    <div id="controls">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="politics">Politics</button>
      <button class="filter-btn" data-category="crypto">Crypto</button>
      <button class="filter-btn" data-category="sports">Sports</button>
      <button class="filter-btn" data-category="tech">Tech</button>
      <input id="search-input" type="text" placeholder="Search events...">
    </div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <button id="sidebar-close">&times;</button>
    <div id="sidebar-title"></div>
    <div id="sidebar-desc"></div>
    <div class="prob-bar-container">
      <div class="prob-bar-label"><span>Yes</span><span>No</span></div>
      <div class="prob-bar">
        <div class="prob-bar-yes" id="sidebar-yes"></div>
        <div class="prob-bar-no" id="sidebar-no"></div>
      </div>
    </div>
    <div id="sidebar-stats"></div>
    <a id="sidebar-link" href="#" target="_blank" rel="noopener">View on Polymarket &rarr;</a>
  </div>

  <!-- Bottom Bar -->
  <div id="bottom-bar">
    <span id="event-count"></span>
    <span id="last-updated"></span>
    <span>Powered by <a href="https://polymarket.com" target="_blank" rel="noopener"
      style="color:#7db4ff; pointer-events:auto; text-decoration:none;">Polymarket</a></span>
  </div>

  <div id="globe-container"></div>

  <script src="https://unpkg.com/globe.gl@2.21.1/dist/globe.gl.min.js"></script>
  <script>
    // =============================================
    // Geo Location Database
    // =============================================
    const GEO_KEYWORDS = {
      'trump': [38.9, -77.0], 'biden': [38.9, -77.0], 'us ': [38.9, -77.0],
      'united states': [38.9, -77.0], 'america': [38.9, -77.0], 'congress': [38.9, -77.0],
      'senate': [38.9, -77.0], 'democrat': [38.9, -77.0], 'republican': [38.9, -77.0],
      'fed ': [38.9, -77.0], 'federal reserve': [38.9, -77.0],
      'canada': [56.1, -106.3], 'mexico': [23.6, -102.5],
      'ukraine': [50.4, 30.5], 'zelensky': [50.4, 30.5], 'russia': [55.7, 37.6],
      'putin': [55.7, 37.6], 'uk ': [51.5, -0.1], 'britain': [51.5, -0.1],
      'england': [51.5, -0.1], 'france': [48.8, 2.3], 'macron': [48.8, 2.3],
      'germany': [52.5, 13.4], 'italy': [41.9, 12.5], 'spain': [40.4, -3.7],
      'eu ': [50.8, 4.4], 'european': [50.8, 4.4], 'nato': [50.8, 4.4],
      'poland': [52.2, 21.0], 'turkey': [39.9, 32.9], 'erdogan': [39.9, 32.9],
      'china': [39.9, 116.4], 'xi jinping': [39.9, 116.4], 'beijing': [39.9, 116.4],
      'japan': [35.7, 139.7], 'india': [28.6, 77.2], 'modi': [28.6, 77.2],
      'korea': [37.5, 127.0], 'taiwan': [25.0, 121.5], 'iran': [35.7, 51.4],
      'israel': [31.8, 35.2], 'gaza': [31.5, 34.5], 'palestine': [31.9, 35.2],
      'saudi': [24.7, 46.7], 'syria': [33.5, 36.3], 'iraq': [33.3, 44.4],
      'brazil': [-14.2, -51.9], 'argentina': [-38.4, -63.6],
      'nigeria': [9.1, 7.5], 'south africa': [-30.6, 22.9], 'egypt': [26.8, 30.8],
      'australia': [-25.3, 133.8],
      'bitcoin': null, 'btc': null, 'ethereum': null, 'eth': null, 'crypto': null,
      'solana': null, 'sol ': null, 'ai ': null, 'openai': [37.8, -122.4],
      'spacex': [25.9, -97.2], 'tesla': [30.2, -97.7], 'elon': [30.2, -97.7],
    };

    function matchGeoLocation(title, description) {
      const text = (title + ' ' + description).toLowerCase();
      for (const [keyword, coords] of Object.entries(GEO_KEYWORDS)) {
        if (coords && text.includes(keyword)) return { lat: coords[0], lng: coords[1] };
      }
      return null;
    }

    function distributeGlobal(index, total) {
      const phi = Math.acos(1 - 2 * (index + 0.5) / total);
      const theta = Math.PI * (1 + Math.sqrt(5)) * index;
      return { lat: 90 - (phi * 180 / Math.PI), lng: (theta * 180 / Math.PI) % 360 - 180 };
    }

    function probToColor(p) {
      const hue = p * 120; // 0=red, 60=yellow, 120=green
      return `hsl(${hue}, 100%, 50%)`;
    }

    function formatVolume(v) {
      if (v >= 1e6) return `$${(v / 1e6).toFixed(1)}M`;
      if (v >= 1e3) return `$${(v / 1e3).toFixed(0)}K`;
      return `$${Math.round(v)}`;
    }

    // =============================================
    // Category detection
    // =============================================
    const CATEGORY_KEYWORDS = {
      politics: ['trump', 'biden', 'election', 'president', 'congress', 'senate', 'democrat', 'republican', 'vote', 'party', 'governor', 'putin', 'zelensky', 'macron', 'modi', 'erdogan', 'xi jinping', 'war', 'nato', 'ceasefire'],
      crypto: ['bitcoin', 'btc', 'ethereum', 'eth', 'crypto', 'solana', 'sol', 'token', 'blockchain', 'defi', 'nft'],
      sports: ['nba', 'nfl', 'mlb', 'soccer', 'football', 'basketball', 'baseball', 'tennis', 'golf', 'world cup', 'champion', 'league', 'playoff', 'super bowl', 'fifa', 'f1 ', 'formula', 'wildcats', 'wolverines', 'huskies', 'spurs', 'nuggets', 'pistons', 'wizards', 'heat', 'eurovision', 'la liga', 'bundesliga', 'ligue'],
      tech: ['ai ', 'openai', 'google', 'apple', 'spacex', 'tesla', 'microsoft', 'meta ', 'amazon', 'nvidia', 'gpt', 'robot', 'starship'],
    };

    function detectCategory(title) {
      const text = title.toLowerCase();
      for (const [cat, kws] of Object.entries(CATEGORY_KEYWORDS)) {
        if (kws.some(kw => text.includes(kw))) return cat;
      }
      return 'other';
    }

    // =============================================
    // Polymarket API
    // =============================================
    // Uses local proxy (server.py) to bypass CORS

    const SAMPLE_EVENTS = [
      {id:"1",title:"US forces enter Iran by..?",slug:"us-forces-enter-iran-by",description:"This market will resolve to Yes if active US military personnel physically enter Iran.",volume:132446717,volume24hr:16514128,liquidity:16416013,markets:[{outcomePrices:["0.10","0.90"]}]},
      {id:"2",title:"2026 FIFA World Cup Winner",slug:"2026-fifa-world-cup-winner-595",description:"This market will resolve according to the national team that wins the 2026 FIFA World Cup.",volume:499822671,volume24hr:7765683,liquidity:80369606,markets:[{outcomePrices:["0.157","0.843"]}]},
      {id:"3",title:"Democratic Presidential Nominee 2028",slug:"democratic-presidential-nominee-2028",description:"This market will resolve to Yes if the named individual wins the 2028 Democratic nomination.",volume:981819023,volume24hr:3963339,liquidity:42515507,markets:[{outcomePrices:["0.028","0.972"]}]},
      {id:"4",title:"Republican Presidential Nominee 2028",slug:"republican-presidential-nominee-2028",description:"This market will resolve to Yes if the named individual wins the 2028 Republican nomination.",volume:519782493,volume24hr:3910922,liquidity:32394177,markets:[{outcomePrices:["0.018","0.982"]}]},
      {id:"5",title:"F1 Drivers' Champion 2026",slug:"2026-f1-drivers-champion",description:"This market will resolve according to the listed driver that finishes 1st in the 2026 F1 standings.",volume:82259603,volume24hr:3506066,liquidity:11264041,markets:[{outcomePrices:["0.435","0.565"]}]},
      {id:"6",title:"US x Iran ceasefire by...?",slug:"us-x-iran-ceasefire-by",description:"This market will resolve to Yes if there is an official ceasefire agreement between US and Iran.",volume:90604119,volume24hr:3036865,liquidity:2130111,markets:[{outcomePrices:["0.15","0.85"]}]},
      {id:"7",title:"2026 NBA Champion",slug:"2026-nba-champion",description:"This market is to predict the winner of the 2025-26 NBA Finals.",volume:228112379,volume24hr:2889667,liquidity:8432751,markets:[{outcomePrices:["0.385","0.615"]}]},
      {id:"8",title:"Presidential Election Winner 2028",slug:"presidential-election-winner-2028",description:"The 2028 US Presidential Election is scheduled for November 7, 2028.",volume:490883241,volume24hr:2700857,liquidity:30696100,markets:[{outcomePrices:["0.005","0.995"]}]},
      {id:"9",title:"Eurovision Winner 2026",slug:"eurovision-winner-2026",description:"This market will resolve to the country whose candidate for Eurovision 2026 wins.",volume:67939214,volume24hr:2066323,liquidity:12516935,markets:[{outcomePrices:["0.004","0.996"]}]},
      {id:"10",title:"Ukraine strikes tanker in Black Sea",slug:"ukraine-strikes-another-tanker-in-black-sea",description:"Ukraine struck and disabled a tanker involved in trading Russian oil.",volume:3085899,volume24hr:1944118,liquidity:0,markets:[{outcomePrices:["0.25","0.75"]}]},
      {id:"11",title:"Bitcoin above $80k on April 5?",slug:"bitcoin-above-on-april-5",description:"This market will resolve to Yes if the Binance BTC/USDT price is above the target.",volume:2778922,volume24hr:1832926,liquidity:952540,markets:[{outcomePrices:["0.996","0.004"]}]},
      {id:"12",title:"Manchester City vs Liverpool",slug:"efa-mnc-liv",description:"FA Cup game between Manchester City FC and Liverpool FC.",volume:2133590,volume24hr:1820379,liquidity:0,markets:[{outcomePrices:["0.55","0.45"]}]},
      {id:"13",title:"Brazil Presidential Election",slug:"brazil-presidential-election",description:"A presidential election is scheduled in Brazil on October 4, 2026.",volume:40884319,volume24hr:1574448,liquidity:2488944,markets:[{outcomePrices:["0.006","0.994"]}]},
      {id:"14",title:"Freiburg vs Bayern München",slug:"bun-fre-bay",description:"Bundesliga game between SC Freiburg and FC Bayern München.",volume:2580846,volume24hr:2113471,liquidity:0,markets:[{outcomePrices:["0.12","0.88"]}]},
      {id:"15",title:"China GDP growth above 5%",slug:"china-gdp-growth",description:"Will China's official GDP growth rate exceed 5% for 2026?",volume:15000000,volume24hr:800000,liquidity:3000000,markets:[{outcomePrices:["0.35","0.65"]}]},
      {id:"16",title:"SpaceX Starship orbital flight",slug:"spacex-starship-orbital",description:"Will SpaceX achieve a full orbital Starship flight in 2026?",volume:25000000,volume24hr:1200000,liquidity:5000000,markets:[{outcomePrices:["0.72","0.28"]}]},
      {id:"17",title:"India surpasses China population",slug:"india-population",description:"Will India's population officially surpass China's by end of 2026?",volume:8000000,volume24hr:500000,liquidity:2000000,markets:[{outcomePrices:["0.88","0.12"]}]},
      {id:"18",title:"OpenAI releases GPT-5",slug:"openai-gpt5-release",description:"Will OpenAI release GPT-5 by end of 2026?",volume:35000000,volume24hr:1500000,liquidity:8000000,markets:[{outcomePrices:["0.62","0.38"]}]},
      {id:"19",title:"Australia interest rate cut",slug:"australia-rate-cut",description:"Will the Reserve Bank of Australia cut interest rates in Q2 2026?",volume:12000000,volume24hr:600000,liquidity:3000000,markets:[{outcomePrices:["0.45","0.55"]}]},
      {id:"20",title:"Tesla stock above $300",slug:"tesla-stock-300",description:"Will Tesla stock price be above $300 at end of Q2 2026?",volume:18000000,volume24hr:900000,liquidity:4000000,markets:[{outcomePrices:["0.40","0.60"]}]},
    ];

    async function fetchEvents() {
      try {
        const res = await fetch('/api/events?limit=50&order=volume24hr&ascending=false&active=true');
        if (res.ok) {
          const events = await res.json();
          if (Array.isArray(events) && events.length > 0) {
            console.log(`Loaded ${events.length} live events`);
            localStorage.setItem('prediction-globe-cache', JSON.stringify({ events, timestamp: Date.now() }));
            return events;
          }
        }
      } catch (err) { console.warn('Proxy fetch failed:', err.message); }
      const cached = localStorage.getItem('prediction-globe-cache');
      if (cached) return JSON.parse(cached).events;
      console.warn('Using sample data');
      return SAMPLE_EVENTS;
    }

    function processEvents(events) {
      let gi = 0;
      const gt = events.filter(e => !matchGeoLocation(e.title, e.description || '')).length;

      return events.map(event => {
        const geo = matchGeoLocation(event.title, event.description || '');
        let lat, lng;
        if (geo) {
          lat = geo.lat + (Math.random() - 0.5) * 4;
          lng = geo.lng + (Math.random() - 0.5) * 4;
        } else {
          const p = distributeGlobal(gi++, Math.max(gt, 1));
          lat = p.lat; lng = p.lng;
        }
        const top = event.markets?.[0];
        let prices = top?.outcomePrices;
        if (typeof prices === 'string') try { prices = JSON.parse(prices); } catch(e) { prices = null; }
        const probability = prices?.[0] ? parseFloat(prices[0]) : 0.5;

        return {
          id: event.id, title: event.title, description: event.description || '',
          slug: event.slug, probability,
          volume: event.volume24hr || 0, totalVolume: event.volume || 0,
          liquidity: event.liquidity || 0, markets: event.markets || [],
          lat, lng, geoMatched: !!geo, category: detectCategory(event.title),
        };
      });
    }

    // =============================================
    // Globe.gl Setup
    // =============================================
    let processedEvents = [];
    let activeCategory = 'all';
    let searchQuery = '';

    const world = Globe()
      .globeImageUrl('https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe@2.31.1/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe@2.31.1/example/img/night-sky.png')
      .showAtmosphere(true)
      .atmosphereColor('#4488ff')
      .atmosphereAltitude(0.2)
      .width(window.innerWidth)
      .height(window.innerHeight)
      (document.getElementById('globe-container'));

    // Auto-rotate
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.4;

    // =============================================
    // Render markers
    // =============================================
    function getFilteredData() {
      return processedEvents.filter(e => {
        const matchCat = activeCategory === 'all' || e.category === activeCategory;
        const matchSearch = !searchQuery || e.title.toLowerCase().includes(searchQuery);
        return matchCat && matchSearch;
      });
    }

    function updateGlobe() {
      const data = getFilteredData();
      const maxVol = Math.max(...data.map(d => d.volume), 1);

      world
        // Colored points on surface
        .pointsData(data)
        .pointLat(d => d.lat)
        .pointLng(d => d.lng)
        .pointColor(d => probToColor(d.probability))
        .pointAltitude(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          return 0.01 + n * 0.15;
        })
        .pointRadius(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          return 0.3 + n * 0.8;
        })
        .pointLabel(d => `
          <div style="background:rgba(10,15,30,0.9);backdrop-filter:blur(12px);padding:12px 16px;border-radius:10px;border:1px solid rgba(100,150,255,0.3);max-width:280px;box-shadow:0 0 20px rgba(50,100,255,0.2);">
            <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:#fff;">${d.title}</div>
            <div style="font-size:24px;font-weight:700;color:${probToColor(d.probability)};">${(d.probability * 100).toFixed(0)}% <span style="font-size:11px;opacity:0.6;color:#fff;">chance</span></div>
            <div style="font-size:11px;opacity:0.6;color:#fff;margin-top:4px;">24h Vol: ${formatVolume(d.volume)}</div>
          </div>
        `)
        .onPointClick(d => openSidebar(d))

        // Text labels floating above points
        .labelsData(data)
        .labelLat(d => d.lat)
        .labelLng(d => d.lng)
        .labelText(d => d.title.length > 22 ? d.title.slice(0, 20) + '...' : d.title)
        .labelSize(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          return 0.6 + n * 0.8;
        })
        .labelDotRadius(0.3)
        .labelColor(d => probToColor(d.probability))
        .labelAltitude(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          return 0.02 + n * 0.16;
        })
        .labelResolution(2)
        .onLabelClick(d => openSidebar(d));
    }

    // =============================================
    // Sidebar
    // =============================================
    const sidebar = document.getElementById('sidebar');

    function openSidebar(e) {
      document.getElementById('sidebar-title').textContent = e.title;
      document.getElementById('sidebar-desc').textContent =
        e.description.slice(0, 300) + (e.description.length > 300 ? '...' : '');

      const yesP = (e.probability * 100).toFixed(0);
      const noP = (100 - e.probability * 100).toFixed(0);
      document.getElementById('sidebar-yes').style.width = yesP + '%';
      document.getElementById('sidebar-yes').textContent = yesP + '%';
      document.getElementById('sidebar-no').style.width = noP + '%';
      document.getElementById('sidebar-no').textContent = noP + '%';

      document.getElementById('sidebar-stats').innerHTML = `
        <div class="sidebar-stat"><span class="sidebar-stat-label">24h Volume</span><span class="sidebar-stat-value">${formatVolume(e.volume)}</span></div>
        <div class="sidebar-stat"><span class="sidebar-stat-label">Total Volume</span><span class="sidebar-stat-value">${formatVolume(e.totalVolume)}</span></div>
        <div class="sidebar-stat"><span class="sidebar-stat-label">Liquidity</span><span class="sidebar-stat-value">${formatVolume(e.liquidity)}</span></div>
        <div class="sidebar-stat"><span class="sidebar-stat-label">Markets</span><span class="sidebar-stat-value">${e.markets.length}</span></div>
      `;
      document.getElementById('sidebar-link').href = `https://polymarket.com/event/${e.slug}`;
      sidebar.classList.add('open');

      // Fly to the event location
      world.pointOfView({ lat: e.lat, lng: e.lng, altitude: 1.8 }, 1000);
    }

    document.getElementById('sidebar-close').addEventListener('click', () => sidebar.classList.remove('open'));

    // =============================================
    // Filters & Search
    // =============================================
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCategory = btn.dataset.category;
        updateGlobe();
      });
    });

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.toLowerCase();
      updateGlobe();
    });

    // =============================================
    // Status & Resize
    // =============================================
    function updateStatus() {
      document.getElementById('event-count').textContent = `${processedEvents.length} events`;
      document.getElementById('last-updated').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    }

    window.addEventListener('resize', () => {
      world.width(window.innerWidth).height(window.innerHeight);
    });

    // =============================================
    // Init
    // =============================================
    async function init() {
      const events = await fetchEvents();
      processedEvents = processEvents(events);
      updateGlobe();
      updateStatus();
      document.getElementById('loading').classList.add('hidden');

      // Auto-refresh every 5 minutes
      setInterval(async () => {
        const events = await fetchEvents();
        processedEvents = processEvents(events);
        updateGlobe();
        updateStatus();
      }, 5 * 60 * 1000);
    }
    init();
  </script>
</body>
</html>
