<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Globe v2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    #globe-container { position: fixed; top: 0; left: 300px; width: calc(100% - 300px); height: 100%; transition: left 0.3s, width 0.3s; }
    body.panel-collapsed #globe-container { left: 0; width: 100%; }
    body.panel-collapsed #flat-map { left: 0; width: 100%; }

    /* Top Bar */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 150;
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      pointer-events: none;
    }
    #top-bar > * { pointer-events: auto; }
    #logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    #logo span { color: #7db4ff; }
    #controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .filter-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: rgba(100,150,255,0.25); border-color: rgba(100,150,255,0.5);
    }
    #search-input {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 13px;
      outline: none; width: 180px; transition: border-color 0.2s;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.3); }
    #search-input:focus { border-color: rgba(100,150,255,0.5); }

    /* Detail Card */
    #sidebar {
      position: fixed; bottom: 20px; right: 20px; width: 360px;
      max-height: 420px; overflow-y: auto;
      background: rgba(10, 15, 30, 0.88); backdrop-filter: blur(20px);
      border: 1px solid rgba(100, 150, 255, 0.25);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 20px rgba(50,100,255,0.1);
      z-index: 200; padding: 20px;
      transform: translateY(20px); opacity: 0; pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.2, 0, 0.2, 1), opacity 0.35s;
      scrollbar-width: thin; scrollbar-color: rgba(100,150,255,0.2) transparent;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: rgba(100,150,255,0.3); border-radius: 2px; }
    #sidebar.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
    #sidebar-close {
      position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.08); border: none;
      color: #fff; font-size: 16px; cursor: pointer; opacity: 0.6; line-height: 1;
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, background 0.2s;
    }
    #sidebar-close:hover { opacity: 1; background: rgba(255,255,255,0.15); }
    #sidebar-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; padding-right: 32px; line-height: 1.4; }
    #sidebar-desc { font-size: 12px; opacity: 0.6; margin-bottom: 14px; line-height: 1.5; max-height: 60px; overflow: hidden; }
    .prob-bar-container { margin-bottom: 14px; }
    .prob-bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; opacity: 0.8; }
    .prob-bar { height: 26px; border-radius: 13px; overflow: hidden; display: flex; background: rgba(255,255,255,0.1); }
    .prob-bar-yes { background: #22c55e; transition: width 0.5s; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .prob-bar-no { background: #ef4444; transition: width 0.5s; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    #sidebar-stats { display: flex; flex-wrap: wrap; gap: 0; }
    .sidebar-stat { display: flex; justify-content: space-between; width: 100%; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 12px; }
    .sidebar-stat-label { opacity: 0.5; }
    .sidebar-stat-value { font-weight: 600; }
    #sidebar-link {
      display: block; text-align: center; margin-top: 14px; padding: 10px;
      background: rgba(100, 150, 255, 0.15); border: 1px solid rgba(100, 150, 255, 0.3);
      border-radius: 8px; color: #7db4ff; text-decoration: none; font-weight: 600; font-size: 13px;
      transition: background 0.2s;
    }
    #sidebar-link:hover { background: rgba(100, 150, 255, 0.3); }

    /* Hot Events Panel */
    #hot-panel {
      position: fixed; top: 70px; left: 16px; width: 280px; max-height: calc(100vh - 140px);
      z-index: 150; display: flex; flex-direction: column;
      background: rgba(10, 15, 30, 0.88); backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 150, 255, 0.2); border-radius: 14px;
      overflow: hidden; transition: transform 0.3s;
    }
    #hot-panel.collapsed { transform: translateX(-270px); }
    #hot-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid rgba(100, 150, 255, 0.15);
      flex-shrink: 0;
    }
    #hot-panel-header h3 {
      font-size: 14px; font-weight: 700; margin: 0;
      background: linear-gradient(90deg, #7db4ff, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #hot-panel-toggle {
      background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer;
      font-size: 16px; padding: 0 4px; transition: color 0.2s;
    }
    #hot-panel-toggle:hover { color: #fff; }
    #hot-list {
      overflow-y: auto; flex: 1; padding: 8px 0;
      scrollbar-width: thin; scrollbar-color: rgba(100,150,255,0.2) transparent;
    }
    #hot-list::-webkit-scrollbar { width: 4px; }
    #hot-list::-webkit-scrollbar-thumb { background: rgba(100,150,255,0.3); border-radius: 2px; }
    .hot-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 16px; cursor: pointer; transition: background 0.2s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .hot-item:hover { background: rgba(100, 150, 255, 0.1); }
    .hot-item:last-child { border-bottom: none; }
    .hot-rank {
      flex-shrink: 0; width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; margin-top: 1px;
    }
    .hot-rank.top3 { background: rgba(255, 180, 50, 0.25); color: #ffb432; }
    .hot-rank.normal { background: rgba(100, 150, 255, 0.15); color: rgba(255,255,255,0.4); }
    .hot-info { flex: 1; min-width: 0; }
    .hot-title {
      font-size: 12px; font-weight: 600; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; color: #fff;
    }
    .hot-meta {
      display: flex; align-items: center; gap: 8px; margin-top: 4px;
      font-size: 10px; color: rgba(255,255,255,0.4);
    }
    .hot-prob {
      font-weight: 700; padding: 1px 5px; border-radius: 4px; font-size: 11px;
    }
    .hot-cat {
      font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .hot-cat.politics { background: rgba(239,68,68,0.2); color: #f87171; }
    .hot-cat.crypto { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .hot-cat.sports { background: rgba(34,197,94,0.2); color: #4ade80; }
    .hot-cat.tech { background: rgba(139,92,246,0.2); color: #a78bfa; }
    .hot-cat.other { background: rgba(148,163,184,0.15); color: rgba(255,255,255,0.4); }

    /* Bottom Bar */
    #bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px; font-size: 12px; opacity: 0.5;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
      pointer-events: none;
    }

    /* Loading */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; background: #000; transition: opacity 0.8s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid rgba(100,150,255,0.2);
      border-top-color: #7db4ff; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { margin-top: 16px; font-size: 14px; opacity: 0.6; }

    /* Flat Map */
    #flat-map {
      position: fixed; top: 0; left: 300px; width: calc(100% - 300px); height: 100%;
      background: #050a18; display: none; z-index: 1; overflow: hidden;
    }
    #flat-map.active { display: block; }
    #flat-map svg { width: 100%; height: 100%; }
    #flat-markers { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    #flat-markers .flat-marker { pointer-events: auto; }
    #flat-map .country {
      fill: rgba(15, 25, 50, 0.9);
      stroke: rgba(60, 100, 180, 0.3);
      stroke-width: 0.5;
      transition: fill 0.3s, filter 0.3s;
    }
    #flat-map .country:hover {
      fill: rgba(30, 50, 80, 0.9);
      stroke: rgba(100, 150, 255, 0.6);
      stroke-width: 1;
    }
    #flat-map .country.has-events {
      fill: rgba(20, 40, 80, 0.95);
      stroke: rgba(100, 150, 255, 0.5);
      stroke-width: 0.8;
      filter: drop-shadow(0 0 4px rgba(80, 130, 255, 0.3));
    }
    #flat-map .country.has-events:hover, #flat-map .country.flash {
      fill: rgba(30, 60, 110, 0.95);
      stroke: rgba(120, 170, 255, 0.8);
      stroke-width: 1.2;
      filter: drop-shadow(0 0 8px rgba(80, 130, 255, 0.5));
    }
    #flat-map .country.flash {
      fill: rgba(50, 80, 140, 0.9);
      transition: fill 0.3s;
    }
    #flat-map .graticule {
      fill: none;
      stroke: rgba(40, 70, 140, 0.12);
      stroke-width: 0.4;
    }
    #flat-map .ocean {
      fill: rgba(5, 10, 25, 1);
    }
    .flat-marker {
      position: absolute; cursor: pointer;
      transform: translate(-50%, -50%);
      transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1), filter 0.3s;
      z-index: 5;
    }
    .flat-marker:hover {
      transform: translate(-50%, -50%) scale(1.6);
      z-index: 10;
      filter: brightness(1.3);
    }
    /* Marker core */
    .flat-dot {
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5), transparent 60%), var(--dot-color);
      box-shadow: 0 0 6px var(--dot-color), 0 0 12px var(--dot-color), inset 0 0 4px rgba(255,255,255,0.3);
      animation: flat-pulse 2.5s ease-in-out infinite;
      animation-delay: var(--pulse-delay, 0s);
    }
    /* Outer ring */
    .flat-dot::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 180%; height: 180%;
      border-radius: 50%;
      border: 1.5px solid var(--dot-color);
      opacity: 0.25;
    }
    /* Expanding wave */
    .flat-dot::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100%; height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--dot-color) 0%, transparent 70%);
      opacity: 0;
      animation: flat-wave 3s ease-out infinite;
      animation-delay: var(--pulse-delay, 0s);
    }
    /* Vertical beam */
    .flat-beam {
      position: absolute; bottom: 50%; left: 50%;
      transform: translateX(-50%);
      width: 1px; height: 0;
      background: linear-gradient(to top, var(--dot-color), transparent);
      opacity: 0.4;
      transition: height 0.3s;
    }
    .flat-marker:hover .flat-beam { height: 30px; opacity: 0.6; }
    /* Label */
    .flat-label {
      position: absolute; left: 50%; top: 100%; transform: translateX(-50%);
      margin-top: 6px; font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.9);
      background: rgba(8,12,28,0.92); padding: 3px 8px; border-radius: 5px;
      border: 1px solid rgba(100,150,255,0.2);
      white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis;
      pointer-events: none; opacity: 0; transition: opacity 0.25s, transform 0.25s;
      backdrop-filter: blur(10px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      transform: translateX(-50%) translateY(4px);
    }
    .flat-marker:hover .flat-label { opacity: 1; transform: translateX(-50%) translateY(0); }
    .flat-tooltip {
      position: fixed; z-index: 400; pointer-events: none;
      background: rgba(10,15,30,0.95); backdrop-filter: blur(16px);
      padding: 12px 16px; border-radius: 10px;
      border: 1px solid rgba(100,150,255,0.3);
      box-shadow: 0 0 30px rgba(50,100,255,0.15);
      max-width: 260px; display: none;
    }
    .flat-tooltip .tt-name { font-size: 12px; font-weight: 600; color: #7db4ff; margin-bottom: 4px; }
    .flat-tooltip .tt-count { font-size: 11px; color: rgba(255,255,255,0.6); }
    #country-popup {
      position: fixed; z-index: 400;
      background: rgba(10,15,30,0.95); backdrop-filter: blur(16px);
      padding: 14px 0; border-radius: 12px;
      border: 1px solid rgba(100,150,255,0.3);
      box-shadow: 0 4px 30px rgba(50,100,255,0.2);
      max-width: 300px; max-height: 320px; overflow-y: auto; display: none;
      scrollbar-width: thin; scrollbar-color: rgba(100,150,255,0.2) transparent;
    }
    #country-popup-title {
      font-size: 13px; font-weight: 700; color: #7db4ff;
      padding: 0 16px 10px; border-bottom: 1px solid rgba(100,150,255,0.15);
    }
    .country-popup-item {
      padding: 8px 16px; cursor: pointer; transition: background 0.2s;
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
    }
    .country-popup-item:hover { background: rgba(100,150,255,0.12); }
    .country-popup-item .cp-title {
      font-size: 12px; font-weight: 500; color: #fff; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .country-popup-item .cp-prob { font-size: 12px; font-weight: 700; flex-shrink: 0; }
    @keyframes flat-pulse {
      0%, 100% { box-shadow: 0 0 4px var(--dot-color), 0 0 8px var(--dot-color), inset 0 0 4px rgba(255,255,255,0.3); }
      50% { box-shadow: 0 0 8px var(--dot-color), 0 0 18px var(--dot-color), 0 0 30px var(--dot-color), inset 0 0 6px rgba(255,255,255,0.4); }
    }
    @keyframes flat-wave {
      0% { width: 100%; height: 100%; opacity: 0.5; }
      100% { width: 400%; height: 400%; opacity: 0; }
    }
    .flat-marker.highlighted {
      transform: translate(-50%, -50%) scale(2);
      z-index: 20;
      filter: brightness(1.5);
    }
    .flat-marker.highlighted .flat-label { opacity: 1; transform: translateX(-50%) translateY(0); }
    .flat-marker.highlighted .flat-dot {
      box-shadow: 0 0 12px var(--dot-color), 0 0 30px var(--dot-color), 0 0 50px var(--dot-color), inset 0 0 8px rgba(255,255,255,0.5);
    }
    .flat-marker.highlighted .flat-beam { height: 50px; opacity: 0.8; }
    @keyframes highlight-ping {
      0% { transform: translate(-50%,-50%) scale(0.5); opacity: 0.8; }
      100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
    }
    .flat-marker .highlight-ring {
      position: absolute; top: 50%; left: 50%;
      width: 100%; height: 100%; border-radius: 50%;
      border: 2px solid currentColor; display: none;
    }
    .flat-marker.highlighted .highlight-ring {
      display: block;
      animation: highlight-ping 1s ease-out 3;
    }
    .hot-item.active {
      background: rgba(100, 150, 255, 0.18);
      border-left: 2px solid #7db4ff;
    }
    #view-toggle {
      position: fixed; bottom: 40px; right: 24px; z-index: 300;
      background: rgba(10,15,30,0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(100,150,255,0.3); border-radius: 12px;
      color: #fff; padding: 10px 16px; cursor: pointer;
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    #view-toggle:hover { background: rgba(100,150,255,0.25); border-color: rgba(100,150,255,0.5); }

    /* Mobile */
    @media (max-width: 768px) {
      #sidebar { width: calc(100% - 16px); left: 8px; right: 8px; bottom: 8px; max-height: 50vh; border-radius: 14px; }
      #top-bar { flex-direction: column; gap: 10px; padding: 12px 16px; }
      #controls { gap: 6px; }
      .filter-btn { padding: 5px 10px; font-size: 12px; }
      #search-input { width: 100%; }
      #bottom-bar { flex-direction: column; gap: 4px; text-align: center; }
      #hot-panel { display: none; }
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loading">
    <div class="loading-spinner"></div>
    <div id="loading-text">Loading prediction markets...</div>
  </div>

  <!-- Top Bar -->
  <div id="top-bar">
    <div id="logo">Prediction <span>Globe</span></div>
    <div id="controls">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="politics">Politics</button>
      <button class="filter-btn" data-category="crypto">Crypto</button>
      <button class="filter-btn" data-category="sports">Sports</button>
      <button class="filter-btn" data-category="tech">Tech</button>
      <input id="search-input" type="text" placeholder="Search events...">
    </div>
  </div>

  <!-- Hot Events Panel -->
  <div id="hot-panel">
    <div id="hot-panel-header">
      <h3>&#x1F525; Hot Events</h3>
      <button id="hot-panel-toggle">&lsaquo;</button>
    </div>
    <div id="hot-list"></div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar">
    <button id="sidebar-close">&times;</button>
    <div id="sidebar-title"></div>
    <div id="sidebar-desc"></div>
    <div class="prob-bar-container">
      <div class="prob-bar-label"><span>Yes</span><span>No</span></div>
      <div class="prob-bar">
        <div class="prob-bar-yes" id="sidebar-yes"></div>
        <div class="prob-bar-no" id="sidebar-no"></div>
      </div>
    </div>
    <div id="sidebar-stats"></div>
    <a id="sidebar-link" href="#" target="_blank" rel="noopener">View on Polymarket &rarr;</a>
  </div>

  <!-- Bottom Bar -->
  <div id="bottom-bar">
    <span id="event-count"></span>
    <span id="last-updated"></span>
    <span>Powered by <a href="https://polymarket.com" target="_blank" rel="noopener"
      style="color:#7db4ff; pointer-events:auto; text-decoration:none;">Polymarket</a></span>
  </div>

  <!-- Flat Map -->
  <div id="flat-map">
    <svg id="flat-map-svg"></svg>
    <div id="flat-markers"></div>
    <div class="flat-tooltip" id="country-tooltip">
      <div class="tt-name"></div>
      <div class="tt-count"></div>
    </div>
    <div id="country-popup">
      <div id="country-popup-title"></div>
      <div id="country-popup-list"></div>
    </div>
  </div>

  <!-- View Toggle -->
  <button id="view-toggle">
    <span id="toggle-icon">&#x1F5FA;</span>
    <span id="toggle-label">2D Map</span>
  </button>

  <div id="globe-container"></div>

  <script src="https://unpkg.com/d3@7.9.0/dist/d3.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
  <script src="https://unpkg.com/globe.gl@2.21.1/dist/globe.gl.min.js"></script>
  <script>
    // =============================================
    // Geo Location Database
    // =============================================
    const GEO_KEYWORDS = {

      'united states': [38.9, -77.0], 'america': [38.9, -77.0], 'congress': [38.9, -77.0],
      'senate': [38.9, -77.0], 'democrat': [38.9, -77.0], 'republican': [38.9, -77.0],
      'fed ': [38.9, -77.0], 'federal reserve': [38.9, -77.0],
      'canada': [56.1, -106.3], 'mexico': [23.6, -102.5],
      'ukraine': [50.4, 30.5], 'zelensky': [50.4, 30.5], 'russia': [55.7, 37.6],
      'putin': [55.7, 37.6], 'uk ': [51.5, -0.1], 'britain': [51.5, -0.1],
      'england': [51.5, -0.1], 'france': [48.8, 2.3], 'macron': [48.8, 2.3],
      'germany': [52.5, 13.4], 'italy': [41.9, 12.5], 'spain': [40.4, -3.7],
      'eu ': [50.8, 4.4], 'european': [50.8, 4.4], 'nato': [50.8, 4.4],

      'china': [39.9, 116.4], 'xi jinping': [39.9, 116.4], 'beijing': [39.9, 116.4],

    function matchGeoLocation(title, description) {
      const text = (title + ' ' + description).toLowerCase();
      for (const [keyword, coords] of Object.entries(GEO_KEYWORDS)) {
        if (coords && text.includes(keyword)) return { lat: coords[0], lng: coords[1] };
      }
      return null;
    }

    function distributeGlobal(index, total) {
      const phi = Math.acos(1 - 2 * (index + 0.5) / total);
      const theta = Math.PI * (1 + Math.sqrt(5)) * index;
      return { lat: 90 - (phi * 180 / Math.PI), lng: (theta * 180 / Math.PI) % 360 - 180 };
    }

    function probToColor(p) {
      const hue = p * 120; // 0=red, 60=yellow, 120=green
      return `hsl(${hue}, 100%, 50%)`;
    }

    function formatVolume(v) {
      if (v >= 1e6) return `$${(v / 1e6).toFixed(1)}M`;
      if (v >= 1e3) return `$${(v / 1e3).toFixed(0)}K`;
      return `$${Math.round(v)}`;
    }

    async function fetchEvents() {
      try {
        const res = await fetch('/api/events?limit=60&order=volume24hr&ascending=false&active=true&closed=false');
        if (res.ok) {
          const events = await res.json();
          if (Array.isArray(events) && events.length > 0) {
            console.log(`Loaded ${events.length} live events`);
            localStorage.setItem('prediction-globe-cache', JSON.stringify({ events, timestamp: Date.now() }));
            return events;
          }
        }
      } catch (err) { console.warn('Proxy fetch failed:', err.message); }
      const cached = localStorage.getItem('prediction-globe-cache');
      if (cached) {
        const { events, timestamp } = JSON.parse(cached);
        // Use cache if less than 10 minutes old
        if (Date.now() - timestamp < 600000) return events;
      }
      console.warn('Using sample data');
      return SAMPLE_EVENTS;
    }

    function processEvents(events) {
      // Filter out closed/resolved events
      events = events.filter(e => !e.closed);
      let gi = 0;
      const gt = events.filter(e => !matchGeoLocation(e.title, e.description || '')).length;

      return events.map(event => {
        const geo = matchGeoLocation(event.title, event.description || '');
        let lat, lng;
        if (geo) {
          lat = geo.lat + (Math.random() - 0.5) * 4;
          lng = geo.lng + (Math.random() - 0.5) * 4;
        } else {
          const p = distributeGlobal(gi++, Math.max(gt, 1));
          lat = p.lat; lng = p.lng;
        }
        const top = event.markets?.[0];
        let prices = top?.outcomePrices;
        if (typeof prices === 'string') try { prices = JSON.parse(prices); } catch(e) { prices = null; }
        const probability = prices?.[0] ? parseFloat(prices[0]) : 0.5;

        return {
          id: event.id, title: event.title, description: event.description || '',
          slug: event.slug, probability,
          volume: event.volume24hr || 0, totalVolume: event.volume || 0,
          liquidity: event.liquidity || 0, markets: event.markets || [],
          lat, lng, geoMatched: !!geo, category: detectCategory(event.title),
        };
      });
    }

    // =============================================
    // Globe.gl Setup
    // =============================================
    let processedEvents = [];
    let activeCategory = 'all';

    const world = Globe()
      .globeImageUrl('https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe@2.31.1/example/img/earth-topology.png')
      .backgroundImageUrl('https://unpkg.com/three-globe@2.31.1/example/img/night-sky.png')
      .showAtmosphere(true)
      .atmosphereColor('#4488ff')
      .atmosphereAltitude(0.2)
      .width(window.innerWidth - 300)
      .height(window.innerHeight)
      (document.getElementById('globe-container'));

    // Auto-rotate
    world.controls().autoRotate = true;
    world.controls().autoRotateSpeed = 0.4;

    // Load country borders onto 3D globe
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(r => r.json())
      .then(worldTopo => {
        const countries = topojson.feature(worldTopo, worldTopo.objects.countries);
        world
          .polygonsData(countries.features)
          .polygonCapColor(() => 'rgba(0,0,0,0)')
          .polygonSideColor(() => 'rgba(0,0,0,0)')
          .polygonStrokeColor(() => 'rgba(100, 160, 255, 0.35)')
          .polygonAltitude(0.005);
      })
      .catch(e => console.warn('Failed to load country borders for globe:', e));

    function getFilteredData() {
      return processedEvents.filter(e => {
        const matchCat = activeCategory === 'all' || e.category === activeCategory;
        const matchSearch = !searchQuery || e.title.toLowerCase().includes(searchQuery);
        return matchCat && matchSearch;
      });

    // THREE.js is exposed by globe.gl
    const THREE = window.THREE;

    // Create glow sprite texture
    function createGlowTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.15, 'rgba(255,255,255,0.8)');
      gradient.addColorStop(0.4, 'rgba(255,255,255,0.3)');
      gradient.addColorStop(0.7, 'rgba(255,255,255,0.05)');
      gradient.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 128, 128);
      return new THREE.CanvasTexture(canvas);
    }

    function createRingTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.beginPath();
      ctx.arc(64, 64, 50, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(64, 64, 56, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
      return new THREE.CanvasTexture(canvas);
    }

    const glowTexture = createGlowTexture();
    const ringTexture = createRingTexture();

    // Store custom objects for animation
    const customObjects = [];

    function updateGlobe() {
      const data = getFilteredData();
      const maxVol = Math.max(...data.map(d => d.volume), 1);
      customObjects.length = 0;

      world
        .customLayerData(data)
        .customThreeObject(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          const color = new THREE.Color(probToColor(d.probability));
          const group = new THREE.Group();

          // Glow sprite (main marker)
          const spriteMat = new THREE.SpriteMaterial({
            map: glowTexture, color, transparent: true, opacity: 0.9,
            depthWrite: false, blending: THREE.AdditiveBlending
          });
          const sprite = new THREE.Sprite(spriteMat);
          const baseScale = 2.5 + n * 4;
          sprite.scale.set(baseScale, baseScale, 1);
          group.add(sprite);

          // Ring on the surface
          const ringMat = new THREE.SpriteMaterial({
            map: ringTexture, color, transparent: true, opacity: 0.4,
            depthWrite: false, blending: THREE.AdditiveBlending
          });
          const ring = new THREE.Sprite(ringMat);
          ring.scale.set(baseScale * 1.8, baseScale * 1.8, 1);
          ring.position.y = -0.5;
          group.add(ring);

          // Vertical beam
          const beamGeo = new THREE.CylinderGeometry(0.15, 0.15, 3 + n * 8, 4);
          const beamMat = new THREE.MeshBasicMaterial({
            color, transparent: true, opacity: 0.15,
            depthWrite: false, blending: THREE.AdditiveBlending
          });
          const beam = new THREE.Mesh(beamGeo, beamMat);
          beam.position.y = (3 + n * 8) / 2;
          group.add(beam);

          // Store for animation
          group.userData = { sprite, ring, spriteMat, ringMat, beamMat, baseScale, phase: Math.random() * Math.PI * 2 };
          customObjects.push(group);

          return group;
        })
        .customThreeObjectUpdate((obj, d) => {
          Object.assign(obj.position, world.getCoords(d.lat, d.lng, 0.01));
        })

        // Keep points layer for tooltip/click (invisible, just for interaction)
        .pointsData(data)
        .pointLat(d => d.lat)
        .pointLng(d => d.lng)
        .pointColor(() => 'rgba(0,0,0,0)')
        .pointAltitude(0.015)
        .pointRadius(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          return 0.5 + n * 1.0;
        })
        .pointLabel(d => `
          <div style="background:rgba(10,15,30,0.9);backdrop-filter:blur(12px);padding:12px 16px;border-radius:10px;border:1px solid rgba(100,150,255,0.3);max-width:280px;box-shadow:0 0 20px rgba(50,100,255,0.2);">
            <div style="font-size:13px;font-weight:600;margin-bottom:6px;color:#fff;">${d.title}</div>
            <div style="font-size:24px;font-weight:700;color:${probToColor(d.probability)};">${(d.probability * 100).toFixed(0)}% <span style="font-size:11px;opacity:0.6;color:#fff;">chance</span></div>
            <div style="font-size:11px;opacity:0.6;color:#fff;margin-top:4px;">24h Vol: ${formatVolume(d.volume)}</div>
          </div>
        `)
        .onPointClick(d => openSidebar(d))

        // Text labels floating above points
        .labelsData(data)
        .labelLat(d => d.lat)
        .labelLng(d => d.lng)
        .labelText(d => d.title.length > 22 ? d.title.slice(0, 20) + '...' : d.title)
        .labelSize(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          return 0.6 + n * 0.8;
        })
        .labelDotRadius(0)
        .labelColor(d => probToColor(d.probability))
        .labelAltitude(d => {
          const n = Math.log1p(d.volume) / Math.log1p(maxVol);
          return 0.03 + n * 0.16;
        })
        .labelResolution(2)
        .onLabelClick(d => openSidebar(d));
    }

    // Animate custom 3D markers
    (function animateMarkers() {
      requestAnimationFrame(animateMarkers);
      const t = Date.now() * 0.001;
      customObjects.forEach(obj => {
        const ud = obj.userData;
        if (!ud.sprite) return;
        const pulse = 0.85 + 0.15 * Math.sin(t * 1.5 + ud.phase);
        const s = ud.baseScale * pulse;
        ud.sprite.scale.set(s, s, 1);
        ud.spriteMat.opacity = 0.7 + 0.3 * pulse;
        const ringPulse = 0.9 + 0.1 * Math.sin(t * 0.8 + ud.phase);
        ud.ring.scale.set(ud.baseScale * 1.8 * ringPulse, ud.baseScale * 1.8 * ringPulse, 1);
        ud.ringMat.opacity = 0.2 + 0.2 * Math.sin(t + ud.phase);
        ud.beamMat.opacity = 0.08 + 0.08 * Math.sin(t * 2 + ud.phase);
      });
    })();

    const flatMarkerContainer = document.getElementById('flat-markers');
    const countryTooltip = document.getElementById('country-tooltip');
    let flatMarkerEls = [];
    let isFlat = false;
    let flatProjection, flatPath, countriesGeo, countryPaths;
    let flatMapReady = false;

    // Country name -> coordinate mapping for highlighting
    const COUNTRY_COORD_MAP = {
      'United States of America': [38.9, -77.0], 'Canada': [56.1, -106.3], 'Mexico': [23.6, -102.5],
      'Ukraine': [50.4, 30.5], 'Russia': [55.7, 37.6], 'United Kingdom': [51.5, -0.1],
      'France': [48.8, 2.3], 'Germany': [52.5, 13.4], 'Italy': [41.9, 12.5], 'Spain': [40.4, -3.7],
      'Poland': [52.2, 21.0], 'Turkey': [39.9, 32.9], 'China': [39.9, 116.4],
      'Japan': [35.7, 139.7], 'India': [28.6, 77.2], 'South Korea': [37.5, 127.0],
      'Taiwan': [25.0, 121.5], 'Iran': [35.7, 51.4], 'Israel': [31.8, 35.2],
      'Saudi Arabia': [24.7, 46.7], 'Syria': [33.5, 36.3], 'Iraq': [33.3, 44.4],
      'Brazil': [-14.2, -51.9], 'Argentina': [-38.4, -63.6],
      'Nigeria': [9.1, 7.5], 'South Africa': [-30.6, 22.9], 'Egypt': [26.8, 30.8],
      'Australia': [-25.3, 133.8],
    };

    // Find country name nearest to a lat/lng
    function findCountryForEvent(lat, lng) {
      let best = null, bestDist = Infinity;
      for (const [name, [clat, clng]] of Object.entries(COUNTRY_COORD_MAP)) {
        const d = (lat - clat) ** 2 + (lng - clng) ** 2;
        if (d < bestDist) { bestDist = d; best = name; }
      }
      return bestDist < 400 ? best : null;
    }

    function getFlatMapSize() {
      const offset = document.body.classList.contains('panel-collapsed') ? 0 : 300;
      return { w: window.innerWidth - offset, h: window.innerHeight };
    }

    async function initFlatMap() {
      const { w, h } = getFlatMapSize();
      flatProjection = d3.geoNaturalEarth1()
        .fitSize([w, h], { type: 'Sphere' });
      flatPath = d3.geoPath(flatProjection);

      const svg = d3.select('#flat-map-svg')
        .attr('width', w).attr('height', h);

      // Ocean background
      svg.append('path')
        .datum({ type: 'Sphere' })
        .attr('class', 'ocean')
        .attr('d', flatPath);

      // Graticule (grid lines)
      const graticule = d3.geoGraticule10();
      svg.append('path')
        .datum(graticule)
        .attr('class', 'graticule')
        .attr('d', flatPath);

      // Load world topology
      try {
        const resp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
        const world = await resp.json();
        countriesGeo = topojson.feature(world, world.objects.countries);

        // Country name lookup from ID
        const nameResp = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
        // Use built-in properties or a simple ID->name map
        const countryNames = {};
        // The 110m topology uses numeric IDs; we map common ones
        const ID_NAMES = {840:'United States of America',124:'Canada',484:'Mexico',804:'Ukraine',643:'Russia',826:'United Kingdom',250:'France',276:'Germany',380:'Italy',724:'Spain',616:'Poland',792:'Turkey',156:'China',392:'Japan',356:'India',410:'South Korea',158:'Taiwan',364:'Iran',376:'Israel',682:'Saudi Arabia',760:'Syria',368:'Iraq',76:'Brazil',32:'Argentina',566:'Nigeria',710:'South Africa',818:'Egypt',36:'Australia',4:'Afghanistan',8:'Albania',12:'Algeria',24:'Angola',31:'Azerbaijan',40:'Austria',50:'Bangladesh',56:'Belgium',68:'Bolivia',70:'Bosnia and Herz.',72:'Botswana',100:'Bulgaria',104:'Myanmar',108:'Burundi',116:'Cambodia',120:'Cameroon',140:'Central African Rep.',148:'Chad',152:'Chile',170:'Colombia',178:'Congo',180:'Dem. Rep. Congo',188:'Costa Rica',191:'Croatia',192:'Cuba',196:'Cyprus',203:'Czech Rep.',208:'Denmark',214:'Dominican Rep.',218:'Ecuador',232:'Eritrea',233:'Estonia',231:'Ethiopia',246:'Finland',268:'Georgia',288:'Ghana',300:'Greece',320:'Guatemala',324:'Guinea',328:'Guyana',332:'Haiti',340:'Honduras',348:'Hungary',352:'Iceland',360:'Indonesia',372:'Ireland',388:'Jamaica',398:'Kazakhstan',404:'Kenya',417:'Kyrgyzstan',418:'Laos',428:'Latvia',422:'Lebanon',426:'Lesotho',430:'Liberia',434:'Libya',440:'Lithuania',458:'Malaysia',466:'Mali',478:'Mauritania',496:'Mongolia',504:'Morocco',508:'Mozambique',516:'Namibia',524:'Nepal',528:'Netherlands',540:'New Caledonia',554:'New Zealand',558:'Nicaragua',562:'Niger',578:'Norway',512:'Oman',586:'Pakistan',591:'Panama',598:'Papua New Guinea',600:'Paraguay',604:'Peru',608:'Philippines',620:'Portugal',634:'Qatar',642:'Romania',646:'Rwanda',688:'Serbia',694:'Sierra Leone',702:'Singapore',703:'Slovakia',705:'Slovenia',706:'Somalia',710:'South Africa',728:'South Sudan',144:'Sri Lanka',729:'Sudan',740:'Suriname',752:'Sweden',756:'Switzerland',762:'Tajikistan',834:'Tanzania',764:'Thailand',768:'Togo',780:'Trinidad and Tobago',788:'Tunisia',795:'Turkmenistan',800:'Uganda',784:'United Arab Emirates',858:'Uruguay',860:'Uzbekistan',862:'Venezuela',704:'Vietnam',887:'Yemen',894:'Zambia',716:'Zimbabwe'};

        countryPaths = svg.append('g')
          .selectAll('path')
          .data(countriesGeo.features)
          .enter().append('path')
          .attr('class', 'country')
          .attr('d', flatPath)
          .attr('data-id', d => d.id)
          .attr('data-name', d => ID_NAMES[+d.id] || '')
          .on('mousemove', function(event, d) {
            const name = ID_NAMES[+d.id] || 'Unknown';
            const evtCount = countryEventCount(name);
            if (evtCount > 0) {
              countryTooltip.style.display = 'block';
              countryTooltip.style.left = (event.clientX + 12) + 'px';
              countryTooltip.style.top = (event.clientY - 10) + 'px';
              countryTooltip.querySelector('.tt-name').textContent = name;
              countryTooltip.querySelector('.tt-count').textContent = evtCount + ' prediction market' + (evtCount > 1 ? 's' : '');
            }
          })
          .on('mouseleave', function() {
            countryTooltip.style.display = 'none';
          })
          .on('click', function(event, d) {
            const name = ID_NAMES[+d.id] || 'Unknown';
            const events = getFilteredData().filter(ev => findCountryForEvent(ev.lat, ev.lng) === name);
            if (events.length === 0) return;
            const popup = document.getElementById('country-popup');
            const list = document.getElementById('country-popup-list');
            document.getElementById('country-popup-title').textContent = name + ` (${events.length})`;
            list.innerHTML = events.map(ev => {
              const prob = (ev.probability * 100).toFixed(0);
              const color = probToColor(ev.probability);
              return `<div class="country-popup-item" data-id="${ev.id}">
                <span class="cp-title">${ev.title}</span>
                <span class="cp-prob" style="color:${color}">${prob}%</span>
              </div>`;
            }).join('');
            list.querySelectorAll('.country-popup-item').forEach((el, i) => {
              el.addEventListener('click', () => {
                popup.style.display = 'none';
                openSidebar(events[i]);
              });
            });
            popup.style.display = 'block';
            popup.style.left = Math.min(event.clientX, window.innerWidth - 320) + 'px';
            popup.style.top = Math.min(event.clientY, window.innerHeight - 340) + 'px';
          });

        // Close country popup on click outside
        document.addEventListener('click', (e) => {
          if (!e.target.closest('#country-popup') && !e.target.closest('.country')) {
            document.getElementById('country-popup').style.display = 'none';
          }
        });

        flatMapReady = true;
      } catch (e) {
        console.warn('Failed to load world topology:', e);
      }
    }

    function countryEventCount(countryName) {
      const data = getFilteredData();
      return data.filter(d => findCountryForEvent(d.lat, d.lng) === countryName).length;
    }

    function renderFlatMap() {
      if (!flatMapReady) return;

      const { w, h } = getFlatMapSize();
      flatProjection.fitSize([w, h], { type: 'Sphere' });

      const svg = d3.select('#flat-map-svg').attr('width', w).attr('height', h);
      svg.select('.ocean').attr('d', flatPath({ type: 'Sphere' }));
      svg.select('.graticule').attr('d', flatPath(d3.geoGraticule10()));
      if (countryPaths) countryPaths.attr('d', flatPath);

      // Highlight countries with events
      const data = getFilteredData();
      const countriesWithEvents = new Set();
      data.forEach(d => {
        const c = findCountryForEvent(d.lat, d.lng);
        if (c) countriesWithEvents.add(c);
      });

      if (countryPaths) {
        countryPaths.classed('has-events', function() {
          return countriesWithEvents.has(d3.select(this).attr('data-name'));
        });
      }

      // Render markers
      flatMarkerEls.forEach(el => el.remove());
      flatMarkerEls = [];
      const maxVol = Math.max(...data.map(d => d.volume), 1);

      data.forEach(d => {
        const pt = flatProjection([d.lng, d.lat]);
        if (!pt) return;
        const color = probToColor(d.probability);
        const n = Math.log1p(d.volume) / Math.log1p(maxVol);
        const size = 3 + n * 6;

        const el = document.createElement('div');
        el.className = 'flat-marker';
        el.dataset.eventId = d.id;
        el.style.left = pt[0] + 'px';
        el.style.top = pt[1] + 'px';
        el.style.setProperty('--dot-color', color);
        el.style.setProperty('--pulse-delay', (Math.random() * 2.5).toFixed(2) + 's');
        el.innerHTML = `
          <div class="flat-beam" style="--dot-color:${color};"></div>
          <div class="flat-dot" style="width:${size}px;height:${size}px;--dot-color:${color};"></div>
          <div class="highlight-ring" style="color:${color};"></div>
          <div class="flat-label">${d.title}</div>
        `;
        el.addEventListener('click', () => openSidebar(d));
        flatMarkerContainer.appendChild(el);
        flatMarkerEls.push(el);
      });
    }

    function highlightFlatMarker(e) {
      // Remove previous highlights
      flatMarkerEls.forEach(el => el.classList.remove('highlighted'));
      document.querySelectorAll('#flat-map-svg .country.flash').forEach(el => el.classList.remove('flash'));

      // Find and highlight the matching marker
      const target = flatMarkerEls.find(el => el.dataset.eventId === String(e.id));
      if (target) {
        target.classList.add('highlighted');
        setTimeout(() => target.classList.remove('highlighted'), 3000);
      }

      // Flash the country polygon
      const countryName = findCountryForEvent(e.lat, e.lng);
      if (countryName && countryPaths) {
        countryPaths.each(function() {
          if (d3.select(this).attr('data-name') === countryName) {
            this.classList.add('flash');
            setTimeout(() => this.classList.remove('flash'), 2000);
          }
        });
      }
    }

    function highlightHotItem(e) {
      document.querySelectorAll('.hot-item').forEach(el => el.classList.remove('active'));
      const data = getFilteredData().slice().sort((a, b) => b.volume - a.volume).slice(0, 20);
      const idx = data.findIndex(d => d.id === e.id);
      if (idx >= 0) {
        const items = hotList.querySelectorAll('.hot-item');
        if (items[idx]) {
          items[idx].classList.add('active');
          items[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }
    }

    // Init flat map in background
    initFlatMap();

    // Toggle
    document.getElementById('view-toggle').addEventListener('click', () => {
      isFlat = !isFlat;
      const globeContainer = document.getElementById('globe-container');
      if (isFlat) {
        globeContainer.style.display = 'none';
        flatMap.classList.add('active');
        document.getElementById('toggle-label').textContent = '3D Globe';
        document.getElementById('toggle-icon').textContent = '\u{1F30D}';
        renderFlatMap();
      } else {
        globeContainer.style.display = 'block';
        flatMap.classList.remove('active');
        document.getElementById('toggle-label').textContent = '2D Map';
        document.getElementById('toggle-icon').textContent = '\u{1F5FA}';
      }
    });

    // Update flat map on filter/resize
    const _origUpdateGlobe = updateGlobe;
    updateGlobe = function() {
      _origUpdateGlobe();
      updateHotList();
      if (isFlat) renderFlatMap();
    };
    window.addEventListener('resize', () => { if (isFlat) renderFlatMap(); });

    // =============================================
    // Init
    // =============================================
    async function init() {
      const events = await fetchEvents();
      processedEvents = processEvents(events);
      updateGlobe();
      updateStatus();
      document.getElementById('loading').classList.add('hidden');

      // Auto-refresh every 5 minutes
      setInterval(async () => {
        const events = await fetchEvents();
        processedEvents = processEvents(events);
        updateGlobe();
        updateStatus();
      }, 5 * 60 * 1000);
    }
    init();
  </script>
</body>
</html>
