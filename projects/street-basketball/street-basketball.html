<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="screen-orientation" content="landscape">
<title>Street Basketball</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #222;
  display: flex; justify-content: center; align-items: center;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
/* Fixed position fills exact visible viewport on mobile (avoids toolbar overlap) */
body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
/* Portrait rotation overlay */
#rotate-hint {
  display: none;
  position: fixed; inset: 0; z-index: 99999;
  background: #1a1a2e;
  flex-direction: column; justify-content: center; align-items: center;
  color: #fff; font-family: 'Arial Black', sans-serif; text-align: center;
}
#rotate-hint .phone-icon {
  font-size: 80px;
  animation: rotatePhone 1.5s ease-in-out infinite;
}
#rotate-hint .hint-text {
  font-size: 22px; margin-top: 20px; color: #ffcc00;
}
#rotate-hint .hint-sub {
  font-size: 14px; margin-top: 10px; color: #888;
}
#rotate-hint .rotate-btn {
  margin-top: 30px; padding: 16px 40px;
  font-size: 20px; font-family: 'Arial Black', sans-serif;
  color: #1a1a2e; background: linear-gradient(135deg, #ffcc00, #ff8800);
  border: none; border-radius: 50px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,200,0,0.4);
  animation: btnPulse 2s ease-in-out infinite;
}
#rotate-hint .rotate-btn:active {
  transform: scale(0.95);
  box-shadow: 0 2px 10px rgba(255,200,0,0.3);
}
@keyframes rotatePhone {
  0%, 100% { transform: rotate(0deg); }
  25%, 75% { transform: rotate(90deg); }
}
@keyframes btnPulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(255,200,0,0.4); }
  50% { box-shadow: 0 4px 30px rgba(255,200,0,0.7), 0 0 60px rgba(255,136,0,0.3); }
}
@media screen and (orientation: portrait) and (max-width: 900px) {
  #rotate-hint:not(.dismissed) { display: flex !important; }
}
/* CSS forced landscape: rotate game when in portrait (WeChat fallback) */
body.css-landscape {
  width: 100vh !important; height: 100vw !important;
  transform: rotate(90deg);
  transform-origin: top left;
  position: absolute !important;
  top: 0; left: 100vw;
  right: auto; bottom: auto;
  overflow: hidden;
}
canvas { display: block; }
</style>
</head>
<body>
<!-- Portrait rotation hint -->
<div id="rotate-hint">
  <div class="phone-icon">📱</div>
  <div class="hint-text">请横屏游玩</div>
  <div class="hint-sub">Please rotate your device</div>
  <button class="rotate-btn" onclick="enterFullscreenLandscape()">🔄 点击开始游戏</button>
</div>
<script>
var isWeChat = /MicroMessenger/i.test(navigator.userAgent);
var isPortrait = function() { return window.innerHeight > window.innerWidth; };

function tryLandscapeLock() {
  try {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(function(){});
    }
  } catch(e) {}
}
function goFullscreen() {
  var el = document.documentElement;
  var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if (rfs) {
    rfs.call(el).then(function() {
      tryLandscapeLock();
    }).catch(function() {
      // Fullscreen failed (WeChat etc.) — use CSS rotation
      applyCSSLandscape();
    });
  } else {
    // No fullscreen API — use CSS rotation
    applyCSSLandscape();
  }
}
function applyCSSLandscape() {
  if (isPortrait()) {
    document.body.classList.add('css-landscape');
    // Tell Phaser the available space is swapped (width=vh, height=vw)
    if (window.__phaserGame) {
      window.__phaserGame.scale.resize(window.innerHeight, window.innerWidth);
      window.__phaserGame.scale.refresh();
    }
  }
}
function removeCSSLandscape() {
  document.body.classList.remove('css-landscape');
  if (window.__phaserGame) {
    window.__phaserGame.scale.refresh();
  }
}
function enterFullscreenLandscape() {
  if (isWeChat || !document.documentElement.requestFullscreen) {
    // WeChat or no fullscreen: use CSS rotation directly
    applyCSSLandscape();
  } else {
    goFullscreen();
  }
  document.getElementById('rotate-hint').classList.add('dismissed');
}
// Monitor orientation changes — remove CSS rotation when actually landscape
window.addEventListener('orientationchange', function() {
  setTimeout(function() {
    if (!isPortrait()) {
      removeCSSLandscape();
    }
  }, 300);
});
// Auto-lock on load
tryLandscapeLock();
// Re-enter fullscreen on first touch (non-WeChat only)
if (!isWeChat) {
  document.addEventListener('touchstart', function autoFS() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      goFullscreen();
    }
  }, { once: true });
}
</script>

// ─── SOUND MANAGER ────────────────────────────────────────────────────────────
class SoundManager {
  constructor() {
    this.ctx = null;
    this.sfxEnabled = true;
    this.bgmEnabled = true;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { this.sfxEnabled = false; }
    // Load saved preference
    try {
      const s = JSON.parse(localStorage.getItem('streetball') || '{}');
      if (s.sfxOn === false) this.sfxEnabled = false;
      if (s.bgmOn === false) this.bgmEnabled = false;
      // Migration from old soundOn
      if (s.soundOn === false && s.bgmOn === undefined) { this.bgmEnabled = false; this.sfxEnabled = false; }
    } catch(e) {}
  }
  get enabled() { return this.sfxEnabled; }
  set enabled(v) { this.sfxEnabled = v; this.bgmEnabled = v; }
  resume() { if (this.ctx?.state === 'suspended') this.ctx.resume(); }
  play(type) {
    if (!this.sfxEnabled || !this.ctx) return;
    this.resume();
    if (typeof this[type] === 'function') this[type]();
  }
  tone(freq, dur, type='sine', vol=0.3) {
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + dur);
    } catch(e) {}
  }
  // Filtered noise with bandpass for realistic sounds
  filteredNoise(dur, vol, freq, Q) {
    try {
      const t = this.ctx.currentTime;
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = Q;
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      src.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
      src.start();
    } catch(e) {}
  }
  noise(dur, vol=0.15) {
    try {
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * dur, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * vol;
      const src = this.ctx.createBufferSource();
      const gain = this.ctx.createGain();
      src.buffer = buf;
      gain.gain.setValueAtTime(vol, this.ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      src.connect(gain); gain.connect(this.ctx.destination);
      src.start();
    } catch(e) {}
  }
  // Metallic ring: sharp attack + inharmonic overtones that decay = 打铁声
  metalRing(freq, dur, vol) {
    try {
      const t = this.ctx.currentTime;
      // Fundamental + inharmonic overtones for metallic timbre
      [1, 2.76, 4.13, 6.27].forEach((ratio, i) => {
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq * ratio;
        const v = vol / (1 + i * 0.8);
        gain.gain.setValueAtTime(v, t);
        gain.gain.setValueAtTime(v, t + 0.002);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur / (1 + i * 0.5));
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(t); osc.stop(t + dur);
      });
    } catch(e) {}
  }
  shoot() { this.tone(800, 0.1, 'sine', 0.2); this.tone(1200, 0.08, 'sine', 0.15); }
  // 空心入网 "唰": filtered noise sweep (chain net) + soft low thud
  swish() {
    try {
      const t = this.ctx.currentTime;
      // Net swoosh: bandpass noise sweeping from high to low = chain rattle
      const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.4, this.ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
      const src = this.ctx.createBufferSource();
      src.buffer = buf;
      const bp = this.ctx.createBiquadFilter();
      bp.type = 'bandpass'; bp.Q.value = 2;
      bp.frequency.setValueAtTime(4000, t);
      bp.frequency.exponentialRampToValueAtTime(800, t + 0.3);
      const gain = this.ctx.createGain();
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.setValueAtTime(0.35, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      src.connect(bp); bp.connect(gain); gain.connect(this.ctx.destination);
      src.start(t);
      // Soft ball-through-net thud
      this.tone(180, 0.12, 'sine', 0.15);
      // Secondary rattle
      setTimeout(() => this.filteredNoise(0.15, 0.12, 2500, 1.5), 100);
    } catch(e) {}
  }
  // 打铁: metallic clang + short ring + rim vibration
  // 打板: 球撞篮板 — 沉闷的"砰"声 + 短振动
  bank() {
    // 球撞击篮板的低频闷响
    this.tone(160, 0.18, 'triangle', 0.35);
    this.tone(100, 0.12, 'sine', 0.2);
    // 篮板振动嗡声
    this.filteredNoise(0.08, 0.25, 800, 2);
    // 轻微高频碰撞感
    this.filteredNoise(0.03, 0.1, 2500, 4);
    setTimeout(() => this.tone(130, 0.1, 'triangle', 0.1), 40);
  }
  // Rim hit: lighter metallic ping (iron ring, higher pitch than bank)
  rimHit() {
    this.metalRing(600, 0.3, 0.2);
    this.filteredNoise(0.03, 0.2, 4000, 4);
  }
  // Rebound grab: ball slap + grunt-like thud
  rebound() {
    // Ball slap (hands grabbing ball)
    this.filteredNoise(0.06, 0.35, 2000, 5);
    // Body impact thud
    this.tone(120, 0.15, 'triangle', 0.25);
    setTimeout(() => this.tone(90, 0.1, 'triangle', 0.15), 50);
    // Sneaker squeak
    setTimeout(() => this.filteredNoise(0.08, 0.12, 3500, 8), 100);
  }
  miss()   { this.tone(200,0.2,'triangle',0.2); }
  combo()  { this.tone(600,0.1,'square',0.2); setTimeout(()=>this.tone(800,0.1,'square',0.2),80); setTimeout(()=>this.tone(1000,0.15,'square',0.2),160); }
  pickup() { this.tone(1200,0.08,'sine',0.2); setTimeout(()=>this.tone(1600,0.1,'sine',0.2),60); }
  beast()  { this.tone(80,0.5,'sawtooth',0.3); this.tone(100,0.5,'square',0.2); this.noise(0.6,0.15); }
  dribble() { this.tone(150,0.08,'triangle',0.15); this.tone(100,0.06,'sine',0.1); }

  // ── BGM: 多首灌篮高手主题曲循环播放 ──
  startBGM() {
    if (!this.bgmTracks) { this.bgmTracks = ['WANDS - 世界が終るまでは…~TV Version~.mp3', 'LordHeeDictator - 君が好きだと叫びたい（好想大声说爱你）TV动画《灌篮高手》OP1.mp3', '核桃 - あなただけ見つめてる（只凝视着你）.mp3', 'BAAD - ENDLESS CHAIN (CINE VERSION).mp3', 'ZYYG - ぜったいに誰にも (TV VERSION).mp3', '徳永暁人 - ライバル対決~仙道VS流川~.mp3']; }
    if (!this.bgmEnabled || this.bgmPlaying) return;
    this.bgmPlaying = true;
    // 每次开始随机选一首
    this.bgmTrackIndex = Math.floor(Math.random() * this.bgmTracks.length);
    this._playNextTrack();
  }
  _playNextTrack() {
    if (!this.bgmPlaying) return;
    // Clean up previous
    if (this.bgmAudio) {
      this.bgmAudio.pause();
      this.bgmAudio.removeEventListener('ended', this._onTrackEnd);
      this.bgmAudio = null;
    }
    const track = this.bgmTracks[this.bgmTrackIndex % this.bgmTracks.length];
    // Extract display name from filename
    this.currentTrackName = track.replace(/\.mp3$/i, '').replace(/^.*? - /, '');
    this.bgmAudio = new Audio(track);
    this.bgmAudio.volume = 0.35;
    this._onTrackEnd = () => {
      if (!this.bgmPlaying) return;
      this.bgmTrackIndex++;
      this._playNextTrack();
    };
    this.bgmAudio.addEventListener('ended', this._onTrackEnd);
    this.bgmAudio.addEventListener('error', () => {
      // Skip broken track, try next
      if (!this.bgmPlaying) return;
      this.bgmTrackIndex++;
      if (this.bgmTrackIndex >= this.bgmTracks.length * 2) {
        // All tracks failed, fall back to synth
        this.bgmUsingReal = false;
        if (this.ctx) {
          this.bgmGain = this.ctx.createGain();
          this.bgmGain.gain.value = 0.12;
          this.bgmGain.connect(this.ctx.destination);
          this._playBGMLoop();
        }
        return;
      }
      this._playNextTrack();
    }, { once: true });
    this.bgmUsingReal = true;
    this.bgmAudio.play().catch(() => {});
  }
  stopBGM() {
    this.bgmPlaying = false;
    if (this.bgmAudio) {
      this.bgmAudio.pause();
    }
    if (this.bgmTimeout) clearTimeout(this.bgmTimeout);
    if (this.bgmGain) {
      try { this.bgmGain.gain.setValueAtTime(0, this.ctx.currentTime); } catch(e) {}
    }
  }
  _bgmNote(freq, start, dur, type='square', vol=1.0) {
    try {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.001, this.ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(vol * 0.15, this.ctx.currentTime + start + 0.02);
      gain.gain.setValueAtTime(vol * 0.15, this.ctx.currentTime + start + dur - 0.03);
      gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + start + dur);
      osc.connect(gain);
      gain.connect(this.bgmGain);
      osc.start(this.ctx.currentTime + start);
      osc.stop(this.ctx.currentTime + start + dur);
    } catch(e) {}
  }
  _bgmBass(freq, start, dur) {
    this._bgmNote(freq, start, dur, 'triangle', 0.7);
  }
  _playBGMLoop() {
    if (!this.bgmPlaying || !this.ctx || this.bgmUsingReal) return;
    this.resume();
    // Jingle Bells — C major, upbeat and recognizable
    const bpm = 160;
    const beat = 60 / bpm;
    const n = {
      C4:261.6, D4:293.7, E4:329.6, F4:349.2, G4:392.0, A4:440.0, B4:493.9,
      C5:523.3, D5:587.3, E5:659.3, F5:698.5, G5:784.0,
      C3:130.8, E3:164.8, F3:174.6, G3:196.0, A3:220.0, B3:246.9, D3:146.8
    };
    const b = beat;
    // Jingle Bells melody (2 full verses)
    const melody = [
      // "Jingle bells, jingle bells, jingle all the way"
      [n.E4,0,b],[n.E4,b,b],[n.E4,b*2,b*2],
      [n.E4,b*4,b],[n.E4,b*5,b],[n.E4,b*6,b*2],
      [n.E4,b*8,b],[n.G4,b*9,b],[n.C4,b*10,b],[n.D4,b*11,b],
      [n.E4,b*12,b*4],
      // "Oh what fun it is to ride in a one-horse open sleigh"
      [n.F4,b*16,b],[n.F4,b*17,b],[n.F4,b*18,b],[n.F4,b*19,b],
      [n.F4,b*20,b],[n.E4,b*21,b],[n.E4,b*22,b],[n.E4,b*23,b*0.5],[n.E4,b*23.5,b*0.5],
      [n.E4,b*24,b],[n.D4,b*25,b],[n.D4,b*26,b],[n.E4,b*27,b],
      [n.D4,b*28,b*2],[n.G4,b*30,b*2],
      // Verse 2: repeat with higher energy
      [n.E4,b*32,b],[n.E4,b*33,b],[n.E4,b*34,b*2],
      [n.E4,b*36,b],[n.E4,b*37,b],[n.E4,b*38,b*2],
      [n.E4,b*40,b],[n.G4,b*41,b],[n.C4,b*42,b],[n.D4,b*43,b],
      [n.E4,b*44,b*4],
      [n.F4,b*48,b],[n.F4,b*49,b],[n.F4,b*50,b],[n.F4,b*51,b],
      [n.F4,b*52,b],[n.E4,b*53,b],[n.E4,b*54,b],[n.E4,b*55,b*0.5],[n.E4,b*55.5,b*0.5],
      [n.G4,b*56,b],[n.G4,b*57,b],[n.F4,b*58,b],[n.D4,b*59,b],
      [n.C5,b*60,b*4],
    ];
    // Bass line — simple root notes
    const bass = [
      [n.C3,0,b*4],[n.C3,b*4,b*4],[n.F3,b*8,b*2],[n.G3,b*10,b*2],[n.C3,b*12,b*4],
      [n.F3,b*16,b*4],[n.C3,b*20,b*2],[n.G3,b*22,b*2],[n.G3,b*24,b*2],[n.F3,b*26,b*2],[n.G3,b*28,b*2],[n.G3,b*30,b*2],
      [n.C3,b*32,b*4],[n.C3,b*36,b*4],[n.F3,b*40,b*2],[n.G3,b*42,b*2],[n.C3,b*44,b*4],
      [n.F3,b*48,b*4],[n.C3,b*52,b*2],[n.G3,b*54,b*2],[n.G3,b*56,b*2],[n.F3,b*58,b*2],[n.C3,b*60,b*4],
    ];
    // Sleigh bells — shimmery high-frequency noise bursts on every beat
    const loopLen = b * 64;
    // Play melody with bright square wave (music box feel)
    melody.forEach(([freq, start, dur]) => this._bgmNote(freq, start, dur, 'square', 0.8));
    // Play bass
    bass.forEach(([freq, start, dur]) => this._bgmBass(freq, start, dur));
    // Sleigh bells + light percussion
    for (let i = 0; i < 64; i++) {
      const t = i * b;
      // Sleigh bell jingle on every beat
      try {
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.04, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) d[j] = (Math.random() * 2 - 1);
        const src = this.ctx.createBufferSource(); src.buffer = buf;
        const hp = this.ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 8000;
        const g = this.ctx.createGain();
        const vol = (i % 2 === 0) ? 0.06 : 0.03; // accent on downbeats
        g.gain.setValueAtTime(vol, this.ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + t + 0.04);
        src.connect(hp); hp.connect(g); g.connect(this.bgmGain);
        src.start(this.ctx.currentTime + t);
      } catch(e) {}
      // Kick on beats 1 and 3
      if (i % 4 === 0) this._bgmNote(80, t, 0.08, 'sine', 0.5);
    }
    this.bgmTimeout = setTimeout(() => this._playBGMLoop(), loopLen * 1000);
  }
}

// ─── Polyfill: Phaser Graphics bezierCurveTo ─────────────────────────────────
// Phaser 3 Graphics doesn't have bezierCurveTo natively; approximate with line segments
Phaser.GameObjects.Graphics.prototype.bezierCurveTo = function(cp1x, cp1y, cp2x, cp2y, x, y) {
  const cmd = this.commandBuffer;
  // Get current point from last moveTo/lineTo
  // Sample the cubic bezier with 8 segments
  const steps = 8;
  // We need the "current point" — approximate from the last command
  // Phaser stores path data internally; we access via _tempLine hack
  // Simpler: just use the Phaser curve math
  const sx = this._bezLastX || 0, sy = this._bezLastY || 0;
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    const u = 1 - t;
    const px = u*u*u*sx + 3*u*u*t*cp1x + 3*u*t*t*cp2x + t*t*t*x;
    const py = u*u*u*sy + 3*u*u*t*cp1y + 3*u*t*t*cp2y + t*t*t*y;
    this.lineTo(px, py);
  }
  this._bezLastX = x;
  this._bezLastY = y;
  return this;
};
// Override moveTo to track position for bezier
const _origMoveTo = Phaser.GameObjects.Graphics.prototype.moveTo;
Phaser.GameObjects.Graphics.prototype.moveTo = function(x, y) {
  this._bezLastX = x;
  this._bezLastY = y;
  return _origMoveTo.call(this, x, y);
};
// Override lineTo to track position for bezier
const _origLineTo = Phaser.GameObjects.Graphics.prototype.lineTo;
Phaser.GameObjects.Graphics.prototype.lineTo = function(x, y) {
  this._bezLastX = x;
  this._bezLastY = y;
  return _origLineTo.call(this, x, y);
};

      const gv = Math.floor(200 - t * 80);
      const b = Math.floor(140 - t * 60);
      g.fillStyle((r << 16) | (gv << 8) | b, 1);
      g.fillRect(0, y, CONFIG.WIDTH, 1);
    }
    // Brick wall (upper portion)
    const wallG = this.add.graphics();
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 20; col++) {
        const bx = col * 42 + (row % 2) * 21;
        const by = row * 22;
        const shade = 0.15 + Math.random() * 0.08;
        wallG.fillStyle(0xb8785a, shade);
        wallG.fillRect(bx, by, 40, 20);
      }
    }
    // Mortar lines
    wallG.lineStyle(1, 0x000000, 0.06);
    for (let y = 0; y <= 176; y += 22) {
      wallG.beginPath(); wallG.moveTo(0, y); wallG.lineTo(CONFIG.WIDTH, y); wallG.strokePath();
    }
  }

    g.beginPath(); g.moveTo(200, 345); g.lineTo(600, 345); g.strokePath();

    // Hoop on right side (decorative)

  drawModeButtons() {
    const centerX = CONFIG.WIDTH / 2;
    const btnW = 280, btnH = 56, btnR = 16;
    const btnY1 = 266, btnY2 = 330;

    // Helper: draw a styled button with gradient, inner glow, shadow
    const drawBtn = (y, color1, color2, highlight, shadowColor) => {
      const bg = this.add.graphics();
      const x = centerX - btnW / 2;
      const yt = y - btnH / 2;
      // Drop shadow
      bg.fillStyle(0x000000, 0.25);
      bg.fillRoundedRect(x + 2, yt + 3, btnW, btnH, btnR);
      // Main fill — gradient via 2 layers
      bg.fillStyle(color1, 0.95);
      bg.fillRoundedRect(x, yt, btnW, btnH, btnR);
      // Top half lighter overlay for gradient feel
      bg.fillStyle(highlight, 0.2);
      bg.fillRoundedRect(x, yt, btnW, btnH / 2, { tl: btnR, tr: btnR, bl: 0, br: 0 });
      // Inner highlight line at top
      bg.lineStyle(1.5, highlight, 0.5);
      bg.beginPath();
      bg.moveTo(x + btnR, yt + 1.5);
      bg.lineTo(x + btnW - btnR, yt + 1.5);
      bg.strokePath();
      // Border
      bg.lineStyle(2, color2, 0.8);
      bg.strokeRoundedRect(x, yt, btnW, btnH, btnR);
      return bg;
    };

    // ── Endless mode button ──
    const endlessBg = drawBtn(btnY1, 0xdd2222, 0xff4444, 0xff8888, 0x880000);

    const endlessTxt = this.add.text(centerX, btnY1 - 5, '🔥 无尽挑战', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '24px',
      color: '#ffffff',
      stroke: '#770000',
      strokeThickness: 3,
      resolution: 2,
    });
    endlessTxt.setOrigin(0.5);

    const endlessZone = this.add.zone(centerX, btnY1, btnW, btnH).setInteractive({ useHandCursor: true });

    const endlessSub = this.add.text(centerX, btnY1 + 16, '一首歌的时间 · 冲击最高分', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '12px',
      color: '#ffdddd',
      resolution: 2,
    });
    endlessSub.setOrigin(0.5);

    // ── Level mode button ──
    const levelBg = drawBtn(btnY2, 0x1a44aa, 0x3366dd, 0x6699ff, 0x001155);

    const levelTxt = this.add.text(centerX, btnY2 - 5, '🏆 关卡模式', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '24px',
      color: '#ffffff',
      stroke: '#001155',
      strokeThickness: 3,
      resolution: 2,
    });
    levelTxt.setOrigin(0.5);

    const levelZone = this.add.zone(centerX, btnY2, btnW, btnH).setInteractive({ useHandCursor: true });

    const levelSub = this.add.text(centerX, btnY2 + 16, '15关挑战 · 3大区域', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '12px',
      color: '#ccddff',
      resolution: 2,
    });
    levelSub.setOrigin(0.5);

    // ── Hover: just brighten the button (no scaling, no glow) ──
    const addBtnHover = (zone, bg, txt, sub2, y, baseColor, hoverColor, borderBase, borderHover) => {
      zone.on('pointerover', () => {
        bg.clear();
        const x = centerX - btnW / 2, yt = y - btnH / 2;
        bg.fillStyle(0x000000, 0.25);
        bg.fillRoundedRect(x + 2, yt + 3, btnW, btnH, btnR);
        bg.fillStyle(hoverColor, 1);
        bg.fillRoundedRect(x, yt, btnW, btnH, btnR);
        bg.fillStyle(0xffffff, 0.15);
        bg.fillRoundedRect(x, yt, btnW, btnH / 2, { tl: btnR, tr: btnR, bl: 0, br: 0 });
        bg.lineStyle(2, borderHover, 0.9);
        bg.strokeRoundedRect(x, yt, btnW, btnH, btnR);
      });
      zone.on('pointerout', () => {
        bg.clear();
        const x = centerX - btnW / 2, yt = y - btnH / 2;
        bg.fillStyle(0x000000, 0.25);
        bg.fillRoundedRect(x + 2, yt + 3, btnW, btnH, btnR);
        bg.fillStyle(baseColor, 0.95);
        bg.fillRoundedRect(x, yt, btnW, btnH, btnR);
        bg.fillStyle(0xffffff, 0.2);
        bg.fillRoundedRect(x, yt, btnW, btnH / 2, { tl: btnR, tr: btnR, bl: 0, br: 0 });
        bg.lineStyle(1.5, borderBase, 0.5);
        bg.beginPath(); bg.moveTo(x + btnR, yt + 1.5); bg.lineTo(x + btnW - btnR, yt + 1.5); bg.strokePath();
        bg.lineStyle(2, borderBase, 0.8);
        bg.strokeRoundedRect(x, yt, btnW, btnH, btnR);
      });
    };
    addBtnHover(endlessZone, endlessBg, endlessTxt, endlessSub, btnY1, 0xdd2222, 0xff4444, 0xff8888, 0xff6666);
    addBtnHover(levelZone, levelBg, levelTxt, levelSub, btnY2, 0x1a44aa, 0x2a5acc, 0x6699ff, 0x5588ff);

    // ── Click handlers ──
    endlessZone.on('pointerdown', () => {
      this.scene.start('GameScene', { mode: 'endless', level: 1 });
    });
    levelZone.on('pointerdown', () => {
      this.scene.start('LevelSelectScene');
    });
  }

      repeat: -1,

    for (let i = 0; i < 3; i++) {
      const star = this.add.text(100 + i * 280, 130 + i * 15, '✦', {
        fontSize: '14px', color: '#ffcc00',
      });
      star.setAlpha(0.3);
      this.tweens.add({
        targets: star,
        y: star.y - 15,
        alpha: 0.6,
        duration: 1200 + i * 300,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut',
      });

    // Subtle particle drift (paint flecks)
    for (let i = 0; i < 6; i++) {
      const fleck = this.add.graphics();
      const colors = [0xff3366, 0x3366ff, 0xffcc00, 0x44cc44, 0xff6600, 0xcc66ff];

      fleck.fillCircle(0, 0, 3 + Math.random() * 4);
      fleck.x = Math.random() * CONFIG.WIDTH;
      fleck.y = Math.random() * 160;
      this.tweens.add({
        targets: fleck,
        y: fleck.y + 20 + Math.random() * 30,
        x: fleck.x + (Math.random() - 0.5) * 40,
        alpha: 0,
        duration: 3000 + Math.random() * 2000,
        repeat: -1,
        delay: Math.random() * 2000,
        onRepeat: () => {
          fleck.x = Math.random() * CONFIG.WIDTH;
          fleck.y = Math.random() * 160;
          fleck.alpha = 0.15 + Math.random() * 0.1;
        },
      });
    }
  }
}

// ─── RESULT SCENE ─────────────────────────────────────────────────────────────
class ResultScene extends Phaser.Scene {
  constructor() { super({ key: 'ResultScene' }); }

  init(data) {
    this.resultScore = data?.score   || 0;
    this.resultCombo = data?.combo   || 0;
    this.resultBasks = data?.baskets || 0;
    this.resultMode  = data?.mode    || 'endless';
    this.resultLevel = data?.level   || 1;
    this.isNewHigh   = data?.isNewHigh || false;
    this.resultStars = data?.stars   ?? null;
    this.resultPassed = data?.passed ?? null;
  }

  create() {
    this.drawBackground();
    this.drawTitle();
    this.drawScore();
    this.drawStats();
    if (this.resultMode === 'level') {
      this.drawLevelResult();
    }
    this.drawButtons();
  }

  drawBackground() {
    const g = this.add.graphics();

    // Paper fill
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Notebook lines
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    // Red margin
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();
  }

  drawTitle() {
    // Shadow
    const shadow = this.add.text(CONFIG.WIDTH / 2 + 3, 78, 'GAME OVER', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '64px',
      color: '#ffcc00',
    });
    shadow.setOrigin(0.5);
    shadow.setAngle(-4);

    // Main title
    const title = this.add.text(CONFIG.WIDTH / 2, 75, 'GAME OVER', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '64px',
      color: '#cc2233',
      stroke: '#440011',
      strokeThickness: 5,
    });
    title.setOrigin(0.5);
    title.setAngle(-4);
  }

  drawScore() {
    const cx = CONFIG.WIDTH / 2;
    const isLevel = this.resultMode === 'level';

    // Score number
    const scoreTxt = this.add.text(cx, isLevel ? 140 : 165, '' + this.resultScore, {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: isLevel ? '56px' : '72px',
      color: CONFIG.COLORS.ink,
      stroke: '#888866',
      strokeThickness: 3,
    });
    scoreTxt.setOrigin(0.5);

    // POINTS label
    const label = this.add.text(cx, isLevel ? 182 : 215, 'POINTS', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#888877',
    });
    label.setOrigin(0.5);

    // New high score
    if (this.isNewHigh) {
      const hsTxt = this.add.text(cx, 248, '★ NEW HIGH SCORE! ★', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '20px',
        color: '#ffcc00',
        stroke: '#884400',
        strokeThickness: 3,
      });
      hsTxt.setOrigin(0.5);
      // Pulsing tween
      this.tweens.add({
        targets: hsTxt,
        scaleX: 1.12, scaleY: 1.12,
        duration: 500,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut',
      });
    }
  }

  drawStats() {
    const cardW = 150, cardH = 72, cardR = 12;
    const y = this.resultMode === 'level' ? 240 : 290;
    const cx = CONFIG.WIDTH / 2;
    const gap = 30;
    const x1 = cx - cardW - gap / 2;
    const x2 = cx + gap / 2;

    // Card helper
    const drawCard = (x, icon, topLabel, value) => {
      const bg = this.add.graphics();
      bg.fillStyle(0xffffff, 0.85);
      bg.fillRoundedRect(x, y, cardW, cardH, cardR);
      bg.lineStyle(2, 0xccccbb, 0.8);
      bg.strokeRoundedRect(x, y, cardW, cardH, cardR);

      this.add.text(x + cardW / 2, y + 14, icon + ' ' + topLabel, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '13px',
        color: '#888877',
      }).setOrigin(0.5);

      this.add.text(x + cardW / 2, y + 44, '' + value, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '28px',
        color: CONFIG.COLORS.ink,
        stroke: '#ccccaa',
        strokeThickness: 2,
      }).setOrigin(0.5);
    };

    drawCard(x1, '🏀', 'BASKETS', this.resultBasks);
    drawCard(x2, '🔥', 'MAX COMBO', this.resultCombo);
  }

  drawButtons() {
    const btnW = 170, btnH = 50, btnR = 12;
    const y = this.resultMode === 'level' ? 355 : 385;
    const cx = CONFIG.WIDTH / 2;
    const gap = 20;
    const x1 = cx - btnW - gap / 2;
    const x2 = cx + gap / 2;

    // Replay button
    const replayBg = this.add.graphics();
    replayBg.fillStyle(0x3366ff, 0.15);
    replayBg.fillRoundedRect(x1, y - btnH / 2, btnW, btnH, btnR);
    replayBg.lineStyle(3, 0x3366ff, 0.9);
    replayBg.strokeRoundedRect(x1, y - btnH / 2, btnW, btnH, btnR);

    const replayTxt = this.add.text(x1 + btnW / 2, y, '🔄 REPLAY', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#1133aa',
      stroke: '#ffffff',
      strokeThickness: 2,
    });
    replayTxt.setOrigin(0.5);
    replayTxt.setInteractive({ useHandCursor: true });

    // Menu button
    const menuBg = this.add.graphics();
    menuBg.fillStyle(0x6666cc, 0.15);
    menuBg.fillRoundedRect(x2, y - btnH / 2, btnW, btnH, btnR);
    menuBg.lineStyle(3, 0x6666cc, 0.9);
    menuBg.strokeRoundedRect(x2, y - btnH / 2, btnW, btnH, btnR);

    const menuTxt = this.add.text(x2 + btnW / 2, y, '🏠 MENU', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#444499',
      stroke: '#ffffff',
      strokeThickness: 2,
    });
    menuTxt.setOrigin(0.5);
    menuTxt.setInteractive({ useHandCursor: true });

    // Hover effects
    const addHover = (txt, scale) => {
      txt.on('pointerover', () => this.tweens.add({ targets: txt, scaleX: scale, scaleY: scale, duration: 100 }));
      txt.on('pointerout',  () => this.tweens.add({ targets: txt, scaleX: 1,     scaleY: 1,     duration: 100 }));
    };
    addHover(replayTxt, 1.08);
    addHover(menuTxt,   1.08);

    // Click handlers
    replayTxt.on('pointerdown', () => {
      this.scene.start('GameScene', { mode: this.resultMode, level: this.resultLevel });
    });
    menuTxt.on('pointerdown', () => {
      if (this.resultMode === 'level') {
        this.scene.start('LevelSelectScene');
      } else {
        this.scene.start('MenuScene');
      }
    });

    // Next level button (level mode, passed, not last level)
    if (this.resultMode === 'level' && this.resultPassed && this.resultLevel < 15) {
      const nextBtnW = 170, nextBtnH = 50, nextBtnR = 12;
      const nextY = y + 60;
      const nextX = cx - nextBtnW / 2;

      const nextBg = this.add.graphics();
      nextBg.fillStyle(0xff8833, 0.2);
      nextBg.fillRoundedRect(nextX, nextY - nextBtnH / 2, nextBtnW, nextBtnH, nextBtnR);
      nextBg.lineStyle(3, 0xff8833, 0.9);
      nextBg.strokeRoundedRect(nextX, nextY - nextBtnH / 2, nextBtnW, nextBtnH, nextBtnR);

      const nextTxt = this.add.text(nextX + nextBtnW / 2, nextY, '▶ 下一关', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '18px',
        color: '#884400',
        stroke: '#ffffff',
        strokeThickness: 2,
      });
      nextTxt.setOrigin(0.5);
      nextTxt.setInteractive({ useHandCursor: true });
      nextTxt.on('pointerover', () => this.tweens.add({ targets: nextTxt, scaleX: 1.08, scaleY: 1.08, duration: 100 }));
      nextTxt.on('pointerout',  () => this.tweens.add({ targets: nextTxt, scaleX: 1, scaleY: 1, duration: 100 }));
      nextTxt.on('pointerdown', () => {
        this.scene.start('GameScene', { mode: 'level', level: this.resultLevel + 1 });
      });
    }
  }

  drawLevelResult() {
    const cx = CONFIG.WIDTH / 2;
    const cfg = CONFIG.LEVELS[this.resultLevel - 1];
    const stars = this.resultStars || 0;
    const passed = this.resultPassed;

    // PASSED / FAILED label
    const statusTxt = this.add.text(cx, 248, passed ? 'PASSED!' : 'FAILED...', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '26px',
      color: passed ? '#44cc44' : '#cc4444',
      stroke: passed ? '#004400' : '#440000',
      strokeThickness: 3,
    });
    statusTxt.setOrigin(0.5);
    if (passed) {
      this.tweens.add({ targets: statusTxt, scaleX: 1.1, scaleY: 1.1, duration: 400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    }

    // Star display
    const starStr = [0,1,2].map(i => i < stars ? '⭐' : '☆').join(' ');
    this.add.text(cx, 278, starStr, { fontSize: '28px' }).setOrigin(0.5);

    // Target score info
    if (cfg) {
      const targetTxt = this.add.text(cx, 310, '目标: ' + cfg.stars[0] + ' / ' + cfg.stars[1] + ' / ' + cfg.stars[2], {
        fontFamily: 'Arial, sans-serif',
        fontSize: '12px',
        color: '#888877',
      });
      targetTxt.setOrigin(0.5);
    }
  }
}

// ─── LEVEL SELECT SCENE ───────────────────────────────────────────────────────
class LevelSelectScene extends Phaser.Scene {
  constructor() { super({ key: 'LevelSelectScene' }); }

  create() {
    this.drawBackground();
    this.drawTitle();
    this.drawAreas();
    this.drawBackButton();
  }

  drawBackground() {
    const g = this.add.graphics();
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();
  }

  drawTitle() {
    const title = this.add.text(CONFIG.WIDTH / 2, 30, '🏆 选择关卡', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '30px',
      color: '#333333',
      stroke: '#888866',
      strokeThickness: 3,
    });
    title.setOrigin(0.5);
    title.setAngle(-1);
  }

  drawAreas() {
    const save = loadSave();
    const levelStars = save.levelStars || {};

    const areas = [
      { key: 'street',  label: '🏙 街角球场', color: 0xff3333, ids: [1,2,3,4,5],    y: 90  },
      { key: 'park',    label: '🌳 城市公园', color: 0x44aa44, ids: [6,7,8,9,10],   y: 220 },
      { key: 'rooftop', label: '🏢 天台球场', color: 0x3366ff, ids: [11,12,13,14,15], y: 350 },
    ];

    areas.forEach(area => {
      // Area header
      const hg = this.add.graphics();
      hg.fillStyle(area.color, 0.15);
      hg.fillRoundedRect(80, area.y, 640, 28, 8);
      hg.lineStyle(2, area.color, 0.7);
      hg.strokeRoundedRect(80, area.y, 640, 28, 8);

      this.add.text(CONFIG.WIDTH / 2, area.y + 14, area.label, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '14px',
        color: '#333333',
      }).setOrigin(0.5);

      // Level boxes
      const boxW = 96, boxH = 90, boxR = 10;
      const totalW = area.ids.length * boxW + (area.ids.length - 1) * 16;
      const startX = (CONFIG.WIDTH - totalW) / 2;

      area.ids.forEach((levelId, i) => {
        const bx = startX + i * (boxW + 16);
        const by = area.y + 35;

        // Check lock state: level 1 always unlocked, others need prev level stars > 0
        const isUnlocked = levelId === 1 || (levelStars[levelId - 1] || 0) > 0;
        const stars = levelStars[levelId] || 0;

        const bg = this.add.graphics();
        bg.fillStyle(isUnlocked ? 0xffffff : 0xddddcc, 0.9);
        bg.fillRoundedRect(bx, by, boxW, boxH, boxR);
        bg.lineStyle(2, isUnlocked ? area.color : 0xaaaaaa, isUnlocked ? 0.8 : 0.4);
        bg.strokeRoundedRect(bx, by, boxW, boxH, boxR);

        if (!isUnlocked) {
          this.add.text(bx + boxW / 2, by + boxH / 2 - 6, '🔒', { fontSize: '24px' }).setOrigin(0.5);
          this.add.text(bx + boxW / 2, by + boxH / 2 + 16, 'LV.' + levelId, {
            fontFamily: "'Arial Black', sans-serif",
            fontSize: '11px', color: '#aaaaaa',
          }).setOrigin(0.5);
        } else {
          // Level number
          this.add.text(bx + boxW / 2, by + 14, 'LV.' + levelId, {
            fontFamily: "'Arial Black', sans-serif",
            fontSize: '13px', color: '#333333',
            stroke: '#ffffff', strokeThickness: 2,
          }).setOrigin(0.5);

          // Level name
          const cfg = CONFIG.LEVELS[levelId - 1];
          this.add.text(bx + boxW / 2, by + 32, cfg.name, {
            fontFamily: 'Arial, sans-serif',
            fontSize: '10px', color: '#555544',
          }).setOrigin(0.5);

          // Star display
          const starStr = ['⭐','⭐','⭐'].map((s, si) => si < stars ? '⭐' : '☆').join('');
          this.add.text(bx + boxW / 2, by + 54, starStr, {
            fontSize: '14px',
          }).setOrigin(0.5);

          // Click zone
          const zone = this.add.zone(bx, by, boxW, boxH).setOrigin(0, 0).setInteractive({ useHandCursor: true });
          zone.on('pointerover', () => {
            bg.clear();
            bg.fillStyle(area.color, 0.2);
            bg.fillRoundedRect(bx, by, boxW, boxH, boxR);
            bg.lineStyle(3, area.color, 1);
            bg.strokeRoundedRect(bx, by, boxW, boxH, boxR);
          });
          zone.on('pointerout', () => {
            bg.clear();
            bg.fillStyle(0xffffff, 0.9);
            bg.fillRoundedRect(bx, by, boxW, boxH, boxR);
            bg.lineStyle(2, area.color, 0.8);
            bg.strokeRoundedRect(bx, by, boxW, boxH, boxR);
          });
          zone.on('pointerdown', () => {
            this.scene.start('GameScene', { mode: 'level', level: levelId });
          });
        }
      });
    });
  }

  drawBackButton() {
    const backTxt = this.add.text(14, CONFIG.HEIGHT - 22, '← 返回菜单', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px',
      color: '#888877',
      stroke: '#f5f0e0',
      strokeThickness: 2,
    });
    backTxt.setOrigin(0, 1);
    backTxt.setInteractive({ useHandCursor: true });
    backTxt.on('pointerover', () => backTxt.setColor('#444433'));
    backTxt.on('pointerout',  () => backTxt.setColor('#888877'));
    backTxt.on('pointerdown', () => { this.scene.start('MenuScene'); });
  }
}

// ─── CHAR SELECT SCENE ────────────────────────────────────────────────────────
class CharSelectScene extends Phaser.Scene {
  constructor() { super({ key: 'CharSelectScene' }); }

  create() {
    if (!this.textures.exists('coverBg')) {
      this.textures.addBase64('coverBg', COVER_IMG_BASE64);
      this.textures.once('addtexture-coverBg', () => this._buildScene());
    } else {
      this._buildScene();
    }
  }

  _buildScene() {
    this.drawBackground();
    this.drawTitle();
    this.drawCharGrid();
    this.drawBackButton();
  }

  drawBackground() {
    // Background image
    if (this.textures.exists('coverBg')) {
      const bg = this.add.image(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2, 'coverBg');
      bg.setDisplaySize(CONFIG.WIDTH, CONFIG.HEIGHT);
      bg.setAlpha(0.95);
    }
    // Dark overlay for readability
    const g = this.add.graphics();
    g.fillStyle(0x1a1520, 0.3);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
  }

  drawTitle() {
    const title = this.add.text(CONFIG.WIDTH / 2, 28, '👤 角色选择', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '28px',
      color: '#ffffff',
      stroke: '#ff2200',
      strokeThickness: 3,
      resolution: 2,
    });
    title.setOrigin(0.5);
    title.setAngle(-1);
  }

  drawCharGrid() {
    const save = loadSave();
    // DEBUG: unlock all characters for preview
    save.unlockedChars = CONFIG.CHARACTERS.map(c => c.id);
    writeSave(save);
    const unlockedChars = save.unlockedChars;
    const selectedChar  = save.selectedChar  || 'default';
    const levelStars    = save.levelStars    || {};
    const highScore     = save.highScore     || 0;
    const totalStars    = Object.values(levelStars).reduce((a, b) => a + b, 0);

    const cardW = 120, cardH = 150, cols = 3, rows = 2;
    const gapX = 20, gapY = 18;
    const totalW = cols * cardW + (cols - 1) * gapX;
    const startX = (CONFIG.WIDTH - totalW) / 2;
    const startY = 60;

    CONFIG.CHARACTERS.forEach((char, idx) => {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const cx = startX + col * (cardW + gapX);
      const cy = startY + row * (cardH + gapY);

      // Check unlock
      let isUnlocked = char.unlock === null || unlockedChars.indexOf(char.id) !== -1;
      if (!isUnlocked && char.unlock) {
        const u = char.unlock;
        if (u.type === 'level') {
          const maxLevel = Object.keys(levelStars).reduce((a, k) => {
            return (levelStars[k] || 0) > 0 ? Math.max(a, parseInt(k)) : a;
          }, 0);
          isUnlocked = maxLevel >= u.value;
        } else if (u.type === 'stars') {
          isUnlocked = totalStars >= u.value;
        } else if (u.type === 'score') {
          isUnlocked = highScore >= u.value;
        }
        if (isUnlocked) {
          unlockedChars.push(char.id);
          save.unlockedChars = unlockedChars;
          writeSave(save);
        }
      }

      const isSelected = selectedChar === char.id;
      const cardG = this.add.graphics();

      // Card background
      cardG.fillStyle(isUnlocked ? 0x222233 : 0x111122, 0.8);
      cardG.fillRoundedRect(cx, cy, cardW, cardH, 12);
      if (isSelected) {
        cardG.lineStyle(3, 0xffcc00, 1);
      } else {
        cardG.lineStyle(2, isUnlocked ? 0x555577 : 0x333344, 0.6);
      }
      cardG.strokeRoundedRect(cx, cy, cardW, cardH, 12);

      if (!isUnlocked) {
        // Locked card
        this.add.text(cx + cardW / 2, cy + 45, '🔒', { fontSize: '32px' }).setOrigin(0.5);
        this.add.text(cx + cardW / 2, cy + 82, char.name, {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '13px', color: '#777799', resolution: 2,
        }).setOrigin(0.5);

        let condText = '';
        if (char.unlock.type === 'level')  condText = '通关第' + char.unlock.value + '关';
        if (char.unlock.type === 'stars')  condText = '获得' + char.unlock.value + '颗星';
        if (char.unlock.type === 'score')  condText = '得分' + char.unlock.value;
        this.add.text(cx + cardW / 2, cy + 100, condText, {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '10px', color: '#666688', resolution: 2,
        }).setOrigin(0.5);
      } else {
        // Draw mini character
        this.drawMiniChar(cx + cardW / 2, cy + 48, char);

        // Name
        this.add.text(cx + cardW / 2, cy + 88, char.name, {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '14px', color: '#ffffff',
          stroke: '#000000', strokeThickness: 2, resolution: 2,
        }).setOrigin(0.5);

        // Title
        this.add.text(cx + cardW / 2, cy + 106, '「' + (char.title || '') + '」', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '11px', color: '#cc4400', resolution: 2,
        }).setOrigin(0.5);

        // Skill desc
        this.add.text(cx + cardW / 2, cy + 122, char.desc, {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '9px', color: '#aaaacc', resolution: 2,
          wordWrap: { width: cardW - 8 },
          align: 'center',
        }).setOrigin(0.5);

        // Selected marker
        if (isSelected) {
          this.add.text(cx + cardW / 2, cy + 138, '✔ 已选择', {
            fontFamily: "'Arial Black', sans-serif",
            fontSize: '11px', color: '#cc8800', resolution: 2,
          }).setOrigin(0.5);
        }

        // Click zone
        const zone = this.add.zone(cx, cy, cardW, cardH).setOrigin(0, 0).setInteractive({ useHandCursor: true });
        zone.on('pointerdown', () => {
          const sv = loadSave();
          sv.selectedChar = char.id;
          writeSave(sv);
          this.scene.restart();
        });
        zone.on('pointerover', () => {
          cardG.clear();
          cardG.fillStyle(0x333355, 0.9);
          cardG.fillRoundedRect(cx, cy, cardW, cardH, 12);
          cardG.lineStyle(2, isSelected ? 0xffcc00 : 0x8888bb, 0.9);
          cardG.strokeRoundedRect(cx, cy, cardW, cardH, 12);
        });
        zone.on('pointerout', () => {
          cardG.clear();
          cardG.fillStyle(0x222233, 0.8);
          cardG.fillRoundedRect(cx, cy, cardW, cardH, 12);
          cardG.lineStyle(isSelected ? 3 : 2, isSelected ? 0xffcc00 : 0x555577, isSelected ? 1 : 0.6);
          cardG.strokeRoundedRect(cx, cy, cardW, cardH, 12);
        });
      }
    });
  }

  drawMiniChar(cx, cy, char) {
    const g = this.add.graphics();
    const jerseyColor = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandColor   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const hairColor   = char.hair ? Phaser.Display.Color.HexStringToColor(char.hair).color : 0x222222;
    const hs = char.hairStyle || 'spike';

    // Body
    g.fillStyle(jerseyColor, 1);
    g.fillRect(cx - 10, cy - 14, 20, 18);
    // Jersey number
    this.add.text(cx, cy - 5, char.jersey || '', {
      fontFamily: "'Arial Black', sans-serif", fontSize: '8px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 1
    }).setOrigin(0.5);
    // Head
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(cx, cy - 22, 9);
    // Hair
    if (hs === 'spike') {
      g.fillStyle(hairColor, 1);
      for (let i = -2; i <= 2; i++) {
        g.fillTriangle(cx + i * 4 - 2, cy - 28, cx + i * 4 + 2, cy - 28, cx + i * 4, cy - 28 - 6 - Math.abs(i));
      }
    } else if (hs === 'long') {
      // 流川 — 碎发刺猬风 (小尺寸缩略图，两侧对称)
      g.fillStyle(hairColor, 1);
      g.fillEllipse(cx, cy - 26, 18, 7);
      const miniSpikes = [
        [-6,-28,-10,-36], [-3,-29,-4,-38], [0,-29,0,-39], [3,-29,4,-37], [6,-28,10,-35],
        [-9,-24,-14,-27], [9,-24,14,-27],
        [-8,-22,-12,-20], [8,-22,12,-20],
      ];
      for (const [x1, y1, x2, y2] of miniSpikes) {
        g.fillTriangle(cx + x1, cy + y1, cx + x2, cy + y2, cx + x1 + 2, cy + y1);
      }
    } else if (hs === 'buzz') {
      g.fillStyle(hairColor, 0.3);
      g.fillCircle(cx, cy - 24, 10);
    } else if (hs === 'short') {
      // 三井 — 偏分短发，右侧翘起
      g.fillStyle(hairColor, 1);
      g.fillEllipse(cx + 1, cy - 27, 20, 7);
      g.fillTriangle(cx + 8, cy - 29, cx + 12, cy - 33, cx + 11, cy - 25);
    } else if (hs === 'curly') {
      g.fillStyle(hairColor, 1);
      for (let i = -1; i <= 1; i++) g.fillCircle(cx + i * 5, cy - 28, 4);
      g.lineStyle(3, bandColor, 1);
      g.beginPath(); g.arc(cx, cy - 22, 9, -Math.PI * 0.8, -Math.PI * 0.1); g.strokePath();
    } else if (hs === 'tall') {
      g.fillStyle(hairColor, 1);
      g.fillTriangle(cx - 6, cy - 26, cx + 6, cy - 26, cx, cy - 40);
      g.fillEllipse(cx, cy - 26, 18, 6);
    }
    // Eyes
    g.fillStyle(0x333333, 1);
    g.fillCircle(cx - 3, cy - 24, 1.5);
    g.fillCircle(cx + 3, cy - 24, 1.5);
    // Legs
    g.lineStyle(3, 0x333333, 1);
    g.beginPath(); g.moveTo(cx - 4, cy + 4); g.lineTo(cx - 6, cy + 16); g.strokePath();
    g.beginPath(); g.moveTo(cx + 4, cy + 4); g.lineTo(cx + 6, cy + 16); g.strokePath();
    // Shoes
    g.fillStyle(0x111111, 1);
    g.fillEllipse(cx - 7, cy + 18, 10, 4);
    g.fillEllipse(cx + 7, cy + 18, 10, 4);
  }

  drawBackButton() {
    const backTxt = this.add.text(14, CONFIG.HEIGHT - 22, '← 返回菜单', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '14px', color: '#999999',
      stroke: '#000000', strokeThickness: 2,
      resolution: 2,
    });
    backTxt.setOrigin(0, 1);
    backTxt.setInteractive({ useHandCursor: true });
    backTxt.on('pointerover', () => {
      backTxt.setColor('#ffffff');
      this.tweens.add({ targets: backTxt, x: 18, duration: 150, ease: 'Quad.easeOut' });
    });
    backTxt.on('pointerout', () => {
      backTxt.setColor('#999999');
      this.tweens.add({ targets: backTxt, x: 14, duration: 120 });
    });
    backTxt.on('pointerdown', () => { this.scene.start('MenuScene'); });
  }
}

// ─── GAME SCENE ───────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }
  shutdown() {
    // Clean up DOM S button on scene exit
    if (this._sBtnDom) { this._sBtnDom.remove(); this._sBtnDom = null; }
  }

  // ── Init (receives mode data from scene transitions) ──────────────────────
  init(data) {
    this.gameMode     = data?.mode  || 'endless';
    this.currentLevel = data?.level || 1;

    // Load level config if in level mode
    if (this.gameMode === 'level') {
      this.levelConfig = CONFIG.LEVELS[this.currentLevel - 1] || CONFIG.LEVELS[0];
    } else {
      this.levelConfig = null;
    }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  initState() {
    this.score        = 0;
    this.combo        = 0;
    this.maxCombo     = 0;
    this.isShooting   = false;
    this.scored       = false;
    this.hitBackboard = false;
    this.swipeStart   = null;
    this.sCharging    = false;
    this.sChargeStart = 0;

    // Level mode state
    if (this.gameMode === 'level' && this.levelConfig) {

  // ── Preload ───────────────────────────────────────────────────────────────
  preload() {
    // Basketball texture generated via canvas
    const bCanvas = document.createElement('canvas');
    bCanvas.width = bCanvas.height = 56;
    const ctx = bCanvas.getContext('2d');

    // Orange gradient
    const grad = ctx.createRadialGradient(20, 18, 4, 28, 28, 28);
    grad.addColorStop(0, '#ffaa44');
    grad.addColorStop(0.6, '#ff8833');
    grad.addColorStop(1, '#cc5500');
    ctx.beginPath();
    ctx.arc(28, 28, 26, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Dark seam lines
    ctx.strokeStyle = '#442200';
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.moveTo(28, 3);
    ctx.bezierCurveTo(42, 14, 42, 42, 28, 53);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(28, 3);
    ctx.bezierCurveTo(14, 14, 14, 42, 28, 53);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, 28);
    ctx.bezierCurveTo(14, 16, 42, 16, 53, 28);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, 28);
    ctx.bezierCurveTo(14, 40, 42, 40, 53, 28);
    ctx.stroke();

    // Dark outline
    ctx.beginPath();
    ctx.arc(28, 28, 26, 0, Math.PI * 2);
    ctx.strokeStyle = '#331100';
    ctx.lineWidth = 2;
    ctx.stroke();

    this.textures.addCanvas('basketball', bCanvas);
  }

  // ── Create ────────────────────────────────────────────────────────────────
  create() {
    this.events.on('shutdown', this.shutdown, this);
    this.initState();
    this.drawBackground();
    this.drawHoop();
    this.createPhysicsBodies();
    this.loadCharacter();   // after physics bodies so bankBoost can apply
    this.drawPlayer();
    this.createTextures();
    this.createBall();
    this.setupInput();
    this.createHUD();
    this.startTimer();
    this.setupWeather();
    this.setupPowerUps();
    // Moving rim / obstacles from level config
    if (this.gameMode === 'level' && this.levelConfig) {
      if (this.levelConfig.rimMove) this.setupMovingRim();
      if (this.levelConfig.obstacles) this.setupObstacles();
    }

    // Start BGM
    soundManager.startBGM();
  }

  // ── Background ────────────────────────────────────────────────────────────
  drawBackground() {
    // Determine area
    let area = 'street';
    if (this.gameMode === 'level' && this.levelConfig) {
      area = this.levelConfig.area || 'street';
    } else if (this.gameMode === 'endless') {
      const areas = ['street', 'park', 'rooftop', 'beach', 'gym', 'sunset'];
      area = areas[Math.floor(Math.random() * areas.length)];
    }
    this.currentArea = area;

    const g = this.add.graphics();

    // Paper fill
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    // Notebook lines (faint blue)
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    // Red margin line
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();

    // Area-specific wall/background
    if (area === 'street') {
      this._drawStreetBackground(g);
    } else if (area === 'park') {
      this._drawParkBackground(g);
    } else if (area === 'rooftop') {
      this._drawRooftopBackground(g);
    } else if (area === 'beach') {
      this._drawBeachBackground(g);
    } else if (area === 'gym') {
      this._drawGymBackground(g);
    } else if (area === 'sunset') {
      this._drawSunsetBackground(g);
    }

    // Ground (shared)
    g.fillStyle(0x8B7355, 1);
    g.fillRect(0, CONFIG.GROUND_Y, CONFIG.WIDTH, CONFIG.HEIGHT - CONFIG.GROUND_Y);
    g.lineStyle(3, 0x5a4a30, 1);
    g.beginPath(); g.moveTo(0, CONFIG.GROUND_Y); g.lineTo(CONFIG.WIDTH, CONFIG.GROUND_Y); g.strokePath();

    // Ground texture lines
    g.lineStyle(1, 0x7a6345, 0.5);
    for (let x = 0; x < CONFIG.WIDTH; x += 15) {
      g.beginPath();
      g.moveTo(x, CONFIG.GROUND_Y + 4);
      g.lineTo(x + 8, CONFIG.HEIGHT);
      g.strokePath();
    }

    // 2-point line (250px from rim) and 3-point line (400px from rim)
    const rimX = 606;
    const lineY = CONFIG.GROUND_Y;

    // 2-point line
    g.lineStyle(2.5, 0xffffff, 0.3);
    g.beginPath();
    g.moveTo(rimX - 250, lineY);
    g.lineTo(rimX - 250, lineY - 8);
    g.strokePath();
    g.lineStyle(1.5, 0xffffff, 0.2);
    g.beginPath();
    g.arc(rimX, lineY, 250, Math.PI, Math.PI * 0.8, true);
    g.strokePath();

    this.add.text(rimX - 250 + 6, lineY + 4, '2分', {
      fontFamily: 'Arial, sans-serif', fontSize: '10px', color: '#ffffff', alpha: 0.3
    });

    // 3-point line
    g.lineStyle(2.5, 0xffffff, 0.35);
    g.beginPath();
    g.moveTo(rimX - 400, lineY);
    g.lineTo(rimX - 400, lineY - 8);
    g.strokePath();
    g.lineStyle(1.5, 0xffffff, 0.25);
    g.beginPath();
    g.arc(rimX, lineY, 400, Math.PI, Math.PI * 0.85, true);
    g.strokePath();

    this.add.text(rimX - 400 + 6, lineY + 4, '3分', {
      fontFamily: 'Arial, sans-serif', fontSize: '10px', color: '#ffffff', alpha: 0.35
    });
  }

  // ── Hoop ──────────────────────────────────────────────────────────────────
  drawHoop() {
    const g = this.add.graphics();
    this.staticHoopGfx = g;
    const POLE_X   = 650;
    const RIM_Y    = 185;
    const RIM_W    = 60;
    const BOARD_W  = 16;
    const BOARD_H  = 75;
    const BOARD_X  = POLE_X - BOARD_W / 2;
    const BOARD_Y  = RIM_Y - 90;
    const RIM_CX   = BOARD_X - RIM_W / 2;

    // Pole — thick dark gray, from ground up to backboard
    g.fillStyle(0x555555);
    g.fillRect(POLE_X - 3, BOARD_Y, 8, CONFIG.GROUND_Y - BOARD_Y);
    g.lineStyle(2, 0x333333);
    g.strokeRect(POLE_X - 3, BOARD_Y, 8, CONFIG.GROUND_Y - BOARD_Y);

    // Backboard — white with thick border
    g.fillStyle(0xffffff);
    g.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
    g.lineStyle(3, 0x222222);
    g.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);

    // Inner target square on backboard (red)
    g.lineStyle(2, 0xee2222, 0.9);
    g.strokeRect(BOARD_X + 3, BOARD_Y + BOARD_H * 0.25, BOARD_W - 6, BOARD_H * 0.4);

    // Rim bracket (short connector from backboard to rim)
    g.lineStyle(4, 0xdd2200);
    g.beginPath();
    g.moveTo(BOARD_X, RIM_Y);
    g.lineTo(RIM_CX + RIM_W / 2, RIM_Y);
    g.strokePath();

    // Rim — bright orange-red, thick and visible
    g.lineStyle(6, 0xff4400);
    g.beginPath();
    g.moveTo(RIM_CX - RIM_W / 2, RIM_Y);
    g.lineTo(RIM_CX + RIM_W / 2, RIM_Y);
    g.strokePath();
    // Rim end caps
    g.fillStyle(0xff4400);
    g.fillCircle(RIM_CX - RIM_W / 2, RIM_Y, 5);
    g.fillCircle(RIM_CX + RIM_W / 2, RIM_Y, 5);

    // Net — white threads with tapered shape
    const netTop = RIM_Y + 5;
    const netBot = RIM_Y + 42;
    const netSegments = 8;
    g.lineStyle(1.5, 0xffffff, 0.7);
    for (let i = 0; i <= netSegments; i++) {
      const topX = (RIM_CX - RIM_W / 2) + (RIM_W * i / netSegments);
      const taper = 6;
      const botX = (RIM_CX - RIM_W / 2 + taper) + ((RIM_W - taper * 2) * i / netSegments);
      const wobble = Math.sin(i * 1.5) * 2;
      g.beginPath();
      g.moveTo(topX, netTop);
      g.lineTo(botX + wobble, netBot);
      g.strokePath();
    }
    // Horizontal net rungs
    g.lineStyle(1, 0xffffff, 0.5);
    for (let row = 1; row <= 3; row++) {
      const t = row / 4;
      const ry = netTop + (netBot - netTop) * t;
      const shrink = row * 3;
      g.beginPath();
      g.moveTo(RIM_CX - RIM_W / 2 + shrink, ry);
      g.lineTo(RIM_CX + RIM_W / 2 - shrink, ry);
      g.strokePath();
    }

    this.hoopGeom = { RIM_CX, RIM_Y, RIM_W, BOARD_X, BOARD_Y, BOARD_W, BOARD_H, POLE_X };
  }

  drawWobblyLine(g, x1, y1, x2, y2, segments) {
    const pts = [];
    for (let i = 0; i <= segments; i++) {
      const t = i / segments;
      const wx = x1 + (x2 - x1) * t + (i > 0 && i < segments ? (Math.random() - 0.5) * 3 : 0);
      const wy = y1 + (y2 - y1) * t + (i > 0 && i < segments ? (Math.random() - 0.5) * 3 : 0);
      pts.push({ x: wx, y: wy });
    }
    g.beginPath();
    g.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) g.lineTo(pts[i].x, pts[i].y);
    g.strokePath();
  }

  drawWobblyRect(g, x, y, w, h, wobble) {
    const r = wobble;
    g.beginPath();
    g.moveTo(x + (Math.random() - 0.5) * r,     y + (Math.random() - 0.5) * r);
    g.lineTo(x + w + (Math.random() - 0.5) * r, y + (Math.random() - 0.5) * r);
    g.lineTo(x + w + (Math.random() - 0.5) * r, y + h + (Math.random() - 0.5) * r);
    g.lineTo(x + (Math.random() - 0.5) * r,     y + h + (Math.random() - 0.5) * r);
    g.closePath();
    g.strokePath();
  }

  // ── Moving Rim ────────────────────────────────────────────────────────────
  setupMovingRim() {
    this.rimMoving    = true;
    this.rimBaseX     = this.hoopGeom.RIM_CX;
    this.rimMoveRange = 40;
    this.rimMoveSpeed = 0.02;
    this.rimMovePhase = 0;

    // Destroy static hoop and replace with animated graphics layer
    if (this.staticHoopGfx) { this.staticHoopGfx.destroy(); this.staticHoopGfx = null; }
    this.hoopGraphics = this.add.graphics().setDepth(2);
  }

  updateMovingRim() {
    if (!this.rimMoving) return;
    this.rimMovePhase += this.rimMoveSpeed;
    const offsetX = Math.sin(this.rimMovePhase) * this.rimMoveRange;
    const newRimCX = this.rimBaseX + offsetX;
    this.redrawHoopAt(newRimCX);
  }

  redrawHoopAt(rimCX) {
    if (!this.hoopGraphics) return;
    const g = this.hoopGraphics;
    g.clear();

    const { RIM_Y, RIM_W, BOARD_W, BOARD_H, POLE_X } = this.hoopGeom;
    // Compute new board position based on offset from original
    const origRimCX = this.hoopGeom.RIM_CX;
    const delta = rimCX - origRimCX;
    const BOARD_X = this.hoopGeom.BOARD_X + delta;
    const BOARD_Y = this.hoopGeom.BOARD_Y;

    // Rim shake Y offset
    let rimShake = 0;
    if (this.gameMode === 'level' && this.levelConfig && this.levelConfig.rimShake) {
      rimShake = Math.sin(Date.now() * 0.01) * 3;
    }
    const rimY = RIM_Y + rimShake;

    // Pole
    g.lineStyle(5, 0x555544, 1);
    g.beginPath();
    g.moveTo(POLE_X + delta, CONFIG.GROUND_Y);
    g.lineTo(POLE_X + delta + 2, rimY + 10);
    g.strokePath();

    // Backboard
    g.fillStyle(0xfafaf5, 1);
    g.fillRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
    g.lineStyle(3, 0x333322, 1);
    g.strokeRect(BOARD_X, BOARD_Y, BOARD_W, BOARD_H);
    g.lineStyle(1.5, 0xcc3333, 0.8);
    g.strokeRect(BOARD_X + 2, BOARD_Y + BOARD_H * 0.3, BOARD_W - 4, BOARD_H * 0.35);

    // Rim arm
    g.lineStyle(4, 0xcc2200, 1);
    g.beginPath();
    g.moveTo(BOARD_X, rimY);
    g.lineTo(rimCX - RIM_W * 0.5 + 4, rimY);
    g.strokePath();

    // Rim
    g.lineStyle(5, 0xff3300, 1);
    g.beginPath();
    g.moveTo(rimCX - RIM_W / 2, rimY);
    g.lineTo(rimCX + RIM_W / 2, rimY);
    g.strokePath();
    g.fillStyle(0xff3300, 1);
    g.fillCircle(rimCX - RIM_W / 2, rimY, 5);
    g.fillCircle(rimCX + RIM_W / 2, rimY, 5);

    // Net
    g.lineStyle(1.5, 0xf5f0e0, 0.85);
    const netTop = rimY + 4;
    const netBot = rimY + 38;
    const netSegments = 7;
    for (let i = 0; i <= netSegments; i++) {
      const nx = (rimCX - RIM_W / 2) + (RIM_W * i / netSegments);
      const wobble = Math.sin(i * 1.3) * 3;
      g.beginPath();
      g.moveTo(nx, netTop);
      g.lineTo(nx + wobble, netBot);
      g.strokePath();
    }
    for (let row = 1; row <= 3; row++) {
      const ry = netTop + (netBot - netTop) * row / 4;
      const shrink = row * 2;
      g.beginPath();
      g.moveTo(rimCX - RIM_W / 2 + shrink, ry);
      g.lineTo(rimCX + RIM_W / 2 - shrink, ry);
      g.strokePath();
    }

    // Update physics bodies to follow visual position
    const sz = this.scoreZoneBody;
    if (sz) {
      sz.body.reset(rimCX, RIM_Y + rimShake + 14);
      sz.refreshBody();
    }
    // No static bodies to update — manual collision in updateHoopCollision() uses hoopGeom directly
  }

  // ── Obstacles ─────────────────────────────────────────────────────────────
  setupObstacles() {
    this._scheduleNextObstacle();
  }

  _scheduleNextObstacle() {
    const delay = Phaser.Math.Between(5000, 8000);
    this.obstacleTimer = this.time.delayedCall(delay, () => {
      if (!this.isGameOver) {
        this.spawnObstacle();
        this._scheduleNextObstacle();
      }
    });
  }

  spawnObstacle() {
    const spawnY = Phaser.Math.Between(100, 250);
    const goLeft = Math.random() > 0.5;
    const spawnX = goLeft ? CONFIG.WIDTH + 20 : -20;
    const velX   = goLeft ? -Phaser.Math.Between(80, 150) : Phaser.Math.Between(80, 150);

    const bird = this.add.text(spawnX, spawnY, '🐦', {
      fontSize: '28px',
    }).setOrigin(0.5).setDepth(7);
    bird.setFlipX(goLeft ? false : true);

    const birdBody = this.physics.add.staticGroup();
    const bz = birdBody.create(spawnX, spawnY, null);
    bz.setVisible(false);
    bz.body.setSize(24, 24);
    bz.refreshBody();

    const obstacleObj = { text: bird, physGroup: birdBody, velX, alive: true };
    this.obstacles.push(obstacleObj);

    // Move the bird manually in update via stored velocity
    obstacleObj._startX = spawnX;
    obstacleObj._startTime = this.time.now;

    // Collide with ball
    if (this.ball && this.ball.active) {
      const oc = this.physics.add.overlap(this.ball, birdBody, () => {
        if (!obstacleObj.alive) return;
        // Deflect ball downward
        if (this.ball && this.ball.body) {
          this.ball.body.velocity.y += 50;
        }
        this._destroyObstacle(obstacleObj);
      });
      this.ballColliders.push(oc);
    }

    // Auto-destroy after 8 seconds
    this.time.delayedCall(8000, () => {
      if (obstacleObj.alive) this._destroyObstacle(obstacleObj);
    });
  }

  _destroyObstacle(obs) {
    if (!obs.alive) return;
    obs.alive = false;
    if (obs.text)       obs.text.destroy();
    if (obs.physGroup)  obs.physGroup.clear(true, true);
    const idx = this.obstacles.indexOf(obs);
    if (idx >= 0) this.obstacles.splice(idx, 1);
  }

  cleanupObstacles() {
    if (this.obstacleTimer) { this.obstacleTimer.remove(); this.obstacleTimer = null; }
    this.obstacles.slice().forEach(obs => this._destroyObstacle(obs));
    this.obstacles = [];
  }

  // ── Player ────────────────────────────────────────────────────────────────
  drawPlayer() {
    this.playerGfx = this.add.graphics();
    // Use levelConfig playerX if available; 0 means random
    let px = 380;
    if (this.levelConfig) {
      px = this.levelConfig.playerX || 380;
      if (this.levelConfig.randomPos) px = Phaser.Math.Between(280, 480);
    }
    this.playerX   = px;
    this.playerY   = CONFIG.GROUND_Y - 4;
    this.redrawPlayer(this.playerX, this.playerY, false);
  }

  redrawPlayer(px, py, shooting) {
    const g = this.playerGfx;
    g.clear();
    // Destroy previous jersey number text to prevent accumulation
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    // Char colors
    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    // Darken jersey for outline: mix with black
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Shadow
    g.fillStyle(0x000000, 0.15);
    g.fillEllipse(px, py, 44, 10);

    // Legs
    g.lineStyle(3.5, 0x222222, 1);
    if (shooting) {
      // Shooting: legs together, toes pointed (in air)
      g.beginPath(); g.moveTo(px - 4, torsoB); g.lineTo(px - 6, legBot - 4); g.strokePath();
      g.beginPath(); g.moveTo(px + 4, torsoB); g.lineTo(px + 2, legBot - 4); g.strokePath();
      g.fillStyle(0x111111, 1);
      g.fillEllipse(px - 7, legBot - 2, 14, 5);
      g.fillEllipse(px + 1, legBot - 2, 14, 5);
    } else {
      // Idle: standing
      g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px - 10, legBot); g.strokePath();
      g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px + 6, legBot); g.strokePath();
      g.fillStyle(0x111111, 1);
      g.fillEllipse(px - 12, legBot + 2, 16, 6);
      g.fillEllipse(px + 4, legBot + 2, 16, 6);
    }

    // Jersey body
    g.fillStyle(jerseyHex, 1);
    g.fillRect(px - 14, torsoT, 28, torsoB - torsoT);
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokeRect(px - 14, torsoT, 28, torsoB - torsoT);

    // Jersey number — offset by jumpOffset when in air
    const jOff = this.jumpOffset || 0;
    this.jerseyNumTxt = this.add.text(px, torsoT + (torsoB - torsoT) / 2 - jOff, char.jersey || '23', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 2
    });
    this.jerseyNumTxt.setOrigin(0.5);

    // Non-shooting arm
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath();
    g.moveTo(px - 14, torsoT + 8);
    g.lineTo(px - 26, torsoT + 24);
    g.strokePath();

    // Shooting arm
    if (shooting) {
      // Upper arm
      g.lineStyle(3.5, 0xffcc99, 1);
      g.beginPath();
      g.moveTo(px + 14, torsoT + 6);
      g.lineTo(px + 22, torsoT - 10);
      g.strokePath();
      // Forearm (follow-through, wrist flick)
      g.lineStyle(3, 0xffcc99, 1);
      g.beginPath();
      g.moveTo(px + 22, torsoT - 10);
      g.lineTo(px + 30, torsoT - 28);
      g.strokePath();
      // Hand (open, flicking)
      g.fillStyle(0xffcc99, 1);
      g.fillCircle(px + 30, torsoT - 30, 4);
      // Fingers spread
      g.lineStyle(1.5, 0xffcc99, 1);
      g.beginPath(); g.moveTo(px + 30, torsoT - 32); g.lineTo(px + 28, torsoT - 38); g.strokePath();
      g.beginPath(); g.moveTo(px + 30, torsoT - 32); g.lineTo(px + 32, torsoT - 38); g.strokePath();
      g.beginPath(); g.moveTo(px + 31, torsoT - 31); g.lineTo(px + 36, torsoT - 35); g.strokePath();
    } else {
      // Idle: arm holding ball at side
      g.lineStyle(3, 0xffcc99, 1);
      g.beginPath();
      g.moveTo(px + 14, torsoT + 8);
      g.lineTo(px + 24, torsoT + 20);
      g.strokePath();
    }

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath();
    g.moveTo(px, torsoT);
    g.lineTo(px, headY + 14);
    g.strokePath();

    // Head
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px, headY + 7, 14);

    // Eyes
    g.fillStyle(0x333333, 1);
    g.fillCircle(px - 5, headY + 4, 2.5);
    g.fillCircle(px + 5, headY + 4, 2.5);

    // Smile
    g.lineStyle(2, 0x553322, 1);
    g.beginPath();
    g.arc(px, headY + 13, 5, 0.2, Math.PI - 0.2);
    g.strokePath();

    // Hair based on character style (golden in Beast Mode)
    const hairColor = this.isBeastMode ? 0xffdd00 : (char.hair ? Phaser.Display.Color.HexStringToColor(char.hair).color : 0x222222);
    const hs = char.hairStyle || 'spike';
    if (hs === 'spike') {
      // 樱木 — 红色刺猬头
      g.fillStyle(hairColor, 1);
      for (let i = -3; i <= 3; i++) {
        const sx = px + i * 5;
        const sh = 10 + Math.abs(i) * 2;
        g.fillTriangle(sx - 3, headY - 4, sx + 3, headY - 4, sx, headY - 4 - sh);
      }
    } else if (hs === 'long') {
      // 流川 — 碎发刺猬风，细密发丝向四周散射（两侧对称）
      // 头圆心在 headY+7, 半径14, 所以头顶≈headY-7
      g.fillStyle(hairColor, 1);
      const hcY = headY + 7; // head center Y
      g.fillEllipse(px, hcY - 10, 30, 10); // 发根基底贴头顶
      const spikes = [
        // 头顶发丝（向上散射）
        [-8,-14,-13,-26,-6,-15],
        [-4,-15,-7,-30,-2,-16],
        [0,-16,-1,-32,2,-16],
        [4,-15,6,-30,6,-16],
        [8,-14,13,-26,10,-15],
        // 左侧短刘海（到眉毛位置，不遮脸）
        [-12,-10,-19,-14,-13,-7],
        [-13,-6,-20,-6,-14,-2],
        [-13,-2,-18,2,-11,1],
        // 右侧短刘海（对称）
        [12,-10,19,-14,13,-7],
        [13,-6,20,-6,14,-2],
        [13,-2,18,2,11,1],
      ];
      for (const [x1, y1, x2, y2, x3, y3] of spikes) {
        g.fillTriangle(px + x1, hcY + y1, px + x2, hcY + y2, px + x3, hcY + y3);
      }
    } else if (hs === 'buzz') {
      // 赤木 — 光头/板寸，体型大
      g.fillStyle(hairColor, 0.3);
      g.fillCircle(px, headY + 4, 15);
    } else if (hs === 'short') {
      // 三井 — 向后梳的偏分短发
      g.fillStyle(hairColor, 1);
      g.fillEllipse(px + 2, headY - 3, 30, 12);
      // 右侧翘起
      g.fillTriangle(px + 12, headY - 6, px + 18, headY - 10, px + 16, headY);
    } else if (hs === 'curly') {
      // 宫城 — 棕色卷发 + 头带
      g.fillStyle(hairColor, 1);
      for (let i = -2; i <= 2; i++) {
        g.fillCircle(px + i * 6, headY - 4, 6);
      }
      g.lineStyle(4, bandHex, 1);
      g.beginPath();
      g.arc(px, headY + 7, 14, -Math.PI * 0.8, -Math.PI * 0.1);
      g.strokePath();
    } else if (hs === 'tall') {
      // 仙道 — 竖起的高发型
      g.fillStyle(hairColor, 1);
      g.fillTriangle(px - 10, headY - 2, px + 10, headY - 2, px, headY - 22);
      g.fillEllipse(px, headY - 2, 28, 10);
    }
  }

  // Dribble pose: walking legs + hand following ball bounce
  // facing: 1=right, -1=left. bounce: 0=ball at ground, 1=ball at waist
  redrawPlayerDribble(px, py, facing, bounce) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;
    const f = facing;

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Walking legs — alternate stride based on dribbleTime
    const stride = Math.sin((this.dribbleTime || 0) * 0.35) * 10;
    g.lineStyle(3.5, 0x222222, 1);
    // Front leg
    g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px + f * stride, legBot); g.strokePath();
    // Back leg
    g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px - f * stride, legBot); g.strokePath();
    // Shoes
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px + f * stride - 2, legBot + 2, 16, 6);
    g.fillEllipse(px - f * stride - 2, legBot + 2, 16, 6);

    // Shadow
    g.fillStyle(0x000000, 0.15);
    g.fillEllipse(px, py, 44, 10);

    // Slight forward lean
    const lean = f * 3;

    // Jersey body
    g.fillStyle(jerseyHex, 1);
    g.fillRect(px + lean - 14, torsoT, 28, torsoB - torsoT);
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokeRect(px + lean - 14, torsoT, 28, torsoB - torsoT);

    // Jersey number
    this.jerseyNumTxt = this.add.text(px + lean, torsoT + (torsoB - torsoT) / 2, char.jersey || '23', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 2
    });
    this.jerseyNumTxt.setOrigin(0.5);

    // Non-dribbling arm (swinging opposite to legs)
    const armSwing = Math.sin((this.dribbleTime || 0) * 0.35) * 8;
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath();
    g.moveTo(px + lean - f * 14, torsoT + 8);
    g.lineTo(px + lean - f * 22, torsoT + 22 + armSwing);
    g.strokePath();

    // Dribbling arm — follows ball bounce
    const handY = py - 10 - bounce * 50 + 5; // slightly above ball
    g.lineStyle(3.5, 0xffcc99, 1);
    // Upper arm
    g.beginPath();
    g.moveTo(px + lean + f * 14, torsoT + 8);
    g.lineTo(px + lean + f * 18, (torsoT + 8 + handY) / 2);
    g.strokePath();
    // Forearm
    g.beginPath();
    g.moveTo(px + lean + f * 18, (torsoT + 8 + handY) / 2);
    g.lineTo(px + f * 20, handY);
    g.strokePath();
    // Hand
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + f * 20, handY, 3.5);

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px + lean, torsoT); g.lineTo(px + lean, headY + 14); g.strokePath();

    // Head (slightly tilted forward)
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + lean, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px + lean, headY + 7, 14);

    // Eyes — looking in movement direction
    g.fillStyle(0x333333, 1);
    g.fillCircle(px + lean - 5 + f * 2, headY + 4, 2.5);
    g.fillCircle(px + lean + 5 + f * 2, headY + 4, 2.5);

    // Focused expression
    g.lineStyle(1.5, 0x553322, 1);
    g.beginPath();
    g.arc(px + lean, headY + 9, 4, 0.1, Math.PI - 0.1);
    g.strokePath();

    // Hair (reuse styles, golden in Beast Mode)
    const hairColor = this.isBeastMode ? 0xffdd00 : (char.hair ? Phaser.Display.Color.HexStringToColor(char.hair).color : 0x222222);
    const hs = char.hairStyle || 'spike';
    const hx = px + lean;
    if (hs === 'spike') {
      g.fillStyle(hairColor, 1);
      for (let i = -3; i <= 3; i++) {
        const sx = hx + i * 5;
        const sh = 10 + Math.abs(i) * 2;
        g.fillTriangle(sx - 3, headY - 4, sx + 3, headY - 4, sx, headY - 4 - sh);
      }
    } else if (hs === 'long') {
      // 流川 — 碎发刺猬风（运球时随方向飘动）
      g.fillStyle(hairColor, 1);
      const fw = f * 3;
      const hcY2 = headY + 7;
      g.fillEllipse(hx, hcY2 - 10, 30, 10);
      const dribSpikes = [
        [-8,-14,-13,-26,-6,-15],[-4,-15,-7,-30,-2,-16],[0,-16,-1,-32,2,-16],
        [4,-15,6,-30,6,-16],[8,-14,13,-26,10,-15],
        [-12,-10,-19,-14,-13,-7],[-13,-6,-20,-6,-14,-2],[-13,-2,-18,2,-11,1],
        [12,-10,19,-14,13,-7],[13,-6,20,-6,14,-2],[13,-2,18,2,11,1],
      ];
      for (const [x1, y1, x2, y2, x3, y3] of dribSpikes) {
        g.fillTriangle(hx + x1 + fw * 0.3, hcY2 + y1, hx + x2 + fw, hcY2 + y2, hx + x3 + fw * 0.3, hcY2 + y3);
      }
    } else if (hs === 'buzz') {
      g.fillStyle(hairColor, 0.3);
      g.fillCircle(hx, headY + 4, 15);
    } else if (hs === 'short') {
      g.fillStyle(hairColor, 1);
      g.fillEllipse(hx + 2, headY - 3, 30, 12);
      g.fillTriangle(hx + 12, headY - 6, hx + 18, headY - 10, hx + 16, headY);
    } else if (hs === 'curly') {
      g.fillStyle(hairColor, 1);
      for (let i = -2; i <= 2; i++) g.fillCircle(hx + i * 6, headY - 4, 6);
      g.lineStyle(4, bandHex, 1);
      g.beginPath(); g.arc(hx, headY + 7, 14, -Math.PI * 0.8, -Math.PI * 0.1); g.strokePath();
    } else if (hs === 'tall') {
      g.fillStyle(hairColor, 1);
      g.fillTriangle(hx - 10, headY - 2, hx + 10, headY - 2, hx, headY - 22);
      g.fillEllipse(hx, headY - 2, 28, 10);
    }

    // Headband
    g.lineStyle(3.5, bandHex, 1);
    g.beginPath();
    g.arc(hx, headY + 7, 14, -Math.PI * 0.85, -Math.PI * 0.15);
    g.strokePath();
  }

  // ── Physics Bodies ────────────────────────────────────────────────────────
  createPhysicsBodies() {
    const { RIM_CX, RIM_Y, RIM_W, BOARD_X, BOARD_Y, BOARD_W, BOARD_H } = this.hoopGeom;

    // Ground
    this.ground = this.physics.add.staticGroup();
    const groundBody = this.ground.create(CONFIG.WIDTH / 2, CONFIG.GROUND_Y + 20, null);
    groundBody.setVisible(false);
    groundBody.body.setSize(CONFIG.WIDTH, 40);
    groundBody.refreshBody();

    // Score zone (sensor) — for detecting scoring
    this.scoreZone = this.physics.add.staticGroup();
    const sz = this.scoreZone.create(RIM_CX, RIM_Y + 16, null);
    sz.setVisible(false);
    sz.body.setSize(RIM_W + 8, 24);
    sz.refreshBody();
    this.scoreZoneBody = sz;
    this.defaultScoreZoneW = RIM_W + 8;

    // Manual collision system — no more static bodies for backboard/rim
    // All collision handled in updateHoopCollision() each frame
    this.backboard = null;
    this.rimLeft = null;
    this.rimRight = null;
    this.backboardBody = null;
    this.defaultBackboardW = 4;
    // Collision cooldown to prevent rapid bouncing
    this.hoopCollisionCooldown = 0;
  }

  // ── Colliders ─────────────────────────────────────────────────────────────
  setupHoopColliders() {
    if (!this.ball || !this.ball.active) return;

    this.ballColliders.forEach(c => { if (c) this.physics.world.removeCollider(c); });
    this.ballColliders = [];

    this.groundBounceCount = 0;
    const gc = this.physics.add.collider(this.ball, this.ground, () => {
      if (!this.isShooting) return;
      this.groundBounceCount++;
      if (this.groundBounceCount >= 3) {
        this.onMiss();
      }
      // Let ball bounce naturally (bounce is set on ball body)
    });
    this.ballColliders.push(gc);

    const sc = this.physics.add.overlap(this.ball, this.scoreZone, () => {
      if (!this.isShooting || this.scored) return;
      // Ball must be moving downward AND must have passed above the rim opening first
      if (this.ball.body.velocity.y > 0 && this.ballPassedRimTop) {
        this.onScore();
      }
    });
    this.ballColliders.push(sc);

    // Power-up collection overlap (set up if powerUpZone exists)
    this._setupPowerUpOverlap();
  }

  _setupPowerUpOverlap() {
    if (!this.powerUpZone || !this.ball || !this.ball.active) return;
    const pc = this.physics.add.overlap(this.ball, this.powerUpZone, () => {
      if (!this.powerUpSprite) return;
      const type = this.powerUpSprite.puType;
      this.collectPowerUp(type);
    });
    this.ballColliders.push(pc);
  }

  // ── Character Loading ─────────────────────────────────────────────────────
  loadCharacter() {
    const save = loadSave();
    const id = save.selectedChar || 'default';
    this.charConfig = CONFIG.CHARACTERS.find(c => c.id === id) || CONFIG.CHARACTERS[0];

    // bigMan (赤木): bigger ball and bigger hoop
    if (this.charConfig.skill === 'bigMan') {
      if (this.ball) this.ball.setDisplaySize(38, 38);
