      if (this.scoreZoneBody) {
        this.scoreZoneBody.body.setSize(this.defaultScoreZoneW + 16, 28);
        this.scoreZoneBody.refreshBody();
      }
    }

    // threePoint (三井): dynamic — activates beyond 3pt line
    this.threePointActive = false;

    // speed (宫城): faster movement and higher jumps
    this.speedActive = this.charConfig.skill === 'speed';
  }

  checkUnlocks() {
    const save = loadSave();
    const unlockedChars = save.unlockedChars || ['default'];
    const levelStars    = save.levelStars    || {};
    const highScore     = save.highScore     || 0;
    const totalStars    = Object.values(levelStars).reduce((a, b) => a + b, 0);
    let changed = false;

    CONFIG.CHARACTERS.forEach(char => {
      if (!char.unlock || unlockedChars.indexOf(char.id) !== -1) return;
      const u = char.unlock;
      let unlocked = false;
      if (u.type === 'level') {
        const maxLevel = Object.keys(levelStars).reduce((a, k) => {
          return (levelStars[k] || 0) > 0 ? Math.max(a, parseInt(k)) : a;
        }, 0);
        unlocked = maxLevel >= u.value;
      } else if (u.type === 'stars') {
        unlocked = totalStars >= u.value;
      } else if (u.type === 'score') {
        unlocked = highScore >= u.value;
      }
      if (unlocked) { unlockedChars.push(char.id); changed = true; }
    });

    if (changed) {
      save.unlockedChars = unlockedChars;
      writeSave(save);
    }
  }

  // ── Power-Up System ────────────────────────────────────────────────────────
  setupPowerUps() {
    // Nothing extra needed — state already init'd in initState
  }

  trySpawnPowerUp() {
    if (this.powerUpSprite) return;
    if (this.basketCount < this.nextPowerUpAt) return;

    const keys = Object.keys(CONFIG.POWERUPS);
    const type = keys[Phaser.Math.Between(0, keys.length - 1)];
    const cfg  = CONFIG.POWERUPS[type];
    const targetX = Phaser.Math.Between(180, 480);
    const targetY = Phaser.Math.Between(120, 200);
    const glowColor = Phaser.Display.Color.HexStringToColor(cfg.color).color;

    // Glow circle (starts above screen)
    this.powerUpGlow = this.add.graphics().setDepth(12);
    this.powerUpGlow.fillStyle(glowColor, 0.4);
    this.powerUpGlow.fillCircle(0, 0, 50);
    this.powerUpGlow.x = targetX;
    this.powerUpGlow.y = -50;

    // Large icon
    this.powerUpSprite = this.add.text(targetX, -50, cfg.icon, {
      fontSize: '44px',
    }).setOrigin(0.5).setDepth(13);
    this.powerUpSprite.puType = type;

    // Falling trail
    const trailGfx = this.add.graphics().setDepth(11);
    const trailParts = [];
    const fallDur = 800;
    const startT = this.time.now;

    // Fall animation with oscillation
    this.powerUpFallTimer = this.time.addEvent({
      delay: 16, loop: true,
      callback: () => {
        const elapsed = this.time.now - startT;
        const t = Math.min(elapsed / fallDur, 1);
        // Bounce ease out
        let easeT;
        if (t < 0.3636) { easeT = 7.5625 * t * t; }
        else if (t < 0.7273) { const t2 = t - 0.5455; easeT = 7.5625 * t2 * t2 + 0.75; }
        else if (t < 0.9091) { const t2 = t - 0.8182; easeT = 7.5625 * t2 * t2 + 0.9375; }
        else { const t2 = t - 0.9545; easeT = 7.5625 * t2 * t2 + 0.984375; }

        const cy = -50 + (targetY + 50) * easeT;
        const cx = targetX + Math.sin(t * Math.PI * 3) * 20 * (1 - t);

        if (this.powerUpSprite) { this.powerUpSprite.x = cx; this.powerUpSprite.y = cy; }
        if (this.powerUpGlow)   { this.powerUpGlow.x = cx; this.powerUpGlow.y = cy; }

        // Trail particles
        if (t < 1) {
          trailParts.push({ x: cx, y: cy, alpha: 0.6, size: 6 + Math.random() * 4 });
        }

        trailGfx.clear();
        for (let i = trailParts.length - 1; i >= 0; i--) {
          const p = trailParts[i];
          p.alpha -= 0.03;
          p.size *= 0.95;
          if (p.alpha <= 0) { trailParts.splice(i, 1); continue; }
          trailGfx.fillStyle(glowColor, p.alpha);
          trailGfx.fillCircle(p.x, p.y, p.size);
        }

        if (t >= 1) {
          this.powerUpFallTimer.remove();
          this.powerUpFallTimer = null;
          this.time.delayedCall(500, () => { if (trailGfx && trailGfx.active) trailGfx.destroy(); });

          // Landing shockwave
          const sw = this.add.graphics().setDepth(11);
          this.tweens.add({
            targets: { r: 5 }, r: 80, duration: 400, ease: 'Quad.easeOut',
            onUpdate: (tw, tgt) => {
              sw.clear();
              sw.lineStyle(3, glowColor, 1 - tgt.r / 80);
              sw.strokeCircle(targetX, targetY, tgt.r);
            },
            onComplete: () => sw.destroy(),
          });

          // Snap to target position
          if (this.powerUpSprite) { this.powerUpSprite.x = targetX; this.powerUpSprite.y = targetY; }
          if (this.powerUpGlow) { this.powerUpGlow.x = targetX; this.powerUpGlow.y = targetY; }

          // Bob + pulse after landing
          if (this.powerUpBobTween) this.powerUpBobTween.stop();
          this.powerUpBobTween = this.tweens.add({
            targets: [this.powerUpSprite, this.powerUpGlow],
            y: targetY - 14, duration: 700, yoyo: true, repeat: -1,
            ease: 'Sine.easeInOut',
          });

          this.powerUpPulseTween = this.tweens.add({
            targets: this.powerUpGlow, alpha: { from: 1, to: 0.4 },
            duration: 500, yoyo: true, repeat: -1,
          });

          // Physics zone for collection
          this.powerUpZone = this.physics.add.staticGroup();
          const puz = this.powerUpZone.create(targetX, targetY, null);
          puz.setVisible(false);
          puz.body.setSize(56, 56);
          puz.refreshBody();

          if (this.ball && this.ball.active) {
            const pc = this.physics.add.overlap(this.ball, this.powerUpZone, () => {
              if (!this.powerUpSprite) return;
              this.collectPowerUp(this.powerUpSprite.puType);
            });
            this.ballColliders.push(pc);
          }
        }
      }
    });

    this.nextPowerUpAt = this.basketCount + Phaser.Math.Between(3, 5);
  }

  collectPowerUp(type) {
    const cfg = CONFIG.POWERUPS[type];
    soundManager.play('pickup');

    // Save collection position before destroying
    const collectX = this.powerUpSprite ? this.powerUpSprite.x : 300;
    const collectY = this.powerUpSprite ? this.powerUpSprite.y : 150;
    const glowColor = Phaser.Display.Color.HexStringToColor(cfg.color).color;

    // Destroy visuals
    if (this.powerUpBobTween)   { this.powerUpBobTween.stop(); this.powerUpBobTween = null; }
    if (this.powerUpPulseTween) { this.powerUpPulseTween.stop(); this.powerUpPulseTween = null; }
    if (this.powerUpSprite)     { this.powerUpSprite.destroy(); this.powerUpSprite = null; }
    if (this.powerUpGlow)       { this.powerUpGlow.destroy();   this.powerUpGlow   = null; }
    if (this.powerUpZone)       { this.powerUpZone.clear(true, true); this.powerUpZone = null; }

    // --- Dramatic collection effects ---

    // 1. Camera flash + shake
    this.cameras.main.flash(200,
      (glowColor >> 16) & 0xff, (glowColor >> 8) & 0xff, glowColor & 0xff);
    this.cameras.main.shake(200, 0.008);

    // 2. Expanding rings from collection point
    const ring = this.add.graphics().setDepth(25);
    this.tweens.add({
      targets: { r: 10 }, r: 100, duration: 500, ease: 'Quad.easeOut',
      onUpdate: (tw, tgt) => {
        ring.clear();
        ring.lineStyle(4, glowColor, 1 - tgt.r / 100);
        ring.strokeCircle(collectX, collectY, tgt.r);
        ring.lineStyle(2, 0xffffff, (1 - tgt.r / 100) * 0.6);
        ring.strokeCircle(collectX, collectY, tgt.r * 0.7);
      },
      onComplete: () => ring.destroy(),
    });

    // 3. Burst particles from collection point
    const burstGfx = this.add.graphics().setDepth(25);
    const burstParts = [];
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      burstParts.push({
        x: collectX, y: collectY,
        vx: Math.cos(angle) * (3 + Math.random() * 3),
        vy: Math.sin(angle) * (3 + Math.random() * 3),
        alpha: 1, size: 4 + Math.random() * 4,
      });
    }
    const burstTimer = this.time.addEvent({
      delay: 16, loop: true,
      callback: () => {
        burstGfx.clear();
        let alive = false;
        for (const p of burstParts) {
          p.x += p.vx; p.y += p.vy;
          p.alpha -= 0.04; p.size *= 0.96;
          if (p.alpha <= 0) continue;
          alive = true;
          burstGfx.fillStyle(glowColor, p.alpha);
          burstGfx.fillCircle(p.x, p.y, p.size);
        }
        if (!alive) { burstTimer.remove(); burstGfx.destroy(); }
      }
    });

    // 4. Large announcement text
    const announce = this.add.text(CONFIG.WIDTH + 100, CONFIG.HEIGHT / 2 - 30,
      cfg.icon + ' ' + cfg.name + ' ACTIVATED!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '32px',
      color: cfg.color,
      stroke: '#000000',
      strokeThickness: 4,
    }).setOrigin(0.5).setDepth(30);
    this.tweens.add({
      targets: announce,
      x: CONFIG.WIDTH / 2, duration: 300, ease: 'Back.easeOut',
      onComplete: () => {
        this.tweens.add({
          targets: announce,
          x: -200, alpha: 0, duration: 600, delay: 800,
          ease: 'Quad.easeIn',
          onComplete: () => announce.destroy(),
        });
      }
    });

    // --- Apply power-up effect ---
    if (type === 'giantHoop') {
      this.activePowerUps.giantHoop = { shotsLeft: cfg.duration };
      if (this.scoreZoneBody) {
        this.scoreZoneBody.body.setSize(this.defaultScoreZoneW * 1.5, 14);
        this.scoreZoneBody.refreshBody();
      }
    } else if (type === 'doubleScore') {
      this.activePowerUps.doubleScore = { shotsLeft: cfg.duration };
      // Gold shimmer particles
      this.goldRainParts = [];
      this.goldRainGfx = this.add.graphics().setDepth(8);
      this.goldRainTimer = this.time.addEvent({
        delay: 16, loop: true,
        callback: () => {
          if (!this.goldRainGfx || !this.goldRainGfx.active) return;
          if (this.activePowerUps.doubleScore && Math.random() < 0.25) {
            this.goldRainParts.push({
              x: Math.random() * CONFIG.WIDTH, y: -5,
              vy: 1.5 + Math.random() * 2,
              size: 2 + Math.random() * 3,
              alpha: 0.5 + Math.random() * 0.4,
            });
          }
          this.goldRainGfx.clear();
          for (let i = this.goldRainParts.length - 1; i >= 0; i--) {
            const p = this.goldRainParts[i];
            p.y += p.vy;
            if (p.y > CONFIG.HEIGHT) { this.goldRainParts.splice(i, 1); continue; }
            this.goldRainGfx.fillStyle(0xffd700, p.alpha);
            this.goldRainGfx.fillCircle(p.x, p.y, p.size);
          }
          if (!this.activePowerUps.doubleScore && this.goldRainParts.length === 0) {
            this.goldRainTimer.remove(); this.goldRainTimer = null;
            this.goldRainGfx.destroy(); this.goldRainGfx = null;
          }
        }
      });
    } else if (type === 'comboShield') {
      this.activePowerUps.comboShield = { shotsLeft: cfg.duration };
    } else if (type === 'extraTime') {
      // Instant effect: add 15 seconds
      if (this.timeLeft != null) {
        this.timeLeft += cfg.timeBonus;
      }
      // Flash timer green + big "+15s" text
      if (this.timerTxt) {
        const origColor = this.timerTxt.style.color;
        this.timerTxt.setColor('#44ff44');
        this.time.delayedCall(1500, () => { if (this.timerTxt) this.timerTxt.setColor(origColor); });
      }
      const bonusTxt = this.add.text(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 20, '+15s!', {
        fontFamily: "'Arial Black', sans-serif", fontSize: '48px',
        color: '#44ff44', stroke: '#000000', strokeThickness: 5,
      }).setOrigin(0.5).setDepth(30).setAlpha(0);
      this.tweens.add({
        targets: bonusTxt, alpha: 1, y: bonusTxt.y - 30, duration: 300,
        onComplete: () => this.tweens.add({
          targets: bonusTxt, alpha: 0, y: bonusTxt.y - 40, duration: 600, delay: 500,
          onComplete: () => bonusTxt.destroy(),
        }),
      });
    } else if (type === 'graffitiBomb') {
      // Instant effect: +500 points + graffiti explosion
      this.score += cfg.scoreBonus;
      this.scoreText.setText(this.score);
      // Spectacular explosion text
      const bombTxt = this.add.text(CONFIG.WIDTH / 2, CONFIG.HEIGHT / 2 - 10, '💥 +500!', {
        fontFamily: "'Arial Black', sans-serif", fontSize: '52px',
        color: '#ff44ff', stroke: '#000000', strokeThickness: 5,
      }).setOrigin(0.5).setDepth(30).setAlpha(0).setScale(0.3);
      this.tweens.add({
        targets: bombTxt, alpha: 1, scaleX: 1, scaleY: 1, duration: 300, ease: 'Back.easeOut',
        onComplete: () => this.tweens.add({
          targets: bombTxt, alpha: 0, scaleX: 1.5, scaleY: 1.5, duration: 700, delay: 600,
          onComplete: () => bombTxt.destroy(),
        }),
      });
      // Color splash particles from center
      const splashGfx = this.add.graphics().setDepth(28);
      const splashParts = [];
      const colors = [0xff44ff, 0xff4444, 0x44ff44, 0xffff00, 0x44ccff];
      for (let i = 0; i < 20; i++) {
        const angle = (i / 20) * Math.PI * 2 + Math.random() * 0.3;
        splashParts.push({
          x: CONFIG.WIDTH / 2, y: CONFIG.HEIGHT / 2,
          vx: Math.cos(angle) * (4 + Math.random() * 6),
          vy: Math.sin(angle) * (4 + Math.random() * 6),
          alpha: 1, size: 6 + Math.random() * 8,
          color: colors[i % colors.length],
        });
      }
      const splashTimer = this.time.addEvent({
        delay: 16, loop: true,
        callback: () => {
          splashGfx.clear();
          let alive = false;
          for (const p of splashParts) {
            p.x += p.vx; p.y += p.vy; p.vy += 0.2;
            p.alpha -= 0.025; p.size *= 0.97;
            if (p.alpha <= 0) continue;
            alive = true;
            splashGfx.fillStyle(p.color, p.alpha);
            splashGfx.fillCircle(p.x, p.y, p.size);
          }
          if (!alive) { splashTimer.remove(); splashGfx.destroy(); }
        }
      });
      this.cameras.main.shake(300, 0.01);
    }

    this.updatePowerUpHUD();
  }

  consumePowerUpShots() {
    const toRemove = [];

    if (this.activePowerUps.giantHoop) {
      this.activePowerUps.giantHoop.shotsLeft--;
      if (this.activePowerUps.giantHoop.shotsLeft <= 0) {
        toRemove.push('giantHoop');
        if (this.scoreZoneBody) {
          this.scoreZoneBody.body.setSize(this.defaultScoreZoneW, 12);
          this.scoreZoneBody.refreshBody();
        }
      }
    }
    if (this.activePowerUps.doubleScore) {
      this.activePowerUps.doubleScore.shotsLeft--;
      if (this.activePowerUps.doubleScore.shotsLeft <= 0) {
        toRemove.push('doubleScore');
      }
    }
    if (this.activePowerUps.comboShield) {
      this.activePowerUps.comboShield.shotsLeft--;
      if (this.activePowerUps.comboShield.shotsLeft <= 0) {
        toRemove.push('comboShield');
      }
    }

    toRemove.forEach(k => delete this.activePowerUps[k]);
    this.updatePowerUpHUD();
  }

  updatePowerUpHUD() {
    // Destroy old HUD items
    this.powerUpHudItems.forEach(item => item.destroy());
    this.powerUpHudItems = [];
    if (this.powerUpHudPulseTween) { this.powerUpHudPulseTween.stop(); this.powerUpHudPulseTween = null; }

    const active = Object.entries(this.activePowerUps);
    if (active.length === 0) return;

    const baseX = CONFIG.WIDTH - 10;
    const baseY = CONFIG.HEIGHT - 58;
    const cardH = 36;

    active.forEach(([type, state], i) => {
      const cfg = CONFIG.POWERUPS[type];
      const cy = baseY - i * (cardH + 6);
      const glowColor = Phaser.Display.Color.HexStringToColor(cfg.color).color;

      // Background card
      const bg = this.add.graphics().setDepth(24);
      bg.fillStyle(0x000000, 0.6);
      bg.fillRoundedRect(baseX - 140, cy - cardH / 2, 140, cardH, 8);
      bg.lineStyle(2, glowColor, 0.9);
      bg.strokeRoundedRect(baseX - 140, cy - cardH / 2, 140, cardH, 8);
      this.powerUpHudItems.push(bg);

      // Icon + name
      const iconTxt = this.add.text(baseX - 130, cy, cfg.icon + ' ' + cfg.name, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '14px',
        color: cfg.color,
        stroke: '#000000',
        strokeThickness: 2,
      }).setOrigin(0, 0.5).setDepth(25);
      this.powerUpHudItems.push(iconTxt);

      // Dot indicators for remaining shots (only for duration-based power-ups)
      if (cfg.duration > 0 && state.shotsLeft) {
        const maxShots = cfg.duration;
        const shotsLeft = state.shotsLeft;
        const dotStartX = baseX - 30;
        const dotGfx = this.add.graphics().setDepth(25);
        for (let d = 0; d < maxShots; d++) {
          const dx = dotStartX + d * 12;
          if (d < shotsLeft) {
            dotGfx.fillStyle(glowColor, 1);
            dotGfx.fillCircle(dx, cy, 4);
          } else {
            dotGfx.lineStyle(1.5, glowColor, 0.4);
            dotGfx.strokeCircle(dx, cy, 4);
          }
        }
        this.powerUpHudItems.push(dotGfx);
      }
    });

    // Pulse the first card border
    if (this.powerUpHudItems.length > 0) {
      const firstBg = this.powerUpHudItems[0];
      this.powerUpHudPulseTween = this.tweens.add({
        targets: firstBg, alpha: { from: 1, to: 0.5 },
        duration: 400, yoyo: true, repeat: -1,
      });
    }
  }

  cleanupPowerUps() {
    if (this.powerUpBobTween)   { this.powerUpBobTween.stop();   this.powerUpBobTween   = null; }
    if (this.powerUpPulseTween) { this.powerUpPulseTween.stop(); this.powerUpPulseTween = null; }
    if (this.powerUpFallTimer)  { this.powerUpFallTimer.remove(); this.powerUpFallTimer = null; }
    if (this.powerUpSprite)     { this.powerUpSprite.destroy();  this.powerUpSprite     = null; }
    if (this.powerUpGlow)       { this.powerUpGlow.destroy();    this.powerUpGlow       = null; }
    if (this.powerUpZone)       { this.powerUpZone.clear(true, true); this.powerUpZone  = null; }
    // Clean up active effect visuals
    if (this.goldRainTimer)     { this.goldRainTimer.remove(); this.goldRainTimer = null; }
    if (this.goldRainGfx)       { this.goldRainGfx.destroy(); this.goldRainGfx = null; }
    this.powerUpHudItems.forEach(item => item.destroy());
    this.powerUpHudItems = [];
    this.activePowerUps = {};
  }

  // ── Ball ──────────────────────────────────────────────────────────────────
  createBall() {
    // Safety: destroy any lingering ball to prevent duplicates
    if (this.ball && this.ball.active) {
      this.ball.destroy();
      this.ball = null;
    }
    const spawnX = this.playerX + 30;
    const spawnY = CONFIG.GROUND_Y - 80;

    this.ball = this.physics.add.sprite(spawnX, spawnY, 'basketball');
    this.ball.setDisplaySize(30, 30);
    this.ball.setDepth(3);
    this.ball.body.setAllowGravity(false);
    this.ball.body.setBounce(0.4);
    this.ball.body.setCircle(14, 14, 14);

    this.isShooting   = false;
    this.scored       = false;
    this.hitBackboard = false;

    // Re-apply threePoint (三井) effect if active
    if (this.threePointActive && this.charConfig && this.charConfig.skill === 'threePoint') {
      this.ball.setDisplaySize(14, 14);
      this.ball.body.setCircle(6, 6, 6);
      if (this.scoreZoneBody) {
        this.scoreZoneBody.body.setSize(this.defaultScoreZoneW + 16, 28);
        this.scoreZoneBody.refreshBody();
      }
    }
    // Re-apply bigMan (赤木) effect
    if (this.charConfig && this.charConfig.skill === 'bigMan') {
      this.ball.setDisplaySize(38, 38);
      if (this.scoreZoneBody) {
        this.scoreZoneBody.body.setSize(this.defaultScoreZoneW + 16, 28);
        this.scoreZoneBody.refreshBody();
      }
    }

    this.setupHoopColliders();
    this._setupPowerUpOverlap();

    if (this.ballTween) this.ballTween.stop();
    this.ballTween = this.tweens.add({
      targets: this.ball,
      y: spawnY - 8,
      duration: 700,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut'
    });
  }

  // ── Input / Swipe ─────────────────────────────────────────────────────────
  setupInput() {
    this.trajectoryGfx = this.add.graphics();
    this.cursors = this.input.keyboard.createCursorKeys();
    this.keyA = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A);
    this.keyD = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D);
    this.keyS = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S);

    // Virtual button states (for mobile)
    this.virtualLeft = false;
    this.virtualRight = false;
    this.virtualS = false;
    this.virtualSJustPressed = false;
    this.virtualSJustReleased = false;
    this.virtualJump = false;
    this.virtualJumpJustPressed = false;

    // Detect touch device
    this.isTouchDevice = !!(('ontouchstart' in window) || navigator.maxTouchPoints > 0);
    if (this.isTouchDevice) this._createMobileControls();

    this.input.on('pointerdown', (ptr) => {
      if (this.isShooting || this.isGameOver) return;
      // Ignore touches on virtual buttons area (left side, bottom 120px)
      // Ignore touches on virtual controls: joystick (left) and S button (right)
      if (this.isTouchDevice && ptr.y > CONFIG.HEIGHT - 140 && (ptr.x < 150 || ptr.x > CONFIG.WIDTH - 120)) return;
      this.swipeStart = { x: ptr.x, y: ptr.y, time: this.time.now };
    });

    this.input.on('pointermove', (ptr) => {
      if (!this.swipeStart || this.isShooting) return;
      this.drawTrajectoryPreview(ptr.x, ptr.y);
    });

    this.input.on('pointerup', (ptr) => {
      if (!this.swipeStart || this.isShooting) return;
      this.trajectoryGfx.clear();

      const dx   = ptr.x - this.swipeStart.x;
      const dy   = ptr.y - this.swipeStart.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const dt   = this.time.now - this.swipeStart.time;

      if (dist < 20 || dt > 1500) {
        this.swipeStart = null;
        return;
      }

      // Start timer on first swipe
      if (!this.gameStarted && this.gameMode === 'endless') {
        this.gameStarted = true;
      }

      this.shootBall(dx, dy, dist, dt);
      this.swipeStart = null;
    });
  }

  // ── Mobile Virtual Controls — Joystick (left) + S button (right) ────────
  _createMobileControls() {
    this.mobileControlItems = [];

    // ── LEFT: Virtual joystick (move + jump) ──
    const joyX = 70, joyY = CONFIG.HEIGHT - 70;
    const joyOuterR = 52, joyInnerR = 22;
    const deadZone = 10; // pixels before direction registers

    // Draw joystick base
    const joyBase = this.add.graphics().setDepth(50);
    joyBase.fillStyle(0x000000, 0.3);
    joyBase.fillCircle(joyX, joyY, joyOuterR);
    joyBase.lineStyle(2, 0xffffff, 0.35);
    joyBase.strokeCircle(joyX, joyY, joyOuterR);
    this.mobileControlItems.push(joyBase);

    // Direction labels
    const labelStyle = { fontFamily: "'Arial Black', sans-serif", fontSize: '10px', color: '#ffffff', resolution: 2 };
    const lL = this.add.text(joyX - joyOuterR + 6, joyY, '◀', labelStyle).setOrigin(0.5).setDepth(51).setAlpha(0.3);
    const lR = this.add.text(joyX + joyOuterR - 6, joyY, '▶', labelStyle).setOrigin(0.5).setDepth(51).setAlpha(0.3);
    const lU = this.add.text(joyX, joyY - joyOuterR + 8, '▲', labelStyle).setOrigin(0.5).setDepth(51).setAlpha(0.3);
    this.mobileControlItems.push(lL, lR, lU);

    // Joystick thumb (moves with finger)
    const joyThumb = this.add.graphics().setDepth(52);
    const drawThumb = (x, y, active) => {
      joyThumb.clear();
      joyThumb.fillStyle(active ? 0xffffff : 0xaaaaaa, active ? 0.5 : 0.35);
      joyThumb.fillCircle(x, y, joyInnerR);
      joyThumb.lineStyle(2, 0xffffff, active ? 0.8 : 0.4);
      joyThumb.strokeCircle(x, y, joyInnerR);
    };
    drawThumb(joyX, joyY, false);
    this.mobileControlItems.push(joyThumb);

    // Joystick hit area (larger than visual)
    const joyHit = this.add.graphics().setDepth(49);
    const joyHitR = joyOuterR + 20;
    joyHit.fillStyle(0x000000, 0.001); // nearly invisible
    joyHit.fillCircle(joyX, joyY, joyHitR);
    joyHit.setDepth(55); // above all other interactive elements
    joyHit.setInteractive(new Phaser.Geom.Circle(joyX, joyY, joyHitR), Phaser.Geom.Circle.Contains);
    this.mobileControlItems.push(joyHit);

    let joyPointerId = null;

    joyHit.on('pointerdown', (pointer) => {
      joyPointerId = pointer.id;
      this._updateJoystick(pointer.x, pointer.y, joyX, joyY, joyOuterR, deadZone, drawThumb);
    });

    this.input.on('pointermove', (pointer) => {
      if (pointer.id !== joyPointerId) return;
      this._updateJoystick(pointer.x, pointer.y, joyX, joyY, joyOuterR, deadZone, drawThumb);
    });

    this.input.on('pointerup', (pointer) => {
      if (pointer.id !== joyPointerId) return;
      joyPointerId = null;
      // Reset all directions
      this.virtualLeft = false;
      this.virtualRight = false;
      this.virtualJump = false;
      drawThumb(joyX, joyY, false);
    });

    // ── RIGHT: S button — DOM overlay for 100% reliable touch on mobile ──
    // Position to match joystick center height (70px from bottom in game coords = 19.4% from bottom)
    const canvas = this.game.canvas;
    const sBtn = document.createElement('div');
    sBtn.id = 'mobile-shoot-btn';
    sBtn.innerHTML = '🏀<br><span style="font-size:9px;letter-spacing:1px">SHOOT</span>';
    const sBtnSize = 80;
    const joyBottomPct = (70 / CONFIG.HEIGHT * 100).toFixed(1); // match joystick Y
    sBtn.style.cssText = 'position:absolute;bottom:calc(' + joyBottomPct + '% - ' + (sBtnSize/2) + 'px);right:4%;' +
      'width:' + sBtnSize + 'px;height:' + sBtnSize + 'px;' +
      'border-radius:50%;background:rgba(0,0,0,0.4);border:3px solid rgba(255,255,255,0.5);' +
      'display:flex;flex-direction:column;align-items:center;justify-content:center;' +
      'font-size:30px;color:#fff;font-family:"Arial Black",sans-serif;' +
      'touch-action:none;user-select:none;-webkit-user-select:none;z-index:100;' +
      'box-shadow:0 0 20px rgba(255,102,0,0.3);';
    canvas.parentElement.style.position = 'relative';
    canvas.parentElement.appendChild(sBtn);
    this._sBtnDom = sBtn;

    const setActive = (active) => {
      if (active) {
        sBtn.style.background = 'rgba(255,102,51,0.55)';
        sBtn.style.borderColor = 'rgba(255,170,100,0.9)';
        sBtn.style.boxShadow = '0 0 30px rgba(255,102,0,0.6)';
      } else {
        sBtn.style.background = 'rgba(0,0,0,0.4)';
        sBtn.style.borderColor = 'rgba(255,255,255,0.5)';
        sBtn.style.boxShadow = '0 0 20px rgba(255,102,0,0.3)';
      }
    };

    sBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      this.virtualS = true;
      this.virtualSJustPressed = true;
      setActive(true);
    }, { passive: false });

    sBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      this.virtualS = false;
      this.virtualSJustReleased = true;
      setActive(false);
    }, { passive: false });

    sBtn.addEventListener('touchcancel', (e) => {
      this.virtualS = false;
      this.virtualSJustReleased = true;
      setActive(false);
    });
  }

  // Joystick direction calculation
  _updateJoystick(px, py, cx, cy, maxR, deadZone, drawThumb) {
    let dx = px - cx, dy = py - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // Clamp thumb to outer radius
    if (dist > maxR) { dx = (dx / dist) * maxR; dy = (dy / dist) * maxR; }
    drawThumb(cx + dx, cy + dy, true);

    // Horizontal: left/right
    if (dx < -deadZone) { this.virtualLeft = true; this.virtualRight = false; }
    else if (dx > deadZone) { this.virtualRight = true; this.virtualLeft = false; }
    else { this.virtualLeft = false; this.virtualRight = false; }

    // Vertical: up = jump (need strong upward push — 2.5x deadzone)
    if (dy < -deadZone * 2.5) {
      if (!this.virtualJump) { this.virtualJump = true; this.virtualJumpJustPressed = true; }
    } else {
      this.virtualJump = false;
    }
  }

  drawTrajectoryPreview(ex, ey) {
    if (!this.swipeStart) return;
    const g = this.trajectoryGfx;
    g.clear();

    const sx = this.ball.x;
    const sy = this.ball.y;

    const dx    = ex - this.swipeStart.x;
    const dy    = ey - this.swipeStart.y;
    const dist  = Math.sqrt(dx * dx + dy * dy);
    const speed = Math.min(dist * 3.5, 900);
    const vx    = (dx / dist) * speed;
    const vy    = (dy / dist) * speed;

    const g_accel = CONFIG.GRAVITY;
    const dt      = 1 / 60;
    let px = sx, py = sy, pvx = vx, pvy = vy;

    g.fillStyle(0xff8833, 0.7);
    for (let i = 0; i < 90; i++) {
      pvy += g_accel * dt;
      px  += pvx * dt;
      py  += pvy * dt;
      if (py > CONFIG.GROUND_Y || px < 0 || px > CONFIG.WIDTH) break;
      if (i % 5 === 0) {
        const r = Phaser.Math.Lerp(5, 2, i / 90);
        g.fillCircle(px, py, r);
      }
    }
  }

  // 宫城 layup: dash toward hoop, jump high, release ball near rim
  // 宫城 layup: dash toward hoop, jump high, wait for S to release
  doLayup(rimX) {
    if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
    this.isJumping = true;
    this.isLayup = true; // flag so S key knows to do a layup release
    this.jumpOffset = 0;
    this.jumpPhase = 'up';
    const startX = this.playerX;
    const targetX = Phaser.Math.Clamp(rimX - 40, 40, 550);
    const dashDist = targetX - startX;
    const LAYUP_HEIGHT = 130;
    const dashDuration = 350;

    this.redrawPlayer(this.playerX, this.playerY, true);

    // Phase 1: dash forward + rise
    this.tweens.add({
      targets: this,
      jumpOffset: LAYUP_HEIGHT,
      duration: dashDuration,
      ease: 'Quad.easeOut',
      onUpdate: () => {
        const progress = this.jumpOffset / LAYUP_HEIGHT;
        this.playerX = Phaser.Math.Clamp(startX + dashDist * progress, 40, 550);
        this.redrawPlayer(this.playerX, this.playerY, true);
        this.playerGfx.y = -this.jumpOffset;
      },
      onComplete: () => {
        // At peak: wait for player to press S
        this.jumpPhase = 'hold';
        // Longer hang time for layup (800ms to charge S, then fall)
        this.time.delayedCall(800, () => {
          if (this.jumpPhase !== 'down') {
            this.layupCharging = false;
            if (this.chargeBar) this.chargeBar.clear();
            this._layupFall();
          }
        });
      }
    });
  }

  // Layup release: called when S pressed during layup hold phase
  // pct: 0 = no charge (flat toss), 1 = full charge (high arc, swish-friendly)
  doLayupRelease(pct = 0) {
    this.isLayup = false;
    this.layupCharging = false;
    const { RIM_CX, RIM_Y } = this.hoopGeom;
    const bx = this.ball.x, by = this.ball.y;
    const dx = RIM_CX - bx;
    // Arc height scales with charge: 20 (flat) → 120 (high arc)
    const arcH = 20 + pct * 100;
    const dy = (RIM_Y - arcH) - by;
    const realDist = Math.sqrt(dx * dx + dy * dy);
    const fakeDist = Math.min(realDist * 0.4, 120);
    const nx = dx / realDist, ny = dy / realDist;
    this.shootBall(nx * fakeDist, ny * fakeDist, fakeDist, 200);
    this.wasJumpShot = true;
    this.time.delayedCall(100, () => { this._layupFall(); });
  }

  _layupFall() {
    if (this.jumpPhase === 'down') return;
    this.jumpPhase = 'down';
    this.isLayup = false;
    this.tweens.add({
      targets: this,
      jumpOffset: 0,
      duration: 400,
      ease: 'Quad.easeIn',
      onUpdate: () => { this.playerGfx.y = -this.jumpOffset; },
      onComplete: () => {
        this.isJumping = false;
        this.jumpOffset = 0;
        this.jumpPhase = null;
        this.redrawPlayer(this.playerX, this.playerY, false);
        if (!this.isShooting) this.ball.setPosition(this.playerX + 20, this.playerY - 100);
      }
    });
  }

  // ── 仙道彰: 天才 — 假投转身后仰投篮 ──────────────────────────
  // 全自动：假投晃人 → 转身 → 后仰跳投，天才般的优雅
  doReverseLayup(rimX) {
    if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
    this.isJumping = true;
    this.isReverseLayup = true;
    this.jumpOffset = 0;
    this.jumpPhase = 'up';

    const startX = this.playerX;
    const TOTAL = 2000;
    const FADE_HEIGHT = 100; // fadeaway jump height

    soundManager.play('shoot');

    // "天才!" text
    const txt = this.add.text(this.playerX + 30, this.playerY - 50, '天才!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '30px', color: '#aa88ff',
      stroke: '#000000', strokeThickness: 5
    });
    txt.setOrigin(0.5).setDepth(20).setAngle(-8);
    this.tweens.add({ targets: txt, y: txt.y - 80, alpha: 0, scaleX: 1.6, scaleY: 1.6, duration: 900, onComplete: () => txt.destroy() });

    let released = false;

    // Phases: pumpFake(0-0.25) → spin(0.25-0.5) → fadeaway(0.5-0.75) → land(0.75-1)
    this.tweens.add({
      targets: { t: 0 }, t: 1,
      duration: TOTAL, ease: 'Linear',
      onUpdate: (tw, tgt) => {
        const t = tgt.t;

        // X: stay in place during fake, step back slightly during fadeaway
        if (t < 0.5) {
          this.playerX = startX;
        } else if (t < 0.75) {
          const fp = (t - 0.5) / 0.25;
          this.playerX = startX - fp * 25; // step back
        } else {
          this.playerX = startX - 25;
        }

        // Y: no jump during fake/spin, parabolic jump during fadeaway
        if (t < 0.5) {
          this.jumpOffset = 0;
        } else if (t < 0.75) {
          const fp = (t - 0.5) / 0.25;
          this.jumpOffset = FADE_HEIGHT * Math.sin(fp * Math.PI);
        } else {
          this.jumpOffset = 0;
        }
        this.playerGfx.y = -this.jumpOffset;

        let phase, pp;
        if (t < 0.25) { phase = 'fake'; pp = t / 0.25; }
        else if (t < 0.5) { phase = 'spin'; pp = (t - 0.25) / 0.25; }
        else if (t < 0.75) { phase = 'fadeaway'; pp = (t - 0.5) / 0.25; }
        else { phase = 'land'; pp = (t - 0.75) / 0.25; }

        const handPos = this._drawSendoPose(this.playerX, this.playerY, phase, pp);

        if (!released && handPos) {
          this.sendoBallHandX = handPos.x;
          this.sendoBallHandY = handPos.y - this.jumpOffset;
        }

        // Release ball at fadeaway p=0.6 (near peak of jump)
        if (phase === 'fadeaway' && pp > 0.55 && !released) {
          released = true;
          this._sendoRelease();
        }
      },
      onComplete: () => {
        this.isJumping = false;
        this.isReverseLayup = false;
        this.jumpOffset = 0;
        this.jumpPhase = null;
        this.playerGfx.y = 0;
        this.sendoBallHandX = null;
        this.sendoBallHandY = null;
        this.redrawPlayer(this.playerX, this.playerY, false);
        if (!this.isShooting) this.ball.setPosition(this.playerX + 20, this.playerY - 100);
      }
    });
  }

  _sendoRelease() {
    const { RIM_CX, RIM_Y } = this.hoopGeom;
    const bx = this.sendoBallHandX || this.ball.x;
    const by = this.sendoBallHandY || this.ball.y;
    const dx = RIM_CX - bx, dy = (RIM_Y - 20) - by;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // High arc fadeaway — elegant lob
    const power = Math.min(dist * 0.35, 100);
    const vx = (dx / dist) * power;
    const vy = (dy / dist) * power - 30; // extra upward for high arc
    this.shootBall(vx, vy, power, 150);
    this.wasJumpShot = true;
  }

  // 仙道姿势绘制: fake → spin → fadeaway → land
  _drawSendoPose(px, py, phase, p) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jersey = Phaser.Display.Color.HexStringToColor(char.color).color;
    const band   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const hair   = this.isBeastMode ? 0xffdd00 : (char.hair ? Phaser.Display.Color.HexStringToColor(char.hair).color : 0x222222);
    const dark   = Phaser.Display.Color.IntegerToColor(jersey); dark.darken(50);
    const skin   = 0xffddaa;

    const hY = py - 88, tT = py - 74, tB = py - 42, lB = py;

    // All poses use: lean, ball-hand (bX,bY), off-hand (oX,oY), leg spread
    let lean, bX, bY, oX, oY, legSpreadL, legSpreadR;

    if (phase === 'fake') {
      // Pump fake: ball rises like a shot, then pulls back down
      const rise = Math.sin(p * Math.PI); // 0→1→0 smooth
      lean = 2;
      // Ball hand: right arm raises up then comes back
      bX = px + 18;
      bY = hY - 5 - rise * 30;  // rises ~30px then back
      // Off hand guides ball up
      oX = px + 8;
      oY = hY - 2 - rise * 25;
      // Legs: slight bend during fake
      legSpreadL = -6;  legSpreadR = 6;
    } else if (phase === 'spin') {
      // 180° spin turn: body rotates, ball sweeps around body
      // p=0: facing right. p=0.5: sideways. p=1: facing left (back to hoop)
      const angle = p * Math.PI; // 0 → π
      lean = Math.sin(angle) * 5; // sway during spin
      // Ball sweeps around the body in a circle
      bX = px + Math.cos(angle) * 22;
      bY = hY - 15 - Math.sin(angle * 0.5) * 10; // ball stays high
      // Off hand follows
      oX = px - Math.cos(angle) * 18;
      oY = tT + 5;
      // Legs: pivot — one foot plants, other swings
      const pivotSpread = Math.sin(angle) * 12;
      legSpreadL = -5 + pivotSpread;
      legSpreadR = 5 - pivotSpread;
    } else if (phase === 'fadeaway') {
      // Facing away from hoop (back turned), lean back, shoot over head
      // Body leans backward progressively
      lean = -4 - p * 10; // strong lean back
      // Ball hand: right arm extends up and back for the fadeaway release
      const shootRise = Math.min(p * 1.5, 1); // quick rise
      bX = px - 5 - p * 10;
      bY = hY - 20 - shootRise * 20; // ball goes high above head
      // Off hand: left arm out for balance
      oX = px + 15 + p * 5;
      oY = tT + 2 + p * 10;
      // Legs: together, slightly bent on jump
      legSpreadL = -3;  legSpreadR = 3;
    } else { // land
      // Return from fadeaway lean to standing
      const ep = Math.min(p * 1.3, 1);
      lean = -14 * (1 - ep); // lean back → upright
      bX = px - 15 + ep * 35;   bY = hY - 40 + ep * (tT + 10 - hY + 40);
      oX = px + 20 - ep * 40;   oY = tT + 12 - ep * 2;
      legSpreadL = -3;  legSpreadR = 3;
    }

    // === LEGS ===
    g.lineStyle(3.5, 0x222222, 1);
    g.beginPath(); g.moveTo(px + lean, tB); g.lineTo(px + legSpreadL, lB + 2); g.strokePath();
    g.beginPath(); g.moveTo(px + lean, tB); g.lineTo(px + legSpreadR, lB + 2); g.strokePath();
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px + legSpreadL - 1, lB + 4, 13, 5);
    g.fillEllipse(px + legSpreadR - 1, lB + 4, 13, 5);

    // === JERSEY ===
    g.fillStyle(jersey, 1);
    g.fillRect(px + lean - 14, tT, 28, tB - tT);
    g.lineStyle(2, dark.color, 1);
    g.strokeRect(px + lean - 14, tT, 28, tB - tT);
    this.jerseyNumTxt = this.add.text(px + lean, tT + (tB - tT) / 2, char.jersey || '7', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '12px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 1, resolution: 2,
    }).setOrigin(0.5).setDepth(5);

    // === ARMS ===
    g.lineStyle(3, skin, 1);
    // Ball hand (right arm)
    g.beginPath(); g.moveTo(px + lean + 14, tT + 6); g.lineTo(bX, bY); g.strokePath();
    // Off hand (left arm)
    g.beginPath(); g.moveTo(px + lean - 14, tT + 6); g.lineTo(oX, oY); g.strokePath();
    g.fillStyle(skin, 1);
    g.fillCircle(bX, bY, 4);
    g.fillCircle(oX, oY, 4);

    // === HEAD ===
    g.fillStyle(skin, 1);
    g.fillCircle(px + lean, hY, 13);
    g.lineStyle(2, 0x333333, 1);
    g.strokeCircle(px + lean, hY, 13);

    // Hair (tall spikes)
    g.fillStyle(hair, 1);
    g.beginPath();
    g.moveTo(px + lean - 13, hY - 2);
    g.lineTo(px + lean - 8, hY - 28);
    g.lineTo(px + lean - 3, hY - 22);
    g.lineTo(px + lean + 2, hY - 30);
    g.lineTo(px + lean + 7, hY - 24);
    g.lineTo(px + lean + 12, hY - 26);
    g.lineTo(px + lean + 13, hY - 2);
    g.closePath(); g.fillPath();

    // Headband
    g.fillStyle(band, 1);
    g.fillRect(px + lean - 14, hY - 5, 28, 5);

    // Eyes — look toward hoop during fake, look away during spin, look back for fadeaway
    g.fillStyle(0x222222, 1);
    const eyeDir = (phase === 'spin') ? -3 : (phase === 'fadeaway' || phase === 'land') ? -4 : 3;
    g.fillCircle(px + lean + eyeDir - 4, hY - 1, 2);
    g.fillCircle(px + lean + eyeDir + 4, hY - 1, 2);
    // Confident smirk
    g.lineStyle(1.5, 0x333333, 0.8);
    g.beginPath(); g.moveTo(px + lean - 3, hY + 5); g.lineTo(px + lean + 5, hY + 3); g.strokePath();

    // Return ball-hand position
    return { x: bX, y: bY };
  }

  // 赤木 dunk: power dash toward hoop, jump very high above rim, S = slam down
  doDunk(rimX) {
    if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
    this.isJumping = true;
    this.isDunk = true;
    this.jumpOffset = 0;
    this.jumpPhase = 'up';
    const startX = this.playerX;
    const targetX = Phaser.Math.Clamp(rimX - 20, 40, 550);
    const dashDist = targetX - startX;
    const DUNK_HEIGHT = 160;
    const dashDuration = 400;

    // Draw dunk pose: both hands holding ball high above head
    this.redrawPlayerDunkRise(this.playerX, this.playerY);

    // Phase 1: power dash + rise above rim
    this.tweens.add({
      targets: this,
      jumpOffset: DUNK_HEIGHT,
      duration: dashDuration,
      ease: 'Quad.easeOut',
      onUpdate: () => {
        const progress = this.jumpOffset / DUNK_HEIGHT;
        this.playerX = Phaser.Math.Clamp(startX + dashDist * progress, 40, 550);
        this.redrawPlayerDunkRise(this.playerX, this.playerY);
        this.playerGfx.y = -this.jumpOffset;
      },
      onComplete: () => {
        this.jumpPhase = 'hold';
        // 500ms to press S for dunk, otherwise fall back
        this.time.delayedCall(500, () => {
          if (this.jumpPhase === 'hold' && this.isDunk) {
            this.isDunk = false;
            this.jumpPhase = 'down';
            this.tweens.add({
              targets: this,
              jumpOffset: 0,
              duration: 350,
              ease: 'Quad.easeIn',
              onUpdate: () => { this.playerGfx.y = -this.jumpOffset; },
              onComplete: () => {
                this.isJumping = false;
                this.jumpOffset = 0;
                this.jumpPhase = null;
                this.redrawPlayer(this.playerX, this.playerY, false);
                if (!this.isShooting) this.ball.setPosition(this.playerX + 20, this.playerY - 100);
              }
            });
          }
        });
      }
    });
  }

  // Dunk rise pose: both hands holding ball high above head
  redrawPlayerDunkRise(px, py) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Legs (tucked up in air)
    g.lineStyle(3.5, 0x222222, 1);
    g.beginPath(); g.moveTo(px - 6, torsoB); g.lineTo(px - 12, legBot - 8); g.strokePath();
    g.beginPath(); g.moveTo(px + 6, torsoB); g.lineTo(px + 0, legBot - 8); g.strokePath();
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px - 14, legBot - 6, 14, 5);
    g.fillEllipse(px - 2, legBot - 6, 14, 5);

    // Jersey body
    g.fillStyle(jerseyHex, 1);
    g.fillRect(px - 14, torsoT, 28, torsoB - torsoT);
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokeRect(px - 14, torsoT, 28, torsoB - torsoT);

    // Jersey number
    this.jerseyNumTxt = this.add.text(px, torsoT + (torsoB - torsoT) / 2, char.jersey || '23', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 2
    });
    this.jerseyNumTxt.setOrigin(0.5);

    // Both arms raised HIGH holding ball above head
    g.lineStyle(3.5, 0xffcc99, 1);
    // Left arm: shoulder → elbow → hand (above head)
    g.beginPath(); g.moveTo(px - 14, torsoT + 6); g.lineTo(px - 10, torsoT - 14); g.strokePath();
    g.beginPath(); g.moveTo(px - 10, torsoT - 14); g.lineTo(px - 6, headY - 16); g.strokePath();
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px - 6, headY - 18, 4);
    // Right arm: shoulder → elbow → hand (above head)
    g.lineStyle(3.5, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px + 14, torsoT + 6); g.lineTo(px + 10, torsoT - 14); g.strokePath();
    g.beginPath(); g.moveTo(px + 10, torsoT - 14); g.lineTo(px + 6, headY - 16); g.strokePath();
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + 6, headY - 18, 4);

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px, torsoT); g.lineTo(px, headY + 14); g.strokePath();

    // Head (looking up)
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px, headY + 7, 14);

    // Eyes (focused, looking up)
    g.fillStyle(0x333333, 1);
    g.fillCircle(px - 5, headY + 2, 3);
    g.fillCircle(px + 5, headY + 2, 3);

    // Determined mouth
    g.lineStyle(2, 0x553322, 1);
    g.beginPath(); g.moveTo(px - 5, headY + 11); g.lineTo(px + 5, headY + 11); g.strokePath();

    // Headband
    g.lineStyle(4, bandHex, 1);
    g.beginPath();
    g.arc(px, headY + 5, 14, Math.PI + 0.3, -0.3);
    g.strokePath();
  }

  // 樱木超远飞扣: Jordan-style single-hand flying dunk
  // Elegant arc: explosive launch → hang time at peak → gentle descent past rim
  // Press S anytime = dive into dunk. No S = land without scoring.
  doSuperDunk(rimX) {
    if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
    this.isJumping = true;
    this.isDunk = true;
    this.isSuperDunk = true;
    this.superDunkDiving = false;
    this.jumpOffset = 0;
    this.jumpPhase = 'up';

    const startX = this.playerX;
    const { RIM_CX, RIM_Y } = this.hoopGeom;
    // Land past the rim
    const landX = Phaser.Math.Clamp(RIM_CX + 40, 40, 720);
    // Peak height: head (~playerY-88-offset) should be ~50px above rim(185)
    // So offset = playerY - 88 - 135 = 340 - 88 - 135 = 117 → use 155 for visual impact
    const peakHeight = 155;
    const totalDuration = 1300;

    soundManager.play('beast');

    // "飞扣!" text
    const launchTxt = this.add.text(this.playerX, this.playerY - 60, '飞扣!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '36px', color: '#ff2200',
      stroke: '#ffcc00', strokeThickness: 5
    });
    launchTxt.setOrigin(0.5).setDepth(20);
    launchTxt.setAngle(-10);
    this.tweens.add({ targets: launchTxt, y: launchTxt.y - 100, alpha: 0, scaleX: 2, scaleY: 2, duration: 1200, onComplete: () => launchTxt.destroy() });

    // Trail
    this.superDunkTrailGfx = this.add.graphics().setDepth(1);
    this.superDunkTrailPoints = [];

    // ── The Arc ──
    // 3 phases blended into one smooth curve:
    //   0.00 – 0.25  Explosive rise (fast up + forward)
    //   0.25 – 0.60  Hang time (slow drift at peak, Jordan magic)
    //   0.60 – 1.00  Natural descent (accelerating down, passing over rim ~0.70)
    //
    // Height uses sin^0.7 for a flattened peak (longer hang time)
    // Horizontal uses a custom ease: fast start, slow mid, fast end

    this.superDunkTween = this.tweens.add({
      targets: { t: 0 },
      t: 1,
      duration: totalDuration,
      ease: 'Linear',
      onUpdate: (tween, target) => {
        if (this.superDunkDiving) return;
        const t = target.t;

        // ── Horizontal: fast launch, slow hang, accelerate to land ──
        // Cubic bezier-like: fast→slow→fast
        let xP;
        if (t < 0.25) {
          // Launch phase: accelerate forward
          xP = 0.35 * (t / 0.25); // reach 35% horizontal by 25% time
        } else if (t < 0.60) {
          // Hang phase: slow drift
          const p = (t - 0.25) / 0.35;
          xP = 0.35 + 0.30 * p; // 35%→65% over 35% of time (slow)
        } else {
          // Descent: accelerate to land
          const p = (t - 0.60) / 0.40;
          const easeP = p * p; // accelerate
          xP = 0.65 + 0.35 * easeP; // 65%→100%
        }
        this.playerX = Phaser.Math.Clamp(startX + (landX - startX) * xP, 40, 720);

        // ── Vertical: sin^0.45 for very flat peak (Jordan hang time magic) ──
        // Low exponent = longer time near peak, sharper rise and fall
        const sinVal = Math.sin(t * Math.PI); // 0→1→0
        const h = peakHeight * Math.pow(sinVal, 0.45); // very flat peak: floats at top
        this.jumpOffset = Math.max(0, h);
        this.playerGfx.y = -this.jumpOffset;

        // Jordan pose
        this.redrawPlayerJordanFly(this.playerX, this.playerY, t);

        // Trail
        if (this.superDunkTrailPoints) {
          this.superDunkTrailPoints.push({ x: this.playerX, y: this.playerY - this.jumpOffset });
          this._drawSuperDunkTrail();
        }
      },
      onComplete: () => {
        if (this.superDunkDiving) return;
        this._superDunkLand();
      }
    });
  }

  // S pressed during flight: fast dive toward rim and dunk
  _superDunkDive() {
    this.superDunkDiving = true;
    // Stop the arc tween
    if (this.superDunkTween) { this.superDunkTween.stop(); this.superDunkTween = null; }

    const { RIM_CX, RIM_Y } = this.hoopGeom;
    const targetX = RIM_CX - 15;
    const targetOffset = this.playerY - RIM_Y + 104; // hands at rim level
    const currentX = this.playerX;
    const currentOffset = this.jumpOffset;

    // Distance-based duration: closer = faster dive
    const dist = Math.sqrt(Math.pow(targetX - currentX, 2) + Math.pow(targetOffset - currentOffset, 2));
    const diveDuration = Math.max(150, Math.min(350, dist * 0.8));

    soundManager.play('combo');

    this.tweens.add({
      targets: { t: 0 },
      t: 1,
      duration: diveDuration,
      ease: 'Quad.easeIn', // accelerating dive
      onUpdate: (tween, target) => {
        const p = target.t;
        // Smooth curve from current position to rim
        this.playerX = Phaser.Math.Clamp(currentX + (targetX - currentX) * p, 40, 700);
        this.jumpOffset = currentOffset + (targetOffset - currentOffset) * p;
        this.playerGfx.y = -this.jumpOffset;
        this.redrawPlayerJordanFly(this.playerX, this.playerY, 0.8 + p * 0.2);
        // Trail
        if (this.superDunkTrailPoints) {
          this.superDunkTrailPoints.push({ x: this.playerX, y: this.playerY - this.jumpOffset });
          this._drawSuperDunkTrail();
        }
      },
      onComplete: () => {
        this._cleanupSuperDunkTrail();
        this.isSuperDunk = false;
        this.doDunkSlam();
      }
    });
  }

  // Landed without pressing S — player flies past the basket and lands behind it
  _superDunkLand() {
    const { RIM_CX } = this.hoopGeom;
    // Current position in the air
    const curX = this.playerX;
    const curOffset = this.jumpOffset || 0;
    // Land well past the basket (flew too far)
    const landX = Phaser.Math.Clamp(RIM_CX + 80, 40, 720);
    const landDuration = 500;

    // Release ball — let it fly forward and fall naturally
    if (this.ball && !this.isShooting) {
      this.ball.setPosition(curX + 18, this.playerY - curOffset - 30);
      this.ball.body.setVelocity(120, -50);
      this.ball.body.setBounce(0.5, 0.5);
      this.ball.body.setAllowGravity(true);
      this.isShooting = true;
    }

    this.superDunkDiving = true; // stop arc tween from updating
    if (this.superDunkTween) { this.superDunkTween.stop(); this.superDunkTween = null; }

    // Animate a natural falling arc past the basket
    this.tweens.add({
      targets: { t: 0 },
      t: 1,
      duration: landDuration,
      ease: 'Linear',
      onUpdate: (tween, target) => {
        const t = target.t;
        // Horizontal: ease out to land position
        this.playerX = Phaser.Math.Clamp(curX + (landX - curX) * t, 40, 720);
        // Vertical: smooth arc down (start from current height, land at ground)
        const remaining = curOffset * (1 - t * t); // accelerating fall
        this.jumpOffset = Math.max(0, remaining);
        this.playerGfx.y = -this.jumpOffset;
        // Keep Jordan pose during fall
        this.redrawPlayerJordanFly(this.playerX, this.playerY, 0.8 + t * 0.2);
        // Trail
        if (this.superDunkTrailPoints) {
          this.superDunkTrailPoints.push({ x: this.playerX, y: this.playerY - this.jumpOffset });
          this._drawSuperDunkTrail();
        }
      },
      onComplete: () => {
        this.isSuperDunk = false;
        this.isDunk = false;
        this.isJumping = false;
        this.jumpOffset = 0;
        this.jumpPhase = null;
        this.playerGfx.y = 0;
        this.redrawPlayer(this.playerX, this.playerY, false);
        this._cleanupSuperDunkTrail();

        // "可惜!" miss text
        const missTxt = this.add.text(this.playerX, this.playerY - 50, '飞过头了!', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '24px', color: '#ff6600',
          stroke: '#ffffff', strokeThickness: 3
        });
        missTxt.setOrigin(0.5).setDepth(20);
        this.tweens.add({ targets: missTxt, y: missTxt.y - 60, alpha: 0, duration: 1000, onComplete: () => missTxt.destroy() });
      }
    });
  }

  _cleanupSuperDunkTrail() {
    if (this.superDunkTrailGfx) {
      this.tweens.add({ targets: this.superDunkTrailGfx, alpha: 0, duration: 500, onComplete: () => { if (this.superDunkTrailGfx) { this.superDunkTrailGfx.destroy(); this.superDunkTrailGfx = null; } } });
    }
    this.superDunkTrailPoints = null;
  }

  _drawSuperDunkTrail() {
    if (!this.superDunkTrailGfx || !this.superDunkTrailPoints) return;
    const gfx = this.superDunkTrailGfx;
    const pts = this.superDunkTrailPoints;
    gfx.clear();
    if (pts.length > 150) pts.splice(0, pts.length - 150);
    const n = pts.length;
    if (n < 2) return;
    // Outer glow
    for (let i = 1; i < n; i++) {
      const a = (i / n) * 0.3;
      gfx.lineStyle(14, 0xff4400, a);
      gfx.beginPath(); gfx.moveTo(pts[i-1].x, pts[i-1].y); gfx.lineTo(pts[i].x, pts[i].y); gfx.strokePath();
    }
    // Inner bright line
    for (let i = 1; i < n; i++) {
      const a = (i / n) * 0.85;
      const w = 2 + (i / n) * 5;
      gfx.lineStyle(w, 0xffcc00, a);
      gfx.beginPath(); gfx.moveTo(pts[i-1].x, pts[i-1].y); gfx.lineTo(pts[i].x, pts[i].y); gfx.strokePath();
    }
  }

  // Jordan-style flying dunk pose: right hand holding ball high, legs spread, body leaning forward
  redrawPlayerJordanFly(px, py, progress) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Body leans forward slightly during flight
    const lean = 3;

    // Legs spread wide (Jordan signature)
    g.lineStyle(3.5, 0x222222, 1);
    // Left leg: forward kick (extended)
    g.beginPath(); g.moveTo(px - 4 + lean, torsoB); g.lineTo(px + 20, legBot + 5); g.strokePath();
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px + 22, legBot + 7, 14, 5);
    // Right leg: back (bent)
    g.beginPath(); g.moveTo(px + 4 + lean, torsoB); g.lineTo(px - 8, torsoB + 20); g.strokePath();
    g.beginPath(); g.moveTo(px - 8, torsoB + 20); g.lineTo(px - 18, torsoB + 10); g.strokePath();
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px - 20, torsoB + 10, 12, 5);

    // Jersey body (slightly tilted forward)
    g.fillStyle(jerseyHex, 1);
    g.fillRect(px - 12 + lean, torsoT, 26, torsoB - torsoT);
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokeRect(px - 12 + lean, torsoT, 26, torsoB - torsoT);

    // Jersey number
    this.jerseyNumTxt = this.add.text(px + lean, torsoT + (torsoB - torsoT) / 2, char.jersey || '10', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 2
    });
    this.jerseyNumTxt.setOrigin(0.5);

    // RIGHT arm: single hand reaching HIGH with ball (Jordan signature)
    g.lineStyle(3.5, 0xffcc99, 1);
    // Shoulder → elbow (up and forward)
    g.beginPath(); g.moveTo(px + 14 + lean, torsoT + 6); g.lineTo(px + 22, torsoT - 18); g.strokePath();
    // Elbow → hand (stretched high above head)
    g.beginPath(); g.moveTo(px + 22, torsoT - 18); g.lineTo(px + 18, headY - 24); g.strokePath();
    // Hand gripping ball
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + 18, headY - 26, 5);

    // LEFT arm: trailing behind/down (balance)
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px - 12 + lean, torsoT + 6); g.lineTo(px - 22, torsoT + 16); g.strokePath();
    g.beginPath(); g.moveTo(px - 22, torsoT + 16); g.lineTo(px - 28, torsoT + 4); g.strokePath();

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px + lean, torsoT); g.lineTo(px + lean, headY + 14); g.strokePath();

    // Head (looking forward/up at rim)
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + lean + 2, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px + lean + 2, headY + 7, 14);

    // Eyes (intense focus, looking right toward rim)
    g.fillStyle(0x333333, 1);
    g.fillCircle(px + lean, headY + 4, 2.5);
    g.fillCircle(px + lean + 8, headY + 4, 2.5);

    // Fierce expression
    g.lineStyle(2, 0x553322, 1);
    g.beginPath(); g.moveTo(px + lean - 2, headY + 12); g.lineTo(px + lean + 6, headY + 11); g.strokePath();

    // Headband (with trailing flutter effect)
    g.lineStyle(4, bandHex, 1);
    g.beginPath();
    g.arc(px + lean + 2, headY + 5, 14, Math.PI + 0.3, -0.3);
    g.strokePath();
    // Headband tails fluttering behind
    g.lineStyle(3, bandHex, 0.7);
    const flutter = Math.sin(progress * Math.PI * 6) * 3;
    g.beginPath(); g.moveTo(px + lean - 12, headY + 2); g.lineTo(px + lean - 28, headY + flutter); g.strokePath();
    g.lineStyle(2.5, bandHex, 0.5);
    g.beginPath(); g.moveTo(px + lean - 12, headY + 6); g.lineTo(px + lean - 24, headY + 8 + flutter); g.strokePath();
  }

  // Dunk slam: direct score, player hangs on rim
  doDunkSlam() {
    this.isDunk = false;
    this.isSuperDunk = false;
    this.isJumping = false;
    this.jumpPhase = null;
    this.isDunkHanging = true;
    // Stop any ongoing player tweens to prevent conflicts
    this.tweens.killTweensOf(this);
    this.tweens.killTweensOf(this.playerGfx);

    const { RIM_CX, RIM_Y } = this.hoopGeom;

    // Position player so hands grab the rim (hands are at torsoT - 30 = playerY - 104)
    // We want hands at RIM_Y, so playerGfx.y offset = -(playerY - (RIM_Y + 104))
    // Player hangs BEHIND/beside the rim, not inside the net
    this.playerX = RIM_CX - 20; // hang on the left side of rim
    const handsAtRim = RIM_Y; // hands grab rim level
    const hangOffset = -(this.playerY - handsAtRim - 104);
    this.playerGfx.y = hangOffset;

    // Custom dunk hanging pose (both arms up grabbing rim)
    this.redrawPlayerDunkHang(this.playerX, this.playerY);
    // Sync jersey number with graphics offset
    if (this.jerseyNumTxt) this.jerseyNumTxt.y += hangOffset;

    // Ball slams through hoop and smashes down to ground
    this.ball.setPosition(RIM_CX, RIM_Y + 35);
    this.ball.body.setAllowGravity(true);
    this.ball.body.setVelocity(Phaser.Math.Between(-30, 30), 650);
    this.ball.body.setBounce(0.6);
    this.ball.body.setAngularVelocity(200);
    this.hoopCollisionCooldown = 60; // long cooldown so ball doesn't get caught by rim

    // Direct score — no physics overlap needed
    this.isShooting = true;
    this.scored = false;
    this.hitBackboard = true; // mark as bank so onScore won't show SWISH effect
    this.isDunkScore = true;  // flag for dunk-specific celebration
    this.wasJumpShot = true;
    this.shotZone = 'near';
    soundManager.play('bank');
    this.cameras.main.shake(200, 0.008);
    this.onScore();

    // Hoop shakes violently on dunk
    const hoopTarget = this.hoopGraphics || this.staticHoopGfx;
    if (hoopTarget) {
      this.tweens.add({
        targets: hoopTarget,
        x: { from: -4, to: 4 },
        y: { from: -2, to: 2 },
        duration: 80,
        yoyo: true,
        repeat: 4,
        ease: 'Sine.easeInOut',
        onComplete: () => { hoopTarget.x = 0; hoopTarget.y = 0; }
      });
    }

    // Player + hoop swing together while hanging
    this.tweens.add({
      targets: this.playerGfx,
      x: { from: this.playerGfx.x - 3, to: this.playerGfx.x + 3 },
      duration: 200,
      yoyo: true,
      repeat: 1,
      ease: 'Sine.easeInOut'
    });

    // Hang on rim for 1000ms, then drop to ground
    this.time.delayedCall(1000, () => {
      this.isDunkHanging = false;
      this.jumpOffset = 0;
      this.playerGfx.y = 0;
      this.playerGfx.x = 0;
      this.playerX = Phaser.Math.Clamp(RIM_CX - 100, 40, 550);
      this.redrawPlayer(this.playerX, this.playerY, false);
      // Hide the bouncing ball to prevent visual duplication before respawn
      if (this.ball && this.ball.active) {
        this.ball.setVisible(false);
        this.ball.body.setVelocity(0, 0);
        this.ball.body.setAllowGravity(false);
      }
    });
  }

  // ── 流川枫: 后仰跳投 (Fadeaway Jump Shot) ──────────────────────────────
  // Triggered: ace char + jump (no direction) + S = fadeaway with auto-aim
  // 流川 fadeaway: left+space → jump backward with lean, hang in air, S to shoot
  doFadeaway(rimX) {
    if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
    this.isFadeaway = true;
    this.isJumping = true;
    this.jumpOffset = 0;
    this.jumpPhase = 'up';

    const startX = this.playerX;
    const FADE_HEIGHT = 90;
    const driftBack = 60; // drift backward during jump

    // "后仰!" text
    const txt = this.add.text(this.playerX, this.playerY - 60, '后仰!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '32px', color: '#ff2222',
      stroke: '#ffcc00', strokeThickness: 5
    });
    txt.setOrigin(0.5).setDepth(20).setAngle(-8);
    this.tweens.add({ targets: txt, y: txt.y - 90, alpha: 0, scaleX: 1.6, scaleY: 1.6, duration: 900, onComplete: () => txt.destroy() });

    // Continuous arc: sin curve, slow at peak but never stopping
    // Total duration 1600ms, S shootable once past 30% (rising) through descent
    const totalDur = 1600;
    const driftTotal = 90; // total backward drift over full arc

    this.fadeawayArcTween = this.tweens.add({
      targets: { t: 0 },
      t: 1,
      duration: totalDur,
      ease: 'Linear',
      onUpdate: (tween, target) => {
        if (this.isShooting) return; // stop updating once shot released
        const t = target.t;
        // sin curve: peaks at t=0.5, slow near peak
        // Use sin^0.7 for a flatter, lingering peak
        const sinVal = Math.sin(t * Math.PI);
        const heightCurve = Math.pow(sinVal, 0.7);
        this.jumpOffset = FADE_HEIGHT * heightCurve;
        this.playerGfx.y = -this.jumpOffset;

        // Continuous backward drift
        this.playerX = Phaser.Math.Clamp(startX - driftTotal * t, 40, 550);

        // Lean progress: ramp up to 0.85 at peak, ease down
        const leanProgress = Math.min(heightCurve * 0.95, 0.85);
        this.redrawPlayerFadeaway(this.playerX, this.playerY, leanProgress);

        // Allow shooting once past 30% of arc (ascending) through descent
        if (t > 0.3 && this.jumpPhase === 'up') {
          this.jumpPhase = 'hold';
        }
        if (t > 0.55) {
          this.jumpPhase = 'down';
        }
      },
      onComplete: () => {
        if (this.isShooting) return;
        this.isFadeaway = false;
        this.isJumping = false;
        this.jumpOffset = 0;
        this.jumpPhase = null;
        this.playerGfx.y = 0;
        this.redrawPlayer(this.playerX, this.playerY, false);
        if (!this.isShooting) this.ball.setPosition(this.playerX + 20, this.playerY - 100);
      }
    });
  }

  // Fadeaway shot: triggered by S during fadeaway hold phase
  doFadeawayShot() {
    soundManager.play('shoot');

    // Shoot with high accuracy toward rim
    const rimX = this.hoopGeom.RIM_CX;
    const rimY = this.hoopGeom.RIM_Y;
    const bx = this.ball.x, by = this.ball.y;
    const dx = rimX - bx;
    const arcHeight = 200;
    const dy = (rimY - arcHeight) - by;
    const realDist = Math.sqrt(dx * dx + dy * dy);
    const fakeDist = Math.min(realDist * 0.45, 180);
    const nx = dx / realDist, ny = dy / realDist;
    this.shootBall(nx * fakeDist, ny * fakeDist, fakeDist, 200);

    // Kill the continuous arc tween so it doesn't conflict
    if (this.fadeawayArcTween) {
      this.fadeawayArcTween.stop();
      this.fadeawayArcTween = null;
    }

    // Animate the follow-through and fall
    this.jumpPhase = 'down';
    const startOffset = this.jumpOffset;
    this.tweens.add({
      targets: this,
      jumpOffset: 0,
      duration: 500,
      ease: 'Quad.easeIn',
      onUpdate: () => {
        this.playerGfx.y = -this.jumpOffset;
        this.redrawPlayerFadeaway(this.playerX, this.playerY, 0.9);
      },
      onComplete: () => {
        this.isFadeaway = false;
        this.isJumping = false;
        this.jumpOffset = 0;
        this.jumpPhase = null;
        this.playerGfx.y = 0;
        this.redrawPlayer(this.playerX, this.playerY, false);
      }
    });
  }

  // Fadeaway pose: dramatic lean back, one arm extended in follow-through
  redrawPlayerFadeaway(px, py, progress) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    // Exaggerated lean — upper body tilts far back, legs stay forward
    const lean = -progress * 30; // dramatic backward lean
    const bodyTilt = progress * 0.4; // torso rotation factor
    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Legs (front leg kicked forward for counterbalance, back leg bent)
    g.lineStyle(3.5, 0x222222, 1);
    // Front leg — thrust forward
    g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px + 20 + progress * 10, legBot - 6); g.strokePath();
    // Back leg — bent under body
    g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px + lean * 0.5, legBot - 2); g.strokePath();
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px + 18 + progress * 10, legBot - 4, 14, 5);
    g.fillEllipse(px + lean * 0.5 - 2, legBot, 14, 5);

    // Jersey body — tilted backward (draw as angled quad)
    const tiltX = lean * 0.8;
    g.fillStyle(jerseyHex, 1);
    // Draw tilted torso as polygon (clockwise: TL → TR → BR → BL)
    g.beginPath();
    g.moveTo(px + tiltX - 14, torsoT + lean * 0.3);
    g.lineTo(px + tiltX + 14, torsoT + lean * 0.3);
    g.lineTo(px + 14 + tiltX * 0.3, torsoB);
    g.lineTo(px - 14 + tiltX * 0.3, torsoB);
    g.closePath();
    g.fillPath();
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokePath();

    // Jersey number (tilted with torso)
    const jnx = px + tiltX * 0.6;
    const jny = (torsoT + lean * 0.3 + torsoB) / 2;
    this.jerseyNumTxt = this.add.text(jnx, jny, char.jersey || '23', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 2
    }).setOrigin(0.5).setAngle(lean * 0.5);

    // Shooting arm: extended HIGH and forward — classic follow-through
    const armBaseX = px + tiltX + 14;
    const armBaseY = torsoT + lean * 0.3 + 6;
    g.lineStyle(3.5, 0xffcc99, 1);
    // Upper arm angled up
    g.beginPath(); g.moveTo(armBaseX, armBaseY); g.lineTo(armBaseX + 14, armBaseY - 20); g.strokePath();
    // Forearm extended high (the follow-through)
    g.beginPath(); g.moveTo(armBaseX + 14, armBaseY - 20); g.lineTo(armBaseX + 20, armBaseY - 44); g.strokePath();
    // Hand — wrist flick, fingers spread
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(armBaseX + 20, armBaseY - 46, 4);
    g.lineStyle(1.5, 0xffcc99, 1);
    g.beginPath(); g.moveTo(armBaseX + 20, armBaseY - 48); g.lineTo(armBaseX + 17, armBaseY - 55); g.strokePath();
    g.beginPath(); g.moveTo(armBaseX + 20, armBaseY - 48); g.lineTo(armBaseX + 23, armBaseY - 54); g.strokePath();
    g.beginPath(); g.moveTo(armBaseX + 21, armBaseY - 47); g.lineTo(armBaseX + 27, armBaseY - 51); g.strokePath();

    // Off-hand: bent at side
    const offBaseX = px + tiltX - 14;
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(offBaseX, armBaseY + 2); g.lineTo(offBaseX - 12, armBaseY + 14); g.strokePath();

    // Neck (tilted back)
    const neckTopX = px + tiltX;
    const neckTopY = torsoT + lean * 0.3;
    const headCX = neckTopX + lean * 0.4;
    const headCY = headY + lean * 0.3 + 7;
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(neckTopX, neckTopY); g.lineTo(headCX, headCY + 7); g.strokePath();

    // Head (tilted back — looking up at the ball)
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(headCX, headCY, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(headCX, headCY, 14);

    // Eyes — looking up at the shot
    g.fillStyle(0x333333, 1);
    g.fillCircle(headCX - 4, headCY - 2 + lean * 0.1, 2.5);
    g.fillCircle(headCX + 6, headCY - 2 + lean * 0.1, 2.5);
    // Slight frown — focused
    g.lineStyle(1.5, 0x553322, 1);
    g.beginPath(); g.moveTo(headCX - 5, headCY + 4); g.lineTo(headCX + 5, headCY + 4); g.strokePath();

    // Hair — 流川碎发刺猬风（后仰时向后飘动，Beast Mode 金色）
    const hairColor = this.isBeastMode ? 0xffdd00 : (char.hair ? Phaser.Display.Color.HexStringToColor(char.hair).color : 0x222222);
    g.fillStyle(hairColor, 1);
    const hx = headCX, hy = headCY; // hy already = head center
    const blow = -progress * 8;
    g.fillEllipse(hx, hy - 10, 30, 10);
    const fadeSpikes = [
      [-8,-14,-13,-26,-6,-15],[-4,-15,-7,-30,-2,-16],[0,-16,-1,-32,2,-16],
      [4,-15,6,-30,6,-16],[8,-14,13,-26,10,-15],
      [-12,-10,-19,-14,-13,-7],[-13,-6,-20,-6,-14,-2],[-13,-2,-18,2,-11,1],
      [12,-10,19,-14,13,-7],[13,-6,20,-6,14,-2],[13,-2,18,2,11,1],
    ];
    for (const [x1, y1, x2, y2, x3, y3] of fadeSpikes) {
      g.fillTriangle(hx + x1, hy + y1, hx + x2 + blow, hy + y2, hx + x3, hy + y3);
    }

    // Headband
    g.lineStyle(3.5, bandHex, 1);
    g.beginPath(); g.arc(headCX, headCY, 14, -Math.PI * 0.85, -Math.PI * 0.15); g.strokePath();
    // Headband tail flying back
    if (progress > 0.15) {
      g.lineStyle(3, bandHex, 0.7);
      g.beginPath(); g.moveTo(headCX - 12, headCY - 3); g.lineTo(headCX - 25 - progress * 10, headCY - 6); g.strokePath();
    }
  }

  // ── 流川枫: 突破扣篮 (Drive & Dunk) ──────────────────────────────────
  // Faster, more elegant than 赤木's power dunk
  doDrive(rimX) {
    if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
    this.isJumping = true;
    this.isDunk = true;
    this.isDrive = true;
    this.jumpOffset = 0;
    this.jumpPhase = 'up';

    const startX = this.playerX;
    const targetX = Phaser.Math.Clamp(rimX - 25, 40, 550);
    const dashDist = targetX - startX;
    const DRIVE_HEIGHT = 150;

    soundManager.play('shoot');

    // "突破!" text
    const txt = this.add.text(this.playerX, this.playerY - 40, '突破!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '30px', color: '#ff2222',
      stroke: '#000000', strokeThickness: 4
    });
    txt.setOrigin(0.5).setDepth(20).setAngle(-5);
    this.tweens.add({ targets: txt, y: txt.y - 80, alpha: 0, scaleX: 1.8, scaleY: 1.8, duration: 900, onComplete: () => txt.destroy() });

    // Phase 1: Quick dash (faster than 赤木)
    const dashDuration = 300;
    this.tweens.add({
      targets: this,
      jumpOffset: DRIVE_HEIGHT,
      duration: dashDuration,
      ease: 'Cubic.easeOut',
      onUpdate: () => {
        const progress = this.jumpOffset / DRIVE_HEIGHT;
        this.playerX = Phaser.Math.Clamp(startX + dashDist * progress, 40, 550);
        this.redrawPlayerDriveRise(this.playerX, this.playerY, progress);
        this.playerGfx.y = -this.jumpOffset;
      },
      onComplete: () => {
        this.jumpPhase = 'hold';
        // 600ms window — press S to dunk, else fall back
        this.time.delayedCall(600, () => {
          if (this.jumpPhase === 'hold' && this.isDunk && this.isDrive) {
            this.isDunk = false;
            this.isDrive = false;
            this.jumpPhase = 'down';
            this.tweens.add({
              targets: this,
              jumpOffset: 0,
              duration: 350,
              ease: 'Quad.easeIn',
              onUpdate: () => { this.playerGfx.y = -this.jumpOffset; },
              onComplete: () => {
                this.isJumping = false;
                this.jumpOffset = 0;
                this.jumpPhase = null;
                this.redrawPlayer(this.playerX, this.playerY, false);
                if (!this.isShooting) this.ball.setPosition(this.playerX + 20, this.playerY - 100);
              }
            });
          }
        });
      }
    });
  }

  // Drive rise pose: single hand high, body stretched, legs trailing
  redrawPlayerDriveRise(px, py, progress) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;
    const lean = 5; // forward lean

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Legs (one stretched back, one tucked — elegant drive pose)
    g.lineStyle(3.5, 0x222222, 1);
    g.beginPath(); g.moveTo(px + lean, torsoB); g.lineTo(px - 15, legBot + 2); g.strokePath(); // trailing leg
    g.beginPath(); g.moveTo(px + lean, torsoB); g.lineTo(px + lean + 5, legBot - 6); g.strokePath(); // front tucked

    this.jerseyNumTxt = this.add.text(px + lean, torsoT + (torsoB - torsoT) / 2, char.jersey || '11', {
