    g.beginPath(); g.moveTo(px + lean + 18, torsoT - 16); g.lineTo(px + lean + 12, headY - 20); g.strokePath();
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + lean + 12, headY - 22, 4);

    // Left arm: out for balance
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px + lean - 14, torsoT + 8); g.lineTo(px + lean - 28, torsoT + 2); g.strokePath();

    // Neck + Head
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px + lean, torsoT); g.lineTo(px + lean, headY + 14); g.strokePath();
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + lean, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px + lean, headY + 7, 14);

    // Cold eyes looking at rim
    g.fillStyle(0x333333, 1);
    g.fillCircle(px + lean - 4, headY + 4, 2.5);
    g.fillCircle(px + lean + 6, headY + 4, 2.5);
    g.lineStyle(1.5, 0x553322, 1);
    g.beginPath(); g.moveTo(px + lean - 5, headY + 10); g.lineTo(px + lean + 5, headY + 10); g.strokePath();

    // Hair — 流川碎发刺猬风（突破时向后飘动，Beast Mode 金色）
    const hairColor = this.isBeastMode ? 0xffdd00 : (char.hair ? Phaser.Display.Color.HexStringToColor(char.hair).color : 0x222222);
    g.fillStyle(hairColor, 1);
    const hx = px + lean, hy = headY + 7;
    const wind = -progress * 6;
    g.fillEllipse(hx, hy - 10, 30, 10);
    const driveSpikes = [
      [-8,-14,-13,-26,-6,-15],[-4,-15,-7,-30,-2,-16],[0,-16,-1,-32,2,-16],
      [4,-15,6,-30,6,-16],[8,-14,13,-26,10,-15],
      [-12,-10,-19,-14,-13,-7],[-13,-6,-20,-6,-14,-2],[-13,-2,-18,2,-11,1],
      [12,-10,19,-14,13,-7],[13,-6,20,-6,14,-2],[13,-2,18,2,11,1],
    ];
    for (const [x1, y1, x2, y2, x3, y3] of driveSpikes) {
      g.fillTriangle(hx + x1, hy + y1, hx + x2 + wind, hy + y2, hx + x3, hy + y3);
    }

    // Headband
    g.lineStyle(3.5, bandHex, 1);
    g.beginPath(); g.arc(hx, hy + 7, 14, -Math.PI * 0.85, -Math.PI * 0.15); g.strokePath();
  }

  // ── 流川枫: 后转身突破 (Reverse Spin Move) ──────────────────────────────
  // Phase 1: spin on the spot (fake left then spin right)
  // Phase 2: explosive drive to basket (reuses doDrive)
  doSpinMove(rimX, isChain) {
    if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
    this.isJumping = true; // block other inputs
    this.jumpPhase = 'up';
    this.isSpinning = true;
    this.spinCount = (isChain ? (this.spinCount || 1) + 1 : 1);

    const startX = this.playerX;

    soundManager.play('shoot');

    // "转身!" text (first spin only, or "连续转身 xN!")
    if (!isChain) {
      const txt = this.add.text(this.playerX, this.playerY - 50, '转身!', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '30px', color: '#ff2222',
        stroke: '#ffcc00', strokeThickness: 4
      });
      txt.setOrigin(0.5).setDepth(20).setAngle(-6);
      this.tweens.add({ targets: txt, y: txt.y - 70, alpha: 0, scaleX: 1.6, scaleY: 1.6, duration: 800, onComplete: () => txt.destroy() });
    } else if (this.spinCount >= 2) {
      const ctxt = this.add.text(this.playerX, this.playerY - 50, '转身 x' + this.spinCount + '!', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '24px', color: '#ff6600',
        stroke: '#ffffff', strokeThickness: 3
      });
      ctxt.setOrigin(0.5).setDepth(20).setAngle(Phaser.Math.Between(-8, 8));
      this.tweens.add({ targets: ctxt, y: ctxt.y - 60, alpha: 0, scaleX: 1.3, scaleY: 1.3, duration: 600, onComplete: () => ctxt.destroy() });
    }

    // Spin animation (350ms) — step back then spin forward ~70px
    const spinDuration = 350;
    const spinForward = 70;
    this.tweens.add({
      targets: { t: 0 },
      t: 1,
      duration: spinDuration,
      ease: 'Cubic.easeInOut',
      onUpdate: (tween, target) => {
        const t = target.t;
        if (t < 0.25) {
          this.playerX = Phaser.Math.Clamp(startX - t * 40, 40, 550);
        } else {
          const p = (t - 0.25) / 0.75;
          const fwd = spinForward * (p * p * 0.4 + p * 0.6);
          this.playerX = Phaser.Math.Clamp(startX - 10 + fwd, 40, 550);
        }
        this.spinT = t;
        this.redrawPlayerSpin(this.playerX, this.playerY, t);
      },
      onComplete: () => {
        this.spinT = 0;
        this.playerX = Phaser.Math.Clamp(startX + spinForward - 10, 40, 550);
        const distToRim = Math.abs(this.playerX - rimX);

        // If S still held and not too close to rim → chain another spin
        if ((this.keyS.isDown || this.virtualS) && distToRim > 80) {
          this.doSpinMove(rimX, true);
        } else {
          // S released or close enough → launch into drive dunk
          this.isSpinning = false;
          this.isJumping = false;
          this.jumpPhase = null;
          this.spinCount = 0;
          this.doDrive(rimX);
        }
      }
    });
  }

  // Spin pose: player rotates 360, showing back then front
  redrawPlayerSpin(px, py, t) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Spin angle: 0→360 degrees mapped to visual width compression
    const angle = t * Math.PI * 2; // full rotation
    const facing = Math.cos(angle); // -1 to 1 (facing direction)
    const bodyWidth = Math.abs(facing) * 28; // compressed when sideways
    const showingBack = facing < -0.2; // showing jersey back

    // Shadow
    g.fillStyle(0x000000, 0.15);
    g.fillEllipse(px, py, 44, 10);

    // Legs (pivoting)
    const legSpread = Math.abs(Math.sin(angle)) * 12;
    g.lineStyle(3.5, 0x222222, 1);
    g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px - legSpread, legBot); g.strokePath();
    g.beginPath(); g.moveTo(px, torsoB); g.lineTo(px + legSpread, legBot); g.strokePath();
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px - legSpread - 2, legBot + 2, 14, 6);
    g.fillEllipse(px + legSpread - 2, legBot + 2, 14, 6);

    // Torso (width changes with rotation)
    const hw = Math.max(bodyWidth / 2, 4);
    g.fillStyle(jerseyHex, 1);
    g.fillRect(px - hw, torsoT, hw * 2, torsoB - torsoT);
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokeRect(px - hw, torsoT, hw * 2, torsoB - torsoT);

    // Jersey number (visible when facing front or back)
    if (Math.abs(facing) > 0.3) {
      this.jerseyNumTxt = this.add.text(px, torsoT + (torsoB - torsoT) / 2, char.jersey || '11', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: Math.max(8, 13 * Math.abs(facing)) + 'px', color: '#ffffff',
        stroke: '#000000', strokeThickness: 2
      });
      this.jerseyNumTxt.setOrigin(0.5);
    }

    // Arms (swing around during spin)
    const armAngle = Math.sin(angle) * 20;
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px - hw, torsoT + 8); g.lineTo(px - hw - 12 + armAngle, torsoT + 20); g.strokePath();
    g.beginPath(); g.moveTo(px + hw, torsoT + 8); g.lineTo(px + hw + 12 - armAngle, torsoT + 20); g.strokePath();

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px, torsoT); g.lineTo(px, headY + 14); g.strokePath();

    // Head
    g.fillStyle(showingBack ? 0xeebb88 : 0xffcc99, 1);
    g.fillCircle(px, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px, headY + 7, 14);

    // Face (only when facing forward enough)
    if (!showingBack) {
      g.fillStyle(0x333333, 1);
      g.fillCircle(px - 5 * facing, headY + 4, 2.5);
      g.fillCircle(px + 5 * facing, headY + 4, 2.5);
      g.lineStyle(1.5, 0x553322, 1);
      g.beginPath(); g.moveTo(px - 4, headY + 10); g.lineTo(px + 4, headY + 10); g.strokePath();
    }

    // Hair — 流川碎发刺猬风（转身时甩动，Beast Mode 金色）
    const hairColor = this.isBeastMode ? 0xffdd00 : (char.hair ? Phaser.Display.Color.HexStringToColor(char.hair).color : 0x222222);
    g.fillStyle(hairColor, 1);
    const whip = Math.sin(angle) * 10;
    const hcYs = headY + 7;
    g.fillEllipse(px, hcYs - 10, 30, 10);
    const spinSpikes = [
      [-8,-14,-13,-26,-6,-15],[-4,-15,-7,-30,-2,-16],[0,-16,-1,-32,2,-16],
      [4,-15,6,-30,6,-16],[8,-14,13,-26,10,-15],
      [-12,-10,-19,-14,-13,-7],[-13,-6,-20,-6,-14,-2],[-13,-2,-18,2,-11,1],
      [12,-10,19,-14,13,-7],[13,-6,20,-6,14,-2],[13,-2,18,2,11,1],
    ];
    for (const [x1, y1, x2, y2, x3, y3] of spinSpikes) {
      g.fillTriangle(px + x1, hcYs + y1, px + x2 + whip, hcYs + y2, px + x3, hcYs + y3);
    }

    // Headband
    g.lineStyle(3.5, bandHex, 1);
    g.beginPath(); g.arc(px, headY + 7, 14, -Math.PI * 0.85, -Math.PI * 0.15); g.strokePath();
    // Headband tail whipping with spin
    g.lineStyle(2.5, bandHex, 0.7);
    g.beginPath(); g.moveTo(px - 12, headY + 4); g.lineTo(px - 20 + whip, headY + 2); g.strokePath();

    // Motion blur lines (speed effect)
    if (t > 0.1 && t < 0.9) {
      g.lineStyle(2, 0xcccccc, 0.3);
      for (let i = 0; i < 3; i++) {
        const ly = torsoT + 10 + i * 12;
        g.beginPath(); g.moveTo(px + 20, ly); g.lineTo(px + 35 + i * 5, ly); g.strokePath();
        g.beginPath(); g.moveTo(px - 20, ly); g.lineTo(px - 35 - i * 5, ly); g.strokePath();
      }
    }
  }

  redrawPlayerDunkHang(px, py) {
    const g = this.playerGfx;
    g.clear();
    if (this.jerseyNumTxt) { this.jerseyNumTxt.destroy(); this.jerseyNumTxt = null; }

    const headY  = py - 88;
    const torsoT = py - 74;
    const torsoB = py - 42;
    const legBot = py;

    const char = this.charConfig || CONFIG.CHARACTERS[0];
    const jerseyHex = Phaser.Display.Color.HexStringToColor(char.color).color;
    const bandHex   = Phaser.Display.Color.HexStringToColor(char.headband).color;
    const jerseyDark = Phaser.Display.Color.IntegerToColor(jerseyHex);
    jerseyDark.darken(50);

    // Legs (dangling)
    g.lineStyle(3.5, 0x222222, 1);
    g.beginPath(); g.moveTo(px - 6, torsoB); g.lineTo(px - 10, legBot + 5); g.strokePath();
    g.beginPath(); g.moveTo(px + 6, torsoB); g.lineTo(px + 2, legBot + 8); g.strokePath();
    g.fillStyle(0x111111, 1);
    g.fillEllipse(px - 12, legBot + 7, 14, 5);
    g.fillEllipse(px + 0, legBot + 10, 14, 5);

    // Jersey body
    g.fillStyle(jerseyHex, 1);
    g.fillRect(px - 14, torsoT, 28, torsoB - torsoT);
    g.lineStyle(2, jerseyDark.color, 1);
    g.strokeRect(px - 14, torsoT, 28, torsoB - torsoT);

    // Jersey number
    this.jerseyNumTxt = this.add.text(px, torsoT + (torsoB - torsoT) / 2, char.jersey || '23', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '13px', color: '#ffffff',
      stroke: '#000000', strokeThickness: 2
    });
    this.jerseyNumTxt.setOrigin(0.5);

    // Both arms reaching UP to grab rim
    g.lineStyle(3.5, 0xffcc99, 1);
    // Left arm up
    g.beginPath(); g.moveTo(px - 14, torsoT + 6); g.lineTo(px - 18, torsoT - 16); g.strokePath();
    g.beginPath(); g.moveTo(px - 18, torsoT - 16); g.lineTo(px - 14, torsoT - 30); g.strokePath();
    // Left hand gripping
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px - 14, torsoT - 32, 4);
    // Right arm up
    g.beginPath(); g.moveTo(px + 14, torsoT + 6); g.lineTo(px + 18, torsoT - 16); g.strokePath();
    g.beginPath(); g.moveTo(px + 18, torsoT - 16); g.lineTo(px + 14, torsoT - 30); g.strokePath();
    // Right hand gripping
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px + 14, torsoT - 32, 4);

    // Neck
    g.lineStyle(3, 0xffcc99, 1);
    g.beginPath(); g.moveTo(px, torsoT); g.lineTo(px, headY + 14); g.strokePath();

    // Head
    g.fillStyle(0xffcc99, 1);
    g.fillCircle(px, headY + 7, 14);
    g.lineStyle(2, 0x885533, 1);
    g.strokeCircle(px, headY + 7, 14);

    // Eyes (looking up/excited)
    g.fillStyle(0x333333, 1);
    g.fillCircle(px - 5, headY + 3, 2.5);
    g.fillCircle(px + 5, headY + 3, 2.5);

    // Open mouth (excited yell)
    g.fillStyle(0x553322, 1);
    g.fillEllipse(px, headY + 12, 8, 5);

    // Hair (synced with standing pose styles, golden in Beast Mode)
    const hs = char.hairStyle || 'spike';
    const hairColor = this.isBeastMode ? 0xffdd00 : Phaser.Display.Color.HexStringToColor(char.hair || '#222').color;
    if (hs === 'spike') {
      // 樱木 — 红色朋克刺发
      g.fillStyle(hairColor, 1);
      const spikeData = [
        { x: px - 8, y: headY - 8, w: 4, h: -10, r: -0.2 },
        { x: px - 3, y: headY - 10, w: 4, h: -12, r: -0.05 },
        { x: px + 3, y: headY - 10, w: 4, h: -14, r: 0.05 },
        { x: px + 8, y: headY - 8, w: 4, h: -10, r: 0.2 },
        { x: px + 12, y: headY - 4, w: 3, h: -8, r: 0.35 },
      ];
      for (const s of spikeData) {
        g.fillTriangle(s.x - 3, headY - 2, s.x + 3, headY - 2, s.x + s.r * 12, s.y + s.h);
      }
    } else if (hs === 'long') {
      // 流川 — 碎发刺猬风
      g.fillStyle(hairColor, 1);
      const hcY = headY + 7;
      g.fillEllipse(px, hcY - 10, 30, 10);
      const spikes = [
        [-8,-14,-13,-26,-6,-15], [-4,-15,-7,-30,-2,-16], [0,-16,-1,-32,2,-16],
        [4,-15,6,-30,6,-16], [8,-14,13,-26,10,-15],
        [-12,-10,-19,-14,-13,-7], [-13,-6,-20,-6,-14,-2], [-13,-2,-18,2,-11,1],
        [12,-10,19,-14,13,-7], [13,-6,20,-6,14,-2], [13,-2,18,2,11,1],
      ];
      for (const [x1, y1, x2, y2, x3, y3] of spikes) {
        g.fillTriangle(px + x1, hcY + y1, px + x2, hcY + y2, px + x3, hcY + y3);
      }
    } else if (hs === 'buzz') {
      // 赤木 — 光头/板寸
      g.fillStyle(hairColor, 0.3);
      g.fillCircle(px, headY + 4, 15);
    } else if (hs === 'short') {
      // 三井 — 偏分短发
      g.fillStyle(hairColor, 1);
      g.fillEllipse(px + 2, headY - 3, 30, 12);
      g.fillTriangle(px + 12, headY - 6, px + 18, headY - 10, px + 16, headY);
    } else if (hs === 'curly') {
      // 宫城 — 棕色卷发
      g.fillStyle(hairColor, 1);
      for (let i = -2; i <= 2; i++) {
        g.fillCircle(px + i * 6, headY - 4, 6);
      }
    } else if (hs === 'tall') {
      // 仙道 — 竖起高发型
      g.fillStyle(hairColor, 1);
      g.fillTriangle(px - 10, headY - 2, px + 10, headY - 2, px, headY - 22);
      g.fillEllipse(px, headY - 2, 28, 10);
    }

    // Headband
    g.lineStyle(4, bandHex, 1);
    g.beginPath();
    g.arc(px, headY + 5, 14, Math.PI + 0.3, -0.3);
    g.strokePath();
  }

  shootBall(dx, dy, dist, dt) {
    if (this.ballTween) { this.ballTween.stop(); this.ballTween = null; }
    this.wasJumpShot = this.isJumping;

    soundManager.play('shoot');

    // Use distance-based speed (less sensitive to swipe speed, more forgiving)
    const speed = Math.min(dist * 3.5, 900);
    let vx    = (dx / dist) * speed;
    let vy    = (dy / dist) * speed;

    this.ball.body.setAllowGravity(true);
    this.ball.body.setVelocity(vx, vy);
    this.ball.body.setAngularVelocity(vx * 0.4);

    this.isShooting        = true;
    this.scored            = false;
    this.hitBackboard      = false;
    this.groundBounceCount = 0;
    this.ballPassedRimTop  = false;
    this.reboundTriggered  = false;

    const rimX = this.hoopGeom.RIM_CX;
    const dToRim = Math.abs(this.playerX - rimX);
    if (dToRim < 250)       this.shotZone = 'near';
    else if (dToRim < 400)  this.shotZone = 'mid';
    else                    this.shotZone = 'far';

    // Shooting pose
    this.redrawPlayer(this.playerX, this.playerY, true);
    if (!this.isJumping) {
      // Ground shot: small hop (player graphic + jersey number move together)
      const hopTargets = [this.playerGfx];
      const jerseyBaseY = this.jerseyNumTxt ? this.jerseyNumTxt.y : 0;
      if (this.jerseyNumTxt) hopTargets.push(this.jerseyNumTxt);
      this.tweens.add({
        targets: hopTargets,
        y: '-=20',
        duration: 150,
        ease: 'Quad.easeOut',
        onComplete: () => {
          this.tweens.add({
            targets: hopTargets,
            y: '+=20',
            duration: 250,
            ease: 'Bounce.easeOut',
            onComplete: () => { this.redrawPlayer(this.playerX, this.playerY, false); }
          });
        }
      });
    } else {
      // Jump shot: already in air — smoothly land the player
      this.tweens.add({
        targets: this,
        jumpOffset: 0,
        duration: 400,
        ease: 'Bounce.easeOut',
        onUpdate: () => { this.playerGfx.y = -this.jumpOffset; },
        onComplete: () => {
          this.isJumping = false;
          this.jumpOffset = 0;
          this.jumpPhase = null;
          this.redrawPlayer(this.playerX, this.playerY, false);
        }
      });
    }
  }

  // ── Score / Miss ──────────────────────────────────────────────────────────
  onScore() {
    if (this.scored) return;
    this.scored = true;

    // Track baskets and combo
    this.basketCount++;
    this.combo = Math.min(this.combo + 1, 10);
    if (this.combo > this.maxCombo) this.maxCombo = this.combo;

    // Sound
    // Bank sound already played on backboard/rim collision; only play swish for clean shots
    if (!this.hitBackboard) soundManager.play('swish');
    if (this.combo > 2) soundManager.play('combo');

    // Real basketball scoring: 2pt inside 3pt line, 3pt outside
    let pts;
    const isThreePointer = this.shotZone === 'far';
    if (this.charConfig && this.charConfig.skill === 'threePoint' && isThreePointer) {
      pts = 4; // 三井远投额外 +1
    } else {
      pts = isThreePointer ? 3 : 2;
    }
    let bonusLabel = isThreePointer ? '3PT' : '2PT';

    if (!this.hitBackboard) {
      pts += 1;
      bonusLabel += ' SWISH! +1';
      const rimX = this.hoopGeom.RIM_CX;
      const rimY = this.hoopGeom.RIM_Y;

      // 1. Big SWISH text with glow
      const swoosh = this.add.text(rimX, rimY + 20, 'SWISH!', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '42px', color: '#ffdd00',
        stroke: '#ff4400', strokeThickness: 6
      });
      swoosh.setOrigin(0.5).setDepth(20);
      swoosh.setAngle(Phaser.Math.Between(-12, -4));
      this.tweens.add({
        targets: swoosh, y: rimY - 50, alpha: 0, scaleX: 2.0, scaleY: 2.0,
        duration: 900, ease: 'Quad.easeOut',
        onComplete: () => swoosh.destroy()
      });

      // 2. Ring burst: expanding circle at rim
      const ring = this.add.graphics().setDepth(19);
      let ringSize = 0;
      this.tweens.add({
        targets: { v: 0 }, v: 1, duration: 500, ease: 'Quad.easeOut',
        onUpdate: (tw, target) => {
          ring.clear();
          ringSize = target.v * 60;
          const a = 1 - target.v;
          ring.lineStyle(3 - target.v * 2, 0xffaa00, a);
          ring.strokeCircle(rimX, rimY + 15, ringSize);
          ring.lineStyle(2, 0xffffff, a * 0.5);
          ring.strokeCircle(rimX, rimY + 15, ringSize * 0.6);
        },
        onComplete: () => ring.destroy()
      });

      // 3. Sparkle burst: small particles flying outward
      const sparkGfx = this.add.graphics().setDepth(20);
      const sparks = [];
      for (let i = 0; i < 10; i++) {
        const angle = (Math.PI * 2 * i / 10) + Math.random() * 0.3;
        sparks.push({
          x: rimX, y: rimY + 15,
          vx: Math.cos(angle) * (80 + Math.random() * 60),
          vy: Math.sin(angle) * (80 + Math.random() * 60),
          size: 2 + Math.random() * 3,
          color: [0xffdd00, 0xff6600, 0xffffff, 0xff3300][i % 4],
          life: 1
        });
      }
      const sparkTimer = this.time.addEvent({
        delay: 16, repeat: 25,
        callback: () => {
          sparkGfx.clear();
          sparks.forEach(s => {
            s.x += s.vx * 0.016;
            s.y += s.vy * 0.016;
            s.vy += 100 * 0.016; // gravity
            s.life -= 0.04;
            if (s.life > 0) {
              sparkGfx.fillStyle(s.color, s.life);
              sparkGfx.fillCircle(s.x, s.y, s.size * s.life);
            }
          });
        }
      });
      this.time.delayedCall(450, () => { sparkGfx.destroy(); });

      // 4. Brief white flash
      const flash = this.add.rectangle(rimX, rimY + 10, 70, 50, 0xffffff, 0.5).setDepth(18);
      this.tweens.add({
        targets: flash, alpha: 0, scaleX: 2, scaleY: 2,
        duration: 250, ease: 'Quad.easeOut',
        onComplete: () => flash.destroy()
      });
    } else if (this.isDunkScore) {
      bonusLabel = 'DUNK!';
      const rimX2 = this.hoopGeom.RIM_CX;
      const rimY2 = this.hoopGeom.RIM_Y;

      // Big DUNK!! text
      const dunkTxt = this.add.text(rimX2, rimY2 - 10, 'DUNK!!', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '48px', color: '#ff3300',
        stroke: '#ffcc00', strokeThickness: 7
      });
      dunkTxt.setOrigin(0.5).setDepth(20).setAngle(Phaser.Math.Between(-10, -3));
      this.tweens.add({
        targets: dunkTxt, y: rimY2 - 80, alpha: 0, scaleX: 2.2, scaleY: 2.2,
        duration: 1100, ease: 'Back.easeOut',
        onComplete: () => dunkTxt.destroy()
      });

      // Shockwave ring at rim
      const wave = this.add.graphics().setDepth(19);
      this.tweens.add({
        targets: { v: 0 }, v: 1, duration: 600, ease: 'Quad.easeOut',
        onUpdate: (tw, target) => {
          wave.clear();
          const r = target.v * 80;
          const a = 1 - target.v;
          wave.lineStyle(4 - target.v * 3, 0xff3300, a);
          wave.strokeCircle(rimX2, rimY2 + 10, r);
          wave.lineStyle(2, 0xffcc00, a * 0.6);
          wave.strokeCircle(rimX2, rimY2 + 10, r * 0.6);
        },
        onComplete: () => wave.destroy()
      });

      this.isDunkScore = false;
    } else {
      bonusLabel += ' BANK!';
    }

    // Jump shot bonus
    if (this.wasJumpShot) {
      pts += 1;
      bonusLabel += ' JUMP+1';
    }

    pts *= this.combo;

    // doubleScore power-up: x2 score
    if (this.activePowerUps.doubleScore) {
      pts *= CONFIG.POWERUPS.doubleScore.scoreMult;
      bonusLabel += bonusLabel ? ' x2!' : 'x2!';
    }

    // Character skill bonus text
    if (this.charConfig) {
      const skill = this.charConfig.skill;
      const rimX = this.hoopGeom.RIM_CX;
      const rimY = this.hoopGeom.RIM_Y;
      let skillLabel = null, skillColor = '#ffffff';

      if (skill === 'threePoint' && isThreePointer) {
        skillLabel = '🎯 三分射手 +1';
        skillColor = '#ffaa00';
      } else if (skill === 'ace' && this.combo >= 3) {
        skillLabel = '🔥 得分天才 越投越准';
        skillColor = '#ff4444';
      } else if (skill === 'rebound' && this.hitBackboard) {
        skillLabel = '💪 篮板王 灌篮王';
        skillColor = '#44cc44';
      } else if (skill === 'bigMan') {
        skillLabel = '🏀 支柱 大球大筐';
        skillColor = '#6688ff';
      } else if (skill === 'genius') {
        skillLabel = this.wasJumpShot ? '✨ 天才 后仰跳投' : '✨ 天才 自动修正';
        skillColor = '#aa88ff';
      } else if (skill === 'speed' && this.wasJumpShot) {
        skillLabel = '⚡ 电光石火 飞跃';
        skillColor = '#ffdd44';
      }

      if (skillLabel) {
        const st = this.add.text(CONFIG.WIDTH / 2, 75, skillLabel, {
          fontFamily: "'Arial Black', sans-serif", fontSize: '16px',
          color: skillColor, stroke: '#000000', strokeThickness: 3, resolution: 2,
        }).setOrigin(0.5).setDepth(22).setAlpha(0);
        this.tweens.add({
          targets: st, alpha: 1, y: 65, duration: 300, ease: 'Quad.easeOut',
          onComplete: () => {
            this.tweens.add({ targets: st, alpha: 0, y: 50, duration: 600, delay: 500, onComplete: () => st.destroy() });
          }
        });
      }
    }

    this.score += pts;

    // Consume shot-based power-ups
    this.consumePowerUpShots();

    // Try spawn new power-up
    this.trySpawnPowerUp();

    const rimX = this.hoopGeom.RIM_CX;
    const rimY = this.hoopGeom.RIM_Y;

    // Main score popup
    const colors  = ['#ff3366','#3366ff','#ff8833','#44cc44','#ffcc00'];
    const color   = colors[Math.floor(Math.random() * colors.length)];
    const ptsTxt  = this.add.text(rimX, rimY - 20, '+' + pts, {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '36px',
      color: color,
      stroke: '#ffffff',
      strokeThickness: 4
    });
    ptsTxt.setOrigin(0.5);
    ptsTxt.setAngle(Phaser.Math.Between(-15, 15));

    this.tweens.add({
      targets: ptsTxt,
      y: rimY - 90,
      alpha: 0,
      duration: 1100,
      ease: 'Quad.easeOut',
      onComplete: () => ptsTxt.destroy()
    });

    // Bonus label
    if (bonusLabel) {
      const bTxt = this.add.text(rimX + 10, rimY - 55, bonusLabel, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '18px',
        color: '#ffcc00',
        stroke: '#333300',
        strokeThickness: 3
      });
      bTxt.setOrigin(0.5);
      bTxt.setAngle(Phaser.Math.Between(-8, 8));
      this.tweens.add({
        targets: bTxt,
        y: rimY - 110,
        alpha: 0,
        duration: 1000,
        ease: 'Quad.easeOut',
        onComplete: () => bTxt.destroy()
      });
    }

    // Combo text
    if (this.combo > 1) {
      const cTxt = this.add.text(rimX - 40, rimY - 80, 'x' + this.combo + ' COMBO!', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '22px',
        color: '#ff3366',
        stroke: '#440011',
        strokeThickness: 3
      });
      cTxt.setOrigin(0.5);
      cTxt.setAngle(Phaser.Math.Between(-12, 12));
      this.tweens.add({
        targets: cTxt,
        y: rimY - 130,
        scaleX: 1.4, scaleY: 1.4,
        alpha: 0,
        duration: 1000,
        ease: 'Back.easeOut',
        onComplete: () => cTxt.destroy()
      });
    }

    // Endless: bonus time every BONUS_EVERY baskets
    if (this.gameMode === 'endless' && this.gameStarted &&
        this.basketCount % CONFIG.ENDLESS.BONUS_EVERY === 0) {
      this.timeLeft += CONFIG.ENDLESS.BONUS_TIME;
      this.showBonusTime();
    }

    // Combo visual effects
    this.updateComboEffects();
    // Score splash
    this.doScoreSplash(rimX, rimY);
    // Celebration animation
    this.doCelebration(pts, this.combo);

    this.updateHUD();

    // Level ball-counter mode
    if (this.gameMode === 'level' && this.levelMode === 'balls') {
      this.ballsLeft = Math.max(0, this.ballsLeft - 1);
      this.updateHUD();
      if (this.ballsLeft <= 0) {
        this.time.delayedCall(1600, () => this.levelComplete());
        return;
      }
    }

    this.time.delayedCall(1600, () => this.respawnBall());
  }

  showBonusTime() {
    const popup = this.add.text(CONFIG.WIDTH - 80, 65, '+' + CONFIG.ENDLESS.BONUS_TIME + 's!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '26px',
      color: '#44cc44',
      stroke: '#003300',
      strokeThickness: 3,
    });
    popup.setOrigin(0.5);
    this.tweens.add({
      targets: popup,
      y: popup.y - 50,
      alpha: 0,
      duration: 1200,
      ease: 'Quad.easeOut',
      onComplete: () => popup.destroy(),
    });
  }

  onMiss() {
    if (this.scored) return;
    if (!this.isShooting) return;
    this.isShooting = false; // prevent double-call from ground + off-screen checks

    soundManager.play('miss');

    // comboShield protects combo from resetting
    if (!this.activePowerUps.comboShield) {
      this.combo = 0;
      // Destroy combo effects emitter since combo resets
      if (this.comboEmitter) { this.comboEmitter.destroy(); this.comboEmitter = null; }
      if (this.ball) this.ball.clearTint();
      this.cleanupBeastMode();
    }
    const missWords = ['MISS...', 'NOPE', 'AIR BALL', 'BRICK!', 'OH NO'];
    const word = missWords[Math.floor(Math.random() * missWords.length)];

    const mTxt = this.add.text(
      this.ball ? this.ball.x : 400,
      this.ball ? this.ball.y - 20 : 200,
      word,
      {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '28px',
        color: '#888888',
        stroke: '#444444',
        strokeThickness: 3
      }
    );
    mTxt.setOrigin(0.5);
    mTxt.setAngle(Phaser.Math.Between(-10, 10));
    this.tweens.add({
      targets: mTxt,
      y: mTxt.y - 60,
      alpha: 0,
      duration: 900,
      ease: 'Quad.easeOut',
      onComplete: () => mTxt.destroy()
    });

    this.updateHUD();

    // Level ball-counter mode: miss also costs a ball
    if (this.gameMode === 'level' && this.levelMode === 'balls') {
      this.ballsLeft = Math.max(0, this.ballsLeft - 1);
      this.updateHUD();
      if (this.ballsLeft <= 0) {
        this.time.delayedCall(800, () => this.levelComplete());
        return;
      }
    }

    this.time.delayedCall(800, () => this.respawnBall());
  }

  respawnBall() {
    if (this.isGameOver) return;
    // If player is hanging on rim after dunk, wait until they drop
    if (this.isDunkHanging) {
      this.time.delayedCall(300, () => this.respawnBall());
      return;
    }
    // Destroy combo emitter before ball, so it doesn't follow a destroyed sprite
    if (this.comboEmitter) { this.comboEmitter.destroy(); this.comboEmitter = null; }
    if (this.ball) {
      this.ball.clearTint();
      this.ball.destroy();
      this.ball = null;
    }
    this.ballColliders.forEach(c => { if (c) this.physics.world.removeCollider(c); });
    this.ballColliders = [];
    this.isFadeaway = false;
    this.isDrive = false;

    // Randomize player position per shot if level has randomPos
    if (this.gameMode === 'level' && this.levelConfig && this.levelConfig.randomPos) {
      this.playerX = Phaser.Math.Between(280, 480);
      this.redrawPlayer(this.playerX, this.playerY, false);
    }

    // Endless mode progressive difficulty
    if (this.gameMode === 'endless') {
      this.applyEndlessDifficulty();
    }

    this.createBall();
    // Re-apply combo effects on the new ball if combo is still active
    if (this.combo > 1) this.updateComboEffects();
  }

  // 樱木篮板王: mid-air grab before ball hits ground
  _doMidAirRebound() {
    const ballX = this.ball ? this.ball.x : 400;
    const ballY = this.ball ? this.ball.y : 250;
    const origX = this.playerGfx.x;
    const origY = this.playerGfx.y;
    const grabX = Phaser.Math.Clamp(ballX, 60, 700);
    const grabY = Math.min(ballY - 20, 220);

    // Freeze ball
    if (this.ball) {
      this.ball.body.setVelocity(0, 0);
      this.ball.body.setAllowGravity(false);
    }

    // Phase 1: leap to ball position
    this.tweens.add({
      targets: this.playerGfx,
      x: grabX - this.playerX,
      y: -(this.playerY - grabY + 20),
      duration: 250,
      ease: 'Quad.easeOut',
      onUpdate: () => {
        this.redrawPlayerDunkRise(this.playerX, this.playerY);
      },
      onComplete: () => {
        // Snap ball to hands
        if (this.ball) {
          this.ball.setPosition(grabX, grabY - 40);
        }

        // "篮板王!" text
        const rebTxt = this.add.text(grabX, grabY - 70, '篮板王!', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '36px', color: '#ff2200',
          stroke: '#ffcc00', strokeThickness: 5
        });
        rebTxt.setOrigin(0.5);
        rebTxt.setAngle(Phaser.Math.Between(-12, -4));
        this.tweens.add({ targets: rebTxt, y: rebTxt.y - 80, alpha: 0, scaleX: 1.5, scaleY: 1.5, duration: 1200, onComplete: () => rebTxt.destroy() });

        this.cameras.main.shake(200, 0.008);

        // Phase 2: brief hang, then land
        this.time.delayedCall(350, () => {
          this.tweens.add({
            targets: this.playerGfx,
            x: origX,
            y: origY,
            duration: 350,
            ease: 'Bounce.easeOut',
            onComplete: () => {
              this.redrawPlayer(this.playerX, this.playerY, false);
              this.respawnBall();
            }
          });
        });
      }
    });
  }

  applyEndlessDifficulty() {
    const bc = this.basketCount;

    // Shrink score zone
    if (this.scoreZoneBody) {
      const newW = (this.defaultScoreZoneW - 10) * Math.max(0.7, 1 - bc * 0.005);
      this.scoreZoneBody.body.setSize(newW, 12);
      this.scoreZoneBody.refreshBody();
    }

    // Increase wind after 10 baskets
    if (bc > 10) {
      this.windForce = Math.min(1 + (bc - 10) * 0.15, 5);
      this.updateHUD();
      if (!this.windTxt) {
        this.windTxt = this.add.text(14, CONFIG.HEIGHT - 40, '', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '13px',
          color: '#446688',
          stroke: '#f5f0e0',
          strokeThickness: 2,
        }).setDepth(10);
      }
      this.windTxt.setVisible(true);
      this.updateHUD();
    }

    // Moving rim after 15 baskets
    if (bc >= 15 && !this.rimMoving) {
      this.setupMovingRim();
    }

    // Obstacles after 25 baskets
    if (bc >= 25 && !this.obstacleTimer && this.obstacles.length === 0) {
      this.setupObstacles();
    }

    // Player position stays where the user placed it
  }

  // ── Timer ─────────────────────────────────────────────────────────────────
  startTimer() {
    // Endless mode: timer starts on first swipe
    // Level timed mode: timer starts immediately
    const needsTimer = this.gameMode === 'endless' ||
      (this.gameMode === 'level' && this.levelMode === 'time');
    if (!needsTimer) return;

    this.timerEvent = this.time.addEvent({
      delay: 1000,
      callback: this.tickTimer,
      callbackScope: this,
      loop: true,
    });

    // Level timed mode starts immediately
    if (this.gameMode === 'level' && this.levelMode === 'time') {
      this.gameStarted = true;
    }
  }

  tickTimer() {
    if (!this.gameStarted || this.isGameOver || this.timerFrozen) return;

    this.timeLeft = Math.max(0, this.timeLeft - 1);
    this.updateHUD();

    if (this.timeLeft <= 0) {
      if (this.gameMode === 'level') {
        this.levelComplete();
      } else {
        this.gameOver();
      }
    }
  }

  gameOver() {
    if (this.isGameOver) return;
    this.isGameOver = true;
    soundManager.stopBGM();

    if (this.timerEvent) this.timerEvent.remove();
    this.cleanupWeather();
    this.cleanupPowerUps();
    this.cleanupObstacles();

    // Save to localStorage
    const save = loadSave();
    const prevHigh = save.highScore || 0;
    const isNewHigh = this.score > prevHigh;
    if (isNewHigh) save.highScore = this.score;
    // Track baskets per character
    if (!save.charBaskets) save.charBaskets = {};
    const charId = this.charConfig ? this.charConfig.id : 'default';
    save.charBaskets[charId] = (save.charBaskets[charId] || 0) + this.basketCount;
    writeSave(save);
    this.checkUnlocks();

    // Brief flash before transition
    const overlay = this.add.graphics();
    overlay.fillStyle(0xff0000, 0);
    overlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

    this.tweens.add({
      targets: overlay,
      alpha: 0.3,
      duration: 200,
      yoyo: true,
      repeat: 2,
      onComplete: () => {
        this.scene.start('ResultScene', {
          score:     this.score,
          combo:     this.maxCombo,
          baskets:   this.basketCount,
          mode:      this.gameMode,
          level:     this.currentLevel,
          isNewHigh: isNewHigh,
        });
      }
    });
  }

  levelComplete() {
    if (this.isGameOver) return;
    this.isGameOver = true;
    soundManager.stopBGM();
    if (this.timerEvent) this.timerEvent.remove();

    const cfg = this.levelConfig;
    let stars = 0;
    if (cfg && cfg.stars) {
      if (this.score >= cfg.stars[2])      stars = 3;
      else if (this.score >= cfg.stars[1]) stars = 2;
      else if (this.score >= cfg.stars[0]) stars = 1;
    }
    const passed = stars > 0;

    // Save stars to localStorage
    const save = loadSave();
    const levelStars = save.levelStars || {};
    if ((levelStars[this.currentLevel] || 0) < stars) {
      levelStars[this.currentLevel] = stars;
    }
    save.levelStars = levelStars;
    writeSave(save);

    this.cleanupWeather();
    this.cleanupPowerUps();
    this.cleanupObstacles();
    this.checkUnlocks();

    const overlay = this.add.graphics();
    overlay.fillStyle(passed ? 0x00cc44 : 0xff0000, 0);
    overlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    this.tweens.add({
      targets: overlay,
      alpha: 0.25,
      duration: 200,
      yoyo: true,
      repeat: 2,
      onComplete: () => {
        this.scene.start('ResultScene', {
          score:     this.score,
          combo:     this.maxCombo,
          baskets:   this.basketCount,
          mode:      this.gameMode,
          level:     this.currentLevel,
          isNewHigh: false,
          stars:     stars,
          passed:    passed,
        });
      }
    });
  }

      strokeThickness: 3,
    });

      const initSecs = Math.ceil(this.timeLeft);

        fontFamily: "'Arial Black', sans-serif",
        fontSize: '22px',
        color: '#44ddff',
        stroke: '#000000',
        strokeThickness: 3,
      });

          color: '#cc6600',
          stroke: '#f5f0e0',
          strokeThickness: 3,
        });

    }

    if (showBalls) {
