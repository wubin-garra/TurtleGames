      this.ballsBg.fillStyle(0x222222, 0.7);
      this.ballsBg.fillRoundedRect(CONFIG.WIDTH - 148, 6, 140, 42, 12);
      this.ballsBg.lineStyle(3, 0xff8833, 0.8);
      this.ballsBg.strokeRoundedRect(CONFIG.WIDTH - 148, 6, 140, 42, 12);

      this.ballsIcon = this.add.text(CONFIG.WIDTH - 140, 10, '🏀', { fontSize: '22px' });

      this.ballsTxt = this.add.text(CONFIG.WIDTH - 112, 11, 'x' + this.ballsLeft, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '22px',
        color: '#ff8833',
        stroke: '#000000',
        strokeThickness: 3,
      });
    }

    // Level info header (level mode)
    if (this.gameMode === 'level' && this.levelConfig) {
      const cfg = this.levelConfig;
      this.levelTxt = this.add.text(CONFIG.WIDTH / 2, 18, 'LV.' + cfg.id + ' ' + cfg.name, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '13px',
        color: '#444433',
        stroke: '#f5f0e0',
        strokeThickness: 2,
      }).setOrigin(0.5);
    }

    // Back to menu button (top-left, small pause/home icon)
    const homeBg = this.add.graphics().setDepth(30);
    homeBg.fillStyle(0x222222, 0.5);
    homeBg.fillRoundedRect(155, 10, 34, 34, 8);
    homeBg.lineStyle(2, 0xffffff, 0.3);
    homeBg.strokeRoundedRect(155, 10, 34, 34, 8);
    const homeBtn = this.add.text(172, 27, '⏸', {
      fontSize: '18px',
    }).setOrigin(0.5).setDepth(31).setAlpha(0.6);
    const homeHit = this.add.zone(172, 27, 44, 44).setDepth(32).setInteractive({ useHandCursor: true });
    homeHit.on('pointerdown', () => {
      soundManager.stopBGM();
      if (this._sBtnDom) { this._sBtnDom.remove(); this._sBtnDom = null; }
      this.scene.start('MenuScene');
    });
    homeHit.on('pointerover', () => { homeBtn.setAlpha(1); homeBg.clear(); homeBg.fillStyle(0x444444, 0.7); homeBg.fillRoundedRect(155, 10, 34, 34, 8); homeBg.lineStyle(2, 0xffffff, 0.6); homeBg.strokeRoundedRect(155, 10, 34, 34, 8); });
    homeHit.on('pointerout', () => { homeBtn.setAlpha(0.6); homeBg.clear(); homeBg.fillStyle(0x222222, 0.5); homeBg.fillRoundedRect(155, 10, 34, 34, 8); homeBg.lineStyle(2, 0xffffff, 0.3); homeBg.strokeRoundedRect(155, 10, 34, 34, 8); });

    // Combo counter
    this.comboTxt = this.add.text(CONFIG.WIDTH / 2, 16, '', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '18px',
      color: '#ff3366',
      stroke: '#440011',
      strokeThickness: 3
    });
    this.comboTxt.setOrigin(0.5, 0);

    // Instructions
    // Instruction text — position above move list area
    const instrY = this.isTouchDevice ? CONFIG.HEIGHT - 140 : CONFIG.HEIGHT - 22;
    this.instrTxt = this.add.text(CONFIG.WIDTH / 2, instrY, 'SWIPE TO SHOOT', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '14px',
      color: '#888877',
      stroke: '#f5f0e0',
      strokeThickness: 3
    });
    this.instrTxt.setOrigin(0.5);

    // BGM toggle — mobile: top-right (avoid S button), PC: bottom-right
    const save = loadSave();
    this.bgmOn = save.bgmOn !== false;
    const bgmX = this.isTouchDevice ? CONFIG.WIDTH - 14 : CONFIG.WIDTH - 14;
    const bgmY = this.isTouchDevice ? 56 : CONFIG.HEIGHT - 14;
    this.bgmTxt = this.add.text(bgmX, bgmY, this.bgmOn ? '🎵' : '🎵off', {
      fontSize: '18px', color: this.bgmOn ? '#333333' : '#bbbbaa',
    });
    this.bgmTxt.setOrigin(1, this.isTouchDevice ? 0.5 : 1);
    this.bgmTxt.setDepth(25);
    this.bgmTxt.setInteractive({ useHandCursor: true });
    this.bgmTxt.on('pointerdown', () => {
      this.bgmOn = !this.bgmOn;
      soundManager.bgmEnabled = this.bgmOn;
      if (!this.bgmOn) soundManager.stopBGM();
      else soundManager.startBGM();
      this.bgmTxt.setText(this.bgmOn ? '🎵' : '🎵off');
      this.bgmTxt.setColor(this.bgmOn ? '#333333' : '#bbbbaa');
      const s = loadSave(); s.bgmOn = this.bgmOn; writeSave(s);
    });

    // Song name display
    const songX = this.isTouchDevice ? CONFIG.WIDTH - 34 : CONFIG.WIDTH - 34;
    const songY = this.isTouchDevice ? 56 : CONFIG.HEIGHT - 14;
    this.songNameTxt = this.add.text(songX, songY, '', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '10px',
      color: '#888877',
      resolution: 2,
    });
    this.songNameTxt.setOrigin(1, this.isTouchDevice ? 0.5 : 1).setDepth(25).setAlpha(0.7);
    this._updateSongName();

    // ── Move List (街霸风出招表) ──
    this._createMoveList();
  }

  _createMoveList() {
    const char = this.charConfig;
    if (!char) return;

    // Build move list per character
    const moves = [];
    // Common moves — adapt labels for mobile (joystick) vs PC (keyboard)
    const isMobile = this.isTouchDevice;
    const L = isMobile ? '◀' : 'A';
    const R = isMobile ? '▶' : 'D';
    const J = isMobile ? '▲' : '空格';
    const S = isMobile ? '🏀' : 'S';
    moves.push({ keys: `${L}/${R}`, desc: '运球移动' });
    moves.push({ keys: '滑动', desc: '投篮' });

    const sk = char.skill;
    if (sk === 'rebound') {
      moves.push({ keys: `${R}+${J}`, desc: '超远飞扣' });
      moves.push({ keys: '自动', desc: '抢篮板补扣' });
    } else if (sk === 'ace') {
      moves.push({ keys: `${R}+${J}`, desc: '突破扣篮' });
      moves.push({ keys: `${L}+${J}`, desc: '后仰跳投' });
      moves.push({ keys: `${L}+${S}`, desc: '旋转突破' });
    } else if (sk === 'bigMan') {
      moves.push({ keys: `${R}+${J}`, desc: '力量扣篮' });
    } else if (sk === 'threePoint') {
      moves.push({ keys: `${J}+${S}`, desc: '蓄力跳投' });
      moves.push({ keys: '站三分线外', desc: '球变小筐变大' });
    } else if (sk === 'speed') {
      moves.push({ keys: `${R}+${J}`, desc: '高速上篮' });
    } else if (sk === 'genius') {
      moves.push({ keys: `${R}+${J}`, desc: '假投转身后仰' });
      moves.push({ keys: '自动', desc: '球轨迹修正' });
    }

    // Draw move list — mobile: top-left, PC: bottom-center
    const lineH = 13;
    const totalH = moves.length * lineH + 8;
    let mlX, mlY;
    if (this.isTouchDevice) {
      mlX = 10; mlY = 50; // top-left, below HUD
    } else {
      mlX = CONFIG.WIDTH / 2 - 120; mlY = CONFIG.HEIGHT - 8 - totalH;
    }

    // Semi-transparent background
    const bg = this.add.graphics().setDepth(24).setAlpha(0.7);
    bg.fillStyle(0x000000, 0.5);
    bg.fillRoundedRect(mlX, mlY, 240, totalH, 6);

    const lines = moves.map((m, i) => {
      const y = mlY + 6 + i * lineH;
      const keyTxt = this.add.text(mlX + 10, y, m.keys, {
        fontFamily: "'Arial Black', sans-serif", fontSize: '9px',
        color: '#ffcc44', resolution: 2,
      }).setDepth(25);
      const descTxt = this.add.text(mlX + 130, y, m.desc, {
        fontFamily: "sans-serif", fontSize: '9px',
        color: '#ffffff', resolution: 2,
      }).setDepth(25);
      return [keyTxt, descTxt];
    });

    this.moveListItems = [bg, ...lines.flat()];
  }

  _updateSongName() {
    if (!this.songNameTxt || !this.songNameTxt.active) return;
    const name = soundManager.currentTrackName || '';
    const display = name ? '♪ ' + name : '';
    if (this.songNameTxt.text !== display) {
      this.songNameTxt.setText(display);
    }
    this.time.delayedCall(2000, () => this._updateSongName());
  }

  // Set endless mode timer to current BGM song duration
  _setSongTimer() {
    const audio = soundManager.bgmAudio;
    if (audio && isFinite(audio.duration) && audio.duration > 0) {
      this.timeLeft = Math.ceil(audio.duration);
    } else if (audio) {
      // Metadata not loaded yet — listen for it
      const onMeta = () => {
        if (isFinite(audio.duration) && audio.duration > 0) {
          this.timeLeft = Math.ceil(audio.duration);
          if (this.timerTxt) {
            const m = Math.floor(this.timeLeft / 60), s = this.timeLeft % 60;
            this.timerTxt.setText(m + ':' + (s < 10 ? '0' : '') + s);
          }
        }
        audio.removeEventListener('loadedmetadata', onMeta);
      };
      audio.addEventListener('loadedmetadata', onMeta);
    }
    // Fallback: CONFIG.ENDLESS.INITIAL_TIME is already set
  }

  updateHUD() {
    this.scoreTxt.setText('' + this.score);

    if (this.combo > 1) {
      this.comboTxt.setText('🔥 x' + this.combo);
      this.comboTxt.setVisible(true);
    } else {
      this.comboTxt.setVisible(false);
    }

    // Timer display
    if (this.timerTxt) {
      const secs = Math.max(0, Math.ceil(this.timeLeft));
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      const formatted = m + ':' + (s < 10 ? '0' : '') + s;
      this.timerTxt.setText(formatted);

      // Flash red when <= 10 seconds
      if (secs <= 10 && this.gameStarted) {
        const flash = secs % 2 === 0;
        this.timerTxt.setColor(flash ? '#ff4444' : '#ff0000');
        if (this.timerBg) {
          this.timerBg.clear();
          this.timerBg.fillStyle(0x440000, flash ? 0.7 : 0.8);
          this.timerBg.fillRoundedRect(CONFIG.WIDTH - 148, 6, 140, 42, 12);
          this.timerBg.lineStyle(3, 0xff0000, 0.9);
          this.timerBg.strokeRoundedRect(CONFIG.WIDTH - 148, 6, 140, 42, 12);
        }
      } else {
        this.timerTxt.setColor('#44ddff');
      }
    }

    // Balls counter display
    if (this.ballsTxt) {
      this.ballsTxt.setText('x' + Math.max(0, this.ballsLeft));
    }

    // Wind indicator display
    if (this.windTxt) {
      const dir = this.windDirection > 0 ? '→' : '←';
      this.windTxt.setText('💨 ' + dir + ' ' + this.windForce + '级');
    }

    // Hide wait text once started
    if (this.gameStarted && this.waitTxt) {
      this.waitTxt.setVisible(false);
    }
  }

  // ── Manual Hoop Collision ────────────────────────────────────────────────
  // Replaces static body colliders for precise, realistic bouncing
  updateHoopCollision() {
    if (!this.ball || !this.ball.active || !this.isShooting) return;
    if (this.isDunkHanging) return; // dunk slam: ball passes through rim
    if (this.hoopCollisionCooldown > 0) { this.hoopCollisionCooldown--; return; }

    const b = this.ball;
    const bx = b.x, by = b.y;
    const vx = b.body.velocity.x, vy = b.body.velocity.y;
    const R = 14; // ball radius
    const { RIM_CX, RIM_Y, RIM_W, BOARD_X, BOARD_Y, BOARD_W, BOARD_H, POLE_X } = this.hoopGeom;

    // Rim shake offset (same as visual)
    let rimShake = 0;
    if (this.gameMode === 'level' && this.levelConfig && this.levelConfig.rimShake) {
      rimShake = Math.sin(Date.now() * 0.01) * 3;
    }
    const rimY = RIM_Y + rimShake;
    // Moving rim offset
    const rimOffset = this.rimMoving ? (Math.sin(this.rimMovePhase) * this.rimMoveRange) : 0;
    const rimCX = RIM_CX + rimOffset;
    const rimLeftX = rimCX - RIM_W / 2;
    const rimRightX = rimCX + RIM_W / 2;
    const boardX = BOARD_X + rimOffset;

    // ─ Backboard front face: vertical line at boardX, from BOARD_Y to BOARD_Y+BOARD_H
    if (bx + R > boardX && bx - R < boardX + BOARD_W &&
        by > BOARD_Y - R && by < BOARD_Y + BOARD_H + R) {
      // Ball touching backboard area — bounce off front face
      if (bx < boardX + BOARD_W / 2) {
        // Coming from the left (normal shot) — soft bounce, easy bank shot
        b.x = boardX - R - 1;
        b.body.velocity.x = -Math.abs(vx) * 0.2 - 15;
        b.body.velocity.y = vy * 0.4;
      } else {
        // Behind backboard — push out to left
        b.x = boardX - R - 1;
        b.body.velocity.x = -100;
        b.body.velocity.y = Math.abs(vy) * 0.2 + 40;
      }
      this.hitBackboard = true;
      this.hoopCollisionCooldown = 6;
      soundManager.play('bank');
      return;
    }

    // ─ Pole: vertical line at POLE_X, from BOARD_Y up to ground
    if (bx + R > POLE_X - 5 && bx - R < POLE_X + 5 &&
        by > BOARD_Y - R && by < CONFIG.GROUND_Y) {
      b.x = POLE_X - 5 - R - 1;
      b.body.velocity.x = -Math.abs(vx) * 0.3 - 50;
      b.body.velocity.y = vy * 0.8;
      this.hitBackboard = true;
      this.hoopCollisionCooldown = 6;
      soundManager.play('bank');
      return;
    }

    // ─ Left rim edge: circle at (rimLeftX, rimY) radius ~5
    const RIM_R = 5;
    const dlx = bx - rimLeftX, dly = by - rimY;
    const distL = Math.sqrt(dlx * dlx + dly * dly);
    if (distL < R + RIM_R) {
      // Bounce off left rim — reflect based on collision normal
      const nx = dlx / distL, ny = dly / distL;
      const dot = vx * nx + vy * ny;
      b.body.velocity.x = (vx - 1.4 * dot * nx) * 0.65;
      b.body.velocity.y = (vy - 1.4 * dot * ny) * 0.65;
      // Push ball out of rim
      b.x = rimLeftX + nx * (R + RIM_R + 1);
      b.y = rimY + ny * (R + RIM_R + 1);
      this.hitBackboard = true;
      this.hoopCollisionCooldown = 5;
      soundManager.play('rimHit');
      return;
    }

    // ─ Right rim edge: circle at (rimRightX, rimY) radius ~5
    const drx = bx - rimRightX, dry = by - rimY;
    const distR = Math.sqrt(drx * drx + dry * dry);
    if (distR < R + RIM_R) {
      const nx = drx / distR, ny = dry / distR;
      const dot = vx * nx + vy * ny;
      b.body.velocity.x = (vx - 1.4 * dot * nx) * 0.65;
      b.body.velocity.y = (vy - 1.4 * dot * ny) * 0.65;
      b.x = rimRightX + nx * (R + RIM_R + 1);
      b.y = rimY + ny * (R + RIM_R + 1);
      this.hitBackboard = true;
      this.hoopCollisionCooldown = 5;
      soundManager.play('rimHit');
      return;
    }

    // ─ Rim bracket: horizontal bar from boardX to rimRightX at rimY
    if (bx > rimRightX - 5 && bx < boardX + 5 && by + R > rimY - 4 && by - R < rimY + 4) {
      if (vy > 0) {
        b.y = rimY - R - 2;
        b.body.velocity.y = -Math.abs(vy) * 0.3 - 40;
      } else {
        b.y = rimY + R + 2;
        b.body.velocity.y = Math.abs(vy) * 0.3 + 40;
      }
      b.body.velocity.x *= 0.7;
      this.hitBackboard = true;
      this.hoopCollisionCooldown = 5;
      soundManager.play('rimHit');
      return;
    }
  }

  // ── Update ────────────────────────────────────────────────────────────────
  update() {
    if (this.isGameOver) return;
    if (!this.ball || !this.ball.active) return;

    // Keyboard movement: left/right only when on ground and not shooting
    if (this.cursors && !this.isShooting && !this.isJumping) {
      const moveSpeed = this.speedActive ? 8 : 4; // 宫城: 2x speed
      const isMovingLeft = this.cursors.left.isDown || this.keyA.isDown || this.virtualLeft;
      const isMovingRight = this.cursors.right.isDown || this.keyD.isDown || this.virtualRight;
      if (isMovingLeft || isMovingRight) {
        if (isMovingLeft) this.playerX = Math.max(40, this.playerX - moveSpeed);
        else this.playerX = Math.min(550, this.playerX + moveSpeed);
        this.dribbleTime = (this.dribbleTime || 0) + 1;
        this.playerFacing = isMovingRight ? 1 : -1;
        // Dribble bounce: ball bounces between waist and ground level
        const prevPhase = Math.abs(Math.sin(((this.dribbleTime - 1) || 0) * 0.25));
        const dribblePhase = Math.abs(Math.sin(this.dribbleTime * 0.25));
        // Play dribble sound when ball hits ground (phase crosses near 0)
        if (prevPhase > 0.15 && dribblePhase <= 0.15) soundManager.play('dribble');
        const ballBaseY = this.playerY - 10; // near ground
        const ballBounceY = ballBaseY - dribblePhase * 50; // bounce up to waist
        const ballOffX = (this.playerFacing > 0 ? 20 : -20);
        this.ball.body.reset(this.playerX + ballOffX, ballBounceY);
        this.redrawPlayerDribble(this.playerX, this.playerY, this.playerFacing, dribblePhase);
      } else {
        this.dribbleTime = 0;
        this.redrawPlayer(this.playerX, this.playerY, false);
        this.ball.setPosition(this.playerX + 20, this.playerY - 100);
      }

      // 流川 spin move: S while dribbling left on ground
      if (isMovingLeft && !this.isSpinning
          && this.charConfig && this.charConfig.skill === 'ace'
          && (Phaser.Input.Keyboard.JustDown(this.keyS) || this.virtualSJustPressed)) {
        const rimX = this.hoopGeom ? this.hoopGeom.RIM_CX : 600;
        const distToRim = Math.abs(this.playerX - rimX);
        if (distToRim > 60) {
          this.doSpinMove(rimX);
        }
      }

      // Space / virtual jump = jump (hold A/D for directional jump)
      const spaceJustDown = Phaser.Input.Keyboard.JustDown(this.cursors.space) || this.virtualJumpJustPressed;
      if (this.virtualJumpJustPressed) this.virtualJumpJustPressed = false;
      if (!this.isSpinning && spaceJustDown) {
        const movingRight = this.cursors.right.isDown || this.keyD.isDown || this.virtualRight;
        const movingLeft = this.cursors.left.isDown || this.keyA.isDown || this.virtualLeft;
        const rimX = this.hoopGeom ? this.hoopGeom.RIM_CX : 600;
        const distToRim = Math.abs(this.playerX - rimX);

        // 宫城 layup / 赤木 dunk / 流川 drive / 樱木 super dunk
        const isBigMan = this.charConfig && this.charConfig.skill === 'bigMan';
        const isRebound = this.charConfig && this.charConfig.skill === 'rebound';
        const isAce = this.charConfig && this.charConfig.skill === 'ace';
        const isGenius = this.charConfig && this.charConfig.skill === 'genius';
        if (this.speedActive && movingRight && distToRim < 350 && distToRim > 40) {
          this.doLayup(rimX);
        } else if (isBigMan && movingRight && distToRim < 280 && distToRim > 40) {
          this.doDunk(rimX);
        } else if (isAce && movingLeft) {
          // 流川: 后仰跳投 — fadeaway jump, press S to shoot
          this.doFadeaway(rimX);
        } else if (isAce && movingRight && distToRim < 320 && distToRim > 40) {
          // 流川: 突破扣篮 — quick elegant drive
          this.doDrive(rimX);
        } else if (isRebound && movingRight && distToRim > 200 && distToRim < 500) {
          // 樱木: 超远飞扣 — long distance flying dunk from 3pt range
          this.doSuperDunk(rimX);
        } else if (isGenius && movingRight && distToRim < 300 && distToRim > 40) {
          // 仙道: 空中换手拉杆上篮
          this.doReverseLayup(rimX);
        } else {
          // Normal jump
          this.isJumping = true;
          this.jumpOffset = 0;
          this.jumpPhase = 'up';
          let jumpDx = this.speedActive ? 80 : 50;
          if (movingRight) { /* keep jumpDx */ }
          else if (movingLeft) jumpDx = -jumpDx;
          else jumpDx = 0;
          const startX = this.playerX;
          this.redrawPlayer(this.playerX, this.playerY, true);
          const JUMP_HEIGHT = this.speedActive ? 100 : 70;
          this.tweens.add({
            targets: this,
            jumpOffset: JUMP_HEIGHT,
            duration: 280,
            ease: 'Quad.easeOut',
            onUpdate: () => {
              const progress = this.jumpOffset / JUMP_HEIGHT;
              if (jumpDx !== 0) {
                this.playerX = Phaser.Math.Clamp(startX + jumpDx * progress, 40, 550);
                this.redrawPlayer(this.playerX, this.playerY, true);
              }
              this.playerGfx.y = -this.jumpOffset;
            },
            onComplete: () => {
              this.jumpPhase = 'hold';
              this.time.delayedCall(200, () => {
                this.jumpPhase = 'down';
                this.tweens.add({
                  targets: this,
                  jumpOffset: 0,
                  duration: 350,
                  ease: 'Bounce.easeOut',
                  onUpdate: () => { this.playerGfx.y = -this.jumpOffset; },
                  onComplete: () => {
                    this.isJumping = false;
                    this.jumpOffset = 0;
                    this.jumpPhase = null;
                    this.redrawPlayer(this.playerX, this.playerY, false);
                    if (!this.isShooting) this.ball.setPosition(this.playerX + 20, this.playerY - 100);
                  }
                });
              });
            }
          });
        }
      }
    }

    // Sync ball during spin move (ground level, ball swings around player)
    if (this.isSpinning && !this.isShooting) {
      const armAngle = Math.sin((this.spinT || 0) * Math.PI * 2) * 20;
      this.ball.body.reset(this.playerX + armAngle, this.playerY - 80);
    }

    // Sync ball + jersey position BEFORE S key check so shot uses correct position
    if (this.isJumping && !this.isShooting && !this.isDunkHanging && !this.isSpinning) {
      if (this.isFadeaway) {
        // Fadeaway: ball held high near head, slightly behind
        this.ball.body.reset(this.playerX + 15, this.playerY - 120 - (this.jumpOffset || 0));
      } else if (this.isSuperDunk) {
        // Jordan fly: ball in right hand, high above head
        this.ball.body.reset(this.playerX + 18, this.playerY - 130 - (this.jumpOffset || 0));
      } else if (this.isDrive) {
        // 流川 drive: ball in right hand, high above head
        this.ball.body.reset(this.playerX + 17, this.playerY - 128 - (this.jumpOffset || 0));
      } else if (this.isReverseLayup) {
        // 仙道: ball follows the actual hand position from pose animation
        if (this.sendoBallHandX != null) {
          this.ball.body.reset(this.sendoBallHandX, this.sendoBallHandY);
        } else {
          this.ball.body.reset(this.playerX + 15, this.playerY - 120 - (this.jumpOffset || 0));
        }
      } else if (this.isDunk) {
        // 赤木 dunk: ball held above head with both hands
        this.ball.body.reset(this.playerX, this.playerY - 120 - (this.jumpOffset || 0));
      } else {
        this.ball.body.reset(this.playerX + 20, this.playerY - 100 - (this.jumpOffset || 0));
      }
    }
    if (this.isJumping && this.jerseyNumTxt) {
      const torsoT = this.playerY - 74;
      const torsoB = this.playerY - 42;
      this.jerseyNumTxt.y = torsoT + (torsoB - torsoT) / 2 - (this.jumpOffset || 0);
    }

    // Layup: hold S to charge during hold phase, release to shoot
    if (this.isLayup && this.jumpPhase === 'hold' && !this.isShooting) {
      if ((Phaser.Input.Keyboard.JustDown(this.keyS) || this.virtualSJustPressed)) {
        this.layupChargeStart = this.time.now;
        this.layupCharging = true;
        if (!this.chargeBar) this.chargeBar = this.add.graphics().setDepth(20);
      }
      if (this.layupCharging && (this.keyS.isDown || this.virtualS)) {
        const elapsed = Math.min(this.time.now - this.layupChargeStart, 500);
        const pct = elapsed / 500;
        const bx = this.ball.x, by = this.ball.y;
        this.chargeBar.clear();
        this.chargeBar.fillStyle(0x333333, 0.6);
        this.chargeBar.fillRoundedRect(bx - 20, by - 30, 40, 6, 3);
        const r = Math.floor(255 * pct), g2 = Math.floor(255 * (1 - pct * 0.5));
        this.chargeBar.fillStyle((r << 16) | (g2 << 8) | 0, 0.9);
        this.chargeBar.fillRoundedRect(bx - 20, by - 30, 40 * pct, 6, 3);
      }
      if (this.layupCharging && (Phaser.Input.Keyboard.JustUp(this.keyS) || this.virtualSJustReleased)) {
        const elapsed = Math.min(this.time.now - this.layupChargeStart, 500);
        const pct = elapsed / 500; // 0~1
        this.layupCharging = false;
        if (this.chargeBar) this.chargeBar.clear();
        this.doLayupRelease(pct);
      }
    }

    // Dunk slam: S during dunk hold phase = slam down
    // Super dunk: S during flight = accelerate dive into dunk
    if (this.isSuperDunk && !this.superDunkDiving && !this.isShooting && (Phaser.Input.Keyboard.JustDown(this.keyS) || this.virtualSJustPressed)) {
      this._superDunkDive();
    }
    // Regular dunk: S at hold = slam (not 仙道 — his move is fully automatic)
    if (this.isDunk && !this.isSuperDunk && !this.isReverseLayup && this.jumpPhase === 'hold' && !this.isShooting && (Phaser.Input.Keyboard.JustDown(this.keyS) || this.virtualSJustPressed)) {
      this.doDunkSlam();
    }

    // 流川 fadeaway: S during fadeaway hold or fall = shoot
    if (this.isFadeaway && !this.isShooting
        && (this.jumpPhase === 'hold' || this.jumpPhase === 'down')
        && (Phaser.Input.Keyboard.JustDown(this.keyS) || this.virtualSJustPressed)) {
      this.doFadeawayShot();
    }

    // S = hold to charge shot height, release to shoot
    if (this.cursors && !this.isShooting && !this.isLayup && !this.isDunk && !this.isFadeaway) {
      if ((Phaser.Input.Keyboard.JustDown(this.keyS) || this.virtualSJustPressed)) {
        // Start charging
        this.sChargeStart = this.time.now;
        this.sCharging = true;
        if (!this.gameStarted && this.gameMode === 'endless') this.gameStarted = true;
        // Show charge indicator
        if (!this.chargeBar) {
          this.chargeBar = this.add.graphics().setDepth(20);
        }
      }
      // Draw charge bar while holding
      if (this.sCharging && (this.keyS.isDown || this.virtualS)) {
        const elapsed = Math.min(this.time.now - this.sChargeStart, 1000);
        const pct = elapsed / 1000; // 0~1 over 1 second
        const bx = this.ball.x, by = this.ball.y;
        this.chargeBar.clear();
        // Background
        this.chargeBar.fillStyle(0x333333, 0.6);
        this.chargeBar.fillRoundedRect(bx - 20, by - 30, 40, 6, 3);
        // Fill: green→yellow→red
        const r = Math.floor(255 * pct), g = Math.floor(255 * (1 - pct * 0.5));
        this.chargeBar.fillStyle((r << 16) | (g << 8) | 0, 0.9);
        this.chargeBar.fillRoundedRect(bx - 20, by - 30, 40 * pct, 6, 3);
      }
      // Release = shoot
      if (this.sCharging && (Phaser.Input.Keyboard.JustUp(this.keyS) || this.virtualSJustReleased)) {
        this.sCharging = false;
        if (this.chargeBar) { this.chargeBar.clear(); }
        const elapsed = Math.min(this.time.now - this.sChargeStart, 1000);
        const pct = elapsed / 1000; // 0~1
        // Arc height: short press = low flat shot, long press = high arc
        const rimX = this.hoopGeom.RIM_CX;
        const rimY = this.hoopGeom.RIM_Y;
        const bx = this.ball.x, by = this.ball.y;
        const dx = rimX - bx;
        const arcHeight = 100 + pct * 250; // 100~350 pixels above target
        const dy = (rimY - arcHeight) - by;
        const realDist = Math.sqrt(dx * dx + dy * dy);
        const fakeDist = Math.min(realDist * 0.45, 180);
        const nx = dx / realDist, ny = dy / realDist;
        this.shootBall(nx * fakeDist, ny * fakeDist, fakeDist, 200);
      }
    } else if (this.sCharging) {
      // Cancel charge if shot happened another way
      this.sCharging = false;
      if (this.chargeBar) this.chargeBar.clear();
    }

    // threePoint (三井): toggle ball/hoop size based on 3pt line
    if (this.charConfig && this.charConfig.skill === 'threePoint' && !this.isShooting) {
      const rimX = this.hoopGeom ? this.hoopGeom.RIM_CX : 602;
      const beyond3pt = Math.abs(this.playerX - rimX) >= 400;
      if (beyond3pt && !this.threePointActive) {
        this.threePointActive = true;
        if (this.ball) { this.ball.setDisplaySize(14, 14); this.ball.body.setCircle(6, 6, 6); }
        if (this.scoreZoneBody) {
          this.scoreZoneBody.body.setSize(this.defaultScoreZoneW + 16, 28);
          this.scoreZoneBody.refreshBody();
        }
      } else if (!beyond3pt && this.threePointActive) {
        this.threePointActive = false;
        if (this.ball) { this.ball.setDisplaySize(30, 30); this.ball.body.setCircle(14, 14, 14); }
        if (this.scoreZoneBody) {
          this.scoreZoneBody.body.setSize(this.defaultScoreZoneW, 12);
          this.scoreZoneBody.refreshBody();
        }
      }
    }

    // Moving rim update
    if (this.rimMoving) this.updateMovingRim();

    // Manual hoop collision (replaces static bodies for precision)
    this.updateHoopCollision();

    // Track if ball passes above rim opening (required for valid score)
    if (this.isShooting && !this.scored && this.hoopGeom && this.ball) {
      const { RIM_CX, RIM_Y, RIM_W } = this.hoopGeom;
      const bx = this.ball.x, by = this.ball.y;
      const halfW = RIM_W / 2 + 5; // small tolerance
      if (by <= RIM_Y && bx >= RIM_CX - halfW && bx <= RIM_CX + halfW) {
        this.ballPassedRimTop = true;
      }
    }

    // Move obstacle birds
    const now = this.time.now;
    for (let i = this.obstacles.length - 1; i >= 0; i--) {
      const obs = this.obstacles[i];
      if (!obs.alive) continue;
      const elapsed = (now - obs._startTime) / 1000;
      const newX = obs._startX + obs.velX * elapsed;
      obs.text.x = newX;
      const bz = obs.physGroup.getChildren()[0];
      if (bz) bz.body.reset(newX, obs.text.y);
      // Remove when off screen
      if (newX < -100 || newX > CONFIG.WIDTH + 100) {
        this._destroyObstacle(obs);
      }
    }

    // Wind physics when ball is in flight
    if (this.isShooting && this.windForce > 0) {
      const wf = this.windForce * 0.5;
      this.ball.body.velocity.x += this.windDirection * wf;
    }

    // genius (仙道): steer ball direction toward rim without changing speed
    // All aim-assist effects stop once ball drops below rim level
    const ballAboveRim = this.hoopGeom && this.ball.y < this.hoopGeom.RIM_Y;

    if (this.isShooting && !this.scored && ballAboveRim && this.charConfig && this.charConfig.skill === 'genius') {
      const { RIM_CX, RIM_Y } = this.hoopGeom;
      const dx = RIM_CX - this.ball.x;
      const dy = RIM_Y - this.ball.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 20 && dist < 300) {
        const vx = this.ball.body.velocity.x;
        const vy = this.ball.body.velocity.y;
        const speed = Math.sqrt(vx * vx + vy * vy);
        if (speed > 10) {
          const blend = 0.03;
          const nx = vx + (dx / dist) * speed * blend;
          const ny = vy + (dy / dist) * speed * blend;
          const newSpeed = Math.sqrt(nx * nx + ny * ny);
          this.ball.body.velocity.x = (nx / newSpeed) * speed;
          this.ball.body.velocity.y = (ny / newSpeed) * speed;
        }
      }
    }

    // Rain wobble
    if (this.isShooting && this.weatherType === 'rain') {
      this.ball.body.velocity.x += (Math.random() - 0.5) * 2;
    }

    // Aim-assist effects — only when ball is above rim
    if (this.isShooting && ballAboveRim) {
      const { RIM_CX, RIM_Y } = this.hoopGeom;
      const dx = RIM_CX - this.ball.x;
      const dy = (RIM_Y + 10) - this.ball.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // ace (流川): aim-assist grows with total baskets
      if (this.charConfig && this.charConfig.skill === 'ace' && dist > 1) {
        const power = Math.min(3.0 + this.basketCount * 2.0, 9.0);
        this.ball.body.velocity.x += (dx / dist) * power;
        this.ball.body.velocity.y += (dy / dist) * power * 0.7;
      }
      // threePoint (三井): ~70% swish rate, steer ball above rim then drop
      else if (this.threePointActive && dist > 1) {
        const bx = this.ball.x, by = this.ball.y;
        // Gentle horizontal nudge toward rim
        if (bx < RIM_CX - 15) {
          this.ball.body.velocity.x += 1.2;
        } else if (bx > RIM_CX + 15) {
          this.ball.body.velocity.x -= 1.2;
        }
        // Above rim: moderate vertical assist
        if (Math.abs(bx - RIM_CX) < 30 && by < RIM_Y) {
          this.ball.body.velocity.x *= 0.92;
          this.ball.body.velocity.y += 6;
        }
      }
      // Default aim-assist
      else if (dist > 1) {
        this.ball.body.velocity.x += (dx / dist) * 1.2;
        this.ball.body.velocity.y += (dy / dist) * 0.8;
      }
    }

    // Night: move ball glow to follow ball
    if (this.nightBallGlow && this.ball) {
      this.nightBallGlow.x = this.ball.x;
      this.nightBallGlow.y = this.ball.y;
    }

    // Combo fire emitter: follow ball, only visible during flight
    if (this.comboEmitter && this.ball) {
      this.comboEmitter.setPosition(this.ball.x, this.ball.y);
      this.comboEmitter.setVisible(this.isShooting);
    }

    // Beast mode: sync player fire emitter position
    if (this.beastPlayerEmitter && this.isBeastMode) {
      this.beastPlayerEmitter.setPosition(this.playerX, this.playerY - (this.jumpOffset || 0));
    }

    // threePoint (三井): full arc trail from release to ball
    if (this.isShooting && this.threePointActive && this.ball) {
      if (!this.threeTrail) this.threeTrail = [];
      this.threeTrail.push({ x: this.ball.x, y: this.ball.y });
      if (!this.threeTrailGfx) this.threeTrailGfx = this.add.graphics().setDepth(2);
      this.threeTrailGfx.clear();
      const len = this.threeTrail.length;
      if (len >= 2) {
        // Draw smooth arc line with gradient width
        for (let i = 1; i < len; i++) {
          const p0 = this.threeTrail[i - 1];
          const p1 = this.threeTrail[i];
          const pct = i / len; // 0→1 from start to current
          const width = 1 + pct * 3.5;
          const alpha = 0.15 + pct * 0.5;
          this.threeTrailGfx.lineStyle(width, 0x3399ff, alpha);
          this.threeTrailGfx.beginPath();
          this.threeTrailGfx.moveTo(p0.x, p0.y);
          this.threeTrailGfx.lineTo(p1.x, p1.y);
          this.threeTrailGfx.strokePath();
        }
        // Glow at ball tip
        const last = this.threeTrail[len - 1];
        this.threeTrailGfx.fillStyle(0x3399ff, 0.5);
        this.threeTrailGfx.fillCircle(last.x, last.y, 6);
        this.threeTrailGfx.fillStyle(0xffffff, 0.4);
        this.threeTrailGfx.fillCircle(last.x, last.y, 3);
      }
    } else if (this.threeTrailGfx) {
      // Fade out the arc after scoring/missing
      if (this.threeTrail && this.threeTrail.length > 0) {
        if (!this.threeTrailFade) this.threeTrailFade = 1;
        this.threeTrailFade -= 0.05;
        if (this.threeTrailFade <= 0) {
          this.threeTrailGfx.clear();
          this.threeTrail = null;
          this.threeTrailFade = null;
        } else {
          this.threeTrailGfx.clear();
          const len = this.threeTrail.length;
          for (let i = 1; i < len; i++) {
            const p0 = this.threeTrail[i - 1];
            const p1 = this.threeTrail[i];
            const pct = i / len;
            const width = 1 + pct * 3.5;
            const alpha = (0.15 + pct * 0.5) * this.threeTrailFade;
            this.threeTrailGfx.lineStyle(width, 0x3399ff, alpha);
            this.threeTrailGfx.beginPath();
            this.threeTrailGfx.moveTo(p0.x, p0.y);
            this.threeTrailGfx.lineTo(p1.x, p1.y);
            this.threeTrailGfx.strokePath();
          }
        }
      } else {
        this.threeTrailGfx.clear();
        this.threeTrail = null;
      }
    }

    if (!this.isShooting) return;

    const b = this.ball;

    // 樱木篮板王: grab ball mid-air before it hits ground
    if (!this.scored && this.charConfig && this.charConfig.skill === 'rebound' &&
        b.body.velocity.y > 50 && b.y > this.hoopGeom.RIM_Y + 60 && b.y < CONFIG.GROUND_Y - 30 &&
        !this.reboundTriggered) {
      this.reboundTriggered = true;
      if (Math.random() < 0.9) {
        this.isShooting = false;
        soundManager.play('rebound');
        this._doMidAirRebound();
        return;
      }
    }

    if (
      b.x < -80 || b.x > CONFIG.WIDTH + 80 ||
      b.y > CONFIG.HEIGHT + 60
    ) {
      this.onMiss();
      return;
    }

    // Safety: ball stuck near hoop for too long
    const spd = Math.sqrt(b.body.velocity.x * b.body.velocity.x + b.body.velocity.y * b.body.velocity.y);
    if (spd < 15 && b.y < this.hoopGeom.RIM_Y + 20) {
      this.stuckTimer = (this.stuckTimer || 0) + 1;
      if (this.stuckTimer > 50) {
        this.stuckTimer = 0;
        b.body.velocity.x = -150;
        b.body.velocity.y = 120;
      }
    } else {
      this.stuckTimer = 0;
    }

    // Consume virtual button flags at end of frame
    this.virtualSJustPressed = false;
    this.virtualSJustReleased = false;
  }

  // ── Textures (particles) ──────────────────────────────────────────────────
  createTextures() {
    // fireparticle: 8x8 radial gradient yellow→orange→transparent
    if (!this.textures.exists('fireparticle')) {
      const fc = document.createElement('canvas');
      fc.width = fc.height = 8;
      const fctx = fc.getContext('2d');
      const fg = fctx.createRadialGradient(4, 4, 0, 4, 4, 4);
      fg.addColorStop(0,   'rgba(255,220,0,1)');
      fg.addColorStop(0.5, 'rgba(255,100,0,0.8)');
      fg.addColorStop(1,   'rgba(255,50,0,0)');
      fctx.fillStyle = fg;
      fctx.fillRect(0, 0, 8, 8);
      this.textures.addCanvas('fireparticle', fc);
    }

    // spark: 4x4 bright cross
    if (!this.textures.exists('spark')) {
      const sc = document.createElement('canvas');
      sc.width = sc.height = 4;
      const sctx = sc.getContext('2d');
      sctx.fillStyle = '#ffffff';
      sctx.fillRect(1, 0, 2, 4);
      sctx.fillRect(0, 1, 4, 2);
      this.textures.addCanvas('spark', sc);
    }

    // inksplat: 10x10 pink circle
    if (!this.textures.exists('inksplat')) {
      const ic = document.createElement('canvas');
      ic.width = ic.height = 10;
      const ictx = ic.getContext('2d');
      ictx.beginPath();
      ictx.arc(5, 5, 4.5, 0, Math.PI * 2);
      ictx.fillStyle = '#ff66aa';
      ictx.fill();
      this.textures.addCanvas('inksplat', ic);
    }

    // raindrop: 3x12 blue-white rectangle, alpha 0.5
    if (!this.textures.exists('raindrop')) {
      const rc = document.createElement('canvas');
      rc.width = 3; rc.height = 12;
      const rctx = rc.getContext('2d');
      rctx.fillStyle = 'rgba(180,210,255,0.5)';
      rctx.fillRect(0, 0, 3, 12);
      this.textures.addCanvas('raindrop', rc);
    }
  }

  // ── Weather Setup ─────────────────────────────────────────────────────────
  setupWeather() {
    // Determine weather type
    if (this.gameMode === 'level' && this.levelConfig) {
      this.weatherType  = this.levelConfig.weather || 'clear';
      this.windForce    = this.levelConfig.wind    || 0;
      this.windDirection = 1;
    } else if (this.gameMode === 'endless') {
      // Start clear, cycle every 20s
      this.weatherType  = 'clear';
      this.windForce    = 0;
      this.windDirection = 1;
      this.weatherTimer = this.time.addEvent({
        delay: 20000,
        callback: this.cycleEndlessWeather,
        callbackScope: this,
        loop: true,
      });
    }

    this.applyWeather();

    // Wind direction changes every 4s
    if (this.windForce > 0) {
      this.windChangeTimer = this.time.addEvent({
        delay: 4000,
        callback: () => {
          this.windDirection *= -1;
          this.updateHUD();
        },
        loop: true,
      });
    }
  }

  cycleEndlessWeather() {
    const options = ['clear', 'windy', 'rain', 'night'];
    const next = options[Math.floor(Math.random() * options.length)];
    this.cleanupWeatherEffects();
    this.weatherType = next;
    this.windForce = next === 'windy' ? 2 : next === 'rain' ? 1 : 0;
    this.applyWeather();
    if (this.windChangeTimer) this.windChangeTimer.remove();
    if (this.windForce > 0) {
      this.windChangeTimer = this.time.addEvent({
        delay: 4000,
        callback: () => { this.windDirection *= -1; this.updateHUD(); },
        loop: true,
      });
    }
    this.updateHUD();
  }

  applyWeather() {
    // Wind HUD indicator
    if (this.windForce > 0) {
      if (!this.windTxt) {
        this.windTxt = this.add.text(14, CONFIG.HEIGHT - 40, '', {
          fontFamily: "'Arial Black', sans-serif",
          fontSize: '13px',
          color: '#446688',
          stroke: '#f5f0e0',
          strokeThickness: 2,
        }).setDepth(10);
      }
      this.updateHUD();
    } else if (this.windTxt) {
      this.windTxt.setVisible(false);
    }

    // Rain
    if (this.weatherType === 'rain') {
      if (!this.rainEmitter && this.textures.exists('raindrop')) {
        this.rainEmitter = this.add.particles(0, -10, 'raindrop', {
          x: { min: 0, max: CONFIG.WIDTH },
          y: -10,
          speedY: { min: 300, max: 500 },
          speedX: { min: -20, max: 20 },
          lifespan: 2000,
          quantity: 4,
          frequency: 30,
          alpha: 0.6,
        });
        this.rainEmitter.setDepth(5);
      }
    }

    // Night
    if (this.weatherType === 'night') {
      if (!this.nightOverlay) {
        this.nightOverlay = this.add.graphics().setDepth(4);
        this.nightOverlay.fillStyle(0x000022, 0.6);
        this.nightOverlay.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      }
      if (!this.nightRimGlow && this.hoopGeom) {
        const { RIM_CX, RIM_Y } = this.hoopGeom;
        this.nightRimGlow = this.add.graphics().setDepth(5);
        this.nightRimGlow.fillStyle(0xffff00, 0.15);
        this.nightRimGlow.fillCircle(RIM_CX, RIM_Y, 50);
      }
      if (!this.nightBallGlow) {
        this.nightBallGlow = this.add.graphics().setDepth(5);
        this.nightBallGlow.fillStyle(0xff8800, 0.2);
        this.nightBallGlow.fillCircle(0, 0, 36);
        if (this.ball) {
          this.nightBallGlow.x = this.ball.x;
          this.nightBallGlow.y = this.ball.y;
        }
      }
      // HUD to high depth so it's visible above night overlay
      if (this.scoreBg)   this.scoreBg.setDepth(19);
      if (this.scoreIcon) this.scoreIcon.setDepth(20);
      if (this.scoreTxt)  this.scoreTxt.setDepth(20);
      if (this.comboTxt)  this.comboTxt.setDepth(20);
      if (this.timerTxt)  this.timerTxt.setDepth(20);
      if (this.ballsTxt)  this.ballsTxt.setDepth(20);
      if (this.instrTxt)  this.instrTxt.setDepth(20);
      if (this.windTxt)   this.windTxt.setDepth(20);
      if (this.waitTxt)   this.waitTxt.setDepth(20);
      if (this.timerBg)   this.timerBg.setDepth(19);
      if (this.timerIcon) this.timerIcon.setDepth(20);
      if (this.ballsBg)   this.ballsBg.setDepth(19);
      if (this.ballsIcon) this.ballsIcon.setDepth(20);
      if (this.levelTxt)  this.levelTxt.setDepth(20);
    }
  }

  cleanupWeatherEffects() {
    if (this.rainEmitter)   { this.rainEmitter.destroy();   this.rainEmitter   = null; }
    if (this.nightOverlay)  { this.nightOverlay.destroy();  this.nightOverlay  = null; }
    if (this.nightRimGlow)  { this.nightRimGlow.destroy();  this.nightRimGlow  = null; }
    if (this.nightBallGlow) { this.nightBallGlow.destroy(); this.nightBallGlow = null; }
    if (this.windTxt)       { this.windTxt.destroy();       this.windTxt       = null; }
  }

  cleanupWeather() {
    this.cleanupWeatherEffects();
    if (this.windChangeTimer) { this.windChangeTimer.remove(); this.windChangeTimer = null; }
    if (this.weatherTimer)    { this.weatherTimer.remove();    this.weatherTimer    = null; }
  }

  // ── Combo Visual Effects ──────────────────────────────────────────────────
  updateComboEffects() {
    // Destroy previous emitter if exists
    if (this.comboEmitter) {
      this.comboEmitter.destroy();
      this.comboEmitter = null;
    }

    // Clear ball tint
    if (this.ball) this.ball.clearTint();

    const c = this.combo;

    if (c >= 10) {
      // BEAST MODE
      this.doBeastMode();
    } else if (c >= 7) {
      // Lightning sparks + blue ball tint
      if (this.ball && this.textures.exists('spark')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'spark', {
          // position synced in update()
          speedX: { min: -80, max: 80 },
          speedY: { min: -80, max: 80 },
          lifespan: 300,
          quantity: 3,
          frequency: 40,
          blendMode: 'ADD',
          alpha: { start: 1, end: 0 },
        });
        this.comboEmitter.setDepth(8);
      }
      if (this.ball) this.ball.setTint(0x4488ff);
    } else if (c >= 4) {
      // Fire trail + screen shake
      const fireQty = 4;
      if (this.ball && this.textures.exists('fireparticle')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
          // position synced in update()
          speedX: { min: -30, max: 30 },
          speedY: { min: -30, max: 30 },
          lifespan: 400,
          quantity: fireQty,
          frequency: 30,
          alpha: { start: 0.9, end: 0 },
          scale: { start: 1.2, end: 0.2 },
        });
        this.comboEmitter.setDepth(8);
      }
      this.cameras.main.shake(100, 0.003);
    } else if (c >= 2) {
      // Orange trail
      if (this.ball && this.textures.exists('fireparticle')) {
        this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
          // position synced in update()
          speedX: { min: -20, max: 20 },
          speedY: { min: -20, max: 20 },
          lifespan: 300,
          quantity: 2,
          frequency: 50,
          alpha: { start: 0.7, end: 0 },
          tint: 0xff8833,
        });
        this.comboEmitter.setDepth(8);
      }
    }
  }

  doBeastMode() {
    const cx = CONFIG.WIDTH / 2;
    const cy = CONFIG.HEIGHT / 2;

    soundManager.play('beast');

    // ── Super Saiyan transformation sequence ──

    // 1. Intense white flash → golden
    const flash = this.add.graphics().setDepth(30);
    flash.fillStyle(0xffffff, 0.7);
    flash.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    this.tweens.add({
      targets: flash, alpha: 0, duration: 400,
      onUpdate: (tw) => {
        const p = tw.progress;
        flash.clear();
        flash.fillStyle(p < 0.5 ? 0xffffff : 0xffdd00, 0.7 * (1 - p));
        flash.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
      },
      onComplete: () => flash.destroy()
    });

    // 2. Heavy camera shake (power-up tremor)
    this.cameras.main.shake(600, 0.012);

    // 3. "BEAST MODE!!" text — golden Saiyan style
    const bTxt = this.add.text(cx, cy - 40, 'BEAST MODE!!', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '42px',
      color: '#ffdd00',
      stroke: '#ff6600',
      strokeThickness: 6,
    }).setOrigin(0.5).setDepth(32).setAngle(Phaser.Math.Between(-5, 5));
    this.tweens.add({
      targets: bTxt,
      scaleX: 2, scaleY: 2,
      alpha: 0,
      duration: 1500,
      ease: 'Back.easeOut',
      onComplete: () => bTxt.destroy()
    });

    // 4. Explosive energy burst lines (radiating from player)
    const px0 = this.playerX, py0 = this.playerY - 50;
    for (let i = 0; i < 16; i++) {
      const angle = (i / 16) * Math.PI * 2;
      const lg = this.add.graphics().setDepth(31);
      lg.lineStyle(3, 0xffdd00, 0.8);
      const r1 = 30, r2 = 120 + Phaser.Math.Between(0, 60);
      lg.beginPath();
      lg.moveTo(px0 + Math.cos(angle) * r1, py0 + Math.sin(angle) * r1);
      lg.lineTo(px0 + Math.cos(angle) * r2, py0 + Math.sin(angle) * r2);
      lg.strokePath();
      lg.setScale(0.1); lg.setAlpha(1);
      this.tweens.add({
        targets: lg,
        scaleX: 1, scaleY: 1, alpha: 0,
        duration: 800,
        delay: i * 30,
        ease: 'Cubic.easeOut',
        onComplete: () => lg.destroy()
      });
    }

    // 5. Ground crack effect (power impact)
    const crackG = this.add.graphics().setDepth(31);
    crackG.lineStyle(2, 0xffaa00, 0.7);
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI - Math.PI / 2 + Phaser.Math.FloatBetween(-0.2, 0.2);
      const len = Phaser.Math.Between(30, 70);
      crackG.beginPath();
      crackG.moveTo(px0, this.playerY);
      let cx2 = px0, cy2 = this.playerY;
      for (let j = 0; j < 3; j++) {
        cx2 += Math.cos(a) * (len / 3) + Phaser.Math.Between(-5, 5);
        cy2 += Math.sin(a) * (len / 6) + Phaser.Math.Between(0, 4);
        crackG.lineTo(cx2, cy2);
      }
      crackG.strokePath();
    }
    this.tweens.add({ targets: crackG, alpha: 0, duration: 1500, delay: 500, onComplete: () => crackG.destroy() });

    // Fire emitter on ball
    if (this.ball && this.textures.exists('fireparticle')) {
      if (this.comboEmitter) { this.comboEmitter.destroy(); this.comboEmitter = null; }
      this.comboEmitter = this.add.particles(this.ball.x, this.ball.y, 'fireparticle', {
        follow: this.ball,
        speedX: { min: -60, max: 60 },
        speedY: { min: -60, max: 60 },
        lifespan: 500,
        quantity: 6,
        frequency: 20,
        alpha: { start: 1, end: 0 },
        scale: { start: 1.5, end: 0.2 },
        blendMode: 'ADD',
      });
      this.comboEmitter.setDepth(9);
      if (this.ball) this.ball.setTint(0xff4400);
    }

    // ── BEAST MODE persistent effects (Super Saiyan style) ──
    this.isBeastMode = true;

    // 1. Golden flaming aura around player
    if (!this.beastAura) {
      this.beastAura = this.add.graphics().setDepth(1);
    }
    this.beastAuraPulse = this.tweens.add({
      targets: { v: 0 },
      v: 1,
      duration: 300,
      yoyo: true,
      repeat: -1,
      onUpdate: (tw, target) => {
        if (!this.beastAura || !this.isBeastMode) return;
        this.beastAura.clear();
        const px = this.playerX, py = this.playerY - (this.jumpOffset || 0);
        const pulse = target.v;
        // Outer golden aura (flame shape — wider at bottom, pointed top)
        this.beastAura.fillStyle(0xffdd00, 0.06 + pulse * 0.04);
        this.beastAura.fillEllipse(px, py - 35, 65 + pulse * 20, 110 + pulse * 15);
        // Mid aura
        this.beastAura.fillStyle(0xffaa00, 0.08 + pulse * 0.05);
        this.beastAura.fillEllipse(px, py - 40, 50 + pulse * 12, 90 + pulse * 10);
        // Inner white-hot core
        this.beastAura.fillStyle(0xffffff, 0.04 + pulse * 0.03);
        this.beastAura.fillEllipse(px, py - 45, 30 + pulse * 8, 60 + pulse * 6);

        // Random lightning sparks around body
        if (Math.random() < 0.3) {
          this.beastAura.lineStyle(1.5, 0x88ddff, 0.7);
          const lx = px + Phaser.Math.Between(-30, 30);
          const ly = py - Phaser.Math.Between(10, 80);
          this.beastAura.beginPath();
          this.beastAura.moveTo(lx, ly);
          this.beastAura.lineTo(lx + Phaser.Math.Between(-12, 12), ly + Phaser.Math.Between(-15, 15));
          this.beastAura.lineTo(lx + Phaser.Math.Between(-12, 12), ly + Phaser.Math.Between(-15, 15));
          this.beastAura.strokePath();
        }
      }
    });

    // 2. Screen edge golden glow border
    if (!this.beastBorder) {
      this.beastBorder = this.add.graphics().setDepth(25);
    }
    this.beastBorder.clear();
    // Top edge — golden
    this.beastBorder.fillGradientStyle(0xffaa00, 0xffaa00, 0xffaa00, 0xffaa00, 0.3, 0.3, 0, 0);
    this.beastBorder.fillRect(0, 0, CONFIG.WIDTH, 18);
    // Bottom edge
    this.beastBorder.fillGradientStyle(0xffaa00, 0xffaa00, 0xffaa00, 0xffaa00, 0, 0, 0.3, 0.3);
    this.beastBorder.fillRect(0, CONFIG.HEIGHT - 18, CONFIG.WIDTH, 18);
    // Left edge
    this.beastBorder.fillGradientStyle(0xffaa00, 0xffaa00, 0xffaa00, 0xffaa00, 0.25, 0, 0.25, 0);
    this.beastBorder.fillRect(0, 0, 14, CONFIG.HEIGHT);
    // Right edge
    this.beastBorder.fillGradientStyle(0xffaa00, 0xffaa00, 0xffaa00, 0xffaa00, 0, 0.25, 0, 0.25);
    this.beastBorder.fillRect(CONFIG.WIDTH - 14, 0, 14, CONFIG.HEIGHT);

    this.beastBorderPulse = this.tweens.add({
      targets: this.beastBorder,
      alpha: { from: 0.5, to: 1 },
      duration: 400,
      yoyo: true,
      repeat: -1,
    });

    // 3. Periodic lightning bolts around player
    this.beastLightningTimer = this.time.addEvent({
      delay: 300,
      loop: true,
      callback: () => {
        if (!this.isBeastMode) return;
        const lg = this.add.graphics().setDepth(3);
        const px = this.playerX, py = this.playerY - (this.jumpOffset || 0);
        lg.lineStyle(2, 0x88ddff, 0.9);
        // Jagged lightning bolt
        let lx = px + Phaser.Math.Between(-25, 25);
        let ly = py - 90;
        lg.beginPath(); lg.moveTo(lx, ly);
        for (let s = 0; s < 4; s++) {
          lx += Phaser.Math.Between(-10, 10);
          ly += Phaser.Math.Between(12, 22);
          lg.lineTo(lx, ly);
        }
        lg.strokePath();
        this.tweens.add({ targets: lg, alpha: 0, duration: 200, onComplete: () => lg.destroy() });
      }
    });
  }

  // Clean up beast mode effects (called when combo breaks)
  cleanupBeastMode() {
    this.isBeastMode = false;
    if (this.beastAura) { this.beastAura.destroy(); this.beastAura = null; }
    if (this.beastAuraPulse) { this.beastAuraPulse.stop(); this.beastAuraPulse = null; }
    if (this.beastBorder) { this.beastBorder.destroy(); this.beastBorder = null; }
    if (this.beastBorderPulse) { this.beastBorderPulse.stop(); this.beastBorderPulse = null; }
    if (this.beastLightningTimer) { this.beastLightningTimer.remove(); this.beastLightningTimer = null; }
  }

  // ── Score Splash ──────────────────────────────────────────────────────────
  doCelebration(pts, combo) {
    const px = this.playerX;
    const py = this.playerY;

    // Skip fist pump during dunk hanging (player is on the rim)
    if (!this.isDunkHanging) {
      this.redrawPlayer(px, py, true);
      const celebTargets = [this.playerGfx];
      if (this.jerseyNumTxt) celebTargets.push(this.jerseyNumTxt);
      this.tweens.add({
        targets: celebTargets,
        y: '-=15',
        duration: 200,
        yoyo: true,
        ease: 'Quad.easeOut',
        onComplete: () => {
          if (!this.isShooting) this.redrawPlayer(px, py, false);
        }
      });
    }

    // Confetti burst from player
    const confettiColors = [0xff3366, 0xffcc00, 0x3366ff, 0x44cc44, 0xff8833, 0xcc44ff];
    const count = combo >= 5 ? 12 : combo >= 3 ? 8 : 5;
    for (let i = 0; i < count; i++) {
      const g = this.add.graphics().setDepth(15);
      const c = confettiColors[i % confettiColors.length];
      g.fillStyle(c, 0.9);
      // Random shapes: circles and rectangles
      if (Math.random() > 0.5) {
        g.fillCircle(0, 0, Phaser.Math.Between(3, 6));
      } else {
        g.fillRect(-4, -2, Phaser.Math.Between(5, 10), Phaser.Math.Between(3, 6));
      }
      g.x = px + Phaser.Math.Between(-20, 20);
      g.y = py - 80;
      g.setScale(0.3);
      const tx = px + Phaser.Math.Between(-80, 80);
      const ty = py - Phaser.Math.Between(40, 160);
      this.tweens.add({
        targets: g,
        x: tx, y: ty,
        scaleX: 1, scaleY: 1,
        angle: Phaser.Math.Between(-180, 180),
        duration: Phaser.Math.Between(500, 900),
        delay: i * 30,
        ease: 'Quad.easeOut',
        onComplete: () => {
          // Fall down
          this.tweens.add({
            targets: g,
            y: g.y + 120,
            alpha: 0,
            angle: g.angle + Phaser.Math.Between(-90, 90),
            duration: 600,
            ease: 'Quad.easeIn',
            onComplete: () => g.destroy()
          });
        }
      });
    }

    // Big combo: extra celebration text
    if (combo >= 5) {
      const celebTexts = ['NICE!', 'GREAT!', 'AMAZING!', 'ON FIRE!', 'UNSTOPPABLE!'];
      const idx = Math.min(Math.floor((combo - 5) / 2), celebTexts.length - 1);
      const ct = this.add.text(px, py - 120, celebTexts[idx], {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '32px', color: '#ffcc00',
        stroke: '#882200', strokeThickness: 5
      });
      ct.setOrigin(0.5).setDepth(20).setScale(0.3);
      this.tweens.add({
        targets: ct,
        scaleX: 1.2, scaleY: 1.2,
        y: py - 170,
        duration: 500,
        ease: 'Back.easeOut',
        onComplete: () => {
          this.tweens.add({
            targets: ct, alpha: 0, duration: 500,
            onComplete: () => ct.destroy()
          });
        }
      });
    }
  }

  doScoreSplash(rimX, rimY) {
    if (!this.textures.exists('inksplat')) return;
    const colors = [0xff3366, 0x3366ff, 0xffcc00, 0x44cc44, 0xff8833, 0x6644ff];
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2;
      const dist  = Phaser.Math.Between(20, 55);
      const sx    = rimX + Math.cos(angle) * dist;
      const sy    = rimY + Math.sin(angle) * dist;
      const g     = this.add.graphics().setDepth(15);
      g.fillStyle(colors[i % colors.length], 0.8);
      g.fillCircle(0, 0, Phaser.Math.Between(6, 14));
      g.x = sx; g.y = sy; g.setScale(0.2);
      this.tweens.add({
        targets: g,
        scaleX: 1.2, scaleY: 1.2,
        alpha: 0,
        duration: 700,
        delay: i * 40,
        ease: 'Quad.easeOut',
        onComplete: () => g.destroy()
      });
    }
  }
}

// ─── PHASER CONFIG ────────────────────────────────────────────────────────────
// ─── LEADERBOARD SCENE ────────────────────────────────────────────────────────
class LeaderboardScene extends Phaser.Scene {
  constructor() { super({ key: 'LeaderboardScene' }); }

  create() {
    const cx = CONFIG.WIDTH / 2;
    const save = loadSave();
    const charBaskets = save.charBaskets || {};

    // Background — paper style
    const g = this.add.graphics();
    g.fillStyle(0xf5f0e0, 1);
    g.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);
    g.lineStyle(1, 0xaabbdd, 0.25);
    for (let y = 20; y < CONFIG.HEIGHT; y += 22) {
      g.beginPath(); g.moveTo(0, y); g.lineTo(CONFIG.WIDTH, y); g.strokePath();
    }
    g.lineStyle(1.5, 0xdd6666, 0.3);
    g.beginPath(); g.moveTo(60, 0); g.lineTo(60, CONFIG.HEIGHT); g.strokePath();

    // Title
    this.add.text(cx, 32, '🏀 进球排行榜', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '28px', color: '#cc2233',
      stroke: '#ffcc00', strokeThickness: 4, resolution: 2,
    }).setOrigin(0.5).setAngle(-2);

    // Sort characters by baskets
    const sorted = CONFIG.CHARACTERS.map(c => ({
      ...c,
      baskets: charBaskets[c.id] || 0,
    })).sort((a, b) => b.baskets - a.baskets);

    const startY = 80;
    const rowH = 56;
    const rowW = 500;
    const rowX = cx - rowW / 2;

    sorted.forEach((char, i) => {
      const y = startY + i * rowH;
      const rank = i + 1;

      // Row background
      const row = this.add.graphics();
      const isTop3 = rank <= 3;
      const rowColors = [0xffd700, 0xc0c0c0, 0xcd7f32];
      row.fillStyle(isTop3 ? rowColors[i] : 0xffffff, isTop3 ? 0.25 : 0.6);
      row.fillRoundedRect(rowX, y, rowW, rowH - 6, 10);
      row.lineStyle(2, isTop3 ? rowColors[i] : 0xccccbb, isTop3 ? 0.6 : 0.4);
      row.strokeRoundedRect(rowX, y, rowW, rowH - 6, 10);

      // Rank medal or number
      const medals = ['🥇', '🥈', '🥉'];
      const rankStr = rank <= 3 ? medals[rank - 1] : '#' + rank;
      this.add.text(rowX + 24, y + (rowH - 6) / 2, rankStr, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: rank <= 3 ? '22px' : '16px',
        color: '#333333', resolution: 2,
      }).setOrigin(0.5);

      // Jersey color dot
      const jerseyColor = Phaser.Display.Color.HexStringToColor(char.color).color;
      const dotG = this.add.graphics();
      dotG.fillStyle(jerseyColor, 1);
      dotG.fillCircle(rowX + 62, y + (rowH - 6) / 2, 14);
      dotG.lineStyle(2, 0x333333, 0.5);
      dotG.strokeCircle(rowX + 62, y + (rowH - 6) / 2, 14);

      this.add.text(rowX + 62, y + (rowH - 6) / 2, char.jersey, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '11px', color: '#ffffff',
        stroke: '#000000', strokeThickness: 1, resolution: 2,
      }).setOrigin(0.5);

      // Name + title
      this.add.text(rowX + 90, y + 10, char.name, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '16px', color: '#333333',
        stroke: '#f5f0e0', strokeThickness: 2, resolution: 2,
      });

      this.add.text(rowX + 90, y + 30, char.title, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '11px', color: '#888877', resolution: 2,
      });

      // Basket count — right side, big number
      this.add.text(rowX + rowW - 24, y + (rowH - 6) / 2 - 6, '' + char.baskets, {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '24px', color: isTop3 ? '#cc2233' : '#333333',
        stroke: '#f5f0e0', strokeThickness: 2, resolution: 2,
      }).setOrigin(1, 0.5);

      this.add.text(rowX + rowW - 24, y + (rowH - 6) / 2 + 14, '进球', {
        fontFamily: "'Arial Black', sans-serif",
        fontSize: '10px', color: '#888877', resolution: 2,
      }).setOrigin(1, 0.5);
    });

    // Total
    const totalBaskets = sorted.reduce((sum, c) => sum + c.baskets, 0);
    this.add.text(cx, startY + sorted.length * rowH + 10, '🏆 总进球数: ' + totalBaskets, {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '16px', color: '#cc8800',
      stroke: '#f5f0e0', strokeThickness: 2, resolution: 2,
    }).setOrigin(0.5);

    // Back button
    const backTxt = this.add.text(cx, CONFIG.HEIGHT - 28, '← 返回主页', {
      fontFamily: "'Arial Black', sans-serif",
      fontSize: '16px', color: '#666666',
      stroke: '#f5f0e0', strokeThickness: 2, resolution: 2,
    }).setOrigin(0.5);
    backTxt.setInteractive({ useHandCursor: true });
    backTxt.on('pointerover', () => backTxt.setColor('#333333'));
    backTxt.on('pointerout', () => backTxt.setColor('#666666'));
    backTxt.on('pointerdown', () => this.scene.start('MenuScene'));
  }
}

const dpr = Math.min(window.devicePixelRatio || 1, 2);
window.__phaserGame = new Phaser.Game({
  type: Phaser.CANVAS,
  width:  CONFIG.WIDTH,
  height: CONFIG.HEIGHT,
  backgroundColor: CONFIG.COLORS.paper,
  resolution: dpr,
  input: { activePointers: 3 },
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: CONFIG.GRAVITY },
      debug: false
    }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    parent: document.body,
  },
  scene: [MenuScene, GameScene, ResultScene, LevelSelectScene, CharSelectScene, LeaderboardScene],
});
// Force Phaser to re-fit when mobile browser toolbar shows/hides
function refreshGameSize() {
  // Skip if CSS landscape rotation is active (it manages its own sizing)
  if (document.body.classList.contains('css-landscape')) return;
  if (window.__phaserGame) window.__phaserGame.scale.refresh();
}
window.addEventListener('resize', refreshGameSize);
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', refreshGameSize);
  // Initial call to set correct size
  refreshGameSize();
}
</script>
