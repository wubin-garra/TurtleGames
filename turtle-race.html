let muted = false;

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

// === ENHANCED SOUND SYSTEM ===

function playSound(type) {
  if (muted) return;
  try {
    ensureAudio();
    const now = audioCtx.currentTime;
    switch (type) {
      case 'tick': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 600;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.start(now); osc.stop(now + 0.15); break;
      }
      case 'go': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 900;
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3); break;
      }
      case 'win': {
        // Triumphant fanfare - 6 note ascending melody with harmony
        const notes = [523, 659, 784, 1047, 784, 1047];
        const times = [0, 0.12, 0.24, 0.36, 0.5, 0.65];
        notes.forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = idx < 4 ? 'square' : 'sawtooth';
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, now + times[idx]);
          gain.gain.linearRampToValueAtTime(0.18, now + times[idx] + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.01, now + times[idx] + 0.2);
          osc.start(now + times[idx]); osc.stop(now + times[idx] + 0.25);
        });
        // Add a shimmering harmony
        const harm = audioCtx.createOscillator();
        const hGain = audioCtx.createGain();
        harm.type = 'sine'; harm.connect(hGain); hGain.connect(audioCtx.destination);
        harm.frequency.setValueAtTime(1047, now + 0.36);
        harm.frequency.linearRampToValueAtTime(1568, now + 0.9);
        hGain.gain.setValueAtTime(0.08, now + 0.36);
        hGain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
        harm.start(now + 0.36); harm.stop(now + 1.0);
        break;
      }
      case 'lose': {
        // Sad descending trombone "wah wah wah wahhh"
        const freqs = [390, 370, 349, 260];
        const starts = [0, 0.25, 0.5, 0.75];
        const durations = [0.22, 0.22, 0.22, 0.6];
        freqs.forEach((freq, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sawtooth';
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.frequency.setValueAtTime(freq, now + starts[idx]);
          if (idx === 3) osc.frequency.linearRampToValueAtTime(220, now + starts[idx] + durations[idx]);
          gain.gain.setValueAtTime(0, now + starts[idx]);
          gain.gain.linearRampToValueAtTime(0.15, now + starts[idx] + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.01, now + starts[idx] + durations[idx]);
          osc.start(now + starts[idx]); osc.stop(now + starts[idx] + durations[idx] + 0.05);
        });
        break;
      }
      case 'select': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 700; osc.type = 'sine';
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1); break;
      }
      case 'coin': {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.setValueAtTime(1600, now + 0.05);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2); break;
      }
      case 'finishLine': {
        // Dramatic finish horn + crowd cheer noise
        // Horn blast
        const horn = audioCtx.createOscillator();
        const hGain = audioCtx.createGain();
        horn.type = 'sawtooth'; horn.connect(hGain); hGain.connect(audioCtx.destination);
        horn.frequency.setValueAtTime(440, now);
        horn.frequency.linearRampToValueAtTime(880, now + 0.15);
        hGain.gain.setValueAtTime(0.25, now);
        hGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        horn.start(now); horn.stop(now + 0.5);
        // Quick ascending arpeggio
        [880, 1047, 1319, 1568].forEach((f, i) => {
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.type = 'square'; o.connect(g); g.connect(audioCtx.destination);
          o.frequency.value = f;
          const t = now + 0.1 + i * 0.07;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.12, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
          o.start(t); o.stop(t + 0.18);
        });
        // Crowd cheer - filtered noise burst
        const bufSize = audioCtx.sampleRate * 0.8;
        const noiseBuffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;
        const bandpass = audioCtx.createBiquadFilter();
        bandpass.type = 'bandpass'; bandpass.frequency.value = 2000; bandpass.Q.value = 0.5;
        const nGain = audioCtx.createGain();
        noise.connect(bandpass); bandpass.connect(nGain); nGain.connect(audioCtx.destination);
        nGain.gain.setValueAtTime(0, now + 0.15);
        nGain.gain.linearRampToValueAtTime(0.12, now + 0.3);
        nGain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
        noise.start(now + 0.15); noise.stop(now + 0.85);
        break;
      }
      case 'running': {
        // Quick rhythmic footstep taps
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle'; osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(120 + Math.random() * 40, now);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.06);
        osc.start(now); osc.stop(now + 0.07);
        break;
      }
      case 'swimming': {
        // Water splash/swoosh
        const bufSize = audioCtx.sampleRate * 0.12;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const lp = audioCtx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 800 + Math.random() * 400;
        const g = audioCtx.createGain();
        src.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
        g.gain.setValueAtTime(0.06, now);
        g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        src.start(now); src.stop(now + 0.12);
        break;
      }
    }
  } catch (e) { /* silent fail */ }
}

// === BACKGROUND MUSIC SYSTEM ===
let bgMusic = null;
let bgMusicGain = null;
let bgMusicPlaying = false;

function startBgMusic() {
  if (muted || bgMusicPlaying) return;
  try {
    ensureAudio();
    bgMusicPlaying = true;

    // Master gain for bg music
    bgMusicGain = audioCtx.createGain();
    bgMusicGain.gain.value = 0.08;
    bgMusicGain.connect(audioCtx.destination);

    // Exciting race atmosphere - looping bass + percussion + melody
    const bpm = 140;
    const beat = 60 / bpm;
    const barLen = beat * 4;
    const totalBars = 64; // ~110 seconds of music (enough for any race)
    const totalTime = totalBars * barLen;

    // --- Bass line ---
    const bassNotes = [130.8, 146.8, 164.8, 146.8]; // C3 D3 E3 D3
    for (let bar = 0; bar < totalBars; bar++) {
      const baseNote = bassNotes[bar % bassNotes.length];
      for (let b = 0; b < 4; b++) {
        const t = audioCtx.currentTime + bar * barLen + b * beat;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.connect(g); g.connect(bgMusicGain);
        osc.frequency.value = baseNote;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.35, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.01, t + beat * 0.7);
        osc.start(t); osc.stop(t + beat * 0.8);
      }
    }

    // --- Percussion (kick + hi-hat pattern) ---
    for (let bar = 0; bar < totalBars; bar++) {
      for (let b = 0; b < 8; b++) {
        const t = audioCtx.currentTime + bar * barLen + b * (beat / 2);
        const isKick = b % 4 === 0;
        const isSnare = b % 4 === 2;

        if (isKick) {
          // Kick drum - low freq burst
          const osc = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          osc.connect(g); g.connect(bgMusicGain);
          osc.frequency.setValueAtTime(150, t);
          osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
          g.gain.setValueAtTime(0.5, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
          osc.start(t); osc.stop(t + 0.16);
        }

        if (isSnare) {
          // Snare - noise burst
          const bufSize = Math.floor(audioCtx.sampleRate * 0.08);
          const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
          const src = audioCtx.createBufferSource();
          src.buffer = buf;
          const hp = audioCtx.createBiquadFilter();
          hp.type = 'highpass'; hp.frequency.value = 2000;
          const g = audioCtx.createGain();
          src.connect(hp); hp.connect(g); g.connect(bgMusicGain);
          g.gain.setValueAtTime(0.3, t);
          g.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
          src.start(t); src.stop(t + 0.1);
        }

        // Hi-hat on every 8th note
        const hBufSize = Math.floor(audioCtx.sampleRate * 0.03);
        const hBuf = audioCtx.createBuffer(1, hBufSize, audioCtx.sampleRate);
        const hData = hBuf.getChannelData(0);
        for (let i = 0; i < hBufSize; i++) hData[i] = Math.random() * 2 - 1;
        const hSrc = audioCtx.createBufferSource();
        hSrc.buffer = hBuf;
        const hHp = audioCtx.createBiquadFilter();
        hHp.type = 'highpass'; hHp.frequency.value = 8000;
        const hG = audioCtx.createGain();
        hSrc.connect(hHp); hHp.connect(hG); hG.connect(bgMusicGain);
        hG.gain.setValueAtTime(b % 2 === 0 ? 0.15 : 0.08, t);
        hG.gain.exponentialRampToValueAtTime(0.01, t + 0.03);
        hSrc.start(t); hSrc.stop(t + 0.04);
      }
    }

    // --- Melody (exciting synth riff, plays every 2 bars) ---
    const melodyPattern = [
      [523, 0], [659, 0.5], [784, 1.0], [659, 1.5], [784, 2.0], [1047, 2.5], [784, 3.0], [659, 3.5],
    ];
    for (let bar = 0; bar < totalBars; bar += 2) {
      melodyPattern.forEach(([freq, offset]) => {
        const t = audioCtx.currentTime + bar * barLen + offset * beat;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'square';
        osc.connect(g); g.connect(bgMusicGain);
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.12, t + 0.03);
        g.gain.setValueAtTime(0.1, t + beat * 0.3);
        g.gain.exponentialRampToValueAtTime(0.01, t + beat * 0.45);
        osc.start(t); osc.stop(t + beat * 0.5);
      });
    }

    // Store the stop time
    bgMusic = { stopTime: audioCtx.currentTime + totalTime };
  } catch (e) { /* silent fail */ }
}

function stopBgMusic() {
  if (!bgMusicPlaying) return;
  bgMusicPlaying = false;
  try {
    if (bgMusicGain) {
      const now = audioCtx.currentTime;
      bgMusicGain.gain.setValueAtTime(bgMusicGain.gain.value, now);
      bgMusicGain.gain.linearRampToValueAtTime(0, now + 0.5);
      // Disconnect after fade
      setTimeout(() => {
        try { bgMusicGain.disconnect(); } catch(e) {}
        bgMusicGain = null;
        bgMusic = null;
      }, 600);
    }
  } catch (e) { bgMusic = null; bgMusicGain = null; }
}

const SAVE_KEY = 'turtle-race-save';

function saveGame() {
  const data = {
    coins: state.coins,
    totalWins: state.totalWins,
    unlockedTurtles: state.unlockedTurtles,
    highScore: state.highScore,
    ownedCosmetics: state.ownedCosmetics,
    equippedCosmetics: state.equippedCosmetics,
    ownedShoes: state.ownedShoes,
    equippedShoe: state.equippedShoe,
    rank: state.rank,
    rankWins: state.rankWins,
    rankLosses: state.rankLosses,
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.coins = data.coins ?? 1000;
    state.totalWins = data.totalWins ?? 0;
    state.unlockedTurtles = data.unlockedTurtles ?? ['speedy','flash','bolt','slowjoe'];
    state.highScore = data.highScore ?? 0;
    state.ownedCosmetics = data.ownedCosmetics ?? [];
    state.equippedCosmetics = data.equippedCosmetics ?? [];
    state.ownedShoes = data.ownedShoes ?? [];
    state.equippedShoe = data.equippedShoe ?? null;
    state.rank = data.rank || 0;
    state.rankWins = data.rankWins || 0;
    state.rankLosses = data.rankLosses || 0;
    state.isRankedMode = false; // 每次加载重置，不要持久化这个
  } catch (e) { /* ignore corrupted save */ }
}

function pickRaceTurtles(myTurtleId) {
  const pool = ALL_TURTLES.filter(t => state.unlockedTurtles.includes(t.id));
  if (myTurtleId) {
    // Player chose their turtle — put it first, fill 3 random opponents from remaining
    const mine = pool.find(t => t.id === myTurtleId);
    const others = pool.filter(t => t.id !== myTurtleId).sort(() => Math.random() - 0.5);
    raceTurtles = [mine, ...others.slice(0, 3)];
    state.selected = 0; // player's turtle is always index 0
  } else {
    // Fallback: random 4
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    raceTurtles = shuffled.slice(0, Math.min(4, shuffled.length));
  }
}

    setHtml += '<div style="display:flex;gap:6px;margin:6px 0;flex-wrap:wrap">';
    setItems.forEach(item => {
      const owned = (state.ownedCosmetics || []).includes(item.id);
      const equipped = (state.equippedCosmetics || []).includes(item.id);
      const opacity = owned ? 1 : 0.35;
      const border = equipped ? `2px solid ${tier.color}` : '2px solid transparent';
      setHtml += `<div style="opacity:${opacity};border:${border};border-radius:8px;padding:4px 8px;font-size:13px;background:rgba(255,255,255,0.05)">${item.emoji} ${item.name}</div>`;
    });
    setHtml += '</div>';

    // Show set bonuses (2pc, 3pc, 4pc)
    ['2pc', '3pc', '4pc'].forEach(key => {
      const bonus = setDef[key];
      if (!bonus) return;
      const n = parseInt(key);
      const active = equippedCount >= n;
      setHtml += `<div style="font-size:11px;color:${active ? tier.color : 'var(--text-muted)'};margin:2px 0;${active ? 'font-weight:600' : ''}">`;
      setHtml += `${active ? '✅' : '⬜'} ${n}件: ${bonus.desc}`;
      setHtml += '</div>';
    });

    setHtml += '</div>';
  });

  setSection.innerHTML = setHtml;
  area.appendChild(setSection);
}

function buyShoe(shoeId) {
  const shoe = SHOE_ITEMS.find(s => s.id === shoeId);
  if (!shoe || state.coins < shoe.cost) return;
  if (!state.ownedShoes) state.ownedShoes = [];
  if (state.ownedShoes.includes(shoeId)) return;
  state.coins -= shoe.cost;
  state.ownedShoes.push(shoeId);
  state.equippedShoe = shoeId;
  playSound('coin');
  saveGame();
  renderShop();
}

function equipShoe(shoeId) {
  state.equippedShoe = shoeId;
  playSound('select');
  saveGame();
  renderShop();
}

function buyCosmetic(itemId) {
  const item = COSMETIC_ITEMS.find(c => c.id === itemId);
  if (!item || state.coins < item.cost) return;
  if (!state.ownedCosmetics) state.ownedCosmetics = [];
  if (state.ownedCosmetics.includes(itemId)) return;
  state.coins -= item.cost;
  state.ownedCosmetics.push(itemId);
  if (!state.equippedCosmetics) state.equippedCosmetics = [];
  // 自动穿戴：先移除同槽位冲突
  if (item.slot) {
    const conflictIdx = state.equippedCosmetics.findIndex(id => {
      const equipped = COSMETIC_ITEMS.find(c => c.id === id);
      return equipped && equipped.slot === item.slot;
    });
    if (conflictIdx >= 0) {
      state.equippedCosmetics.splice(conflictIdx, 1);
    }
  }
  state.equippedCosmetics.push(itemId);
  playSound('coin');
  saveGame();
  renderShop();
}

function buyTurtle(id) {
  const t = ALL_TURTLES.find(x => x.id === id);
  if (!t || state.coins < t.cost || state.unlockedTurtles.includes(id)) return;
  state.coins -= t.cost;
  state.unlockedTurtles.push(id);
  playSound('coin');
  saveGame();
  renderShop();
}

const LB_KEY = 'turtle-race-leaderboard';

function addRaceRecord(turtleName, turtleColor, trackName, timeSec, reward) {
  const entries = JSON.parse(localStorage.getItem(LB_KEY) || '[]');
  entries.push({
    turtle: turtleName,
    color: turtleColor,
    track: trackName,
    time: timeSec,
    reward,

const BET_OPTIONS = [100, 500, 1000, 5000];

function updateTrackObstacles(trackEl, startX, endX) {
  if (!state.racing || !raceObstacles.length) return;
  const maxProg = Math.max(...state.progress);
  // Find which lane is the leader
  const leaderIdx = state.progress.indexOf(maxProg);
  const lanes = trackEl.querySelectorAll('.track-lane');

  raceObstacles.forEach(obs => {
    if (obs.hit) return;
    const distAhead = obs.pos - maxProg;
    // Show obstacle when leader is within 15 progress units ahead
    const shouldShow = distAhead > 0 && distAhead < 15;

    if (shouldShow && !obs.el) {
      // Create obstacle element in the leader's lane
      const lane = lanes[leaderIdx];
      if (!lane) return;
      const el = document.createElement('div');
      el.className = 'track-obstacle';
      el.textContent = obs.emoji;
      // Position based on obstacle's lap progress
      const lapPos = obs.pos % 100;
      el.style.left = (startX + (lapPos / 100) * (endX - startX)) + 'px';
      lane.appendChild(el);
      obs.el = el;
      // Trigger animation on next frame
      requestAnimationFrame(() => el.classList.add('visible'));
    } else if (!shouldShow && obs.el && !obs.hit) {
      // Remove if leader passed without hitting (shouldn't happen normally for leader, but cleanup)
      if (distAhead <= 0) {
        obs.el.remove();
        obs.el = null;
      }
    }
  });
}

function renderBetBtns() {
  const container = document.getElementById('betBtns');
  if (!container) return;
  container.innerHTML = '';
  BET_OPTIONS.forEach(amt => {
    const btn = document.createElement('button');
    btn.className = 'bet-btn' + (state.betAmount === amt ? ' active' : '');
    btn.textContent = '🪙' + amt.toLocaleString();
    btn.disabled = state.racing || state.coins < amt;
    btn.onclick = () => { state.betAmount = amt; playSound('select'); render(); };
    container.appendChild(btn);
  });
}

function getQualityTier(item) {
  if (!item) return QUALITY_TIERS[0];
  if (item.quality) return QUALITY_TIERS.find(t => t.id === item.quality) || QUALITY_TIERS[0];
  // Auto-determine from bonus value and extraStats
  if (item.extraStats) return QUALITY_TIERS.find(t => t.id === 'legendary');
  if (item.bonus <= 0.08) return QUALITY_TIERS[0]; // common
  if (item.bonus <= 0.12) return QUALITY_TIERS[1]; // fine
  if (item.bonus <= 0.15) return QUALITY_TIERS[2]; // rare
  if (item.bonus <= 0.18) return QUALITY_TIERS[3]; // epic
  return QUALITY_TIERS[4]; // legendary
}

// Get info about which set pieces the player has equipped
function getEquippedSetInfo() {
  const setCount = {};
  (state.equippedCosmetics || []).forEach(id => {
    const item = COSMETIC_ITEMS.find(c => c.id === id);
    if (item && item.setId && (state.ownedCosmetics || []).includes(id)) {
      setCount[item.setId] = (setCount[item.setId] || 0) + 1;
    }
  });
  return setCount;
}

function getEquippedSetAura() {
  const setCounts = getEquippedSetInfo();
  let bestSet = null, bestCount = 0;
  Object.entries(setCounts).forEach(([setId, count]) => {
    if (count >= 2 && count > bestCount) {
      bestSet = setId;
      bestCount = count;
    }
  });
  if (!bestSet) return null;
  const setKeyMap = {
    frost_lord: 'frost',
    flame_king: 'flame',
    night_assassin: 'night',
    dragon_emperor: 'dragon',
    rainbow_set: 'rainbow',
  };
  return {
    setKey: setKeyMap[bestSet] || 'frost',
    level: Math.min(bestCount, 4),
  };
}

// Calculate all active set bonuses based on equipped set pieces
function getSetBonuses() {
  const setInfo = getEquippedSetInfo();
  const bonuses = {};
  const specials = [];
  Object.entries(setInfo).forEach(([setId, count]) => {
    const setDef = SET_BONUSES[setId];
    if (!setDef) return;
    // Apply 2pc, 3pc, 4pc bonuses cumulatively
    ['2pc', '3pc', '4pc'].forEach(tier => {
      const tierNum = parseInt(tier);
      if (count >= tierNum && setDef[tier]) {
        const tb = setDef[tier];
        if (tb.stats) {
          Object.entries(tb.stats).forEach(([stat, val]) => {
            bonuses[stat] = (bonuses[stat] || 0) + val;
          });
        }
        if (tb.terrain && tb.terrainBonus && currentTrack) {
          const ratio = (tb.terrain === 'all' || currentTrack.id === tb.terrain) ? 1.0 : 0;
          if (ratio > 0) {
            bonuses.speed = (bonuses.speed || 0) + tb.terrainBonus * ratio;
          }
        }
        if (tb.special) {
          specials.push(tb.special);
        }
      }
    });
  });
  return { bonuses, specials };
}

function getEquippedShoe() {
  const equipped = state.equippedShoe || null;
  return SHOE_ITEMS.find(s => s.id === equipped) || null;
}

function getShoeBonus() {
  const shoe = getEquippedShoe();
  if (!shoe) return 0;
  if (currentTrack && currentTrack.id === shoe.terrain) return shoe.terrainBonus;
  return shoe.baseBonus;
}

function getShoeAccessory() {
  const shoe = getEquippedShoe();
  return shoe ? shoe.effect : null;
}

function generateAIEquipment(rankIndex) {
  const rank = RANKS[rankIndex];
  if (rank.aiSlots === 0) return { cosmetics: [], shoe: null, setEffects: [] };

  const selectedCosmetics = [];

  // 如果有套装需求，优先选套装
  if (rank.aiSetId) {
    let targetSets;
    if (rank.aiSetId === 'random_legendary') {
      targetSets = Object.keys(SET_BONUSES).filter(k => SET_BONUSES[k].quality === 'legendary');
    } else if (rank.aiSetId === 'random_mythic') {
      targetSets = Object.keys(SET_BONUSES).filter(k => SET_BONUSES[k].quality === 'mythic');
    }
    const chosenSetId = targetSets[Math.floor(Math.random() * targetSets.length)];
    const setItems = COSMETIC_ITEMS.filter(c => c.setId === chosenSetId);
    setItems.forEach(item => selectedCosmetics.push(item.id));
  } else {
    // 按品质随机选装备填满对应槽位数
    const qualityItems = COSMETIC_ITEMS.filter(c => c.quality === rank.aiQuality);
    const usedSlots = [];
    for (let i = 0; i < rank.aiSlots && i < 4; i++) {
      const available = qualityItems.filter(c => !usedSlots.includes(c.slot));
      if (available.length > 0) {
        const pick = available[Math.floor(Math.random() * available.length)];
        selectedCosmetics.push(pick.id);
        usedSlots.push(pick.slot);
      }
    }
  }

  // 钻石及以上加鞋子
  let shoe = null;
  if (rankIndex >= 4) {
    const shoeIdx = Math.floor(Math.random() * SHOE_ITEMS.length);
    shoe = SHOE_ITEMS[shoeIdx].id;
  }

  // 计算套装特效
  const setEffects = (getSetBonuses(selectedCosmetics)._activeEffects) || [];

  return { cosmetics: selectedCosmetics, shoe, setEffects };
}

// Terrain affinity: which zone types each terrain relates to
// Used to calculate partial bonuses on composite tracks
const TERRAIN_ZONE_AFFINITY = {
  grass: 'run',       // 草地 → 跑步赛段
  beach: 'swim',      // 沙滩 → 游泳赛段
  snow: 'climb',      // 雪地 → 蛙跳赛段 (ice/grip)
  volcano: 'climb',   // 火山 → 蛙跳赛段 (rock)
  night: null,         // 夜光 → 无对应赛段
  triathlon: null,     // 铁人三项 → 专属匹配
  rainbow: null,       // 彩虹 → 专属匹配
};

// Calculate terrain match ratio for an item on current track
// Returns 1.0 for exact match, 0.3~0.5 for partial (zone affinity), 0 for no match
function getTerrainMatchRatio(item) {
  if (!item.terrain || !item.terrainBonus || !currentTrack) return 0;
  // Exact match
  if (currentTrack.id === item.terrain) return 1.0;
  // "all" terrain items always match
  if (item.terrain === 'all') return 1.0;
  // Composite track partial matching
  if (currentTrack.zones && currentTrack.zones.length > 0) {
    const affinity = TERRAIN_ZONE_AFFINITY[item.terrain];
    if (!affinity) return 0;
    // Calculate what % of track uses this zone type
    const totalWidth = 100;
    let matchWidth = 0;
    currentTrack.zones.forEach(z => {
      if (z.zone === affinity) matchWidth += (z.end - z.start);
    });
    const ratio = matchWidth / totalWidth;
    if (ratio > 0) return Math.max(0.3, ratio); // At least 30% effectiveness
  }
  return 0;
}

// Calculate total stat bonuses from equipped cosmetics
function getCosmeticBonuses() {
  const bonuses = {};
  (state.equippedCosmetics || []).forEach(id => {
    const item = COSMETIC_ITEMS.find(c => c.id === id);
    if (item && (state.ownedCosmetics || []).includes(id)) {
      bonuses[item.stat] = (bonuses[item.stat] || 0) + item.bonus;
      // Terrain-specific items: full or partial bonus
      if (item.terrain && item.terrainBonus) {
        const ratio = getTerrainMatchRatio(item);
        if (ratio > 0) {
          bonuses.speed = (bonuses.speed || 0) + item.terrainBonus * ratio;
        }
      }
      // Legendary items have extra stats
      if (item.extraStats) {
        Object.entries(item.extraStats).forEach(([stat, val]) => {
          bonuses[stat] = (bonuses[stat] || 0) + val;
        });
      }
    }
  });
  // Apply set bonuses
  const setBonusResult = getSetBonuses();
  Object.entries(setBonusResult.bonuses).forEach(([stat, val]) => {
    bonuses[stat] = (bonuses[stat] || 0) + val;
  });
  bonuses._activeEffects = setBonusResult.specials || [];
  return bonuses;
}

function getMyAccessories() {
  const acc = (state.ownedCosmetics || []).filter(id => (state.equippedCosmetics || []).includes(id))
    .map(id => COSMETIC_ITEMS.find(c => c.id === id)?.effect).filter(Boolean);
  const shoe = getShoeAccessory();
  if (shoe) acc.push(shoe);
  return acc;
}

function renderItemBtns() {
  const container = document.getElementById('itemBtns');
  if (!container) return;

  // If buttons already exist, just update disabled/used state (don't recreate)
  const existing = container.querySelectorAll('[data-item-id]');
  if (existing.length === BUFF_ITEMS.length) {
    existing.forEach(btn => {
      const id = btn.dataset.itemId;
      const used = state.usedItems.includes(id);
      const item = BUFF_ITEMS.find(i => i.id === id);
      btn.className = 'item-btn' + (used ? ' used' : '');
      btn.disabled = !state.racing || !raceTurtleState.length || used || state.coins < (item?.cost || 0);
    });
    // Update cosmetic button
    const cosBtn = container.querySelector('[data-cos-btn]');
    if (cosBtn) cosBtn.disabled = state.racing;
    return;
  }

  // First time: create buttons
  container.innerHTML = '';

  BUFF_ITEMS.forEach(item => {
    const btn = document.createElement('button');
    const used = state.usedItems.includes(item.id);
    btn.className = 'item-btn' + (used ? ' used' : '');
    btn.dataset.itemId = item.id;
    btn.innerHTML = `${item.emoji} ${item.name} 🪙${item.cost}<span class="item-tooltip">${item.desc}</span>`;
    btn.disabled = !state.racing || !raceTurtleState.length || used || state.coins < item.cost;
    btn.onclick = (e) => { e.stopPropagation(); useRaceItem(item.id); };
    container.appendChild(btn);
  });

  // Cosmetic shop button
  const cosBtn = document.createElement('button');
  cosBtn.className = 'item-btn';
  cosBtn.dataset.cosBtn = '1';
  cosBtn.style.borderColor = 'var(--accent)';
  cosBtn.style.color = 'var(--accent)';
  cosBtn.textContent = '✨ 装扮';
  cosBtn.disabled = state.racing;
  cosBtn.onclick = () => showCosmeticModal();
  container.appendChild(cosBtn);
}

function applyTurtleAnim(turtleIdx, animClass, duration) {
  // Store animation in turtleState so render() can apply it every frame
  if (raceTurtleState[turtleIdx]) {
    raceTurtleState[turtleIdx]._anim = animClass;
    setTimeout(() => {
      if (raceTurtleState[turtleIdx]) raceTurtleState[turtleIdx]._anim = null;
    }, duration);
  }
}

function showItemFlash(color, emoji) {
  // Full screen flash
  const flash = document.createElement('div');
  flash.className = 'evt-flash';
  flash.style.setProperty('--flash-color', color);
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 500);
  // Big emoji burst in center
  const burst = document.createElement('div');
  burst.style.cssText = `position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:80px;z-index:200;pointer-events:none;animation:itemBurst 0.8s ease-out forwards`;
  burst.textContent = emoji;
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 900);
}

function useRaceItem(itemId) {
  const item = BUFF_ITEMS.find(i => i.id === itemId);
  if (!item || state.coins < item.cost || state.usedItems.includes(itemId) || !state.racing) return;
  if (!raceTurtleState.length || state.selected < 0) return;

  state.coins -= item.cost;
  state.usedItems.push(itemId);
  playSound('coin');
  // Force button rebuild to show "used" state
  const itemContainer = document.getElementById('itemBtns');
  if (itemContainer) itemContainer.innerHTML = '';
  renderItemBtns();

  const playerIdx = state.selected;
  const playerName = raceTurtles[playerIdx]?.name || '你的乌龟';
  const opponents = [0,1,2,3].filter(i => i !== playerIdx);

  switch (item.target) {
    case 'leader': {
      let leaderIdx = -1; let maxP = -1;
      state.progress.forEach((p, idx) => { if (idx !== playerIdx && p > maxP) { maxP = p; leaderIdx = idx; } });
      if (leaderIdx >= 0) {
        const ts = raceTurtleState[leaderIdx];
        ts.slowTimer = 60; ts.momentum = 0.15;
        showItemFlash('rgba(255,200,0,0.2)', '🍌');
        applyTurtleAnim(leaderIdx, 'evt-banana', 1900);
        spawnEventEffects(leaderIdx, false, '🍌 踩到香蕉皮!');
        playSound('tick');
        const div = document.createElement('div');
        div.className = 'race-event';
        div.textContent = `🍌 ${raceTurtles[leaderIdx]?.name || '第一名'} 踩到了 ${playerName} 扔的香蕉皮！`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
      }
      break;
    }
    case 'random_opponent': {
      const target = opponents[Math.floor(Math.random() * opponents.length)];
      const ts = raceTurtleState[target];
      ts.slowTimer = 50; ts.momentum = 0.25; ts.stamina = Math.max(0.3, ts.stamina - 0.08);
      showItemFlash('rgba(100,200,255,0.25)', '⚡');
      applyTurtleAnim(target, 'evt-lightning', 900);
      spawnEventEffects(target, false, '⚡ 被电晕了!');
      playSound('tick');
      const div = document.createElement('div');
      div.className = 'race-event';
      div.textContent = `⚡ ${playerName} 召唤闪电击中了 ${raceTurtles[target]?.name || '对手'}！`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2500);
      break;
    }
    case 'self': {
      if (itemId === 'rocket') {
        const ts = raceTurtleState[playerIdx];
        ts.burstTimer = 80; ts.momentum = 2.0;
        showItemFlash('rgba(255,100,0,0.2)', '🚀');
        applyTurtleAnim(playerIdx, 'evt-rocket', 800);
        spawnEventEffects(playerIdx, true, '🚀 火箭加速!');
        playSound('go');
        const div = document.createElement('div');
        div.className = 'race-event';
        div.textContent = `🚀 ${playerName} 点燃火箭推进器！起飞！`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
      } else if (itemId === 'shield') {
        const ts = raceTurtleState[playerIdx];
        ts._shielded = true;
        showItemFlash('rgba(78,234,172,0.2)', '🛡️');
        applyTurtleAnim(playerIdx, 'evt-shield', 1200);
        spawnEventEffects(playerIdx, true, '🛡️ 护盾激活!');
        playSound('go');
        const div = document.createElement('div');
        div.className = 'race-event';
        div.textContent = `🛡️ ${playerName} 开启护盾！免疫下一次减速！`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
      } else if (itemId === 'heal') {
        const ts = raceTurtleState[playerIdx];
        ts.stamina = Math.min(1.0, ts.stamina + 0.21); // +30% of 0.7 range
        showItemFlash('rgba(78,234,172,0.25)', '💊');
        applyTurtleAnim(playerIdx, 'evt-heal', 900);
        spawnEventEffects(playerIdx, true, '💊 体力恢复!');
        playSound('go');
        const div = document.createElement('div');
        div.className = 'race-event';
        div.textContent = `💊 ${playerName} 喝了能量饮料！体力大幅恢复！`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
      }
      break;
    }
    case 'all_opponents': {
      opponents.forEach(idx => {
        const ts = raceTurtleState[idx];
        ts.slowTimer = 35; ts.momentum = 0.4;
      });
      showItemFlash('rgba(255,60,60,0.25)', '🌍');
      opponents.forEach(idx => {
        applyTurtleAnim(idx, 'evt-quake', 1200);
        spawnEventEffects(idx, false, '🌍 地震!');
      });
      playSound('tick');
      const div = document.createElement('div');
      div.className = 'race-event';
      div.textContent = `🌍 ${playerName} 触发地震！其他乌龟全部被震倒！`;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2500);
      break;
    }
  }
  render();
}

function showCosmeticModal() {
  let overlay = document.getElementById('cosmeticModal');

function toggleCosmetic(itemId) {
  if (!state.equippedCosmetics) state.equippedCosmetics = [];
  const idx = state.equippedCosmetics.indexOf(itemId);
  if (idx >= 0) {
    // 卸下
    state.equippedCosmetics.splice(idx, 1);
  } else {
    // 穿戴：先移除同槽位已装备的装备
    const item = COSMETIC_ITEMS.find(c => c.id === itemId);
    if (item && item.slot) {
      const conflictIdx = state.equippedCosmetics.findIndex(id => {
        const equipped = COSMETIC_ITEMS.find(c => c.id === id);
        return equipped && equipped.slot === item.slot;
      });
      if (conflictIdx >= 0) {
        state.equippedCosmetics.splice(conflictIdx, 1);
      }
    }
    state.equippedCosmetics.push(itemId);
  }
  playSound('select');
  saveGame();
  const cmEl = document.getElementById('cosmeticModal');
  if (cmEl) renderCosmeticModal(cmEl, false);
  render();
}

function switchShoe(shoeId) {
  state.equippedShoe = shoeId;
  playSound('select');
  saveGame();
  const cmEl2 = document.getElementById('cosmeticModal');
  if (cmEl2) renderCosmeticModal(cmEl2, false);
  render();
}

function startCountdown(callback) {
  const overlay = document.createElement('div');
  overlay.className = 'countdown-overlay';
  document.body.appendChild(overlay);
  const nums = ['3', '2', '1', '🏁 GO!'];
  let i = 0;
  function showNext() {
    if (i >= nums.length) { overlay.remove(); callback(); return; }
    overlay.innerHTML = `<div class="countdown-text">${nums[i]}</div>`;
    playSound(i < 3 ? 'tick' : 'go');
    i++;
    setTimeout(showNext, 800);
  }
  showNext();
}

function showScene(sceneId) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById(sceneId).classList.add('active');
  if (sceneId === 'scene-start') {
    state.isRankedMode = false;
    const hsEl = document.getElementById('highScore');
    if (hsEl) hsEl.textContent = state.highScore.toLocaleString();
    const scEl = document.getElementById('startCoins');
    if (scEl) scEl.textContent = state.coins.toLocaleString();
    const menuBadge = document.getElementById('rankBadgeMenu');
    if (menuBadge) {
      const rank = RANKS[state.rank];
      menuBadge.textContent = `${rank.icon} ${rank.name}`;
    }
  }
  if (sceneId === 'scene-leaderboard') renderLeaderboard();
  if (sceneId === 'scene-shop') renderShop();
  if (sceneId === 'scene-ranked') renderRankedScene();
}

function renderRankedScene() {
  const rank = RANKS[state.rank];
  const tier = state.rank;

  // 段位图标和名称
  document.getElementById('rankDisplay').innerHTML = `
    <div class="rank-icon">${rank.icon}</div>
    <div class="rank-name" style="color:${rank.color}">${rank.name}</div>
  `;

  // 战绩星星
  let starsHtml = '<div style="margin:8px 0">';
  // 胜利星星（绿色）
  for (let i = 0; i < 3; i++) {
    starsHtml += `<span class="rank-star ${i < state.rankWins ? 'filled' : 'empty'}" style="color:#22C55E">★</span>`;
  }
  starsHtml += ' <span style="color:var(--text-muted);margin:0 8px">|</span> ';
  // 失败星星（红色）
  for (let i = 0; i < 3; i++) {
    starsHtml += `<span class="rank-star ${i < state.rankLosses ? 'filled' : 'empty'}" style="color:#EF4444">✖</span>`;
  }
  starsHtml += '</div>';
  document.getElementById('rankRecord').innerHTML = starsHtml;

  // 进度条
  const progressPct = (state.rankWins / 3) * 100;
  document.getElementById('rankProgress').innerHTML = `
    <div class="rank-progress-bar">
      <div class="rank-progress-fill" style="width:${progressPct}%;background:linear-gradient(90deg,${rank.color},${rank.color}cc)"></div>
    </div>
  `;

  // 费用和奖励
  const canAfford = state.coins >= rank.fee;
  document.getElementById('rankInfo').innerHTML = `
    <div style="margin:4px 0">🎫 入场费: <span style="color:${canAfford ? 'var(--gold)' : 'var(--danger)'}">${rank.fee} 🪙</span></div>
    <div style="margin:4px 0">🏆 胜利奖励: <span style="color:var(--accent)">${rank.reward} 🪙</span></div>
    <div style="margin:4px 0">💰 当前余额: <span style="color:var(--gold)">${state.coins} 🪙</span></div>
  `;

  // 对手预览
  const nextRankInfo = tier < 6 ? RANKS[tier] : RANKS[6];
  let opponentDesc = '';
  if (nextRankInfo.aiSlots === 0) {
    opponentDesc = '对手无装备，轻松上分！';
  } else {
    const qt = getQualityTier({ quality: nextRankInfo.aiQuality });
    opponentDesc = `对手装备: ${nextRankInfo.aiSlots}件 ${qt.icon}${qt.name}`;
    if (nextRankInfo.aiSetId) opponentDesc += ' (含套装效果)';
  }
  document.getElementById('rankOpponentPreview').innerHTML = `⚠️ ${opponentDesc}`;

  // 按钮状态
  document.getElementById('rankStartBtn').disabled = !canAfford;
  document.getElementById('rankStartBtn').style.opacity = canAfford ? 1 : 0.5;

  // 主菜单段位标签
  const menuBadge = document.getElementById('rankBadgeMenu');
  if (menuBadge) menuBadge.textContent = `${rank.icon} ${rank.name}`;
}

function confirmBackToHome() {
  if (state.racing) return; // can't leave mid-race
  // Track pick → go back to turtle pick
  if (state.trackPickPhase) {
    state.trackPickPhase = false;
    state.pickPhase = true;
    document.getElementById('raceTitle').textContent = '🐢 选择你的参赛乌龟！';
    render();
    return;
  }
  // Turtle pick → go back to start
  if (state.pickPhase) {
    showScene('scene-start');
    return;
  }
  if (state.round > 1 || state.wins > 0) {
    if (!confirm('确定返回主页吗？当前比赛进度将丢失。')) return;
  }
  showScene('scene-start');
}

function startNewGame() {
  state.round = 1; state.wins = 0; state.selected = -1;
  state.progress = [0, 0, 0, 0]; state.finished = [];
  state.betAmount = 100; state.usedItems = [];
  const ic = document.getElementById('itemBtns');
  if (ic) ic.innerHTML = ''; // force rebuild item buttons
  state.pickPhase = true;
  state._lap2Announced = false;
  state._lap3Announced = false;
  raceTurtles = [];
  showScene('scene-race');
  document.getElementById('raceTitle').textContent = '🐢 选择你的参赛乌龟！';
  render();
}

function startRankedGame() {
  const rank = RANKS[state.rank];
  if (state.coins < rank.fee) return;

  state.isRankedMode = true;
  state.coins -= rank.fee;

  // 为AI对手生成装备
  state._rankedAIEquipment = [null, null, null].map(() => generateAIEquipment(state.rank));

  // 进入选龟阶段（复用现有流程）
  state.wins = 0;
  state.round = 1;
  state.maxRounds = 1;
  state.pickPhase = true;
  state.trackPickPhase = false;
  state.progress = [0,0,0,0];
  state.finished = [];
  state.usedItems = [];

  const ic = document.getElementById('itemBtns');
  if (ic) ic.innerHTML = '';
  state._lap2Announced = false;
  state._lap3Announced = false;
  raceTurtles = [];

  saveGame();
  showScene('scene-race');
  document.getElementById('raceTitle').textContent = '🏆 段位赛 — 选择你的乌龟！';
  render();
}

function render() {
  const coinsEl = document.getElementById('coins');
  const winsEl = document.getElementById('wins');
  const roundEl = document.getElementById('round');
  if (coinsEl) coinsEl.textContent = state.coins.toLocaleString();
  if (winsEl) winsEl.textContent = state.wins;
  // Update lap display
  const lapEl = document.getElementById('lapDisplay');
  const lapBadgeEl = lapEl?.parentElement;
  if (lapEl && state.racing) {
    const maxProg = Math.max(...state.progress);
    const currentLap = Math.min(state.totalLaps, Math.floor(maxProg / 100) + 1);
    lapEl.textContent = currentLap;
    if (lapBadgeEl) {
      lapBadgeEl.style.color = currentLap === state.totalLaps ? '#FF6B6B' : '#8BB8E8';
      lapBadgeEl.style.borderColor = currentLap === state.totalLaps ? '#FF6B6B' : '#1A3A5C';
    }
  } else if (lapEl) {
    lapEl.textContent = '1';
    if (lapBadgeEl) { lapBadgeEl.style.color = '#8BB8E8'; lapBadgeEl.style.borderColor = '#1A3A5C'; }
  }

  // Track lanes
  const trackEl = document.getElementById('trackLanes');
  if (!trackEl) { renderBetBtns(); renderItemBtns(); return; }

  // === Pick Phase: show all unlocked turtles in a grid ===
  if (state.pickPhase) {
    trackEl.style.display = 'none';
    let picker = document.getElementById('turtlePicker');
    if (!picker) {
      picker = document.createElement('div');
      picker.id = 'turtlePicker';
      trackEl.parentElement.appendChild(picker);
    }
    const unlocked = ALL_TURTLES.filter(t => state.unlockedTurtles.includes(t.id));
    const maxSpeed = Math.max(...unlocked.map(t => t.speed));
    const bonuses = getCosmeticBonuses();
    const catMap = {speed:'⚡速度',warmup:'⚡速度',stamina:'💪耐力',recovery:'💪耐力',focus:'🎯技巧',dodge:'🎯技巧',burst:'🎯技巧',sprint:'🔥冲刺',chaos:'🔥冲刺',luck:'🔥冲刺'};
    const grouped = {};
    Object.entries(bonuses).forEach(([k,v]) => { const c = catMap[k]||k; grouped[c] = (grouped[c]||0)+v; });
    const bonusText = Object.entries(grouped).map(([k,v]) => `${k}+${Math.round(v*100)}%`).join(' ');

    const equipped = state.equippedCosmetics || [];
    const owned = state.ownedCosmetics || [];

    // Build inline equipment panel
    const ownedItems = COSMETIC_ITEMS.filter(c => (owned).includes(c.id));
    const SLOT_META = [
      { key: 'head',  icon: '🎩', label: '头饰', attr: '⚡速度' },
      { key: 'face',  icon: '😎', label: '面饰', attr: '🔥冲刺' },
      { key: 'back',  icon: '🦸', label: '背饰', attr: '🎯技巧' },
      { key: 'mount', icon: '🐰', label: '坐骑', attr: '💪耐力' },
    ];
    const inlineEquipHtml = (() => {
      const slotHtml = SLOT_META.map(slot => {
        const items = ownedItems.filter(c => c.slot === slot.key);
        if (!items.length) return '';
        return `<div style="margin-bottom:6px">
          <div style="font-size:11px;color:var(--text-muted);padding:2px 4px;display:flex;align-items:center;gap:4px">${slot.icon} ${slot.label} <span style="font-size:9px;color:var(--gold)">${slot.attr}</span></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;padding:2px 4px">
            ${items.map(c => {
              const isEquipped = equipped.includes(c.id);
              const isLegendary = c.extraStats != null;
              const tRatio = c.terrain ? getTerrainMatchRatio(c) : 0;
              return `<div class="cosmetic-item ${isEquipped ? 'equipped' : ''}${isLegendary ? ' legendary' : ''}${tRatio > 0 ? ' terrain-match' : ''}" data-cid="${c.id}" onclick="event.stopPropagation();toggleCosmetic('${c.id}')" style="padding:6px 5px;min-width:70px">
                <span class="cosmetic-emoji" style="font-size:18px">${renderItemIcon(c.emoji, 18)}</span>
                <span class="cosmetic-name" style="font-size:10px">${c.name}</span>
                <span style="font-size:9px;color:var(--gold)">${c.desc}</span>
                <span class="cosmetic-status" style="font-size:9px;${!isEquipped ? 'color:var(--text-muted)' : ''}">${isEquipped ? '✓ 已装备' : '点击装备'}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('');

      const shoeHtml = (state.ownedShoes||[]).length ? `<div style="margin-bottom:6px">
        <div style="font-size:11px;color:var(--text-muted);padding:2px 4px;display:flex;align-items:center;gap:4px">👟 鞋子 <span style="font-size:9px;color:var(--text-muted)">只能穿一双</span></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;padding:2px 4px">
          ${SHOE_ITEMS.filter(s => (state.ownedShoes||[]).includes(s.id)).map(s => {
            const isEquipped = state.equippedShoe === s.id;
            return `<div class="cosmetic-item ${isEquipped ? 'equipped' : ''}" data-sid="${s.id}" onclick="event.stopPropagation();switchShoe('${s.id}')" style="padding:6px 5px;min-width:70px">
              <span class="cosmetic-emoji" style="font-size:18px">${s.emoji}</span>
              <span class="cosmetic-name" style="font-size:10px">${s.name}</span>
              <span style="font-size:9px;color:var(--text-muted)">${s.desc}</span>
              <span class="cosmetic-status" style="font-size:9px;${!isEquipped ? 'color:var(--text-muted)' : ''}">${isEquipped ? '✓ 穿着' : '点击穿上'}</span>
            </div>`;
          }).join('')}
          <div class="cosmetic-item ${!state.equippedShoe ? 'equipped' : ''}" data-sid="none" onclick="event.stopPropagation();switchShoe(null)" style="padding:6px 5px;min-width:70px">
            <span class="cosmetic-emoji" style="font-size:18px">🦶</span>
            <span class="cosmetic-name" style="font-size:10px">光脚</span>
            <span style="font-size:9px;color:var(--text-muted)">不穿鞋</span>
            <span class="cosmetic-status" style="font-size:9px;${state.equippedShoe ? 'color:var(--text-muted)' : ''}">${!state.equippedShoe ? '✓ 当前' : '点击脱下'}</span>
          </div>
        </div>
      </div>` : '';

      if (!slotHtml && !shoeHtml) return '';
      return `<div style="padding:10px 16px;margin:0 20px 10px;background:rgba(0,0,0,0.25);border-radius:12px;border:1px solid var(--border);max-height:35vh;overflow-y:auto">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;position:sticky;top:0;background:rgba(10,20,40,0.95);padding:4px 0;z-index:1">
          <div style="font-size:14px;font-weight:700;color:var(--accent)">✨ 装备选择</div>
          <div style="font-size:11px;color:var(--text-secondary)">${bonusText || '无加成'}</div>
        </div>
        ${slotHtml}${shoeHtml}
      </div>`;
    })();

    picker.innerHTML =
      // Turtle grid
      '<div class="turtle-picker-grid"><div class="picker-title">🐢 选择你的参赛乌龟</div>' + unlocked.map(t => {
      const speedPct = Math.round((t.speed / maxSpeed) * 100);
      const speedColor = speedPct > 90 ? '#4EEAAC' : speedPct > 70 ? '#FFD700' : '#FF8C00';
      const isTop = t.speed === maxSpeed;
      return `<div class="picker-card" onclick="confirmTurtlePick('${t.id}')" style="${isTop ? 'border-color:var(--gold)' : ''}">
        ${isTop ? '<div class="picker-tag" style="position:absolute;top:6px;right:6px;background:rgba(255,215,0,0.2);color:var(--gold)">👑 最快</div>' : ''}
        <div style="width:75px;height:58px">${turtleSVG(t.shell, t.body, t.pattern, t.accent, getMyAccessories())}</div>
        <div class="picker-name" style="color:${t.color}">${t.name}</div>
        <div class="picker-speed">⚡ ${t.speed}</div>
        <div class="picker-stat-bar"><div class="picker-stat-fill" style="width:${speedPct}%;background:${speedColor}"></div></div>
      </div>`;
    }).join('') + '</div>' +
      // Inline equipment panel
      inlineEquipHtml;
    // Hide bottom bar controls during pick phase
    const pickBtnsEl = document.getElementById('pickBtns');
    if (pickBtnsEl) pickBtnsEl.innerHTML = '';
    const startBtnEl = document.getElementById('startBtn');
    if (startBtnEl) startBtnEl.style.display = 'none';
    renderBetBtns(); renderItemBtns();
    return;
  }

  // === Track Pick Phase: show track selector ===
  if (state.trackPickPhase) {
    trackEl.style.display = 'none';
    let picker = document.getElementById('turtlePicker');
    if (!picker) {
      picker = document.createElement('div');
      picker.id = 'turtlePicker';
      trackEl.parentElement.appendChild(picker);
    }
    const shoe = getEquippedShoe();
    picker.innerHTML = '<div class="turtle-picker-grid"><div class="picker-title">🗺️ 选择赛道</div>' +
      // Random option
      `<div class="picker-card" onclick="confirmTrackPick(-1)" style="border-color:var(--gold)">
        <div style="font-size:44px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))">🎲</div>
        <div class="picker-name" style="color:var(--gold)">随机赛道</div>
        <div class="picker-speed">随缘出发！</div>
        <div class="picker-tag" style="background:rgba(255,215,0,0.15);color:var(--gold)">推荐</div>
      </div>` +
      TRACK_THEMES.map((t, i) => {
        const shoeMatch = shoe && shoe.terrain === t.id;
        const trackType = t.isRainbow ? '🌈 七彩赛段' : t.isTriathlon ? '🏃🏊🧗 三段赛制' : '常规赛道';
        return `<div class="picker-card" onclick="confirmTrackPick(${i})" style="${shoeMatch ? 'border-color:#4EEAAC' : ''}">
          <div style="font-size:44px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3))">${t.name.split(' ')[0]}</div>
          <div class="picker-name" style="color:#fff">${t.name}</div>
          <div class="picker-speed">${trackType}</div>
          ${shoeMatch ? '<div class="picker-tag">✨ 鞋子匹配!</div>' : ''}
        </div>`;
      }).join('') +
    '</div>';
    const pickBtnsEl = document.getElementById('pickBtns');
    if (pickBtnsEl) pickBtnsEl.innerHTML = '';
    const startBtnEl = document.getElementById('startBtn');
    if (startBtnEl) startBtnEl.style.display = 'none';
    renderBetBtns(); renderItemBtns();
    return;
  }

  // === Normal race view ===
  trackEl.style.display = '';
  const picker = document.getElementById('turtlePicker');
  if (picker) picker.remove();
  const startBtnEl2 = document.getElementById('startBtn');
  if (startBtnEl2) startBtnEl2.style.display = '';

  // During racing: update existing elements instead of rebuilding (preserves animations)
  if (state.racing && trackEl.querySelectorAll('.track-lane').length === raceTurtles.length) {
    const trackWidth = trackEl.offsetWidth || 800;
    const startX = 90;
    const endX = trackWidth - 70;
    const maxProgT = state.totalLaps * 100;

    raceTurtles.forEach((t, i) => {
      const lane = trackEl.querySelectorAll('.track-lane')[i];
      if (!lane) return;
      const runner = lane.querySelector('.turtle-runner');
      if (!runner) return;

      // Update position
      const lapPr = state.progress[i] >= maxProgT ? 100 : (state.progress[i] % 100);
      runner.style.left = (startX + (lapPr / 100) * (endX - startX)) + 'px';

      // Build correct class
      let cls = 'turtle-runner racing';
      if (state.progress[i] >= maxProgT) cls = 'turtle-runner finished';
      if (state.progress[i] > 0 && state.progress[i] < maxProgT && currentTrack?.isTriathlon) {
        const z = getZone(state.progress[i] % 100);
        if (z === 'swim') cls += ' in-water';
        else if (z === 'climb') cls += ' in-climb';
      }
      // State class
      if (state.progress[i] < maxProgT && raceTurtleState[i]) {
        const ts = raceTurtleState[i];
        const tp = state.progress[i] / maxProgT;
        const mxP = Math.max(...state.progress);
        if (tp > 0.80) cls += ' state-sprint';
        else if (ts.burstTimer > 0 && ts.momentum > 1.3) cls += ' state-burst';
        else if (ts.slowTimer > 0) cls += ' state-slow';
        else if (ts.stamina < 0.65) cls += ' state-tired';
        else if (ts.stamina > 1.25) cls += ' state-recover';
        else if (state.progress[i] === mxP && state.progress[i] > 20) cls += ' state-leader';
      }
      // Event animation
      if (raceTurtleState[i] && raceTurtleState[i]._anim) {
        cls += ' ' + raceTurtleState[i]._anim;
      }
      // Only update className if changed (prevents animation restart)
      if (runner.className !== cls) runner.className = cls;

      // Rank badge
      const rankColors = ['#FFD700', '#C0C0C0', '#CD7F32', '#666'];
      let existingBadge = lane.querySelector('.lane-rank-badge');
      const finRank = state.finished.indexOf(i);
      if (finRank >= 0) {
        if (!existingBadge) {
          existingBadge = document.createElement('div');
          existingBadge.className = 'lane-rank-badge';
          lane.appendChild(existingBadge);
        }
        existingBadge.style.background = rankColors[finRank];
        existingBadge.style.color = finRank >= 3 ? '#fff' : '#0A1628';
        existingBadge.textContent = finRank + 1;
      }

      // Update info panel inside lane-label
      if (raceTurtleState[i]) {
        const rts = raceTurtleState[i];
        // Speed
        const speedSpan = lane.querySelector('.lane-speed');
        if (speedSpan) {
          const dSpeed = Math.round(rts.baseSpeed * rts.momentum * rts.stamina * 100);
          const sColor = dSpeed > t.speed * 1.2 ? '#4EEAAC' : dSpeed < t.speed * 0.7 ? '#FF6B6B' : 'rgba(255,255,255,0.6)';
          speedSpan.textContent = '⚡' + dSpeed;
          speedSpan.style.color = sColor;
        }
        // Stamina bar
        const stamFill = lane.querySelector('.lane-stam-fill');
        if (stamFill) {
          const sn = Math.max(0, (rts.stamina - 0.3) / 0.7);
          const sf = Math.min(100, Math.round(sn * 100));
          const sc = sn > 0.7 ? '#4EEAAC' : sn > 0.4 ? '#FFD700' : sn > 0.15 ? '#FF8C00' : '#FF4444';
          stamFill.style.width = sf + '%';
          stamFill.style.background = sc;
        }
        // State text (first .lane-state)
        const stLabels = lane.querySelectorAll('.lane-state');
        if (stLabels[0]) {
          const tp = state.progress[i] / maxProgT;
          let sText = '🏃正常', sCol = '#8BB8E8';
          if (tp > 0.80) { sText = '🔥冲刺'; sCol = '#FF6B6B'; }
          else if (rts.burstTimer > 0 && rts.momentum > 1.3) { sText = '⚡爆发'; sCol = '#64C8FF'; }
          else if (rts.slowTimer > 0) { sText = '😵减速'; sCol = '#FF8C00'; }
          else if (rts.stamina < 0.65) { sText = '😰疲惫'; sCol = '#FF8C00'; }
          stLabels[0].textContent = sText;
          stLabels[0].style.color = sCol;
        }
        // Lap label
        const lapLabel = lane.querySelector('[data-lap-label]');
        if (lapLabel) {
          const tLap = Math.min(state.totalLaps, Math.floor(state.progress[i] / 100) + 1);
          const isFinal = tLap === state.totalLaps;
          lapLabel.textContent = isFinal ? `🏁 第${tLap}圈` : `🔄 第${tLap}圈`;
          lapLabel.style.color = isFinal ? '#FF6B6B' : 'var(--text-muted)';
        }
      }
    });

    // Update obstacle visibility on track
    updateTrackObstacles(trackEl, startX, endX);

    renderBetBtns(); renderItemBtns();
    return;
  }

  // Remove old lanes but keep start-line and finish-line
  trackEl.querySelectorAll('.track-lane').forEach(l => l.remove());

  raceTurtles.forEach((t, i) => {
    const lane = document.createElement('div');
    lane.className = 'track-lane' + (state.selected === i ? ' selected' : '');
    if (state.finished.length && state.finished[0] === i) lane.classList.add('winner');
    // No lane click — player already picked their turtle in pick phase

    // Integrated info panel (left side)
    const label = document.createElement('div');
    label.className = 'lane-label';
    // Always create all elements so fast-path can find them
    let displaySpeed = t.speed;
    let speedColor = 'rgba(255,255,255,0.6)';
    let stamFillPct = 100, stamCol = '#4EEAAC';
    let sText = '', sCol = '#8BB8E8';
    if (state.racing && raceTurtleState[i]) {
      const rts = raceTurtleState[i];
      displaySpeed = Math.round(rts.baseSpeed * rts.momentum * rts.stamina * 100);
      speedColor = displaySpeed > t.speed * 1.2 ? '#4EEAAC' : displaySpeed < t.speed * 0.7 ? '#FF6B6B' : 'rgba(255,255,255,0.6)';
      const sn = Math.max(0, (rts.stamina - 0.3) / 0.7);
      stamFillPct = Math.min(100, Math.round(sn * 100));
      stamCol = sn > 0.7 ? '#4EEAAC' : sn > 0.4 ? '#FFD700' : sn > 0.15 ? '#FF8C00' : '#FF4444';
      const tp = state.progress[i] / (state.totalLaps * 100);
      if (tp > 0.80) { sText = '🔥冲刺'; sCol = '#FF6B6B'; }
      else if (rts.burstTimer > 0 && rts.momentum > 1.3) { sText = '⚡爆发'; sCol = '#64C8FF'; }
      else if (rts.slowTimer > 0) { sText = '😵减速'; sCol = '#FF8C00'; }
      else if (rts.stamina < 0.65) { sText = '😰疲惫'; sCol = '#FF8C00'; }
      else { sText = '🏃正常'; sCol = '#8BB8E8'; }
    }
    const tLap = Math.min(state.totalLaps, Math.floor(state.progress[i] / 100) + 1);
    label.innerHTML = `
      <span class="lane-name" style="color:${t.color}">${t.name}</span>
      <span class="lane-speed" style="color:${speedColor}">⚡${displaySpeed}</span>
      <div class="lane-stam-wrap"><div class="lane-stam-fill" style="width:${stamFillPct}%;background:${stamCol}"></div></div>
      <div class="lane-state" style="color:${sCol}">${sText || '—'}</div>
      ${state.totalLaps > 1 ? `<div class="lane-state" data-lap-label="1" style="color:var(--text-muted)">🔄 第${tLap}圈</div>` : ''}`;
    lane.appendChild(label);

    // Turtle runner — positioned by progress
    const trackWidth = trackEl.offsetWidth || 800;
    const startX = 90; // after start line
    const endX = trackWidth - 70; // before finish line
    const maxProg = state.totalLaps * 100;
    const lapProgress = state.progress[i] >= maxProg ? 100 : (state.progress[i] % 100);
    const turtleX = startX + (lapProgress / 100) * (endX - startX);

    const runner = document.createElement('div');
    const maxProgTotal = state.totalLaps * 100;
    let runnerClass = 'turtle-runner' + (state.racing && state.progress[i] < maxProgTotal ? ' racing' : '') + (state.progress[i] >= maxProgTotal ? ' finished' : '');
    // Add zone animation class directly so it persists across render()
    if (state.racing && state.progress[i] > 0 && state.progress[i] < maxProgTotal && currentTrack?.isTriathlon) {
      const zone = getZone(state.progress[i] % 100);
      if (zone === 'swim') runnerClass += ' in-water';
      else if (zone === 'climb') runnerClass += ' in-climb';
    }
    // Add state-based visual classes from turtleState
    if (state.racing && raceTurtleState[i] && state.progress[i] < maxProgTotal) {
      const ts = raceTurtleState[i];
      const totalProg = state.progress[i] / maxProgTotal;
      const maxP = Math.max(...state.progress);
      const isLeading = state.progress[i] === maxP && state.progress[i] > 20;
      if (totalProg > 0.80) {
        runnerClass += ' state-sprint';
      } else if (ts.burstTimer > 0 && ts.momentum > 1.3) {
        runnerClass += ' state-burst';
      } else if (ts.slowTimer > 0) {
        runnerClass += ' state-slow';
      } else if (ts.stamina < 0.65) {
        runnerClass += ' state-tired';
      } else if (ts.stamina > 1.25) {
        runnerClass += ' state-recover';
      } else if (isLeading) {
        runnerClass += ' state-leader';
      }
    }
    // Apply active event animation from turtleState
    if (state.racing && raceTurtleState[i] && raceTurtleState[i]._anim) {
      runnerClass += ' ' + raceTurtleState[i]._anim;
    }
    // 套装光环
    if (state.racing && raceTurtleState[i] && raceTurtleState[i]._aura) {
      const { setKey, level } = raceTurtleState[i]._aura;
      runnerClass += ` aura-${setKey}-${level}`;
    }
    runner.className = runnerClass;
    runner.id = 'turtle' + i;
    runner.style.left = turtleX + 'px';
    runner.style.top = 'calc(50% - 22px)';
    const acc = (i === state.selected) ? getMyAccessories() : [];
    runner.innerHTML = turtleSVG(t.shell, t.body, t.pattern, t.accent, acc);
    lane.appendChild(runner);

    // Rank badge (right side, only after race)
    if (state.finished.length > 0) {
      const rank = state.finished.indexOf(i);
      if (rank >= 0) {
        const badge = document.createElement('div');
        badge.className = 'lane-rank-badge';
        badge.style.background = rankColors[rank];
        badge.style.color = rank === 3 ? '#fff' : '#0A1628';
        badge.textContent = rank + 1;
        lane.appendChild(badge);
      }
    }

    trackEl.appendChild(lane);
  });

  // Odds display
  const oddsEl = document.getElementById('raceOdds');
  if (oddsEl && raceTurtles.length > 0 && !state.racing) {
    const odds = calculateOdds();
    oddsEl.innerHTML = odds.map(o => `<span class="odds-tag" style="color:${o.color}">
      ${o.name} <span style="color:var(--gold)">${o.odds}x</span></span>`).join('');
  } else if (oddsEl && state.racing) {
    oddsEl.innerHTML = '';
  }

  // Streak display
  const streakEl = document.getElementById('streakDisplay');
  if (streakEl) {
    const streak = state.winStreak || 0;
    streakEl.innerHTML = streak >= 2
      ? `<span class="streak-badge">🔥 ${streak}连胜 x${getStreakMultiplier()}</span>` : '';
  }

  // Pick buttons — show raceTurtles with player's highlighted
  const pickEl = document.getElementById('pickBtns');
  if (pickEl) {
    pickEl.innerHTML = '';
    pickEl.style.display = 'flex';
    pickEl.style.gap = '8px';
    raceTurtles.forEach((t, i) => {
      const tag = document.createElement('span');
      tag.className = 'pick-btn' + (i === state.selected ? ' active' : '');
      tag.style.background = i === state.selected ? t.color : 'rgba(255,255,255,0.1)';
      tag.style.color = i === state.selected ? '#0A1628' : t.color;
      tag.style.cursor = 'default';
      tag.style.padding = '8px 14px';
      tag.style.fontSize = '13px';
      tag.textContent = (i === state.selected ? '★ ' : '') + t.name;
      pickEl.appendChild(tag);
    });
  }

  const startBtnEl = document.getElementById('startBtn');

// Apply theme without re-randomizing
function applyTrackTheme_apply() {
  const container = document.querySelector('.track-container');
  if (!container) return;
  container.style.setProperty('--track-bg', currentTrack.bg);

  // Strip decoration per theme
  const stripColors = {
    grass: 'repeating-linear-gradient(90deg, #3a7a20 0px, #2d6a18 20px, #3a7a20 40px)',
    beach: 'repeating-linear-gradient(90deg, #d4a030 0px, #c49020 15px, #d4a030 30px)',
    snow: 'repeating-linear-gradient(90deg, #8ab4e8 0px, #a8cef0 15px, #8ab4e8 30px)',
    night: 'repeating-linear-gradient(90deg, #4a2080 0px, #3a1868 15px, #4a2080 30px)',
    volcano: 'repeating-linear-gradient(90deg, #8b2500 0px, #6b1a00 15px, #8b2500 30px)',
    triathlon: 'repeating-linear-gradient(90deg, #2a6a2a 0px, #1a5a1a 20px, #2a6a2a 40px)',
    rainbow: 'linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00cc44, #0088ff, #aa00ff)',
  };
  container.style.setProperty('--strip-bg', stripColors[currentTrack.id] || stripColors.grass);

  // Remove old atmosphere
  container.querySelectorAll('.track-atmos').forEach(e => e.remove());

  // Create atmosphere layer
  const tLanes = document.getElementById('trackLanes');
  const atmos = document.createElement('div');
  atmos.className = 'track-atmos atmos-' + currentTrack.id;

  if (currentTrack.id === 'grass') {
    const leaves = ['🍃', '🌿', '☘️', '🍀'];
    for (let j = 0; j < 8; j++) {
      const l = document.createElement('span');
      l.className = 'leaf';
      l.textContent = leaves[Math.floor(Math.random() * leaves.length)];
      l.style.left = (Math.random() * 100) + '%';
      l.style.animationDuration = (4 + Math.random() * 6) + 's';
      l.style.animationDelay = (Math.random() * 5) + 's';
      atmos.appendChild(l);
    }
  } else if (currentTrack.id === 'snow') {
    for (let j = 0; j < 20; j++) {
      const f = document.createElement('div');
      f.className = 'flake';
      f.style.left = (Math.random() * 100) + '%';
      f.style.width = f.style.height = (2 + Math.random() * 4) + 'px';
      f.style.animationDuration = (3 + Math.random() * 5) + 's';
      f.style.animationDelay = (Math.random() * 4) + 's';
      atmos.appendChild(f);
    }
  } else if (currentTrack.id === 'night') {
    for (let j = 0; j < 25; j++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = (Math.random() * 100) + '%';
      s.style.top = (Math.random() * 100) + '%';
      s.style.animationDuration = (1 + Math.random() * 3) + 's';
      s.style.animationDelay = (Math.random() * 3) + 's';
      atmos.appendChild(s);
    }
  } else if (currentTrack.id === 'volcano') {
    for (let j = 0; j < 12; j++) {
      const e = document.createElement('div');
      e.className = 'ember';
      e.style.left = (Math.random() * 100) + '%';
      e.style.bottom = '0';
      e.style.background = Math.random() > 0.5 ? '#FF6E40' : '#FFAB40';
      e.style.setProperty('--drift', (Math.random() * 30 - 15) + 'px');
      e.style.animationDuration = (2 + Math.random() * 3) + 's';
      e.style.animationDelay = (Math.random() * 3) + 's';
      atmos.appendChild(e);
    }
  }

  if (tLanes) tLanes.appendChild(atmos);
  const header = container.querySelector('.track-header');
  if (header) {
    const shoe = getEquippedShoe();
    const match = shoe && shoe.terrain === currentTrack.id;
    header.querySelector('span').innerHTML = currentTrack.name +
      (match ? ` <span style="color:#4EEAAC;font-size:12px">✨ ${shoe.name}匹配! +${shoe.terrainBonus*100}%</span>` : '');
  }
  document.querySelectorAll('.track-lane').forEach((lane, i) => {
    lane.style.background = i % 2 === 0 ? currentTrack.laneOdd : currentTrack.laneEven;
  });
  // Triathlon zones
  const trackLanes = document.getElementById('trackLanes');
  trackLanes.querySelectorAll('.zone-overlay,.zone-divider').forEach(e => e.remove());
  if (currentTrack.isTriathlon && currentTrack.zones) {
    generateTriathlonAbilities();
    // Use percentage positioning so zones always fill the full track
    currentTrack.zones.forEach((zone, zi) => {
      const overlay = document.createElement('div');
      overlay.className = 'zone-overlay';
      if (zone.cssClass) overlay.classList.add(zone.cssClass);
      overlay.style.left = zone.start + '%';
      overlay.style.width = (zone.end - zone.start) + '%';
      overlay.innerHTML = `<span class="zone-label">${zone.name}</span>`;
      trackLanes.appendChild(overlay);
      if (zi > 0) {
        const divider = document.createElement('div');
        divider.className = 'zone-divider';
        divider.style.left = zone.start + '%';
        divider.setAttribute('data-icon', zone.name.split(' ')[0]);
        trackLanes.appendChild(divider);
      }
    });
  }
}

function triggerRaceEvent(speeds) {
  const evt = RACE_EVENTS[Math.floor(Math.random() * RACE_EVENTS.length)];
  let targetIdx;

  if (evt.effect === 'slow_leader') {
    let maxProg = -1;
    state.progress.forEach((p, i) => { if (p > maxProg) { maxProg = p; targetIdx = i; } });
  } else {
    targetIdx = Math.floor(Math.random() * raceTurtles.length);
  }

  const multiplier = evt.effect.startsWith('boost') ? 1.5 : 0.5;
  const originalSpeed = speeds[targetIdx];
  speeds[targetIdx] *= multiplier;

  setTimeout(() => { speeds[targetIdx] = originalSpeed; }, 2000);

  const div = document.createElement('div');
  div.className = 'race-event';
  div.textContent = evt.emoji + ' ' + evt.text.replace('{name}', raceTurtles[targetIdx]?.name || '乌龟');
  document.body.appendChild(div);
  playSound(evt.effect.startsWith('boost') ? 'go' : 'tick');
  setTimeout(() => div.remove(), 2500);
}

// Triathlon zone speed modifiers per turtle (randomized per race)
let triathlonAbilities = [];

function generateTriathlonAbilities() {
  triathlonAbilities = raceTurtles.map(() => ({
    run: 0.9 + Math.random() * 0.4,    // 0.9 ~ 1.3 跑步正常速度
    swim: 0.5 + Math.random() * 0.45,  // 0.5 ~ 0.95 游泳明显慢（水阻力）
    climb: 0.7 + Math.random() * 0.5,  // 0.7 ~ 1.2 蛙跳中等偏慢
  }));
}

function getZone(progress) {
  // For tracks with custom zone definitions, use the zone array
  if (currentTrack?.zones) {
    for (const z of currentTrack.zones) {
      if (progress >= z.start && progress < z.end) return z.zone;
    }
    return currentTrack.zones[currentTrack.zones.length - 1].zone;
  }
  if (progress < 33) return 'run';
  if (progress < 66) return 'swim';
  return 'climb';
}

function getZoneMultiplier(turtleIdx, progress) {
  if (!currentTrack?.isTriathlon || !triathlonAbilities[turtleIdx]) return 1.0;
  const zone = getZone(progress);
  return triathlonAbilities[turtleIdx][zone];
}
