// === WIN STREAK ===
function getStreakMultiplier() {
  const streak = state.winStreak || 0;
  if (streak >= 5) return 3.0;
  if (streak >= 3) return 2.0;
  if (streak >= 2) return 1.5;
  return 1.0;
}

// === ODDS CALCULATION ===
function calculateOdds() {
  if (!raceTurtles.length) return [];
  const totalSpeed = raceTurtles.reduce((s, t) => s + t.speed, 0);
  return raceTurtles.map((t, i) => {
    let winProb = t.speed / totalSpeed;
    // Player's equipped cosmetics boost their turtle's odds slightly
    if (i === state.selected) {
      const cb = getCosmeticBonuses();
      winProb *= 1 + (cb.speed || 0) + (cb.sprint || 0) * 0.5;
    }
    const odds = Math.max(1.2, (1 / winProb)).toFixed(1);
    return { name: t.name, color: t.color, odds: parseFloat(odds) };
  });
}

function beginRaceAnimation() {
  // Start background race music
  startBgMusic();
  ambientSoundTimer = 0;

  // Target ~20 seconds at 60fps = ~1200 frames, need avg 100/1200 ≈ 0.083 per frame
  const baseSpeeds = raceTurtles.map(t => t.speed / 100);

  // Get cosmetic bonuses for player's turtle
  const cb = (state.selected >= 0) ? getCosmeticBonuses() : {};
  // stat bonuses:
  //   speed    → base speed multiplier
  //   stamina  → slower stamina drain for leader
  //   luck     → wider luck range
  //   recovery → faster underdog recovery
  //   focus    → smaller jitter (more consistent)
  //   burst    → stronger burst speed
  //   chaos    → opponents get more momentum swings
  //   sprint   → stronger final sprint
  //   dodge    → resist slow events
  //   warmup   → start with higher momentum

  const turtleState = raceTurtles.map((t, i) => {
    const isPlayer = i === state.selected;
    const lucky = state.usedItems.includes('lucky') && isPlayer;
    return {
      baseSpeed: t.speed / 100 * (isPlayer ? 1 + (cb.speed || 0) + getShoeBonus() : 1),
      momentum: 0.8 + Math.random() * 0.4 + (isPlayer ? (cb.warmup || 0) : 0),
      stamina: 1.0,
      burstTimer: 0,
      slowTimer: 0,
      nextShiftAt: 15 + Math.random() * 20 * ((!isPlayer && cb.chaos) ? 0.6 : 1),
      luckyBoost: lucky ? 1.15 + (cb.luck || 0) : 1.0,
      isPlayer,
    };
  });

  // Apply item boosts to base
  if (state.usedItems.includes('boost')) {
    turtleState[state.selected].baseSpeed *= 1.2;
  }
  if (state.usedItems.includes('slow')) {
    const opponents = [0,1,2,3].filter(i => i !== state.selected);
    const target = opponents[Math.floor(Math.random() * opponents.length)];
    turtleState[target].baseSpeed *= 0.8;
  }

  let frameCount = 0;
  raceStartTime = performance.now();
  let lastEventProgress = 0;

  let animId;
  function tick() {
    frameCount++;

    for (let i = 0; i < 4; i++) {
      if (state.progress[i] >= 100) continue;

      const ts = turtleState[i];

      // === Dynamic momentum shifts — the core drama engine ===
      // Every turtle hits shift points where their speed changes dramatically
      if (state.progress[i] >= ts.nextShiftAt) {
        // Big momentum swing: can speed up OR slow down significantly
        const swing = 0.5 + Math.random() * 1.2; // range 0.5x to 1.7x
        ts.momentum = swing;
        const shiftInterval = (!ts.isPlayer && cb.chaos) ? (8 + Math.random() * 10) : (8 + Math.random() * 18);
        ts.nextShiftAt = state.progress[i] + shiftInterval;
      }

      // === Random speed bursts — sudden surges forward ===
      if (ts.burstTimer > 0) {
        ts.burstTimer--;
      } else if (Math.random() < 0.005) {
        ts.burstTimer = 30 + Math.floor(Math.random() * 60);
        ts.momentum = 1.4 + Math.random() * 0.5 + (ts.isPlayer ? (cb.burst || 0) : 0);
      }

      // === Random slowdowns — turtle gets tired or distracted ===
      if (ts.slowTimer > 0) {
        // dodge bonus: player's turtle resists slowdowns
        const dodged = ts.isPlayer && (cb.dodge || 0) > 0 && Math.random() < (cb.dodge || 0);
        if (!dodged) { ts.slowTimer--; ts.momentum *= 0.6; }
        else { ts.slowTimer = 0; } // shrug off the slowdown
      } else if (Math.random() < 0.003) {
        ts.slowTimer = 20 + Math.floor(Math.random() * 40);
      }

      // === Stamina system — leaders tire, trailers get second wind ===
      const maxProgress = Math.max(...state.progress);
      const isLeader = state.progress[i] === maxProgress && state.progress[i] > 30;
      const isBehind = state.progress[i] < maxProgress - 15;

      if (isLeader && state.progress[i] > 50) {
        const staminaDrain = ts.isPlayer ? 0.001 * (1 - (cb.stamina || 0)) : 0.001;
        ts.stamina = Math.max(0.6, ts.stamina - staminaDrain);
      }
      if (isBehind && state.progress[i] > 40) {
        const recoveryRate = ts.isPlayer ? 0.003 * (1 + (cb.recovery || 0)) : 0.003;
        ts.stamina = Math.min(1.3, ts.stamina + recoveryRate);
      }

      // === Final sprint — everyone speeds up past 85% for exciting finish ===
      const sprintMult = ts.isPlayer ? 1 + (cb.sprint || 0) : 1;
      const sprintBoost = state.progress[i] > 85 ? (1.2 + (state.progress[i] - 85) * 0.02) * sprintMult : 1.0;

      // === Calculate final speed with all factors ===
      // focus bonus: player's turtle has less speed variation (more consistent)
      const jitterRange = ts.isPlayer ? 0.3 * (1 - (cb.focus || 0)) : 0.3;
      const jitter = 0.85 + Math.random() * jitterRange;
      const zoneMult = getZoneMultiplier(i, state.progress[i]);
      const effectiveSpeed = ts.baseSpeed * ts.momentum * ts.stamina * ts.luckyBoost * sprintBoost * jitter * zoneMult;

      // Scale to ~20 second race: base increment ~0.08 per frame
      state.progress[i] += effectiveSpeed * 0.09;

      if (state.progress[i] >= 100) {
        state.progress[i] = 100;
        if (!state.finished.includes(i)) {
          state.finished.push(i);
          playSound('finishLine');
        }
      }
    }

    // Random race events — more frequent window, wider range
    const avgProgress = state.progress.reduce((a, b) => a + b, 0) / 4;
    if (avgProgress > 15 && avgProgress < 85 && avgProgress - lastEventProgress > 12 && Math.random() < 0.008) {
      // Affect turtleState momentum instead of the old speeds array
      const evt = RACE_EVENTS[Math.floor(Math.random() * RACE_EVENTS.length)];
      let targetIdx;
      if (evt.effect === 'slow_leader') {
        let maxProg = -1;
        state.progress.forEach((p, i) => { if (p > maxProg && p < 100) { maxProg = p; targetIdx = i; } });
      } else {
        targetIdx = Math.floor(Math.random() * raceTurtles.length);
      }
      if (targetIdx !== undefined) {
        const ts = turtleState[targetIdx];
        if (evt.effect.startsWith('boost')) {
          ts.burstTimer = 60; ts.momentum = 1.6;
        } else {
          ts.slowTimer = 50; ts.momentum = 0.4;
        }
        const div = document.createElement('div');
        div.className = 'race-event';
        div.textContent = evt.emoji + ' ' + evt.text.replace('{name}', raceTurtles[targetIdx]?.name || '乌龟');
        document.body.appendChild(div);
        playSound(evt.effect.startsWith('boost') ? 'go' : 'tick');
        setTimeout(() => div.remove(), 2500);
        lastEventProgress = avgProgress;
      }
    }

    render();

    // === AMBIENT RACE SOUNDS ===
    ambientSoundTimer++;
    if (ambientSoundTimer % 12 === 0) { // ~5 times per second at 60fps
      const playerProg2 = state.progress[state.selected] || 0;
      if (playerProg2 > 0 && playerProg2 < 100) {
        const playerZone = currentTrack?.isTriathlon ? getZone(playerProg2) : 'run';
        if (playerZone === 'swim') {
          playSound('swimming');
        } else {
          playSound('running');
        }
      }
    }

    // === COMMENTARY & BUBBLES ===
    commentaryTimer++;
    const avgProg = state.progress.reduce((a,b) => a+b, 0) / 4;
    // Find leader
    let leadIdx = 0; let leadProg = 0;
    state.progress.forEach((p,i) => { if (p > leadProg) { leadProg = p; leadIdx = i; } });
    const playerProg = state.progress[state.selected] || 0;

    if (commentaryTimer === 1) {
      showCommentary('start');
    }
    if (commentaryTimer === 60) {
      showCommentary('takeLeadFirst', raceTurtles[leadIdx]?.name);
    }
    // Lead changes
    if (commentaryTimer > 60 && commentaryTimer % 30 === 0) {
      const sorted = [...state.progress].map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
      const gap = sorted[0].p - sorted[1].p;
      if (gap < 3 && avgProg > 30) {
        showCommentary('closeFight');
      } else if (gap > 15) {
        showCommentary('bigGap', raceTurtles[sorted[0].i]?.name);
      }
    }
    // Player-specific commentary
    if (commentaryTimer % 80 === 0 && avgProg > 20 && avgProg < 80) {
      if (leadIdx === state.selected) {
        showCommentary('playerLead', raceTurtles[state.selected]?.name);
      } else if (leadProg - playerProg > 10) {
        showCommentary('playerBehind', raceTurtles[state.selected]?.name);
      }
    }
    // Comeback detection
    if (commentaryTimer % 60 === 0) {
      const sorted = [...state.progress].map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
      for (let ri = 1; ri < sorted.length; ri++) {
        if (sorted[0].p - sorted[ri].p < 5 && sorted[ri].p > 50) {
          showCommentary('comeback', raceTurtles[sorted[ri].i]?.name);
          break;
        }
      }
    }
    // Sprint phase
    if (avgProg > 82 && commentaryTimer % 100 === 0) {
      showCommentary('sprint');
    }
    if (avgProg > 92 && commentaryTimer % 60 === 0) {
      showCommentary('almostFinish');
    }
    // Triathlon zone transitions
    if (currentTrack?.isTriathlon) {
      const leaderProg = Math.max(...state.progress);
      // Trigger zone transition commentary once
      if (!state._swimAnnounced && leaderProg >= 33) {
        state._swimAnnounced = true;
        showCommentary('enterSwim');
      }
      if (!state._climbAnnounced && leaderProg >= 66) {
        state._climbAnnounced = true;
        showCommentary('enterClimb');
      }
      // Zone-specific performance commentary
      if (commentaryTimer % 90 === 0 && triathlonAbilities.length > 0) {
        for (let ti = 0; ti < raceTurtles.length; ti++) {
          const zone = getZone(state.progress[ti]);
          const ability = triathlonAbilities[ti]?.[zone] || 1;
          if (ability < 0.85 && state.progress[ti] > 5 && state.progress[ti] < 95) {
            showCommentary(zone === 'swim' ? 'swimStruggle' : zone === 'climb' ? 'climbStruggle' : 'playerBehind', raceTurtles[ti]?.name);
            break;
          } else if (ability > 1.15 && state.progress[ti] > 5 && state.progress[ti] < 95) {
            showCommentary(zone === 'swim' ? 'swimFast' : zone === 'climb' ? 'climbFast' : 'playerLead', raceTurtles[ti]?.name);
            break;
          }
        }
      }
    }

    // Random speech bubbles
    if (Math.random() < 0.004) {
      const sorted = [...state.progress].map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
      if (sorted[0].p - sorted[sorted.length-1].p > 10) {
        showBubble(sorted[0].i, 'happy');
        showBubble(sorted[sorted.length-1].i, 'sad');
      }
    }

    // Spawn zone-specific particles + update turtle zone class
    if (Math.random() < 0.4) {
      raceTurtles.forEach((_, i) => {
        if (state.progress[i] > 0 && state.progress[i] < 100) {
          const runner = document.getElementById('turtle' + i);
          if (!runner || !runner.parentElement) return;
          const zone = getZone(state.progress[i]);
          const isTri = currentTrack?.isTriathlon;
          const laneEl = runner.parentElement;
          const rx = parseFloat(runner.style.left) || 0;
          const cy = laneEl.offsetHeight / 2;

          // Update turtle zone animation class
          runner.classList.remove('in-water', 'in-climb');
          if (isTri && zone === 'swim') runner.classList.add('in-water');
          if (isTri && zone === 'climb') runner.classList.add('in-climb');

          if (isTri && zone === 'swim') {
            // Water splash: multiple droplets
            for (let d = 0; d < 3; d++) {
              const sp = document.createElement('div');
              sp.className = 'splash';
              sp.style.width = (5 + Math.random() * 8) + 'px';
              sp.style.height = sp.style.width;
              sp.style.left = (rx - 8 + Math.random() * 12) + 'px';
              sp.style.top = (cy + (Math.random() - 0.5) * 24) + 'px';
              laneEl.appendChild(sp);
              setTimeout(() => sp.remove(), 700);
            }
            // Water drops falling
            if (Math.random() < 0.5) {
              const drop = document.createElement('div');
              drop.className = 'splash-drop';
              drop.style.left = (rx + 10 + Math.random() * 20) + 'px';
              drop.style.top = (cy - 10 + Math.random() * 8) + 'px';
              laneEl.appendChild(drop);
              setTimeout(() => drop.remove(), 500);
            }
            // Water ripple behind turtle
            if (Math.random() < 0.3) {
              const ripple = document.createElement('div');
              ripple.className = 'water-ripple';
              ripple.style.left = (rx - 15) + 'px';
              ripple.style.top = (cy - 5) + 'px';
              laneEl.appendChild(ripple);
              setTimeout(() => ripple.remove(), 1000);
            }
          } else if (isTri && zone === 'climb') {
            // Rock particles + sparks
            const rock = document.createElement('div');
            rock.className = 'rock-particle';
            rock.style.width = (4 + Math.random() * 6) + 'px';
            rock.style.height = (4 + Math.random() * 5) + 'px';
            rock.style.left = (rx - 5 + Math.random() * 15) + 'px';
            rock.style.top = (cy + (Math.random() - 0.5) * 20) + 'px';
            laneEl.appendChild(rock);
            setTimeout(() => rock.remove(), 800);
            if (Math.random() < 0.4) {
              const spark = document.createElement('div');
              spark.className = 'rock-spark';
              spark.style.left = (rx + Math.random() * 10) + 'px';
              spark.style.top = (cy - 5 + Math.random() * 10) + 'px';
              laneEl.appendChild(spark);
              setTimeout(() => spark.remove(), 400);
            }
          } else {
            // Normal dust
            const dust = document.createElement('div');
            dust.className = 'dust';
            dust.style.left = (rx - 5 + Math.random() * 6) + 'px';
            dust.style.top = (cy + (Math.random() - 0.5) * 20) + 'px';
            laneEl.appendChild(dust);
            setTimeout(() => dust.remove(), 600);
          }
        }
      });
    }

    if (state.finished.length < 4) {
      animId = requestAnimationFrame(tick);
    } else {
      finishRace();
    }
  }
  animId = requestAnimationFrame(tick);
}

function finishRace() {
  state.racing = false;
  stopBgMusic();
  const winner = state.finished[0];
  const won = winner === state.selected;
  const raceTime = ((performance.now() - raceStartTime) / 1000).toFixed(2);

  // Commentary: finish
  showCommentary('finished', raceTurtles[winner]?.name);

  // Streak + reward calc
  const streakMult = getStreakMultiplier();
  let netReward = 0;
  if (won) {
    const reward = Math.round(state.betAmount * 4 * streakMult);
    netReward = reward - state.betAmount; // net gain for display
    state.coins += reward;
    state.wins++;
    state.winStreak = (state.winStreak || 0) + 1;
    playSound('win');
    showConfetti();
    showBubble(winner, 'taunt');
    // Record to leaderboard
    addRaceRecord(
      raceTurtles[winner].name,
      raceTurtles[winner].color,
      currentTrack?.name || '🌿 草地赛道',
      raceTime,
      netReward
    );
  } else {
    state.winStreak = 0;
    playSound('lose');
    showBubble(state.selected, 'sad');
    showBubble(winner, 'taunt');
  }

  render();

  setTimeout(() => {
    const modal = document.getElementById('modal');
    const streakText = won && state.winStreak >= 2 ? ` (🔥${state.winStreak}连胜 x${getStreakMultiplier()})` : '';
    document.getElementById('modalTitle').textContent = won ? '🎉 You Won!' : '😅 Better Luck Next Time';
    document.getElementById('modalTitle').style.color = won ? '#4EEAAC' : '#FF6B6B';
    document.getElementById('modalEmoji').textContent = won ? '🏆' : '💔';
    document.getElementById('modalText').textContent = `Winner: ${raceTurtles[winner].name}${streakText}`;
    document.getElementById('modalText').innerHTML += `<br><span style="font-size:22px;color:var(--gold)">⏱ ${raceTime}s</span>`;
    document.getElementById('modalReward').textContent = won ? `+${netReward} coins!` : `-${state.betAmount} coins`;
    document.getElementById('modalReward').style.color = won ? '#FFD700' : '#FF6B6B';
    modal.classList.add('show');
  }, 800);

  saveGame();
}

function showGameOver() {
  if (state.coins > state.highScore) {
    state.highScore = state.coins;
  }
  state.totalWins += state.wins;
  saveGame();
  // Race records are now added per-win in finishRace()

  document.getElementById('gameoverEmoji').textContent = state.wins >= 3 ? '🏆' : '🐢';
  document.getElementById('gameoverTitle').textContent =
    state.wins >= 3 ? '太厉害了!' : state.wins > 0 ? '不错的比赛!' : '再接再厉!';
  document.getElementById('gameoverTitle').style.color =
    state.wins >= 3 ? 'var(--gold)' : 'var(--accent)';

  document.getElementById('gameoverStats').innerHTML = `
    <div class="stat-card"><div class="stat-value">🪙 ${state.coins.toLocaleString()}</div><div class="stat-label">最终金币</div></div>
    <div class="stat-card"><div class="stat-value">🏆 ${state.wins}</div><div class="stat-label">胜利场次</div></div>
    <div class="stat-card"><div class="stat-value">${state.maxRounds}</div><div class="stat-label">总轮次</div></div>
    <div class="stat-card"><div class="stat-value">${state.highScore.toLocaleString()}</div><div class="stat-label">历史最高</div></div>
  `;

  if (state.wins >= 3) showConfetti();
  playSound(state.wins > 0 ? 'win' : 'lose');
  showScene('scene-gameover');
}

function nextRound() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('confetti').innerHTML = '';

  if (state.round >= state.maxRounds) {
    showGameOver();
    return;
  }

  state.round++;
  state.selected = -1;
  state.progress = [0, 0, 0, 0];
  state.finished = [];
  state.usedItems = [];
  state.pickPhase = true;
  raceTurtles = [];
  document.getElementById('raceTitle').textContent = '🐢 选择你的参赛乌龟！';
  render();
  saveGame();
}

function showConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#FFD700', '#4EEAAC', '#FF6B6B', '#FFB347', '#A78BFA', '#fff'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = Math.random() * 1.5 + 's';
    container.appendChild(el);
  }
}

loadGame();
const hsEl = document.getElementById('highScore');
if (hsEl) hsEl.textContent = state.highScore.toLocaleString();
const scEl = document.getElementById('startCoins');
if (scEl) scEl.textContent = state.coins.toLocaleString();
render();
</script>
</body>
</html>
