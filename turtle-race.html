// === ODDS CALCULATION ===
function calculateOdds() {
  if (!raceTurtles.length) return [];
  const totalSpeed = raceTurtles.reduce((s, t) => s + t.speed, 0);
  return raceTurtles.map((t, i) => {
    let winProb = t.speed / totalSpeed;
    // Player's equipped cosmetics boost their turtle's odds slightly
    if (i === state.selected) {
      const cb = getCosmeticBonuses();
      winProb *= 1 + (cb.speed || 0) + (cb.sprint || 0) * 0.5;
    }
    const odds = Math.max(1.2, (1 / winProb)).toFixed(1);
    return { name: t.name, color: t.color, odds: parseFloat(odds) };
  });
}

function beginRaceAnimation() {
  // Start background race music
  startBgMusic();
  ambientSoundTimer = 0;

  // Target ~35 seconds at 60fps = ~2100 frames, need avg 100/2100 ≈ 0.048 per frame
  const baseSpeeds = raceTurtles.map(t => t.speed / 100);

  // Get cosmetic bonuses for player's turtle
  const cb = (state.selected >= 0) ? getCosmeticBonuses() : {};
  // stat bonuses:
  //   speed    → base speed multiplier
  //   stamina  → slower stamina drain for leader
  //   luck     → wider luck range
  //   recovery → faster underdog recovery
  //   focus    → smaller jitter (more consistent)
  //   burst    → stronger burst speed
  //   chaos    → opponents get more momentum swings
  //   sprint   → stronger final sprint
  //   dodge    → resist slow events
  //   warmup   → start with higher momentum

  const turtleState = raceTurtles.map((t, i) => {
    // Note: also exposed as raceTurtleState for render()
    const isPlayer = i === state.selected;
    const lucky = state.usedItems.includes('lucky') && isPlayer;
    return {
      baseSpeed: t.speed / 100 * (isPlayer ? 1 + (cb.speed || 0) + getShoeBonus() : 1),
      momentum: 0.8 + Math.random() * 0.4 + (isPlayer ? (cb.warmup || 0) : 0),
      stamina: 1.0,
      burstTimer: 0,
      slowTimer: 0,
      nextShiftAt: 15 + Math.random() * 20 * ((!isPlayer && cb.chaos) ? 0.6 : 1),
      luckyBoost: lucky ? 1.15 + (cb.luck || 0) : 1.0,
      isPlayer,
      _tripped: false,
      _sprintEntered: false,
      _staminaWarned: false,
      activeSetEffects: i === state.selected ? (cb._activeEffects || []) : (t._aiSetEffects || []),
      freezeCooldown: 0,
      stealthCharge: 0,
      dragonFireReady: true,
      rainbowLastZone: -1,
      _aura: isPlayer ? getEquippedSetAura() : null,
    };
  });

  // Apply AI equipment bonuses in ranked mode
  if (state.isRankedMode && state._rankedAIEquipment) {
    let aiIdx = 0;
    for (let i = 0; i < 4; i++) {
      if (i === state.selected) continue;
      const ts = turtleState[i];
      const aiEquip = state._rankedAIEquipment[aiIdx];
      aiIdx++;
      if (!aiEquip) continue;
      if (aiEquip.cosmetics && aiEquip.cosmetics.length > 0) {
        let aiSpeedBonus = 0;
        let aiSprintBonus = 0;
        let aiDodgeBonus = 0;
        let aiStaminaBonus = 0;
        aiEquip.cosmetics.forEach(cosId => {
          const item = COSMETIC_ITEMS.find(c => c.id === cosId);
          if (item) {
            if (item.stat === 'speed') aiSpeedBonus += item.bonus;
            if (item.stat === 'sprint') aiSprintBonus += item.bonus;
            if (item.stat === 'dodge') aiDodgeBonus += item.bonus;
            if (item.stat === 'stamina') aiStaminaBonus += item.bonus;
          }
        });
        ts.baseSpeed *= (1 + aiSpeedBonus);
        ts.sprintBonus = (ts.sprintBonus || 0) + aiSprintBonus;
        ts.dodgeBonus = (ts.dodgeBonus || 0) + aiDodgeBonus;
        ts.staminaBonus = (ts.staminaBonus || 0) + aiStaminaBonus;
        ts._aiSetEffects = aiEquip.setEffects;
        ts.activeSetEffects = aiEquip.setEffects;
      }
      if (aiEquip.shoe) {
        const shoe = SHOE_ITEMS.find(s => s.id === aiEquip.shoe);
        if (shoe) ts.baseSpeed *= 1.05;
      }
    }
  }

  raceTurtleState = turtleState; // expose for render()

  // Generate obstacles for each lap
  raceObstacles = [];
  const OBSTACLE_TYPES = [
    { emoji: '🍌', text: '🍌 踩到香蕉皮！', anim: 'evt-banana' },
    { emoji: '🪨', text: '🪨 被石头绊倒！', anim: 'evt-slow' },
    { emoji: '💧', text: '💧 踩进水坑！', anim: 'evt-slow' },
    { emoji: '🕳️', text: '🕳️ 掉进小坑！', anim: 'evt-slow' },
  ];
  for (let lap = 0; lap < state.totalLaps; lap++) {
    // 2-3 obstacles per lap, spread across the track
    const count = 2 + Math.floor(Math.random() * 2);
    for (let j = 0; j < count; j++) {
      const pos = lap * 100 + 30 + Math.random() * 55; // between 30% and 85% of each lap
      const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
      raceObstacles.push({
        pos, emoji: type.emoji, text: type.text, anim: type.anim,
        hit: false, el: null,
      });
    }
  }

  // Items are now used during race via useRaceItem()

  let frameCount = 0;
  raceStartTime = performance.now();
  let lastEventProgress = 0;

  let animId;
  function tick() {
    frameCount++;

    for (let i = 0; i < 4; i++) {
      const maxProgTotal = state.totalLaps * 100;
      if (state.progress[i] >= maxProgTotal) continue;

      const ts = turtleState[i];
      const lapProg = state.progress[i] % 100;
      const maxProgress = Math.max(...state.progress);
      const rank = [...state.progress].filter(p => p > state.progress[i]).length; // 0=1st,3=last

      // ========================================
      // PHASE 1: 起跑 (0~30%) — ⚡速度 matters
      // PHASE 2: 中段 (30~70%) — 💪耐力 + events
      // PHASE 3: 冲刺 (70~100%) — 🔥冲刺 + 🎯技巧
      // ========================================

      // --- Momentum: smooth shifts instead of wild random ---
      if (state.progress[i] >= ts.nextShiftAt) {
        const swing = 0.6 + Math.random() * 1.0; // 0.6~1.6x
        // Phase-based: more stable in P1, wilder in P2, dramatic in P3
        ts.momentum = lapProg > 70 ? (0.5 + Math.random() * 1.3) : swing;
        const interval = (!ts.isPlayer && cb.chaos) ? (8 + Math.random() * 8) : (10 + Math.random() * 15);
        ts.nextShiftAt = state.progress[i] + interval;
      }

      // --- Burst: 🎯技巧(burst) drives this ---
      if (ts.burstTimer > 0) {
        ts.burstTimer--;
      } else if (Math.random() < (lapProg > 70 ? 0.01 : 0.004)) { // more bursts in sprint phase
        ts.burstTimer = 25 + Math.floor(Math.random() * 45);
        ts.momentum = 1.5 + Math.random() * 0.4 + (ts.isPlayer ? (cb.burst || 0) : 0);
        const burstMsgs = ['🔥 爆发加速!', '💨 突然提速!', '⚡ 全力冲刺!'];
        spawnEventEffects(i, true, burstMsgs[Math.floor(Math.random() * burstMsgs.length)]);
      }

      // --- Slowdown: 🎯技巧(dodge) resists, 🎯技巧(focus) reduces impact ---
      if (ts.slowTimer > 0) {
        const dodged = ts.isPlayer && (cb.dodge || 0) > 0 && Math.random() < (cb.dodge || 0);
        if (!dodged) {
          ts.slowTimer--;
          const slowMult = ts.isPlayer ? 0.6 + (cb.focus || 0) * 0.3 : 0.6;
          ts.momentum *= slowMult;
        } else {
          ts.slowTimer = 0;
          spawnEventEffects(i, true, '🛡️ 闪避成功!');
        }
      } else if (Math.random() < 0.003) {
        // Shield blocks slowdown
        if (ts._shielded) {
          ts._shielded = false;
          spawnEventEffects(i, true, '🛡️ 护盾抵挡!');
        } else {
          ts.slowTimer = 15 + Math.floor(Math.random() * 30);
          const slowMsgs = ['😵 脚步踉跄!', '💦 体力下降!', '🌀 节奏紊乱!'];
          spawnEventEffects(i, false, slowMsgs[Math.floor(Math.random() * slowMsgs.length)]);
        }
      }

      // --- 💪耐力: All turtles drain, overall downward trend ---
      const gap = maxProgress - state.progress[i];
      const staminaBonus = ts.isPlayer ? (cb.stamina || 0) : 0;
      const recoveryBonus = ts.isPlayer ? (cb.recovery || 0) : 0;

      // === DRAIN (always happening, everyone) ===
      // Base: constant drain for all, ensures overall downward trend
      const baseDrain = 0.00012;
      // Effort: faster momentum costs more
      const effortDrain = ts.momentum > 1.0 ? (ts.momentum - 1.0) * 0.00015 : 0;
      // Burst: extra cost during burst
      const burstDrain = ts.burstTimer > 0 ? 0.0004 : 0;
      // Leader: slight extra drain for pushing the pace
      const leaderDrain = rank === 0 ? 0.00008 : 0;
      // Phase: mid-race drains normal, sprint drains more
      const phaseDrainMult = lapProg > 70 ? 1.4 : lapProg > 30 ? 1.0 : 0.7;

      // Total drain (耐力装备reduces by up to 30%)
      const totalDrain = (baseDrain + effortDrain + burstDrain + leaderDrain) * phaseDrainMult * (1 - staminaBonus * 0.3);

      // === RECOVERY (conditional, partial, never fully offsets drain) ===
      let recovery = 0;
      // Slowed = forced rest, small recovery
      if (ts.slowTimer > 0) recovery += 0.0005;
      // Trailing: partial recovery, but capped so it only slows the drain
      if (rank >= 2 && gap > 10) {
        const catchup = Math.min(1.5, 1 + gap * 0.02);
        recovery += 0.00006 * (1 + recoveryBonus) * catchup;
      }
      // 2nd place: tiny recovery
      if (rank === 1) recovery += 0.00003;

      // Net change: drain always > recovery in normal running
      ts.stamina -= totalDrain;
      ts.stamina += recovery;

      // Clamp: min 0.3, max 1.0 (no overflow)
      ts.stamina = Math.max(0.3, Math.min(1.0, ts.stamina));

      // --- 🔥冲刺: Final stretch boost (last 20% of total race) ---
      const totalProg = state.progress[i] / maxProgTotal;
      const sprintMult = ts.isPlayer ? 1 + (cb.sprint || 0) : 1;
      let sprintBoost = 1.0;
      if (totalProg > 0.80) {
        sprintBoost = (1.15 + (totalProg - 0.80) * 2.5) * sprintMult;
        // Sprint entry banner (once)
        if (!ts._sprintEntered) {
          ts._sprintEntered = true;
          spawnEventEffects(i, true, '🔥 全力冲刺!');
        }
      }

      // --- 🍌 赛道意外: 领先者踩到预设障碍物 ---
      let trailBoost = 1.0;
      if (rank === 0) {
        for (const obs of raceObstacles) {
          if (obs.hit) continue;
          // Leader hits obstacle when reaching its position
          if (state.progress[i] >= obs.pos && state.progress[i] < obs.pos + 3) {
            obs.hit = true;
            // Mark obstacle element as hit
            if (obs.el) {
              obs.el.classList.remove('visible');
              obs.el.classList.add('hit');
              setTimeout(() => { if (obs.el) obs.el.remove(); }, 500);
            }
            if (ts._shielded) {
              ts._shielded = false;
              spawnEventEffects(i, true, '🛡️ 护盾抵挡!');
            } else {
              // 🌙 隐身特效：被障碍物命中时50%闪避
              let stealthDodged = false;
              if (ts.activeSetEffects && ts.activeSetEffects.includes('stealth')) {
                if (Math.random() < 0.5) {
                  stealthDodged = true;
                  showSetEffect(i, '💨');
                  spawnEventEffects(i, true, '💨 隐身闪避!');
                }
              }
              if (!stealthDodged) {
                ts.slowTimer = 30;
                ts.momentum = 0.35;
                ts.stamina = Math.max(0.45, ts.stamina - 0.1);
                const runner = document.getElementById('turtle' + i);
                if (runner) {
                  runner.classList.add(obs.anim);
                  setTimeout(() => runner.classList.remove(obs.anim), obs.anim === 'evt-banana' ? 1900 : 1000);
                }
                spawnEventEffects(i, false, obs.text);
                playSound('tick');
                showCommentary('leaderTrip', raceTurtles[i]?.name);
              }
            }
            break; // one obstacle per tick
          }
        }
      }
      // Trailing turtles: path already cleared, run smoother
      if (rank >= 2 && gap > 8) {
        trailBoost = 1.03 + Math.min(0.06, gap * 0.002); // 3~9% safe path bonus
      }

      // --- Last place desperation (final lap only) ---
      let panicBoost = 1.0;
      if (rank === 3 && Math.floor(state.progress[i] / 100) >= state.totalLaps - 1 && lapProg > 30 && Math.random() < 0.015) {
        panicBoost = 1.6 + Math.random() * 0.4;
        ts.momentum = Math.max(ts.momentum, 1.4);
        spawnEventEffects(i, true, '😱 绝地反击!');
      }

      // Stamina critical warning on lane
      if (ts.stamina < 0.38 && !ts._staminaWarned) {
        ts._staminaWarned = true;
        spawnEventEffects(i, false, '😰 体力告急!');
      }
      if (ts.stamina > 0.5) ts._staminaWarned = false;

      // --- Calculate final speed ---
      const jitterRange = ts.isPlayer ? 0.25 * (1 - (cb.focus || 0)) : 0.25;
      const jitter = 0.88 + Math.random() * jitterRange;
      const zoneMult = getZoneMultiplier(i, lapProg);
      // Stamina affects speed in phases, reduced impact during sprint
      // Full(1.0)=1.0x, Mid(0.65)=0.85x, Low(0.45)=0.7x, Critical(0.3)=0.55x
      const stamRatio = (ts.stamina - 0.3) / 0.7; // 0~1
      let stamSpeedMult = 0.55 + stamRatio * 0.45; // 0.55~1.0
      // During sprint phase: reduce stamina penalty (adrenaline!)
      if (totalProg > 0.80) {
        stamSpeedMult = 0.75 + stamRatio * 0.25; // 0.75~1.0 (much smaller range)
      }
      let effectiveSpeed = ts.baseSpeed * ts.momentum * stamSpeedMult * ts.luckyBoost * sprintBoost * trailBoost * panicBoost * jitter * zoneMult;

      // === 套装特效处理 ===
      if (ts.activeSetEffects && ts.activeSetEffects.length > 0) {
        // ❄️ 冰冻特效：每圈冻结1名对手0.5秒
        if (ts.activeSetEffects.includes('freeze') && ts.freezeCooldown <= 0) {
          if (state.progress[i] > 0 && Math.floor(state.progress[i] / 100) > Math.floor((state.progress[i] - effectiveSpeed * 0.05) / 100)) {
            // 刚跨过整圈
            const opponents = [0,1,2,3].filter(j => j !== i && !state.finished.includes(j));
            if (opponents.length > 0) {
              const target = opponents[Math.floor(Math.random() * opponents.length)];
              turtleState[target].slowTimer = Math.max(turtleState[target].slowTimer, 30);
              ts.freezeCooldown = 60;
              showSetEffect(target, '❄️');
            }
          }
        }
        if (ts.freezeCooldown > 0) ts.freezeCooldown--;

        // 🔥 烈焰特效：冲刺阶段额外+15%
        if (ts.activeSetEffects.includes('blaze')) {
          const lapProgress = state.progress[i] % 100;
          if (lapProgress > 80) {
            effectiveSpeed *= 1.15;
          }
        }

        // 🐉 龙焰特效：被减速时反弹给最近对手
        if (ts.activeSetEffects.includes('dragonfire') && ts.dragonFireReady && ts.slowTimer > 0) {
          const opponents = [0,1,2,3].filter(j => j !== i && !state.finished.includes(j));
          if (opponents.length > 0) {
            let closest = opponents[0];
            let minDist = Math.abs(state.progress[opponents[0]] - state.progress[i]);
            opponents.forEach(j => {
              const d = Math.abs(state.progress[j] - state.progress[i]);
              if (d < minDist) { minDist = d; closest = j; }
            });
            turtleState[closest].slowTimer = Math.max(turtleState[closest].slowTimer, ts.slowTimer);
            ts.slowTimer = 0;
            ts.dragonFireReady = false;
            setTimeout(() => { ts.dragonFireReady = true; }, 3000);
            showSetEffect(closest, '🐉');
          }
        }

        // 🌈 彩虹特效：换区域时+20%加速1秒
        if (ts.activeSetEffects.includes('rainbow_burst')) {
          const currentZone = Math.floor((state.progress[i] % 100) / 100 * 7);
          if (ts.rainbowLastZone !== -1 && currentZone !== ts.rainbowLastZone) {
            ts.momentum *= 1.20;
            setTimeout(() => { ts.momentum /= 1.20; }, 1000);
            showSetEffect(i, '🌈');
          }
          ts.rainbowLastZone = currentZone;
        }
      }

      // Scale to ~35 second per lap
      const prevLap = Math.floor(state.progress[i] / 100);
      state.progress[i] += effectiveSpeed * 0.05;
      const newLap = Math.floor(state.progress[i] / 100);

      // Lap crossing sound + announcement + momentum shuffle
      if (newLap > prevLap && state.progress[i] < maxProgTotal) {
        playSound('finishLine');

        // Lap transition shuffle: reset momentum + stamina partial restore
        // This creates natural comeback opportunities each lap
        ts.momentum = 0.7 + Math.random() * 0.6; // fresh start 0.7~1.3
        ts.stamina = Math.min(0.9, ts.stamina + 0.1); // partial recovery, never back to full
        ts.burstTimer = 0;
        ts.slowTimer = 0;

        // Show big lap transition overlay (only once per lap crossing for the leader)
        const leaderIdx2 = state.progress.indexOf(Math.max(...state.progress));
        if (i === leaderIdx2) {
          const trackContainer = document.querySelector('.track-container');
          if (trackContainer && !trackContainer.querySelector('.lap-announce')) {
            const lapNum = newLap + 1;
            const ann = document.createElement('div');
            ann.className = 'lap-announce';
            const isFinal = lapNum === state.totalLaps;
            ann.style.setProperty('--lap-glow', isFinal ? '#FF6B6B' : '#4EEAAC');
            ann.innerHTML = `<div class="lap-announce-text">${isFinal ? '🏁 最后一圈！' : '🔄 第 ' + lapNum + ' 圈'}</div>`;
            trackContainer.appendChild(ann);
            setTimeout(() => ann.remove(), 1600);
          }
        }
      }

      if (state.progress[i] >= maxProgTotal) {
        state.progress[i] = maxProgTotal;
        if (!state.finished.includes(i)) {
          state.finished.push(i);
          playSound('finishLine');
        }
      }
    }

    // Random race events — more frequent window, wider range
    const avgProgress = state.progress.reduce((a, b) => a + b, 0) / 4;
    const avgNorm = avgProgress / state.totalLaps; // normalize to 0~100 for thresholds
    if (avgNorm > 10 && avgNorm < 90 && avgProgress - lastEventProgress > 25 && Math.random() < 0.008) {
      // Affect turtleState momentum instead of the old speeds array
      const evt = RACE_EVENTS[Math.floor(Math.random() * RACE_EVENTS.length)];
      let targetIdx;
      if (evt.effect === 'slow_leader') {
        let maxProg = -1;
        state.progress.forEach((p, i) => { if (p > maxProg && p < 100) { maxProg = p; targetIdx = i; } });
      } else {
        targetIdx = Math.floor(Math.random() * raceTurtles.length);
      }
      if (targetIdx !== undefined) {
        const ts = turtleState[targetIdx];
        const isBoosted = evt.effect.startsWith('boost');
        const tName = raceTurtles[targetIdx]?.name || '乌龟';
        const evtFullText = evt.emoji + ' ' + evt.text.replace('{name}', tName);
        const evtLaneText = evt.emoji + ' ' + evt.text.replace('{name}', '').replace('！', '').trim() + '!';

        if (evt.effect === 'lightning_strike') {
          // Lightning: flash white + shake
          ts.slowTimer = 45; ts.momentum = 0.3;
          applyTurtleAnim(targetIdx, 'evt-lightning', 900);
          spawnEventEffects(targetIdx, false, '⚡ 被雷劈了!');
        } else if (evt.effect === 'wind_blow') {
          // Wind: push turtle backwards + slow
          ts.slowTimer = 40; ts.momentum = 0.3;
          state.progress[targetIdx] = Math.max(1, state.progress[targetIdx] - 5); // blow back 5%
          // Wind animation on turtle
          const runner = document.getElementById('turtle' + targetIdx);
          if (runner) {
            runner.classList.add('evt-wind');
            setTimeout(() => runner.classList.remove('evt-wind'), 1600);
          }
          spawnEventEffects(targetIdx, false, '🌬️ 被吹回去了!');
        } else if (evt.effect === 'banana_slip') {
          // Banana: flip animation + slow
          ts.slowTimer = 70; ts.momentum = 0.15;
          // Flip animation on turtle
          const runner = document.getElementById('turtle' + targetIdx);
          if (runner) {
            runner.classList.add('evt-banana');
            setTimeout(() => runner.classList.remove('evt-banana'), 1900);
          }
          spawnEventEffects(targetIdx, false, '🍌 滑倒翻了!');
        } else if (isBoosted) {
          ts.burstTimer = 60; ts.momentum = 1.6;
          spawnEventEffects(targetIdx, true, evtLaneText);
        } else {
          ts.slowTimer = 50; ts.momentum = 0.4;
          spawnEventEffects(targetIdx, false, evtLaneText);
        }

        // Top banner
        const div = document.createElement('div');
        div.className = 'race-event';
        div.textContent = evtFullText;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
        playSound(isBoosted ? 'go' : 'tick');
        lastEventProgress = avgProgress;
      }
    }

    render();

    // === AMBIENT RACE SOUNDS ===
    ambientSoundTimer++;
    if (ambientSoundTimer % 12 === 0) { // ~5 times per second at 60fps
      const playerProg2 = state.progress[state.selected] || 0;
      const mp2 = state.totalLaps * 100;
      if (playerProg2 > 0 && playerProg2 < mp2) {
        const playerZone = currentTrack?.isTriathlon ? getZone(playerProg2 % 100) : 'run';
        if (playerZone === 'swim') {
          playSound('swimming');
        } else {
          playSound('running');
        }
      }
    }

    // === COMMENTARY & BUBBLES ===
    commentaryTimer++;
    const avgProg = state.progress.reduce((a,b) => a+b, 0) / 4;
    const mpNorm = state.totalLaps * 100;
    const avgNorm2 = avgProg / state.totalLaps; // normalized 0~100
    // Find leader
    let leadIdx = 0; let leadProg = 0;
    state.progress.forEach((p,i) => { if (p > leadProg) { leadProg = p; leadIdx = i; } });
    const playerProg = state.progress[state.selected] || 0;

    if (commentaryTimer === 1) {
      showCommentary('start');
    }
    if (commentaryTimer === 60) {
      showCommentary('takeLeadFirst', raceTurtles[leadIdx]?.name);
    }
    // Lap transition commentary
    if (state.totalLaps > 1) {
      const leaderLap = Math.floor(leadProg / 100);
      if (leaderLap === 1 && !state._lap2Announced) {
        state._lap2Announced = true;
        showCommentary('start'); // reuse start for new lap energy
      }
      if (leaderLap === 2 && !state._lap3Announced) {
        state._lap3Announced = true;
        showCommentary('sprint');
      }
    }
    // Lead changes
    if (commentaryTimer > 60 && commentaryTimer % 30 === 0) {
      const sorted = [...state.progress].map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
      const gap = sorted[0].p - sorted[1].p;
      if (gap < 8 && avgNorm2 > 20) {
        showCommentary('closeFight');
      } else if (gap > 30) {
        showCommentary('bigGap', raceTurtles[sorted[0].i]?.name);
      }
    }
    // Player-specific commentary
    if (commentaryTimer % 80 === 0 && avgNorm2 > 15 && avgNorm2 < 85) {
      if (leadIdx === state.selected) {
        showCommentary('playerLead', raceTurtles[state.selected]?.name);
      } else if (leadProg - playerProg > 25) {
        showCommentary('playerBehind', raceTurtles[state.selected]?.name);
      }
    }
    // Comeback detection
    if (commentaryTimer % 60 === 0) {
      const sorted = [...state.progress].map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
      for (let ri = 1; ri < sorted.length; ri++) {
        if (sorted[0].p - sorted[ri].p < 5 && sorted[ri].p > 50) {
          showCommentary('comeback', raceTurtles[sorted[ri].i]?.name);
          break;
        }
      }
      // Last place panic
      if (sorted[3] && sorted[3].p > 60 && sorted[2].p - sorted[3].p > 8) {
        showCommentary('panic', raceTurtles[sorted[3].i]?.name);
      }
    }
    // Leader tired
    if (commentaryTimer % 90 === 0 && avgProg > 45 && avgProg < 80) {
      if (leadProg > avgProg + 10) {
        showCommentary('leaderTired', raceTurtles[leadIdx]?.name);
      }
    }
    // Missile warning commentary — warn when someone might fire
    if (commentaryTimer % 100 === 0 && avgNorm2 > 30 && avgNorm2 < 80) {
      const sorted2 = [...state.progress].map((p,idx)=>({p,idx})).sort((a,b)=>b.p-a.p);
      if (sorted2[3] && sorted2[0].p - sorted2[3].p > 15) {
        showCommentary('panic', raceTurtles[sorted2[3].idx]?.name);
      }
    }
    // Sprint phase
    if (avgNorm2 > 82 && commentaryTimer % 100 === 0) {
      showCommentary('sprint');
    }
    if (avgNorm2 > 92 && commentaryTimer % 60 === 0) {
      showCommentary('almostFinish');
    }
    // Triathlon zone transitions
    if (currentTrack?.isTriathlon) {
      const leaderProgMod = Math.max(...state.progress) % 100;
      if (currentTrack.isRainbow) {
        // Rainbow track: announce zone transitions (re-triggers each lap)
        const rbKeys = ['rbOrange','rbYellow','rbGreen','rbBlue','rbIndigo','rbViolet'];
        const rbThresholds = [14.3, 28.6, 42.9, 57.2, 71.5, 85.8];
        rbThresholds.forEach((thr, idx) => {
          const flag = '_rb' + idx;
          if (leaderProgMod >= thr && leaderProgMod < thr + 3 && !state[flag]) {
            state[flag] = true;
            showCommentary(rbKeys[idx]);
          }
          // Reset flags when leader wraps to new lap
          if (leaderProgMod < 10) state[flag] = false;
        });
      } else {
        // Standard triathlon: re-trigger each lap
        if (leaderProgMod >= 33 && leaderProgMod < 36 && !state._swimAnnounced) {
          state._swimAnnounced = true;
          showCommentary('enterSwim');
        }
        if (leaderProgMod >= 66 && leaderProgMod < 69 && !state._climbAnnounced) {
          state._climbAnnounced = true;
          showCommentary('enterClimb');
        }
        // Reset for next lap
        if (leaderProgMod < 10) {
          state._swimAnnounced = false;
          state._climbAnnounced = false;
        }
      }
      // Zone-specific performance commentary
      if (commentaryTimer % 90 === 0 && triathlonAbilities.length > 0) {
        for (let ti = 0; ti < raceTurtles.length; ti++) {
          const zone = getZone(state.progress[ti] % 100);
          const ability = triathlonAbilities[ti]?.[zone] || 1;
          const mp = state.totalLaps * 100;
          if (ability < 0.85 && state.progress[ti] > 5 && state.progress[ti] < mp - 5) {
            showCommentary(zone === 'swim' ? 'swimStruggle' : zone === 'climb' ? 'climbStruggle' : 'playerBehind', raceTurtles[ti]?.name);
            break;
          } else if (ability > 1.15 && state.progress[ti] > 5 && state.progress[ti] < mp - 5) {
            showCommentary(zone === 'swim' ? 'swimFast' : zone === 'climb' ? 'climbFast' : 'playerLead', raceTurtles[ti]?.name);
            break;
          }
        }
      }
    }

    // Random speech bubbles
    if (Math.random() < 0.004) {
      const sorted = [...state.progress].map((p,i)=>({p,i})).sort((a,b)=>b.p-a.p);
      if (sorted[0].p - sorted[sorted.length-1].p > 10) {
        showBubble(sorted[0].i, 'happy');
        showBubble(sorted[sorted.length-1].i, 'sad');
      }
    }

    // Spawn zone-specific particles + update turtle zone class
    if (Math.random() < 0.4) {
      raceTurtles.forEach((_, i) => {
        const mp = state.totalLaps * 100;
        if (state.progress[i] > 0 && state.progress[i] < mp) {
          const runner = document.getElementById('turtle' + i);
          if (!runner || !runner.parentElement) return;
          const zone = getZone(state.progress[i] % 100);
          const isTri = currentTrack?.isTriathlon;
          const laneEl = runner.parentElement;
          const rx = parseFloat(runner.style.left) || 0;
          const cy = laneEl.offsetHeight / 2;

          // Zone classes are now set in render() — just spawn particles here
          if (isTri && zone === 'swim') {
            // Water splash: multiple droplets
            for (let d = 0; d < 3; d++) {
              const sp = document.createElement('div');
              sp.className = 'splash';
              sp.style.width = (5 + Math.random() * 8) + 'px';
              sp.style.height = sp.style.width;
              sp.style.left = (rx - 8 + Math.random() * 12) + 'px';
              sp.style.top = (cy + (Math.random() - 0.5) * 24) + 'px';
              laneEl.appendChild(sp);
              setTimeout(() => sp.remove(), 700);
            }
            // Water drops falling
            if (Math.random() < 0.5) {
              const drop = document.createElement('div');
              drop.className = 'splash-drop';
              drop.style.left = (rx + 10 + Math.random() * 20) + 'px';
              drop.style.top = (cy - 10 + Math.random() * 8) + 'px';
              laneEl.appendChild(drop);
              setTimeout(() => drop.remove(), 500);
            }
            // Water ripple behind turtle
            if (Math.random() < 0.3) {
              const ripple = document.createElement('div');
              ripple.className = 'water-ripple';
              ripple.style.left = (rx - 15) + 'px';
              ripple.style.top = (cy - 5) + 'px';
              laneEl.appendChild(ripple);
              setTimeout(() => ripple.remove(), 1000);
            }
          } else if (isTri && zone === 'climb') {
            // Rock particles + sparks
            const rock = document.createElement('div');
            rock.className = 'rock-particle';
            rock.style.width = (4 + Math.random() * 6) + 'px';
            rock.style.height = (4 + Math.random() * 5) + 'px';
            rock.style.left = (rx - 5 + Math.random() * 15) + 'px';
            rock.style.top = (cy + (Math.random() - 0.5) * 20) + 'px';
            laneEl.appendChild(rock);
            setTimeout(() => rock.remove(), 800);
            if (Math.random() < 0.4) {
              const spark = document.createElement('div');
              spark.className = 'rock-spark';
              spark.style.left = (rx + Math.random() * 10) + 'px';
              spark.style.top = (cy - 5 + Math.random() * 10) + 'px';
              laneEl.appendChild(spark);
              setTimeout(() => spark.remove(), 400);
            }
          } else {
            // Normal dust
            const dust = document.createElement('div');
            dust.className = 'dust';
            dust.style.left = (rx - 5 + Math.random() * 6) + 'px';
            dust.style.top = (cy + (Math.random() - 0.5) * 20) + 'px';
            laneEl.appendChild(dust);
            setTimeout(() => dust.remove(), 600);
          }
        }
      });
    }

    if (state.finished.length < 4) {
      animId = requestAnimationFrame(tick);
    } else {
      finishRace();
    }
  }
  animId = requestAnimationFrame(tick);
}

function finishRace() {
  state.racing = false;
  // Clean up obstacle elements
  raceObstacles.forEach(obs => { if (obs.el) { obs.el.remove(); obs.el = null; } });
  raceObstacles = [];
  stopBgMusic();
  const winner = state.finished[0];
  const won = winner === state.selected;
  const raceTime = ((performance.now() - raceStartTime) / 1000).toFixed(2);

  // Commentary: finish
  showCommentary('finished', raceTurtles[winner]?.name);

  // Streak + reward calc
  const streakMult = getStreakMultiplier();
  let netReward = 0;
  if (won) {
    const reward = Math.round(state.betAmount * 4 * streakMult);
    netReward = reward - state.betAmount; // net gain for display
    state.coins += reward;
    state.wins++;
    state.winStreak = (state.winStreak || 0) + 1;
    playSound('win');
    showConfetti();
    showBubble(winner, 'taunt');
    // Record to leaderboard
    addRaceRecord(
      raceTurtles[winner].name,
      raceTurtles[winner].color,
      currentTrack?.name || '🌿 草地赛道',
      raceTime,
      netReward
    );
  } else {
    state.winStreak = 0;
    playSound('lose');
    showBubble(state.selected, 'sad');
    showBubble(winner, 'taunt');
  }

  if (state.isRankedMode) {
    const rankedRank = RANKS[state.rank];
    if (won) {
      state.rankWins++;
      state.coins += rankedRank.reward;
      if (state.rankWins >= 3) {
        setTimeout(() => showPromoteAnimation(), 1500);
      }
    } else {
      state.rankLosses++;
      if (state.rankLosses >= 3) {
        setTimeout(() => showDemoteAnimation(), 1500);
      }
    }
    saveGame();
  }

  render();

  setTimeout(() => {
    const modal = document.getElementById('modal');
    const streakText = won && state.winStreak >= 2 ? ` (🔥${state.winStreak}连胜 x${getStreakMultiplier()})` : '';
    document.getElementById('modalTitle').textContent = won ? '🎉 You Won!' : '😅 Better Luck Next Time';
    document.getElementById('modalTitle').style.color = won ? '#4EEAAC' : '#FF6B6B';
    document.getElementById('modalEmoji').textContent = won ? '🏆' : '💔';
    document.getElementById('modalText').textContent = `Winner: ${raceTurtles[winner].name}${streakText}`;
    document.getElementById('modalText').innerHTML += `<br><span style="font-size:22px;color:var(--gold)">⏱ ${raceTime}s</span>`;
    document.getElementById('modalReward').textContent = won ? `+${netReward} coins!` : `-${state.betAmount} coins`;
    document.getElementById('modalReward').style.color = won ? '#FFD700' : '#FF6B6B';
    modal.classList.add('show');
  }, 800);

  saveGame();
}

function showGameOver() {
  const isNewHigh = state.coins > state.highScore;
  if (isNewHigh) state.highScore = state.coins;
  state.totalWins += state.wins;
  saveGame();

  const won = state.wins > 0;
  const raceTime = ((performance.now() - raceStartTime) / 1000).toFixed(1);
  const playerRank = state.finished.indexOf(state.selected);

  // Banner
  const bannerEl = document.getElementById('gameoverBanner');
  bannerEl.textContent = won ? '🏆 VICTORY' : '💔 DEFEATED';
  bannerEl.className = 'gameover-banner ' + (won ? 'win' : 'lose');

  // Title
  const titleEl = document.getElementById('gameoverTitle');
  titleEl.textContent = won ? '🏆 恭喜获胜！' : '🐢 下次加油！';
  titleEl.style.color = won ? 'var(--gold)' : 'var(--accent)';

  // Subtitle
  const subtitleEl = document.getElementById('gameoverSubtitle');
  const myTurtle = raceTurtles[state.selected];
  subtitleEl.innerHTML = won
    ? `<span style="color:${myTurtle?.color||'#fff'}">${myTurtle?.name||'你的乌龟'}</span> 以 ${raceTime}s 完赛，赢得了比赛！`
    : `<span style="color:${myTurtle?.color||'#fff'}">${myTurtle?.name||'你的乌龟'}</span> 获得第 ${playerRank+1} 名`;

  // Podium — show top 3 with turtles on blocks (order: 2nd, 1st, 3rd)
  const podiumOrder = [1, 0, 2]; // display order: silver, gold, bronze
  const medals = ['🥇', '🥈', '🥉'];
  const blockClass = ['p2', 'p1', 'p3'];
  const podiumEl = document.getElementById('gameoverPodium');
  podiumEl.innerHTML = `<h3>🏅 领奖台</h3>
    <div class="podium">
      ${podiumOrder.map((displayIdx, posIdx) => {
        const finIdx = state.finished[displayIdx];
        const t = raceTurtles[finIdx];
        if (!t) return '';
        const isMe = finIdx === state.selected;
        return `<div class="podium-slot">
          ${isMe ? '<div class="podium-you">⭐ 你</div>' : '<div style="height:14px"></div>'}
          <div class="podium-medal">${medals[displayIdx]}</div>
          <div class="podium-turtle">${turtleSVG(t.shell, t.body, t.pattern, t.accent)}</div>
          <div class="podium-name" style="color:${t.color}">${t.name}</div>
          <div class="podium-block ${blockClass[posIdx]}">${displayIdx + 1}</div>
        </div>`;
      }).join('')}
    </div>
    ${state.finished[3] !== undefined ? (() => {
      const t4 = raceTurtles[state.finished[3]];
      const isMe4 = state.finished[3] === state.selected;
      return `<div class="podium-4th">
        <span style="font-size:14px;color:#666;font-weight:800">4th</span>
        <span style="width:30px;height:24px;display:inline-block">${turtleSVG(t4.shell, t4.body, t4.pattern, t4.accent)}</span>
        <span style="color:${t4?.color||'#666'};font-weight:600">${t4?.name||'???'}</span>
        ${isMe4 ? '<span style="color:var(--accent);font-size:10px">(你)</span>' : ''}
      </div>`;
    })() : ''}
  `;

  // Stats — compact horizontal cards
  const netChange = won ? Math.round(state.betAmount * 4 * getStreakMultiplier()) - state.betAmount : -state.betAmount;
  document.getElementById('gameoverStats').innerHTML = `
    <div class="stat-card${won ? ' highlight' : ''}">
      <div class="stat-label">${won ? '💰 收益' : '💸 损失'}</div>
      <div class="stat-value" style="color:${won ? '#4EEAAC' : '#FF6B6B'}">${netChange > 0 ? '+' : ''}${netChange.toLocaleString()}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🪙 余额</div>
      <div class="stat-value">${state.coins.toLocaleString()}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⏱ 用时</div>
      <div class="stat-value">${raceTime}s</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🗺️ 赛道</div>
      <div class="stat-value" style="font-size:16px">${currentTrack?.name || '赛道'}</div>
    </div>
    <div class="stat-card${isNewHigh ? ' highlight' : ''}">
      <div class="stat-label">${isNewHigh ? '🎉 新纪录' : '📊 最高'}</div>
      <div class="stat-value">${state.highScore.toLocaleString()}</div>
    </div>
  `;

  // Update gameover action buttons for ranked mode
  const gameoverActions = document.querySelector('.gameover-actions');
  if (gameoverActions) {
    if (state.isRankedMode) {
      const rankedRank = RANKS[state.rank];
      const winsNow = state.rankWins;
      const lossesNow = state.rankLosses;
      const progressInfo = won
        ? `<div style="margin-bottom:12px;color:var(--accent);font-size:14px">🏆 段位赛战绩：${winsNow}/3 胜 | ${lossesNow}/3 负（+${rankedRank.reward}🪙）</div>`
        : `<div style="margin-bottom:12px;color:var(--danger);font-size:14px">段位赛战绩：${winsNow}/3 胜 | ${lossesNow}/3 负</div>`;
      gameoverActions.innerHTML = progressInfo +
        `<button class="menu-btn primary" onclick="startRankedGame()">🔄 再战一场</button>
         <button class="menu-btn" onclick="state.isRankedMode=false;showScene('scene-ranked')">🏆 返回段位赛</button>`;
    } else {
      gameoverActions.innerHTML =
        `<button class="menu-btn primary" onclick="startNewGame()">🔄 再来一局</button>
         <button class="menu-btn" onclick="showScene('scene-start')">🏠 返回主页</button>`;
    }
  }

  if (won) showConfetti();
  playSound(won ? 'win' : 'lose');
  showScene('scene-gameover');
}

function nextRound() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('confetti').innerHTML = '';
  showGameOver();
}

function showPromoteAnimation() {
  const oldRank = RANKS[state.rank];
  if (state.rank < RANKS.length - 1) {
    state.rank++;
  }
  state.rankWins = 0;
  state.rankLosses = 0;
  const newRank = RANKS[state.rank];
  saveGame();

  const overlay = document.createElement('div');
  overlay.className = 'promote-overlay';
  overlay.innerHTML = `
    <div class="promote-icon">${newRank.icon}</div>
    <div class="promote-text" style="color:${newRank.color}">晋级成功！</div>
    <div style="font-size:20px;margin-top:8px;color:var(--text-secondary);animation:promoteSlide 0.6s ease-out 0.5s both">
      ${oldRank.icon} ${oldRank.name} → ${newRank.icon} ${newRank.name}
    </div>
    <div style="font-size:48px;margin-top:16px;animation:promoteSlide 0.6s ease-out 0.7s both">🎉🎊🎉</div>
    <button class="menu-btn" style="margin-top:24px;width:200px;border-color:${newRank.color};animation:promoteSlide 0.6s ease-out 0.9s both" onclick="this.parentElement.remove();showScene('scene-ranked')">
      继续挑战
    </button>
  `;
  document.body.appendChild(overlay);
}

function showDemoteAnimation() {
  const oldRank = RANKS[state.rank];
  if (state.rank > 0) {
    state.rank--;
  }
  state.rankWins = 0;
  state.rankLosses = 0;
  const newRank = RANKS[state.rank];
  saveGame();

  const overlay = document.createElement('div');
  overlay.className = 'promote-overlay';
  overlay.innerHTML = `
    <div style="font-size:72px">${newRank.icon}</div>
    <div class="demote-text" style="color:var(--danger)">段位下降</div>
    <div style="font-size:18px;margin-top:8px;color:var(--text-secondary)">
      ${oldRank.icon} ${oldRank.name} → ${newRank.icon} ${newRank.name}
    </div>
    <div style="font-size:15px;margin-top:12px;color:var(--text-muted)">
      ${state.rank === 0 ? '青铜保底，不会再降了，加油！💪' : '别灰心，继续努力！💪'}
    </div>
    <button class="menu-btn" style="margin-top:24px;width:200px;border-color:var(--border)" onclick="this.parentElement.remove();showScene('scene-ranked')">
      再来一次
    </button>
  `;
  document.body.appendChild(overlay);
}

function showConfetti() {
  const container = document.getElementById('confetti');
  const colors = ['#FFD700', '#4EEAAC', '#FF6B6B', '#FFB347', '#A78BFA', '#fff'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = Math.random() * 1.5 + 's';
    container.appendChild(el);
  }
}

function showSetEffect(turtleIndex, emoji) {
  const turtleEl = document.querySelectorAll('.turtle-sprite')[turtleIndex];
  if (!turtleEl) return;
  const effectEl = document.createElement('div');
  effectEl.textContent = emoji;
  effectEl.style.cssText = `
    position:absolute; top:-25px; left:50%; transform:translateX(-50%);
    font-size:20px; animation:setEffectPop 0.8s ease-out forwards;
    pointer-events:none; z-index:100;
  `;
  turtleEl.style.position = 'relative';
  turtleEl.appendChild(effectEl);
  setTimeout(() => effectEl.remove(), 800);
}

loadGame();
const hsEl = document.getElementById('highScore');
if (hsEl) hsEl.textContent = state.highScore.toLocaleString();
const scEl = document.getElementById('startCoins');
if (scEl) scEl.textContent = state.coins.toLocaleString();
render();
</script>
</body>
</html>
