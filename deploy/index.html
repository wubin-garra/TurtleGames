// Prevent pull-to-refresh and bounce scroll in WeChat
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
// Prevent double-tap zoom
let lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = Date.now();
  if (now - lastTouchEnd < 300) e.preventDefault();
  lastTouchEnd = now;
}, { passive: false });

// === ERROR HANDLER (prevent white screen) ===
window.onerror = function(msg, url, line) {
  document.body.innerHTML = '<div style="color:#fff;padding:20px;text-align:center;font-family:sans-serif;">' +
    '<h2>🐢 加载出错了</h2><p>请尝试用最新版微信或浏览器打开</p>' +
    '<p style="color:#888;font-size:12px;">错误: ' + msg + ' (行' + line + ')</p>' +
    '<p><a href="javascript:location.reload()" style="color:#4CAF50;">点击重试</a></p></div>';
};

    this.translate(cx, cy);
    this.rotate(rotation);
    this.scale(rx, ry);
    this.arc(0, 0, 1, startAngle, endAngle, ccw);
    this.restore();
  };
}

// === ROUNDRECT POLYFILL ===
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
    this.lineTo(x + r[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
    this.lineTo(x, y + r[0]);
    this.quadraticCurveTo(x, y, x + r[0], y);
    this.closePath();
  };
}

// === LAYOUT ===
const layout = {};

function computeLayout() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr;
  const H = canvas.height / dpr;
  const topBarH = 44;
  const previewH = 36;
  const dropZoneH = 55;
  const bottomBarH = 56;

  layout.width = W;
  layout.height = H;
  layout.topBar    = { x: 0, y: 0,                             w: W, h: topBarH };
  layout.preview   = { x: 0, y: topBarH,                       w: W, h: previewH };
  layout.dropZone  = { x: 0, y: topBarH + previewH,            w: W, h: dropZoneH };

  const gameTop    = topBarH + previewH + dropZoneH;
  const gameBottom = H - bottomBarH;
  layout.gameArea      = { x: 0, y: gameTop,    w: W, h: gameBottom - gameTop };
  layout.gameOverLineY = gameTop + 30;
  layout.bottomBar     = { x: 0, y: gameBottom, w: W, h: bottomBarH };
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const maxW = 420, maxH = 900;
  const w = Math.min(window.innerWidth, maxW);
  const h = Math.min(window.innerHeight, maxH);
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeLayout();
}

// ========== CLASSIC STYLE ==========
function drawTurtleClassic(ctx, x, y, level, scale = 1) {
  const t = TURTLES[level];
  const r = t.radius * scale;
  const s = r / 30;

  ctx.save();
  ctx.translate(x, y);

  // Shell (outer)
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 28 * s, 22 * s, 0, 0, Math.PI * 2);
  ctx.fillStyle = t.color;
  ctx.fill();

  // Shell (inner, darker)
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 22 * s, 17 * s, 0, 0, Math.PI * 2);
  ctx.fillStyle = t.darkColor;
  ctx.fill();

  // Shell pattern
  drawShellPatternClassic(ctx, level, s);

  // Legs
  ctx.fillStyle = t.color;
  ctx.beginPath(); ctx.ellipse(-20 * s, 10 * s, 7 * s, 5 * s, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 20 * s, 10 * s, 7 * s, 5 * s,  0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-16 * s, 20 * s, 6 * s, 4 * s, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 16 * s, 20 * s, 6 * s, 4 * s,  0.2, 0, Math.PI * 2); ctx.fill();
  // Tail
  ctx.beginPath(); ctx.ellipse(0, 26 * s, 3 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.fillStyle = t.color;
  ctx.beginPath();
  ctx.arc(0, -16 * s, 10 * s, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(-4 * s, -18 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 4 * s, -18 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();

  // Gentle smile
  ctx.beginPath();
  ctx.arc(0, -15.5 * s, 5 * s, 0.6, Math.PI - 0.6, false);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.3 * s;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.lineCap = 'butt';

  // Crowns for top 3
  if (level === 8) drawCrown(ctx, s, 'gold');
  else if (level === 7) drawCrown(ctx, s, 'silver');
  else if (level === 6) drawCrown(ctx, s, 'bronze');

  ctx.restore();
}

function drawShellPatternClassic(ctx, level, s) {
  const dc = TURTLES[level].darkColor;
  const c = TURTLES[level].color;

  if (level === 0) { // 草龟 — concentric rings + radial dividers
    ctx.strokeStyle = dc; ctx.lineWidth = 1 * s; ctx.globalAlpha = 0.45;
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 16 * s, 12 * s, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 10 * s, 7 * s, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2); ctx.stroke();
    // Radial dividers
    ctx.globalAlpha = 0.25;
    for (let i = 0; i < 6; i++) {
      const a = Math.PI * 2 / 6 * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 4 * s, Math.sin(a) * 3 * s + 2 * s);
      ctx.lineTo(Math.cos(a) * 16 * s, Math.sin(a) * 12 * s + 2 * s);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

  } else if (level === 1) { // 巴西龟 — red ear stripes + V-shaped shell lines
    ctx.fillStyle = '#E53935';
    ctx.beginPath(); ctx.ellipse(-9 * s, -17 * s, 5 * s, 2 * s, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 9 * s, -17 * s, 5 * s, 2 * s,  0.4, 0, Math.PI * 2); ctx.fill();
    // V-shaped shell markings
    ctx.strokeStyle = '#A5D6A7'; ctx.lineWidth = 1.5 * s; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(-12 * s, 2 * s); ctx.lineTo(0, -5 * s); ctx.lineTo(12 * s, 2 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-10 * s, 8 * s); ctx.lineTo(0, 2 * s); ctx.lineTo(10 * s, 8 * s); ctx.stroke();
    // Yellow head stripes
    ctx.strokeStyle = '#FFEE58'; ctx.lineWidth = 0.8 * s; ctx.globalAlpha = 0.5;
    ctx.beginPath(); ctx.moveTo(-2 * s, -24 * s); ctx.lineTo(-6 * s, -13 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 2 * s, -24 * s); ctx.lineTo( 6 * s, -13 * s); ctx.stroke();
    ctx.globalAlpha = 1;

  } else if (level === 2) { // 花龟 — multicolor spots + thin stripes
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#FFEE58';
    ctx.beginPath(); ctx.arc(-7 * s, -2 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF8A65';
    ctx.beginPath(); ctx.arc( 5 * s,  5 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#CE93D8';
    ctx.beginPath(); ctx.arc( 6 * s, -5 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath(); ctx.arc(-4 * s,  7 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#C5E1A5';
    ctx.beginPath(); ctx.arc(0, 0, 2 * s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

  } else if (level === 3) { // 锦龟 — zigzag + red-yellow rim
    // Bright yellow zigzag (kept inside shell, away from head)
    ctx.strokeStyle = '#FFCA28'; ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(-13 * s, 4 * s); ctx.lineTo(-7 * s, -1 * s); ctx.lineTo(0, 4 * s);
    ctx.lineTo(7 * s, -1 * s); ctx.lineTo(13 * s, 4 * s);
    ctx.stroke();
    ctx.strokeStyle = '#FF8A65'; ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.moveTo(-11 * s, 11 * s); ctx.lineTo(-5 * s, 7 * s); ctx.lineTo(0, 11 * s);
    ctx.lineTo(5 * s, 7 * s); ctx.lineTo(11 * s, 11 * s);
    ctx.stroke();
    // Red-yellow shell edge (bottom half only, avoid head area)
    ctx.strokeStyle = '#FF5722'; ctx.lineWidth = 1.5 * s; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 26 * s, 20 * s, 0, 0.25, Math.PI - 0.25); ctx.stroke();
    ctx.strokeStyle = '#FFC107';
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 24 * s, 18 * s, 0, 0.3, Math.PI - 0.3); ctx.stroke();
    ctx.globalAlpha = 1;

  } else if (level === 4) { // 鳄龟 — rough ridges + spiky bumps
    ctx.strokeStyle = '#546E7A'; ctx.lineWidth = 2.5 * s; ctx.globalAlpha = 0.6;
    for (let row = -1; row <= 1; row++) {
      ctx.beginPath();
      for (let i = -3; i <= 3; i++) {
        const px = i * 5 * s, py = (row * 7 + (i % 2 === 0 ? -2 : 2)) * s;
        i === -3 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    // Bumps
    ctx.fillStyle = '#455A64';
    for (const [bx, by] of [[-8,-4],[0,-6],[8,-4],[-5,4],[5,4]]) {
      ctx.beginPath(); ctx.arc(bx * s, by * s, 2 * s, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;

  } else if (level === 5) { // 海龟 — hexagonal scales
    ctx.strokeStyle = '#1565C0'; ctx.lineWidth = 1.5 * s; ctx.globalAlpha = 0.45;
    for (let row = -1; row <= 1; row++) {
      for (let col = -1; col <= 1; col++) {
        const hx = (col * 10 + (row % 2) * 5) * s, hy = (row * 8) * s;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = Math.PI / 3 * i - Math.PI / 6;
          const px = hx + Math.cos(a) * 5 * s, py = hy + Math.sin(a) * 5 * s;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

  } else if (level === 6) { // 苏卡达陆龟 — pentagon scute + radial lines
    ctx.strokeStyle = '#A08050'; ctx.lineWidth = 1.5 * s; ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -8 * s); ctx.lineTo(8 * s, -3 * s); ctx.lineTo(6 * s, 6 * s);
    ctx.lineTo(-6 * s, 6 * s); ctx.lineTo(-8 * s, -3 * s); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -8 * s); ctx.lineTo(0, -14 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8 * s, -3 * s); ctx.lineTo(14 * s, -5 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8 * s, -3 * s); ctx.lineTo(-14 * s, -5 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6 * s, 6 * s); ctx.lineTo(10 * s, 12 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6 * s, 6 * s); ctx.lineTo(-10 * s, 12 * s); ctx.stroke();
    // Growth rings
    ctx.lineWidth = 0.8 * s; ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(0, 0, 3 * s, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 5.5 * s, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;

  } else if (level === 7) { // 象龟 — 3x3 block grid with highlights
    ctx.fillStyle = dc; ctx.globalAlpha = 0.35;
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const bx = (-12 + col * 10) * s, by = (-8 + row * 8) * s;
        ctx.fillRect(bx, by, 8 * s, 6 * s);
      }
    }
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        ctx.fillRect((-12 + col * 10) * s, (-8 + row * 8) * s, 8 * s, 2 * s);
      }
    }
    ctx.globalAlpha = 1;

  } else if (level === 8) { // 加拉帕戈斯象龟 — golden hexagon + star + dots
    ctx.strokeStyle = '#FF8F00'; ctx.lineWidth = 1.5 * s; ctx.globalAlpha = 0.5;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i - Math.PI / 6;
      const px = Math.cos(a) * 8 * s, py = Math.sin(a) * 8 * s + 2 * s;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.stroke();
    // Inner star
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = Math.PI * 2 / 5 * i - Math.PI / 2;
      const a2 = Math.PI * 2 / 5 * (i + 0.5) - Math.PI / 2;
      ctx.lineTo(Math.cos(a1) * 5 * s, Math.sin(a1) * 5 * s + 2 * s);
      ctx.lineTo(Math.cos(a2) * 2.5 * s, Math.sin(a2) * 2.5 * s + 2 * s);
    }
    ctx.closePath(); ctx.stroke();
    // Gold dots
    ctx.fillStyle = '#FFD54F';
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 13 * s, Math.sin(a) * 10 * s + 2 * s, 2 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ========== CRYPTO STYLE ==========
function drawTurtleCrypto(ctx, x, y, level, scale = 1) {
  const t = TURTLES[level];
  const c = CRYPTO_COINS[level];

  const s = r / 30;

  ctx.save();

  // Limbs
  ctx.fillStyle = c.skinColor;
  ctx.beginPath(); ctx.ellipse(-20 * s, 10 * s, 7 * s, 5 * s, -0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 20 * s, 10 * s, 7 * s, 5 * s,  0.3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-16 * s, 20 * s, 6 * s, 4 * s, -0.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 16 * s, 20 * s, 6 * s, 4 * s,  0.2, 0, Math.PI * 2); ctx.fill();
  // Tail
  ctx.beginPath(); ctx.ellipse(0, 26 * s, 3 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();

  // Shell (outer) with coin brand color
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 28 * s, 22 * s, 0, 0, Math.PI * 2);
  ctx.fillStyle = c.color;
  ctx.fill();
  // Shell rim shine
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5 * s;
  ctx.stroke();

  // Shell (inner, darker)
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 22 * s, 17 * s, 0, 0, Math.PI * 2);
  ctx.fillStyle = c.darkColor;

  // Draw coin logo on shell
  drawCryptoLogo(ctx, level, s);

  // Head
  ctx.fillStyle = c.skinColor;
  ctx.beginPath();
  ctx.arc(0, -16 * s, 10 * s, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-4 * s, -18 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 4 * s, -18 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-4 * s, -18 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 4 * s, -18 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-3.2 * s, -18.8 * s, 0.8 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( 4.8 * s, -18.8 * s, 0.8 * s, 0, Math.PI * 2); ctx.fill();

  // Smile
  ctx.beginPath();
  ctx.arc(0, -15.5 * s, 5 * s, 0.5, Math.PI - 0.5, false);
  ctx.strokeStyle = c.darkColor; ctx.lineWidth = 1.2 * s; ctx.lineCap = 'round'; ctx.stroke();
  ctx.lineCap = 'butt';

  // Crowns for top 3
  if (level === 8) drawCrown(ctx, s, 'gold');
  else if (level === 7) drawCrown(ctx, s, 'silver');
  else if (level === 6) drawCrown(ctx, s, 'bronze');

  // Coin symbol label below shell
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = `bold ${6 * s}px monospace`; ctx.textAlign = 'center';
  ctx.fillText(c.symbol, 0, 28 * s);

  ctx.restore();
}

function drawCryptoLogo(ctx, level, s) {
  ctx.save();
  ctx.translate(0, 2 * s); // center on shell

  if (level === 0) {
    // DOGE — "D" letter stylized
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = `bold ${16 * s}px serif`; ctx.textAlign = 'center';
    ctx.fillText('D', 0, 7 * s);
  } else if (level === 1) {
    // PEPE — frog face emoji-style
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    // Two big frog eyes
    ctx.beginPath(); ctx.arc(-6 * s, -4 * s, 5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6 * s, -4 * s, 5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2D7455';
    ctx.beginPath(); ctx.arc(-6 * s, -4 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 6 * s, -4 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
    // Smirk
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5 * s;
    ctx.beginPath(); ctx.arc(0, 2 * s, 6 * s, 0.1, Math.PI - 0.1); ctx.stroke();
  } else if (level === 2) {
    // SHIB — "S" with bone shape
    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = `bold ${16 * s}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText('S', 0, 7 * s);
    // Small bone accent
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2 * s; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-8 * s, -6 * s); ctx.lineTo(8 * s, -6 * s); ctx.stroke();
    ctx.beginPath(); ctx.arc(-8 * s, -6 * s, 1.5 * s, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
    ctx.beginPath(); ctx.arc( 8 * s, -6 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.lineCap = 'butt';
  } else if (level === 3) {
    // ADA — starburst / flower logo
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5 * s;
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 3 * s, Math.sin(a) * 3 * s);
      ctx.lineTo(Math.cos(a) * 10 * s, Math.sin(a) * 10 * s);
      ctx.stroke();
      // Dots at tips
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath(); ctx.arc(Math.cos(a) * 10 * s, Math.sin(a) * 10 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
    }
    // Center dot
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(0, 0, 2.5 * s, 0, Math.PI * 2); ctx.fill();
  } else if (level === 4) {
    // XRP — X shape
    ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 2.5 * s; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-8 * s, -8 * s); ctx.lineTo(8 * s, 8 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8 * s, -8 * s); ctx.lineTo(-8 * s, 8 * s); ctx.stroke();
    // Center circle
    ctx.beginPath(); ctx.arc(0, 0, 3 * s, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill();
    ctx.lineCap = 'butt';
  } else if (level === 5) {
    // SOL — gradient stripe diagonal
    const solGrad = ctx.createLinearGradient(-10 * s, -8 * s, 10 * s, 8 * s);
    solGrad.addColorStop(0, '#00FFA3');
    solGrad.addColorStop(0.5, '#9945FF');
    solGrad.addColorStop(1, '#14F195');
    ctx.strokeStyle = solGrad; ctx.lineWidth = 3 * s; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-10 * s, -6 * s); ctx.lineTo(10 * s, -6 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10 * s, 0); ctx.lineTo(-10 * s, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-10 * s, 6 * s); ctx.lineTo(10 * s, 6 * s); ctx.stroke();
    ctx.lineCap = 'butt';
  } else if (level === 6) {
    // BNB — diamond shape
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    // Center diamond
    ctx.beginPath();
    ctx.moveTo(0, -8 * s); ctx.lineTo(8 * s, 0); ctx.lineTo(0, 8 * s); ctx.lineTo(-8 * s, 0);
    ctx.closePath(); ctx.fill();
    // Inner cutout
    ctx.fillStyle = CRYPTO_COINS[6].darkColor;
    ctx.beginPath();
    ctx.moveTo(0, -4 * s); ctx.lineTo(4 * s, 0); ctx.lineTo(0, 4 * s); ctx.lineTo(-4 * s, 0);
    ctx.closePath(); ctx.fill();
  } else if (level === 7) {
    // ETH — diamond / octahedron shape
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    // Top half
    ctx.beginPath();
    ctx.moveTo(0, -12 * s); ctx.lineTo(-8 * s, 0); ctx.lineTo(0, -3 * s); ctx.lineTo(8 * s, 0);
    ctx.closePath(); ctx.fill();
    // Bottom half (darker)
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.moveTo(0, 10 * s); ctx.lineTo(-8 * s, 0); ctx.lineTo(0, -3 * s); ctx.lineTo(8 * s, 0);
    ctx.closePath(); ctx.fill();
    // Center line
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 0.8 * s;
    ctx.beginPath(); ctx.moveTo(-8 * s, 0); ctx.lineTo(8 * s, 0); ctx.stroke();
  } else if (level === 8) {
    // BTC — ₿ symbol
    ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = `bold ${20 * s}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText('₿', 0, 8 * s);
    // Glow circle behind
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, 0, 14 * s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ========== CARTOON STYLE ==========
// === MOOD SYSTEM (for cartoon expressions) ===
// Each body tracks: body.mood = { type, timer, maxTimer, intensity }
function updateMoods(dt) {
  for (const body of world.bodies) {
    if (!body.mood) body.mood = { type: 'normal', timer: 0, maxTimer: 0, intensity: 0 };
    const m = body.mood;
    const speed = Math.sqrt(body.vx * body.vx + body.vy * body.vy);

    // Happy & sleepy moods have priority — skip detection while active
    if ((m.type === 'happy' || m.type === 'sleepy') && m.timer > 0) {
      // Wake up sleepy if bumped
      if (m.type === 'sleepy' && speed > 20) { m.type = 'normal'; m.timer = 0; body._idleTimer = 0; continue; }
      m.timer -= dt;
      if (m.timer <= 0) { m.type = 'normal'; m.timer = 0; }
      m.intensity = Math.min(1, m.timer / Math.min(m.maxTimer, 0.5));
      continue;
    }

    // Detect new mood triggers
    let newMood = null;

    // 1. Falling fast → dizzy (only first drop, age < 1.5s)
    if (body.vy > 150 && body.age < 1.5) {
      newMood = { type: 'falling', maxTimer: 1.5 };
    }

    // 2. Just landed hard → impact (only after first fall)
    if (!newMood && m.type === 'falling' && body.vy < 50 && speed < 100 && body.age < 2) {
      newMood = { type: 'impact', maxTimer: 0.8 };
    }

    // 3. Near same-level turtle → love (max 2s)
    if (!newMood) {
      for (const other of world.bodies) {
        if (other === body || other.level !== body.level) continue;
        const dx = other.x - body.x, dy = other.y - body.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < (body.radius + other.radius) * 1.8) {
          newMood = { type: 'love', maxTimer: 2.0 };
          break;
        }
      }
    }

    // 4. Squeezed by many → panic (max 2.5s)
    if (!newMood) {
      let neighbors = 0;
      for (const other of world.bodies) {
        if (other === body) continue;
        const dx = other.x - body.x, dy = other.y - body.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < (body.radius + other.radius) * 1.15) neighbors++;
      }
      if (neighbors >= 3) newMood = { type: 'squeezed', maxTimer: 2.5 };
    }

    // 5. Near game over line → panic (max 3s)
    if (!newMood) {
      const topY = body.y - body.radius;
      if (body.age > 1 && topY < layout.gameOverLineY + 30) {
        newMood = { type: 'panic', maxTimer: 3.0 };
      }
    }

    // 6. Idle too long → sleepy (10s no movement, random duration 3-6s)
    if (!newMood) {
      if (!body._idleTimer) body._idleTimer = 0;
      if (speed < 5) {
        body._idleTimer += dt;
      } else {
        body._idleTimer = 0;
      }
      if (body._idleTimer > 10 && m.type !== 'sleepy') {
        newMood = { type: 'sleepy', maxTimer: 3 + Math.random() * 3 };
        body._idleTimer = 0; // reset so it can trigger again later
      }
    }

    // 7. Happy after merge (set externally via body.mood)
    // (handled in processMerges)

    // Apply new mood or tick existing
    if (newMood) {
      if (m.type !== newMood.type) {
        m.type = newMood.type;
        m.timer = newMood.maxTimer;
        m.maxTimer = newMood.maxTimer;
      } else {
        // Refresh timer if same mood re-triggered
        m.timer = Math.min(m.timer + dt * 2, m.maxTimer);
      }
    } else if (m.type !== 'normal' && m.type !== 'happy') {
      m.timer -= dt;
      if (m.timer <= 0) { m.type = 'normal'; m.timer = 0; }
    } else if (m.type === 'happy') {
      m.timer -= dt;
      if (m.timer <= 0) { m.type = 'normal'; m.timer = 0; }
    }

    // Intensity: 1.0 at start, fading toward 0
    m.intensity = m.maxTimer > 0 ? Math.min(1, m.timer / Math.min(m.maxTimer, 0.5)) : 0;
  }
}

function getTurtleMood(body) {
  if (!body || !body.mood) return 'normal';
  return body.mood.type;
}

function drawTurtleCartoon(ctx, x, y, level, scale = 1, mood = 'normal', body = null) {
  const t = TURTLES[level];
  const r = t.radius * scale;
  const s = r / 30;
  const skin = SKIN_COLORS[level];

  ctx.save();
  ctx.translate(x, y);

  // === LIMBS ===
  ctx.fillStyle = skin;
  if (level === 5) {
    // 海龟 — flippers
    ctx.save();
    ctx.translate(-20 * s, 6 * s); ctx.rotate(-0.5);
    ctx.beginPath(); ctx.ellipse(0, 0, 10 * s, 4 * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(20 * s, 6 * s); ctx.rotate(0.5);
    ctx.beginPath(); ctx.ellipse(0, 0, 10 * s, 4 * s, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // Rear flippers (smaller)
    ctx.beginPath(); ctx.ellipse(-14 * s, 20 * s, 6 * s, 3 * s, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 14 * s, 20 * s, 6 * s, 3 * s,  0.3, 0, Math.PI * 2); ctx.fill();
  } else if (level === 4) {
    // 鳄龟 — thick stubby clawed legs
    ctx.beginPath(); ctx.ellipse(-20 * s, 10 * s, 9 * s, 6 * s, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 20 * s, 10 * s, 9 * s, 6 * s,  0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-16 * s, 21 * s, 8 * s, 5 * s, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 16 * s, 21 * s, 8 * s, 5 * s,  0.2, 0, Math.PI * 2); ctx.fill();
    // Claws
    ctx.fillStyle = '#37474F';
    for (const [lx, ly] of [[-24,8],[24,8],[-20,23],[20,23]]) {
      for (let c = -1; c <= 1; c++) {
        ctx.beginPath(); ctx.ellipse((lx + c * 2) * s, (ly + 3) * s, 1.5 * s, 2.5 * s, 0, 0, Math.PI * 2); ctx.fill();
      }
    }
  } else if (level >= 6) {
    // 陆龟类 — thick column legs
    ctx.fillStyle = skin;
    const legW = (7 + (level - 6) * 1.5);
    ctx.beginPath(); ctx.ellipse(-20 * s, 10 * s, legW * s, (legW - 1) * s, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 20 * s, 10 * s, legW * s, (legW - 1) * s,  0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-16 * s, 21 * s, (legW - 1) * s, (legW - 2) * s, -0.15, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 16 * s, 21 * s, (legW - 1) * s, (legW - 2) * s,  0.15, 0, Math.PI * 2); ctx.fill();
  } else {
    // Default small turtle legs
    ctx.beginPath(); ctx.ellipse(-20 * s, 10 * s, 7 * s, 5 * s, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 20 * s, 10 * s, 7 * s, 5 * s,  0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-16 * s, 20 * s, 6 * s, 4 * s, -0.2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 16 * s, 20 * s, 6 * s, 4 * s,  0.2, 0, Math.PI * 2); ctx.fill();
  }
  // Tail
  ctx.fillStyle = skin;
  const tailLen = level >= 4 ? 6 : 5;
  ctx.beginPath(); ctx.ellipse(0, 26 * s, 3 * s, tailLen * s, 0, 0, Math.PI * 2); ctx.fill();

  // === SHELL ===
  // Drop shadow for depth
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.ellipse(1 * s, 4 * s, 28 * s, 20 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shell (outer) — high dome for land turtles, flatter for aquatic
  const shellH = level === 5 ? 18 * s : (level >= 6 ? (24 + (level - 6) * 2) * s : 22 * s);
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 28 * s, shellH, 0, 0, Math.PI * 2);
  ctx.fillStyle = t.color;
  ctx.fill();
  // Shell highlight (glossy 3D)
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-6 * s, -4 * s, 14 * s, 9 * s, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Bottom rim shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(0, 8 * s, 24 * s, 10 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shell (inner, darker)
  const innerH = level === 5 ? 13 * s : (level >= 6 ? (19 + (level - 6) * 1.5) * s : 17 * s);
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 22 * s, innerH, 0, 0, Math.PI * 2);
  ctx.fillStyle = t.darkColor;
  ctx.fill();
  // Inner shell highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.ellipse(-4 * s, -2 * s, 10 * s, 6 * s, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Shell pattern (varies by level)
  drawShellPatternCartoon(ctx, level, s);

  // === HEAD ===
  // Head shadow for depth
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath(); ctx.arc(0.5 * s, -14 * s, 10 * s, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = skin;
  if (level === 4) {
    // 鳄龟 — broad angular head (front view), beak pointing down
    ctx.beginPath();
    ctx.moveTo(-11 * s, -16 * s);
    ctx.lineTo(-8 * s, -24 * s);
    ctx.lineTo(8 * s, -24 * s);
    ctx.lineTo(11 * s, -16 * s);
    ctx.quadraticCurveTo(0, -12 * s, -11 * s, -16 * s);
    ctx.fill();
    // Bumpy brow ridge
    ctx.fillStyle = '#546E7A';
    ctx.beginPath();
    ctx.moveTo(-9 * s, -23 * s); ctx.lineTo(-7 * s, -25.5 * s);
    ctx.lineTo(7 * s, -25.5 * s); ctx.lineTo(9 * s, -23 * s);
    ctx.closePath(); ctx.fill();
  } else if (level >= 6) {
    // 陆龟 — larger rounded head + neck
    const headR = (10 + (level - 6) * 1.5);
    ctx.beginPath(); ctx.arc(0, -16 * s, headR * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-9 * s, -8 * s);
    ctx.quadraticCurveTo(-11 * s, -14 * s, -9 * s, -18 * s);
    ctx.lineTo(9 * s, -18 * s);
    ctx.quadraticCurveTo(11 * s, -14 * s, 9 * s, -8 * s);
    ctx.closePath();
    ctx.fill();
  } else {
    // Default round head + neck bridge
    ctx.beginPath();
    ctx.arc(0, -16 * s, 10 * s, 0, Math.PI * 2);
    ctx.fill();
    // Neck fill to cover head-shell gap
    ctx.beginPath();
    ctx.moveTo(-8 * s, -8 * s);
    ctx.quadraticCurveTo(-10 * s, -14 * s, -8 * s, -18 * s);
    ctx.lineTo(8 * s, -18 * s);
    ctx.quadraticCurveTo(10 * s, -14 * s, 8 * s, -8 * s);
    ctx.closePath();
    ctx.fill();
  }

  // === CARTOON EYES & MOUTH (unique personality per turtle) ===
  const eY = -18 * s; // base eye Y
  const eS = level >= 6 ? 5 : 4; // eye spacing

  if (level === 0) {
    // 草龟 — shy baby: HUGE watery eyes, tiny dot mouth, heavy blush
    const er = 4 * s;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-eS * s, eY, er, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( eS * s, eY, er, 0, Math.PI * 2); ctx.fill();
    // Giant green pupils looking up-left (shy)
    ctx.fillStyle = '#2E7D32';
    ctx.beginPath(); ctx.arc((-eS - 1) * s, eY - 1 * s, er * 0.65, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(( eS - 1) * s, eY - 1 * s, er * 0.65, 0, Math.PI * 2); ctx.fill();
    // Double shine (watery)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc((-eS - 0.3) * s, eY - 2 * s, er * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc((-eS + 1) * s, eY + 0.5 * s, er * 0.15, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(( eS - 0.3) * s, eY - 2 * s, er * 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(( eS + 1) * s, eY + 0.5 * s, er * 0.15, 0, Math.PI * 2); ctx.fill();
    // Tiny 'o' mouth
    ctx.fillStyle = '#5D4037';
    ctx.beginPath(); ctx.arc(0, -13 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
    // Heavy blush
    ctx.fillStyle = 'rgba(255,120,120,0.35)';
    ctx.beginPath(); ctx.arc(-8 * s, -14 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8 * s, -14 * s, 3 * s, 0, Math.PI * 2); ctx.fill();

  } else if (level === 1) {
    // 巴西龟 — realistic cute: round alert eyes with yellow-green iris, expressive
    const er = 3.2 * s;
    // Eye whites
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-eS * s, eY, er, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( eS * s, eY, er, 0, Math.PI * 2); ctx.fill();
    // Yellow-green iris (realistic for red-eared slider)
    ctx.fillStyle = '#7CB342';
    ctx.beginPath(); ctx.arc(-eS * s, eY + 0.2 * s, er * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( eS * s, eY + 0.2 * s, er * 0.6, 0, Math.PI * 2); ctx.fill();
    // Black pupil (horizontal slit, like real turtle)
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.ellipse(-eS * s, eY + 0.2 * s, er * 0.35, er * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( eS * s, eY + 0.2 * s, er * 0.35, er * 0.2, 0, 0, Math.PI * 2); ctx.fill();
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc((-eS + 0.8) * s, eY - 0.6 * s, er * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(( eS + 0.8) * s, eY - 0.6 * s, er * 0.22, 0, Math.PI * 2); ctx.fill();
    // Yellow stripes on head (multiple thin lines, realistic)
    ctx.strokeStyle = '#FFEE58'; ctx.lineWidth = 0.8 * s; ctx.globalAlpha = 0.7;
    ctx.beginPath(); ctx.moveTo(-1 * s, -25 * s); ctx.quadraticCurveTo(-4 * s, -20 * s, -8 * s, -14 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 1 * s, -25 * s); ctx.quadraticCurveTo( 4 * s, -20 * s,  8 * s, -14 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-3 * s, -25 * s); ctx.quadraticCurveTo(-7 * s, -20 * s, -10 * s, -16 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 3 * s, -25 * s); ctx.quadraticCurveTo( 7 * s, -20 * s,  10 * s, -16 * s); ctx.stroke();
    ctx.globalAlpha = 1;
    // Cute content smile
    ctx.beginPath();
    ctx.arc(0, -14 * s, 4 * s, 0.4, Math.PI - 0.4, false);
    ctx.strokeStyle = '#2E7D32'; ctx.lineWidth = 1.2 * s;
    ctx.lineCap = 'round'; ctx.stroke(); ctx.lineCap = 'butt';

  } else if (level === 2) {
    // 花龟 — diva: sparkly star-eyes, eyelashes, big smile, blush
    const er = 3.5 * s;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-eS * s, eY, er, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( eS * s, eY, er, 0, Math.PI * 2); ctx.fill();
    // Star-shaped pupils (★)
    ctx.fillStyle = '#8B4513';
    for (const sx of [-eS, eS]) {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {

      ctx.beginPath(); ctx.arc(-hs * 0.5, -hs * 0.8, hs * 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    // Blush intensified
    ctx.fillStyle = `rgba(255,100,130,${0.25 * moodAlpha})`;
    ctx.beginPath(); ctx.arc(-8 * s, -13 * s, 3.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8 * s, -13 * s, 3.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

  } else if (mood === 'squeezed' && moodAlpha > 0) {
    // Sweat drops (animated dripping) + stress lines + trembling
    ctx.globalAlpha = 0.7 * moodAlpha;
    const tm = Date.now() / 400;
    // Multiple sweat drops
    ctx.fillStyle = '#64B5F6';
    const dropY = (Math.sin(tm) * 2) * s;
    ctx.beginPath(); ctx.moveTo(9 * s, (-24 + dropY) * s);
    ctx.quadraticCurveTo(11 * s, (-21 + dropY) * s, 9 * s, (-19 + dropY) * s);
    ctx.quadraticCurveTo(7 * s, (-21 + dropY) * s, 9 * s, (-24 + dropY) * s); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-8 * s, (-26 + dropY * 0.5) * s);
    ctx.quadraticCurveTo(-6.5 * s, (-24 + dropY * 0.5) * s, -8 * s, (-23 + dropY * 0.5) * s);
    ctx.quadraticCurveTo(-9.5 * s, (-24 + dropY * 0.5) * s, -8 * s, (-26 + dropY * 0.5) * s); ctx.fill();
    // Stress lines (radiating)
    ctx.strokeStyle = '#FF8A65'; ctx.lineWidth = 1 * s;
    for (let i = 0; i < 4; i++) {
      const a = -Math.PI * 0.8 + i * 0.35;
      const ox = -10 * s, oy = -26 * s;
      ctx.beginPath();
      ctx.moveTo(ox + Math.cos(a) * 3 * s, oy + Math.sin(a) * 3 * s);
      ctx.lineTo(ox + Math.cos(a) * 6 * s, oy + Math.sin(a) * 6 * s);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

  } else if (mood === 'panic' && moodAlpha > 0) {
    // Near game over — exclamation mark + trembling
    ctx.globalAlpha = 0.8 * moodAlpha;
    const tm = Date.now() / 150;
    const shake = Math.sin(tm) * 1.5 * s;
    // Exclamation marks
    ctx.fillStyle = '#FF5252';
    ctx.font = `bold ${10 * s}px sans-serif`; ctx.textAlign = 'center';
    ctx.fillText('!', (-6 + shake * 0.5) * s, -28 * s);
    ctx.fillText('!', (6 - shake * 0.5) * s, -28 * s);
    // Face turns slightly red
    ctx.fillStyle = `rgba(255,80,80,${0.15 * moodAlpha})`;
    ctx.beginPath(); ctx.arc(0, -16 * s, 10 * s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

  } else if (mood === 'happy' && moodAlpha > 0) {
    // Just merged — big celebration! glow + sparkle ring + notes + rainbow ring
    const tm = Date.now() / 300;
    const age = moodData ? (moodData.maxTimer - moodData.timer) : 0;

    // Expanding glow pulse
    const glowR = (20 + age * 15) * s;
    const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
    glowGrad.addColorStop(0, `rgba(255,215,0,${0.2 * moodAlpha})`);
    glowGrad.addColorStop(0.6, `rgba(255,180,50,${0.08 * moodAlpha})`);
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(0, 0, glowR, 0, Math.PI * 2); ctx.fill();

    // Sparkle ring (8 sparkles rotating outward)
    ctx.globalAlpha = 0.9 * moodAlpha;
    const sparkleR = (14 + age * 8) * s;
    for (let i = 0; i < 8; i++) {
      const a = tm * 1.5 + i * Math.PI / 4;
      const sx = Math.cos(a) * sparkleR;
      const sy = Math.sin(a) * sparkleR * 0.7;
      const sparkSize = (2.5 + Math.sin(tm * 3 + i * 2) * 1) * s;
      // Four-pointed star
      ctx.fillStyle = ['#FFD54F', '#FF4081', '#64FFDA', '#FF8A65', '#CE93D8', '#81D4FA', '#FFD54F', '#AED581'][i];
      ctx.beginPath();
      for (let j = 0; j < 4; j++) {
        const sa = Math.PI / 2 * j;
        ctx.lineTo(sx + Math.cos(sa) * sparkSize, sy + Math.sin(sa) * sparkSize);
        ctx.lineTo(sx + Math.cos(sa + Math.PI / 4) * sparkSize * 0.3, sy + Math.sin(sa + Math.PI / 4) * sparkSize * 0.3);
      }
      ctx.closePath(); ctx.fill();
    }

    // Floating musical notes (multiple, different sizes)
    ctx.globalAlpha = 0.7 * moodAlpha;
    const notes = ['♪', '♫', '♪'];
    const noteColors = ['#CE93D8', '#FF80AB', '#80DEEA'];
    for (let i = 0; i < 3; i++) {
      const nx = ((-8 + i * 8) + Math.sin(tm + i * 2) * 3) * s;
      const ny = (-32 - Math.sin(tm * 1.2 + i * 1.3) * 5 - age * 8) * s;
      ctx.fillStyle = noteColors[i];
      ctx.font = `bold ${(6 + i) * s}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText(notes[i], nx, ny);
    }

    // Rainbow ring burst (first 0.5s only)
    if (age < 0.5) {
      const ringAlpha = (0.5 - age) * 2 * moodAlpha;
      ctx.globalAlpha = ringAlpha * 0.4;
      const ringR = (10 + age * 40) * s;
      ctx.lineWidth = 2 * s;
      const rainbow = ['#FF5252', '#FF9800', '#FFEB3B', '#4CAF50', '#2196F3', '#9C27B0'];
      rainbow.forEach((c, i) => {
        ctx.strokeStyle = c;
        ctx.beginPath();
        ctx.arc(0, 0, ringR + i * 1.5 * s, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    ctx.globalAlpha = 1;

  } else if (mood === 'sleepy' && moodAlpha > 0) {
    // Zzz floating with gentle bob
    ctx.globalAlpha = 0.5 * moodAlpha;
    const tm = Date.now() / 800;
    const zy = Math.sin(tm) * 3 * s;
    ctx.fillStyle = '#90CAF9';
    ctx.font = `bold ${8 * s}px sans-serif`; ctx.textAlign = 'left';
    ctx.fillText('z', 8 * s, (-24 + zy) * s);
    ctx.font = `bold ${6 * s}px sans-serif`;
    ctx.globalAlpha = 0.4 * moodAlpha;
    ctx.fillText('z', 13 * s, (-29 + zy * 0.7) * s);
    ctx.font = `bold ${4 * s}px sans-serif`;
    ctx.globalAlpha = 0.3 * moodAlpha;
    ctx.fillText('z', 17 * s, (-32 + zy * 0.4) * s);
    // Snot bubble
    ctx.globalAlpha = 0.35 * moodAlpha;
    ctx.strokeStyle = '#90CAF9'; ctx.lineWidth = 0.8 * s;
    const br = (2 + Math.sin(tm * 1.2) * 0.8) * s;
    ctx.beginPath(); ctx.arc(5 * s, -12 * s, br, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawShellPatternCartoon(ctx, level, s) {
  const dc = TURTLES[level].darkColor;
  const c = TURTLES[level].color;

  if (level === 0) { // 草龟 - concentric rings + subtle radial lines
    ctx.strokeStyle = dc;
    ctx.lineWidth = 1 * s;
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 16 * s, 12 * s, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 10 * s, 7 * s, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 4 * s, 3 * s, 0, 0, Math.PI * 2); ctx.stroke();
    // Radial dividers between rings
    ctx.globalAlpha = 0.2;
    for (let i = 0; i < 8; i++) {
      const a = Math.PI * 2 / 8 * i;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * 4 * s, Math.sin(a) * 3 * s + 2 * s);
      ctx.lineTo(Math.cos(a) * 16 * s, Math.sin(a) * 12 * s + 2 * s);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

  } else if (level === 1) { // 巴西龟 - realistic: red ears, yellow stripes, scute pattern
    // Red ear patches (signature!)
    ctx.fillStyle = '#E53935';
    ctx.beginPath(); ctx.ellipse(-9 * s, -17 * s, 5 * s, 2.5 * s, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 9 * s, -17 * s, 5 * s, 2.5 * s,  0.4, 0, Math.PI * 2); ctx.fill();
    // Red ear darker edge
    ctx.fillStyle = '#C62828';
    ctx.beginPath(); ctx.ellipse(-9 * s, -17 * s, 3.5 * s, 1.5 * s, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( 9 * s, -17 * s, 3.5 * s, 1.5 * s,  0.4, 0, Math.PI * 2); ctx.fill();
    // Shell scute lines (realistic pentagon pattern)
    ctx.strokeStyle = '#A5D6A7'; ctx.lineWidth = 1.2 * s; ctx.globalAlpha = 0.5;
    // Central vertebral scutes
    ctx.beginPath(); ctx.moveTo(0, -8 * s); ctx.lineTo(0, 12 * s); ctx.stroke();
    // V-shaped costal scute lines
    ctx.beginPath(); ctx.moveTo(-16 * s, -2 * s); ctx.lineTo(0, -7 * s); ctx.lineTo(16 * s, -2 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-14 * s, 5 * s); ctx.lineTo(0, 1 * s); ctx.lineTo(14 * s, 5 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12 * s, 11 * s); ctx.lineTo(0, 7 * s); ctx.lineTo(12 * s, 11 * s); ctx.stroke();
    // Yellow marginal highlights on shell edge
    ctx.strokeStyle = '#FFEE58'; ctx.lineWidth = 1 * s; ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.ellipse(0, 2 * s, 20 * s, 15 * s, 0, 0.5, Math.PI - 0.5); ctx.stroke();
    ctx.globalAlpha = 1;

  } else if (level === 2) { // 花龟 - colorful spots + thin stripes on neck
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = '#FFEE58';
    ctx.beginPath(); ctx.arc(-7 * s, -2 * s, 4 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#FF8A65';
    ctx.beginPath(); ctx.arc( 5 * s,  5 * s, 3 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#CE93D8';
    ctx.beginPath(); ctx.arc( 6 * s, -5 * s, 3.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#81D4FA';
    ctx.beginPath(); ctx.arc(-4 * s,  7 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#C5E1A5';
    ctx.beginPath(); ctx.arc( 0, 0, 2 * s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    // Head stripes (花龟 has thin colorful lines on head/neck)
    ctx.strokeStyle = '#FFD54F';
    ctx.lineWidth = 0.8 * s;
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.moveTo(-3 * s, -22 * s); ctx.lineTo(-7 * s, -12 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 3 * s, -22 * s); ctx.lineTo( 7 * s, -12 * s); ctx.stroke();
    ctx.globalAlpha = 1;

  } else if (level === 3) { // 锦龟 — punk spiky pattern + bold red/yellow flames
    // Bright zigzag "flame" stripes on shell (high contrast)
    ctx.strokeStyle = '#FFEB3B';
    ctx.lineWidth = 2.5 * s;
    ctx.beginPath();
    ctx.moveTo(-14 * s, 0); ctx.lineTo(-7 * s, -8 * s); ctx.lineTo(0, 0);
    ctx.lineTo(7 * s, -8 * s); ctx.lineTo(14 * s, 0);
    ctx.stroke();
    ctx.strokeStyle = '#FF5722';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(-12 * s, 6 * s); ctx.lineTo(-6 * s, -1 * s); ctx.lineTo(0, 6 * s);
    ctx.lineTo(6 * s, -1 * s); ctx.lineTo(12 * s, 6 * s);
    ctx.stroke();
    // Red-yellow flame rim around entire shell edge
    ctx.strokeStyle = '#FF5722';
    ctx.lineWidth = 2.5 * s;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.ellipse(0, 2 * s, 27 * s, 21 * s, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#FFC107';
    ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.ellipse(0, 2 * s, 25 * s, 19 * s, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;

  } else if (level === 4) { // 鳄龟 - rough spiky ridges
    ctx.strokeStyle = '#546E7A';
    ctx.lineWidth = 2.5 * s;
    ctx.globalAlpha = 0.6;
    // Three ridges along the back
    for (let row = -1; row <= 1; row++) {
      ctx.beginPath();
      for (let i = -3; i <= 3; i++) {
        const px = i * 5 * s;
        const py = (row * 7 + (i % 2 === 0 ? -2 : 2)) * s;
        i === -3 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    }
    // Spiky bumps
    ctx.fillStyle = '#455A64';
    for (const [bx, by] of [[-8,-4],[0,-6],[8,-4],[-5,4],[5,4]]) {
      ctx.beginPath(); ctx.arc(bx * s, by * s, 2 * s, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Green moss/algae spots (鳄龟 often has algae on shell)
    ctx.fillStyle = '#2E7D32';
    ctx.globalAlpha = 0.2;
    ctx.beginPath(); ctx.arc(-12 * s, 8 * s, 3.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10 * s, -8 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(3 * s, 10 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

  } else if (level === 5) { // 海龟 - hexagonal scales (fitted inside shell)
    ctx.strokeStyle = '#1565C0';
    ctx.lineWidth = 1.2 * s;
    ctx.globalAlpha = 0.4;
    // Hexagon positions: 3x3 grid shifted, skip top-left, add bottom-left
    const hexPositions = [
      /*top*/    [0, -1], [1, -1],
      /*mid*/ [-1, 0], [0, 0], [1, 0],
      /*bot*/ [-2, 1], [-1, 1], [0, 1], [1, 1],
    ];
    for (const [col, row] of hexPositions) {
      const hx = (col * 8 + (row % 2) * 4) * s;
      const hy = (row * 7 + 2) * s;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = Math.PI / 3 * i - Math.PI / 6;
        const px = hx + Math.cos(angle) * 4 * s;
        const py = hy + Math.sin(angle) * 4 * s;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.stroke();
    }
    ctx.globalAlpha = 1;

  } else if (level === 6) { // 苏卡达陆龟 - prominent scute pattern
    ctx.strokeStyle = '#A08050';
    ctx.lineWidth = 1.5 * s;
    ctx.globalAlpha = 0.5;
    // Central pentagon scute
    ctx.beginPath();
    ctx.moveTo(0, -8 * s); ctx.lineTo(8 * s, -3 * s); ctx.lineTo(6 * s, 6 * s);
    ctx.lineTo(-6 * s, 6 * s); ctx.lineTo(-8 * s, -3 * s); ctx.closePath(); ctx.stroke();
    // Radial lines from center
    ctx.beginPath(); ctx.moveTo(0, -8 * s); ctx.lineTo(0, -14 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8 * s, -3 * s); ctx.lineTo(14 * s, -5 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-8 * s, -3 * s); ctx.lineTo(-14 * s, -5 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(6 * s, 6 * s); ctx.lineTo(10 * s, 12 * s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6 * s, 6 * s); ctx.lineTo(-10 * s, 12 * s); ctx.stroke();
    // Growth ring arcs inside scute
    ctx.lineWidth = 0.8 * s;
    ctx.globalAlpha = 0.3;
    ctx.beginPath(); ctx.arc(0, 0, 3 * s, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, 5.5 * s, 0, Math.PI * 2); ctx.stroke();
    ctx.globalAlpha = 1;

  } else if (level === 7) { // 象龟 - block grid with highlight
    ctx.fillStyle = dc;
    ctx.globalAlpha = 0.35;
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const bx = (-12 + col * 10) * s;
        const by = (-8 + row * 8) * s;
        ctx.fillRect(bx, by, 8 * s, 6 * s);
      }
    }
    // Highlight on each block
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const bx = (-12 + col * 10) * s;
        const by = (-8 + row * 8) * s;
        ctx.fillRect(bx, by, 8 * s, 2 * s);
      }
    }
    ctx.globalAlpha = 1;

  } else if (level === 8) { // 加拉帕戈斯象龟 - ornate golden scutes
    ctx.strokeStyle = '#FF8F00';
    ctx.lineWidth = 1.5 * s;
    ctx.globalAlpha = 0.5;
    // Large center hexagon
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 3 * i - Math.PI / 6;
      const px = Math.cos(angle) * 8 * s;
      const py = Math.sin(angle) * 8 * s + 2 * s;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.stroke();
    // Inner star
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a1 = Math.PI * 2 / 5 * i - Math.PI / 2;
      const a2 = Math.PI * 2 / 5 * (i + 0.5) - Math.PI / 2;
      ctx.lineTo(Math.cos(a1) * 5 * s, Math.sin(a1) * 5 * s + 2 * s);
      ctx.lineTo(Math.cos(a2) * 2.5 * s, Math.sin(a2) * 2.5 * s + 2 * s);
    }
    ctx.closePath(); ctx.stroke();
    // Surrounding dots
    ctx.fillStyle = '#FFD54F';
    for (let i = 0; i < 6; i++) {
      const angle = Math.PI / 3 * i;
      ctx.beginPath();
      ctx.arc(Math.cos(angle) * 13 * s, Math.sin(angle) * 10 * s + 2 * s, 2 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawCrown(ctx, s, type) {
  const colors = {
    gold:   { fill: '#FFD700', stroke: '#FFA000', glow: 'rgba(255, 213, 79, 0.3)' },
    silver: { fill: '#C0C0C0', stroke: '#888',    glow: 'rgba(192, 192, 192, 0.25)' },
    bronze: { fill: '#CD7F32', stroke: '#8B5A2B', glow: 'rgba(205, 127, 50, 0.2)' },
  };
  const c = colors[type] || colors.gold;
  ctx.fillStyle = c.fill;
  ctx.strokeStyle = c.stroke;
  ctx.lineWidth = 1 * s;
  ctx.beginPath();
  ctx.moveTo(-10 * s, -24 * s);
  ctx.lineTo( -7 * s, -32 * s);
  ctx.lineTo( -3 * s, -26 * s);
  ctx.lineTo(  0,     -34 * s);
  ctx.lineTo(  3 * s, -26 * s);
  ctx.lineTo(  7 * s, -32 * s);
  ctx.lineTo( 10 * s, -24 * s);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Jewel on crown center
  const gems = { gold: '#E53935', silver: '#42A5F5', bronze: '#4CAF50' };
  ctx.fillStyle = gems[type] || '#E53935';
  ctx.beginPath(); ctx.arc(0, -28 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(-0.5 * s, -28.8 * s, 0.8 * s, 0, Math.PI * 2); ctx.fill();

  // Glow ring
  ctx.strokeStyle = c.glow;
  ctx.lineWidth = 4 * s;
  ctx.beginPath();
  ctx.ellipse(0, 2 * s, 34 * s, 28 * s, 0, 0, Math.PI * 2);
  ctx.stroke();
}

// === PHYSICS ENGINE ===
class Body {
  constructor(x, y, level) {
    this.x = x;
    this.y = y;
    this.vx = 0;
    this.vy = 0;
    this.level = level;
    this.radius = TURTLES[level].radius;
    this.mass = this.radius * this.radius;
    this.invMass = 1 / this.mass;
    this.sleeping = false;
    this.sleepTimer = 0;
    this.mergeFlag = false;
    this.age = 0;
    this.id = Body.nextId++;
  }
}
Body.nextId = 0;

const world = {
  bodies: [],
  mergeQueue: [],
  addBody(x, y, level) {
    const b = new Body(x, y, level);
    this.bodies.push(b);
    return b;
  },
  removeBody(body) {
    const idx = this.bodies.indexOf(body);
    if (idx !== -1) this.bodies.splice(idx, 1);
  },
};

function detectCollisions(bodies, area) {
  const pairs = [];
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i], b = bodies[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = a.radius + b.radius;
      if (dist < minDist) {
        const nx = dist > 0.0001 ? dx / dist : 0;
        const ny = dist > 0.0001 ? dy / dist : 1;
        pairs.push({ a, b, nx, ny, overlap: minDist - dist });
      }
    }
  }
  const left = area.x + GAME.wallThickness;
  const right = area.x + area.w - GAME.wallThickness;
  const bottom = area.y + area.h;
  for (const body of bodies) {
    if (body.x - body.radius < left)
      pairs.push({ a: body, b: null, nx: 1, ny: 0, overlap: left - (body.x - body.radius), wall: 'left' });
    if (body.x + body.radius > right)
      pairs.push({ a: body, b: null, nx: -1, ny: 0, overlap: (body.x + body.radius) - right, wall: 'right' });
    if (body.y + body.radius > bottom)
      pairs.push({ a: body, b: null, nx: 0, ny: -1, overlap: (body.y + body.radius) - bottom, wall: 'bottom' });
  }
  return pairs;
}

function detectCollisionsOptimized(bodies, area) {
  if (bodies.length < 20) return detectCollisions(bodies, area);

  const cellSize = 160; // larger than biggest turtle diameter
  const grid = new Map();

  for (const body of bodies) {
    const cx = Math.floor(body.x / cellSize);
    const cy = Math.floor(body.y / cellSize);
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const key = `${cx+dx},${cy+dy}`;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push(body);
      }
    }
  }

  const pairs = [];
  const checked = new Set();

  for (const cell of grid.values()) {
    for (let i = 0; i < cell.length; i++) {
      for (let j = i + 1; j < cell.length; j++) {
        const a = cell[i], b = cell[j];
        const pairKey = a.id < b.id ? `${a.id}-${b.id}` : `${b.id}-${a.id}`;
        if (checked.has(pairKey)) continue;
        checked.add(pairKey);

        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = a.radius + b.radius;
        if (dist < minDist) {
          const nx = dist > 0.0001 ? dx / dist : 0;
          const ny = dist > 0.0001 ? dy / dist : 1;
          pairs.push({ a, b, nx, ny, overlap: minDist - dist });
        }
      }
    }
  }

  // Wall collisions
  const left = area.x + GAME.wallThickness;
  const right = area.x + area.w - GAME.wallThickness;
  const bottom = area.y + area.h;
  for (const body of bodies) {
    if (body.x - body.radius < left)
      pairs.push({ a: body, b: null, nx: 1, ny: 0, overlap: left - (body.x - body.radius), wall: 'left' });
    if (body.x + body.radius > right)
      pairs.push({ a: body, b: null, nx: -1, ny: 0, overlap: (body.x + body.radius) - right, wall: 'right' });
    if (body.y + body.radius > bottom)
      pairs.push({ a: body, b: null, nx: 0, ny: -1, overlap: (body.y + body.radius) - bottom, wall: 'bottom' });
  }

  return pairs;
}

function solveCollision(pair) {
  const { a, b, nx, ny, overlap } = pair;
  if (!b) {
    // Wall collision
    const isGround = pair.wall === 'bottom';
    const fric = isGround ? PHYSICS.groundFriction : PHYSICS.friction;
    const e = PHYSICS.restitution;

    // Full position correction for walls (no slop needed)
    a.x += nx * overlap;
    a.y += ny * overlap;

    const vn = a.vx * nx + a.vy * ny;
    if (vn < 0) {
      // Only bounce if velocity is significant, otherwise just zero it
      if (Math.abs(vn) < 20) {
        // Kill tiny bounces to prevent jitter
        a.vx -= vn * nx;
        a.vy -= vn * ny;
      } else {
        a.vx -= (1 + e) * vn * nx;
        a.vy -= (1 + e) * vn * ny;
      }
      // Tangent friction
      const tx = -ny, ty = nx;
      const vt = a.vx * tx + a.vy * ty;
      const maxFric = Math.abs(vn) * fric;
      const fricImpulse = Math.max(-maxFric, Math.min(maxFric, -vt));
      a.vx += fricImpulse * tx;
      a.vy += fricImpulse * ty;
    }
    a.sleeping = false;
    a.sleepTimer = 0;
    return;
  }

  // Circle-circle collision
  // Merge check
  if (a.level === b.level && a.level < TURTLES.length - 1 && !a.mergeFlag && !b.mergeFlag) {
    a.mergeFlag = true;
    b.mergeFlag = true;
    world.mergeQueue.push({ a, b });
  }

  // Position correction with slop (Baumgarte stabilization)
  const totalInvMass = a.invMass + b.invMass;
  if (totalInvMass > 0) {
    const corrAmount = Math.max(0, overlap - PHYSICS.slop) * PHYSICS.correctionRate;
    const corrA = (a.invMass / totalInvMass) * corrAmount;
    const corrB = (b.invMass / totalInvMass) * corrAmount;
    a.x -= nx * corrA;
    a.y -= ny * corrA;
    b.x += nx * corrB;
    b.y += ny * corrB;
  }

  // Relative velocity along normal
  const dvx = a.vx - b.vx;
  const dvy = a.vy - b.vy;
  const vn = dvx * nx + dvy * ny;
  if (vn > 0) return; // separating

  // Normal impulse — size-aware restitution, kill tiny bounces
  let e = Math.abs(vn) < 20 ? 0 : PHYSICS.restitution;
  // Reduce bounce for mismatched sizes (small on big = less bouncy, more stable)
  if (e > 0) {
    const sizeR = Math.max(a.radius, b.radius) / Math.min(a.radius, b.radius);
    e *= 1 / (1 + (sizeR - 1) * 0.4); // e.g. 3x size ratio → ~55% restitution
  }
  const j = -(1 + e) * vn / totalInvMass;
  a.vx += j * a.invMass * nx;
  a.vy += j * a.invMass * ny;
  b.vx -= j * b.invMass * nx;
  b.vy -= j * b.invMass * ny;

  // Tangent friction — boost when sizes differ (small on big)
  const tx = -ny, ty = nx;
  const vt = dvx * tx + dvy * ty;
  const sizeRatio = Math.max(a.radius, b.radius) / Math.min(a.radius, b.radius);
  const fricBoost = 1 + (sizeRatio - 1) * 0.3; // up to ~1.6x for large size diff
  const maxFric = Math.abs(j) * PHYSICS.friction * fricBoost;
  let jt = -vt / totalInvMass;
  jt = Math.max(-maxFric, Math.min(maxFric, jt));
  a.vx += jt * a.invMass * tx;
  a.vy += jt * a.invMass * ty;
  b.vx -= jt * b.invMass * tx;
  b.vy -= jt * b.invMass * ty;

  // Wake both
  a.sleeping = false; a.sleepTimer = 0;
  b.sleeping = false; b.sleepTimer = 0;
}

let physicsAccumulator = 0;

function physicsStep(dt) {
  physicsAccumulator += dt;
  const fixedDt = PHYSICS.fixedDt;
  while (physicsAccumulator >= fixedDt) {
    physicsAccumulator -= fixedDt;
    for (const body of world.bodies) {
      if (body.sleeping) continue;
      body.vy += PHYSICS.gravity * fixedDt;
      // Velocity clamping — prevent unrealistic speeds
      const speed = Math.sqrt(body.vx * body.vx + body.vy * body.vy);
      if (speed > PHYSICS.maxVelocity) {
        const scale = PHYSICS.maxVelocity / speed;
        body.vx *= scale;
        body.vy *= scale;
      }
      // Stronger damping at low speeds to help settle
      const damp = speed < PHYSICS.lowSpeedThreshold ? PHYSICS.lowSpeedDamp : PHYSICS.damping;
      body.vx *= damp;
      body.vy *= damp;
      body.x += body.vx * fixedDt;
      body.y += body.vy * fixedDt;
    }
    for (let iter = 0; iter < PHYSICS.solverIterations; iter++) {
      const pairs = detectCollisionsOptimized(world.bodies, layout.gameArea);
      for (const pair of pairs) {
        solveCollision(pair);
      }
    }
    processMerges();
    for (const body of world.bodies) {
      if (body.sleeping) continue;
      const speed = Math.sqrt(body.vx * body.vx + body.vy * body.vy);
      if (speed < PHYSICS.sleepThreshold) {
        body.sleepTimer += fixedDt;
        if (body.sleepTimer >= PHYSICS.sleepDelay) body.sleeping = true;
      } else {
        body.sleepTimer = 0;
      }
    }
  }
}

// === MERGE & PARTICLES ===
const particles = [];
const scorePopups = [];
let chainCount = 0;

// === GAME STATE ===
const game = {
  state: 'menu',
  difficulty: 'normal',
  score: 0,
  highScore: parseInt(localStorage.getItem('turtle_merge_high_score') || '0'),
  leaderboard: JSON.parse(localStorage.getItem('turtle_merge_leaderboard') || '[]'),
  showLeaderboard: false,
  showEncyclopedia: false,
  encyclopediaScroll: 0,
  currentTurtle: null,
  nextLevel: 0,
  dropX: 0,
  canDrop: true,
  dropCooldownTimer: 0,
  gameOverTimer: 0,
  discoveredLevels: new Set(),
  maxLevelCount: 0,
  victoryBanner: null,
  // Combo system
  combo: 0,
  comboTimer: 0,
  comboDisplay: null, // { text, x, y, timer, maxTimer, multiplier }
  maxCombo: 0,
  totalMerges: 0,

  showVictoryBanner(turtleName, subtitle, tier, duration) {
    this.victoryBanner = { text: `🎉 恭喜合成 ${turtleName}！`, subtitle: subtitle || '', tier: tier || 'bronze', timer: duration || 3.0, maxTimer: duration || 3.0 };
  },

  addCombo(x, y) {
    this.combo++;
    this.comboTimer = 1.5; // 1.5s window for next combo
    this.totalMerges++;
    if (this.combo > this.maxCombo) this.maxCombo = this.combo;
    if (this.combo >= 2) {
      const mult = Math.min(this.combo, 8); // cap at x8
      this.comboDisplay = { text: `COMBO x${mult}!`, x, y: y - 30, timer: 1.2, maxTimer: 1.2, multiplier: mult };
      return mult;
    }
    return 1;
  },

  reset() {
    this.score = 0;
    this.state = 'playing';
    this.canDrop = true;
    this.dropCooldownTimer = 0;
    this.gameOverTimer = 0;
    this.discoveredLevels = new Set();
    this.maxLevelCount = 0;
    this.victoryBanner = null;
    this.combo = 0;
    this.comboTimer = 0;
    this.comboDisplay = null;
    this.maxCombo = 0;
    this.totalMerges = 0;
    sessionNewAchievements.length = 0;
    world.bodies = [];
    world.mergeQueue = [];
    particles.length = 0;
    scorePopups.length = 0;
    applyDifficultyPhysics(this.difficulty);
    this.spawnNext();
  },

  spawnNext() {
    const maxDrop = DIFFICULTY[this.difficulty].maxDrop;
    this.nextLevel = Math.floor(Math.random() * maxDrop);
    if (this.currentTurtle === null) {
      this.currentTurtle = { level: this.nextLevel, x: layout.width / 2 };
      this.nextLevel = Math.floor(Math.random() * maxDrop);
    }
  },

  dropTurtle() {
    if (!this.canDrop || this.state !== 'playing') return;
    const t = this.currentTurtle;
    const dropY = layout.dropZone.y + layout.dropZone.h;
    world.addBody(t.x, dropY, t.level);
    this.discoveredLevels.add(t.level);
    playDropSound();
    this.canDrop = false;
    this.dropCooldownTimer = GAME.dropCooldown;
    this.currentTurtle = { level: this.nextLevel, x: layout.width / 2 };
    const maxDrop = DIFFICULTY[this.difficulty].maxDrop;
    this.nextLevel = Math.floor(Math.random() * maxDrop);
  },
};

function processMerges() {
  for (const { a, b } of world.mergeQueue) {
    const newLevel = a.level + 1;
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    world.removeBody(a);
    world.removeBody(b);
    const newBody = world.addBody(mx, my, newLevel);
    newBody.vx = ((a.vx + b.vx) / 2) * 0.5;
    newBody.vy = Math.min(((a.vy + b.vy) / 2) * 0.5, -50);
    newBody.mood = { type: 'happy', timer: 2.0, maxTimer: 2.0, intensity: 1 };
    const basePoints = TURTLES[newLevel].score;
    const comboMult = game.addCombo(mx, my);
    const points = basePoints * comboMult;
    game.score += points;
    // Track count of highest-level turtle
    const curMax = game.discoveredLevels.size > 0 ? Math.max(...game.discoveredLevels) : -1;
    if (newLevel > curMax) {
      game.maxLevelCount = 1;
    } else if (newLevel === curMax) {
      game.maxLevelCount++;
    }
    chainCount++;
    const particleCount = chainCount > 1 ? 16 : 10;
    spawnMergeParticles(mx, my, TURTLES[newLevel].color, particleCount);
    const fontSize = chainCount > 1 ? 24 + chainCount * 4 : 20;
    const scoreText = comboMult > 1 ? `+${basePoints}×${comboMult}` : `+${points}`;
    scorePopups.push({ x: mx, y: my, text: scoreText, life: 0.8, maxLife: 0.8, fontSize });
    if (navigator.vibrate) navigator.vibrate(chainCount > 1 ? 100 : 50);

    // Top 3 turtles: special effects + encouragement banner
    if (newLevel >= 6) {
      spawnCelebration(mx, my, newLevel);
      if (newLevel === TURTLES.length - 1) {
        playVictorySound();
        game.showVictoryBanner(`${TURTLES[newLevel].name}`, '👑 终极合成！无龟能敌！', 'gold', 6);
      } else if (newLevel === TURTLES.length - 2) {
        playTopTierSound(newLevel);
        game.showVictoryBanner(`${TURTLES[newLevel].name}`, '🔥 距离终极只差一步！', 'silver', 5);
      } else {
        playTopTierSound(newLevel);
        game.showVictoryBanner(`${TURTLES[newLevel].name}`, '💪 继续加油，向终极进发！', 'bronze', 4);
      }
    } else {
      if (typeof playMergeSound === 'function') playMergeSound(newLevel, chainCount);
    }
  }
  if (world.mergeQueue.length === 0) chainCount = 0;
  world.mergeQueue = [];
}

function spawnMergeParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = 80 + Math.random() * 120;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius: 3 + Math.random() * 3, color, life: 0.5, maxLife: 0.5 });
  }
}

function spawnCelebration(x, y, level) {
  const palettes = {
    6: ['#CD7F32', '#B87333', '#A0522D', '#8B4513'],  // bronze
    7: ['#C0C0C0', '#D3D3D3', '#A9A9A9', '#E8E8E8'],  // silver
    8: ['#FFD54F', '#FFD700', '#FFA000', '#FF8F00'],    // gold
  };
  const colors = palettes[level] || palettes[8];
  const count = level === 8 ? 50 : 30;
  const spread = level === 8 ? 150 : 80;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 100 + Math.random() * 200;
    particles.push({ x: x + (Math.random() - 0.5) * spread, y: y + (Math.random() - 0.5) * spread, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 100, radius: 4 + Math.random() * 4, color: colors[Math.floor(Math.random() * 4)], life: level === 8 ? 2.5 : 1.5, maxLife: level === 8 ? 2.5 : 1.5 });
  }
  if (navigator.vibrate) navigator.vibrate(level === 8 ? 300 : 150);
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt; p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const sp = scorePopups[i]; sp.y -= 40 * dt; sp.life -= dt;
    if (sp.life <= 0) scorePopups.splice(i, 1);
  }
}

function renderParticles(ctx) {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const sp of scorePopups) {
    ctx.globalAlpha = sp.life / sp.maxLife;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${sp.fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y);
  }
  ctx.globalAlpha = 1;
}

// === AUDIO ENGINE ===
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playDropSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function playMergeSound(level, chain) {
  if (!audioCtx) return;
  const baseFreq = 300 + level * 80;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine'; osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + 0.15);
  gain.gain.setValueAtTime(0.3, t);
  gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
  osc.start(t); osc.stop(t + 0.3);
  if (chain > 1) {
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'triangle'; osc2.connect(gain2); gain2.connect(audioCtx.destination);
    osc2.frequency.setValueAtTime(baseFreq * 1.25, t);
    osc2.frequency.exponentialRampToValueAtTime(baseFreq * 1.75, t + 0.2);
    gain2.gain.setValueAtTime(0.2, t);
    gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
    osc2.start(t); osc2.stop(t + 0.3);
  }
}

function playTopTierSound(level) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // Bronze: 2 notes, Silver: 3 notes
  const notes = level === 6 ? [392, 523] : [392, 523, 659];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle'; osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, t + i * 0.12);
    gain.gain.setValueAtTime(0.25, t + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.12 + 0.35);
    osc.start(t + i * 0.12); osc.stop(t + i * 0.12 + 0.35);
  });
}

function playVictorySound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // Grand fanfare: C-E-G-C ascending chord
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine'; osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, t + i * 0.15);
    gain.gain.setValueAtTime(0.3, t + i * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.01, t + i * 0.15 + 0.6);
    osc.start(t + i * 0.15); osc.stop(t + i * 0.15 + 0.6);
  });
  // Harmony
  setTimeout(() => {
    if (!audioCtx) return;
    const t2 = audioCtx.currentTime;
    [784, 988, 1175].forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle'; osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(freq, t2 + i * 0.1);
      gain.gain.setValueAtTime(0.15, t2 + i * 0.1);
      gain.gain.exponentialRampToValueAtTime(0.01, t2 + i * 0.1 + 0.5);
      osc.start(t2 + i * 0.1); osc.stop(t2 + i * 0.1 + 0.5);
    });
  }, 400);
}

function playGameOverSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth'; osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
  osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

// === INPUT HANDLER ===
let touching = false;

function getEventPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches && e.touches.length > 0 ? e.touches[0].clientX : e.clientX;
  const cy = e.touches && e.touches.length > 0 ? e.touches[0].clientY : e.clientY;
  return { x: cx - rect.left, y: cy - rect.top };
}
function getEventX(e) { return getEventPos(e).x; }
function getEventY(e) { return getEventPos(e).y; }

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  initAudio();
  touching = true;
  if (game.showEncyclopedia) {
    encyclopediaTouchY = e.touches[0].clientY;
  }
  const x = getEventX(e), y = getEventY(e);
  handleTap(x, y);
  handlePointerMove(x);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (game.showEncyclopedia && encyclopediaTouchY !== null) {
    const ty = e.touches[0].clientY;
    const delta = encyclopediaTouchY - ty;
    game.encyclopediaScroll += delta;
    encyclopediaTouchY = ty;
    return;
  }
  if (touching) handlePointerMove(getEventX(e));
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  encyclopediaTouchY = null;
  if (touching && game.state === 'playing' && !tapConsumed) game.dropTurtle();
  touching = false;
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  initAudio();
  touching = true;
  const pos = getEventPos(e);
  handleTap(pos.x, pos.y);
  handlePointerMove(pos.x);
});
canvas.addEventListener('mousemove', (e) => {
  if (touching) handlePointerMove(getEventPos(e).x);
});
canvas.addEventListener('mouseup', () => {
  if (touching && game.state === 'playing' && !tapConsumed) game.dropTurtle();
  touching = false;
});

function handlePointerMove(x) {
  if (game.state === 'playing' && game.currentTurtle) {
    const r = TURTLES[game.currentTurtle.level].radius;
    const left = layout.gameArea.x + GAME.wallThickness + r;
    const right = layout.gameArea.x + layout.gameArea.w - GAME.wallThickness - r;
    game.currentTurtle.x = Math.max(left, Math.min(right, x));
  }
}

let tapConsumed = false; // prevent drop when tapping UI buttons
let encyclopediaTouchY = null;

canvas.addEventListener('wheel', (e) => {
  if (game.showEncyclopedia) {
    e.preventDefault();
    game.encyclopediaScroll += e.deltaY;
  }
}, { passive: false });

// === KEYBOARD CONTROLS ===
const keysDown = new Set();
document.addEventListener('keydown', (e) => {
  initAudio();
  keysDown.add(e.key);

  // Space / Enter / ArrowDown — drop turtle
  if ((e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowDown') && game.state === 'playing' && !game.showEncyclopedia && !game.showLeaderboard) {
    e.preventDefault();
    game.dropTurtle();
  }

  // Escape — close overlays or return to menu
  if (e.key === 'Escape') {
    if (game.showEncyclopedia) { game.showEncyclopedia = false; game.encyclopediaScroll = 0; }
    else if (game.showLeaderboard) { game.showLeaderboard = false; }
    else if (game.state === 'gameover') { game.state = 'menu'; }
  }
});
document.addEventListener('keyup', (e) => { keysDown.delete(e.key); });

// Continuous keyboard movement in game loop
function processKeyboardInput() {
  if (game.state !== 'playing' || !game.currentTurtle) return;
  const speed = 6;
  const r = TURTLES[game.currentTurtle.level].radius;
  const left = layout.gameArea.x + GAME.wallThickness + r;
  const right = layout.gameArea.x + layout.gameArea.w - GAME.wallThickness - r;
  if (keysDown.has('ArrowLeft') || keysDown.has('a') || keysDown.has('A')) {
    game.currentTurtle.x = Math.max(left, game.currentTurtle.x - speed);
  }
  if (keysDown.has('ArrowRight') || keysDown.has('d') || keysDown.has('D')) {
    game.currentTurtle.x = Math.min(right, game.currentTurtle.x + speed);
  }
}

function handleTap(x, y) {
  tapConsumed = false;
  // Encyclopedia overlay
  if (game.showEncyclopedia) {
    tapConsumed = true;
    if (game.encyclopediaBackBtn && hitTest(x, y, game.encyclopediaBackBtn)) { game.showEncyclopedia = false; game.encyclopediaScroll = 0; return; }
    return;
  }
  // Leaderboard overlay — handle in any state
  if (game.showLeaderboard) {
    tapConsumed = true;
    if (hitTest(x, y, game.leaderboardBackBtn)) { game.showLeaderboard = false; return; }
    if (hitTest(x, y, game.leaderboardClearBtn)) {
      game.leaderboard = [];
      game.highScore = 0;
      localStorage.removeItem('turtle_merge_leaderboard');
      localStorage.removeItem('turtle_merge_high_score');
      return;
    }
    return;
  }
  // Top bar leaderboard button — available in any state
  if (game.topLeaderboardBtn && hitTest(x, y, game.topLeaderboardBtn)) {
    tapConsumed = true;
    game.showLeaderboard = true;
    return;
  }
  // Difficulty buttons — top bar or menu overlay
  if (game.state === 'menu') {
    const btns = [...(game.diffBtns || []), ...(game.menuDiffBtns || [])];
    for (const btn of btns) {
      if (hitTest(x, y, btn)) {
        game.difficulty = btn.diff;
        localStorage.setItem('turtle_merge_difficulty', btn.diff);
        tapConsumed = true;
        return;
      }
    }
  }
  // Start button — menu state
  if (game.state === 'menu' && game.encyclopediaBtn && hitTest(x, y, game.encyclopediaBtn)) {
    tapConsumed = true;
    game.showEncyclopedia = true;
    game.encyclopediaScroll = 0;
    return;
  }
  if (game.state === 'menu' && game.menuShareBtn && hitTest(x, y, game.menuShareBtn)) {
    tapConsumed = true;
    const text = '🐢 合成大乌龟｜一个爸爸为女儿做的小游戏\n女儿养的小乌龟去世了，她很伤心。于是爸爸做了这个游戏，让小乌龟们在游戏里永远活着，还能不断进化变强💚\n9种乌龟等你合成，来试试吧 → https://merge-turtle.netlify.app/';
    navigator.clipboard?.writeText(text).then(() => {
      showToast('✅ 已复制，快去粘贴分享吧！');
    });
    return;
  }
  if (game.state === 'menu' && game.startBtn && hitTest(x, y, game.startBtn)) {
    tapConsumed = true;
    game.reset();
    return;
  }
  if (game.state === 'gameover') {
    tapConsumed = true;
    if (hitTest(x, y, game.restartBtn)) { game.state = 'menu'; return; }
    if (hitTest(x, y, game.shareBtn)) { shareScore(); return; }
    if (hitTest(x, y, game.leaderboardBtn)) { game.showLeaderboard = true; return; }
    return;
  }
  // Taps on UI areas (above game area) should not trigger drops
  if (y < layout.dropZone.y) {
    tapConsumed = true;
  }
  // Style toggle buttons (bottom bar)
  if (game.styleBtns) {
    for (const btn of game.styleBtns) {
      if (hitTest(x, y, btn)) {
        turtleStyle = btn.style;
        localStorage.setItem('turtle_merge_style', btn.style);
        tapConsumed = true;
        break;
      }
    }
  }
}

function hitTest(x, y, rect) {
  return rect && x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
}

function shareScore() {
  const maxTurtle = Math.max(...game.discoveredLevels);
  const name = TURTLES[maxTurtle]?.name || '草龟';
  const diffNames = { easy: '简单', normal: '普通', hard: '困难' };
  const diff = diffNames[game.difficulty] || '普通';
  const comboText = game.maxCombo >= 2 ? `，最高${game.maxCombo}连击🔥` : '';
  const achCount = sessionNewAchievements.length;
  const achText = achCount > 0 ? `，解锁${achCount}个新成就🏅` : '';
  const text = `🐢 合成大乌龟｜${diff}模式\n我获得了 ${game.score.toLocaleString()} 分！最高合成到了${name}${comboText}${achText}\n一个爸爸为女儿做的暖心小游戏，来和小乌龟们玩吧💚\n→ https://merge-turtle.netlify.app/`;
  navigator.clipboard?.writeText(text).then(() => {
      showToast('✅ 已复制，快去粘贴分享吧！');
  });
}

function renderDropZone(ctx) {
  const dz = layout.dropZone;
  // Soft gradient transition into game area
  const dzGrad = ctx.createLinearGradient(0, dz.y, 0, dz.y + dz.h);
  dzGrad.addColorStop(0, '#0a1828');
  dzGrad.addColorStop(1, '#0a1628');
  ctx.fillStyle = dzGrad;
  ctx.fillRect(dz.x, dz.y, dz.w, dz.h);

  if (game.currentTurtle && game.canDrop) {
    const t = game.currentTurtle;
    const tColor = TURTLES[t.level].color;

    // Soft circular glow behind current turtle
    const glowGrad = ctx.createRadialGradient(t.x, dz.y + dz.h / 2, 0, t.x, dz.y + dz.h / 2, TURTLES[t.level].radius * 1.2);
    glowGrad.addColorStop(0, tColor + '20');
    glowGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(t.x - 50, dz.y, 100, dz.h);

    // Guide line
    ctx.setLineDash([4, 4]);
    ctx.strokeStyle = tColor + '30';
    ctx.beginPath(); ctx.moveTo(t.x, dz.y + dz.h); ctx.lineTo(t.x, layout.gameArea.y + layout.gameArea.h);
    ctx.stroke(); ctx.setLineDash([]);

    drawTurtle(ctx, t.x, dz.y + dz.h / 2, t.level, 0.8);
  }
}
