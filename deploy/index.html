function renderGameArea(ctx) {
  const ga = layout.gameArea;

  // Ocean gradient background
  const grad = ctx.createLinearGradient(0, ga.y, 0, ga.y + ga.h);
  grad.addColorStop(0, '#0a1628');   // deep dark blue (surface)
  grad.addColorStop(0.3, '#0d2137'); // mid ocean
  grad.addColorStop(0.7, '#0f2b4a'); // lighter deep
  grad.addColorStop(1, '#133a5e');   // ocean floor
  ctx.fillStyle = grad;
  ctx.fillRect(ga.x, ga.y, ga.w, ga.h);

  // Sandy ocean floor
  const floorH = 14;
  const floorGrad = ctx.createLinearGradient(0, ga.y + ga.h - floorH, 0, ga.y + ga.h);
  floorGrad.addColorStop(0, 'rgba(194, 178, 128, 0.1)');
  floorGrad.addColorStop(0.4, 'rgba(194, 178, 128, 0.25)');
  floorGrad.addColorStop(1, 'rgba(180, 160, 110, 0.35)');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(ga.x, ga.y + ga.h - floorH, ga.w, floorH);
  // Sand texture dots
  ctx.globalAlpha = 0.12;
  for (let i = 0; i < 30; i++) {
    const sx = ga.x + ((i * 137 + 53) % 100) / 100 * ga.w;
    const sy = ga.y + ga.h - Math.random() * floorH;
    ctx.fillStyle = '#c2b280';
    ctx.beginPath(); ctx.arc(sx, sy, 0.5 + Math.random(), 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Rocks
  ctx.globalAlpha = 0.6;
  for (const rock of rocks) {
    const rx = ga.x + ga.w * rock.xRatio;
    const ry = ga.y + ga.h - rock.h * 0.6;
    ctx.fillStyle = rock.color;
    ctx.beginPath();
    ctx.ellipse(rx, ry, rock.w / 2, rock.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.ellipse(rx - rock.w * 0.1, ry - rock.h * 0.15, rock.w * 0.25, rock.h * 0.2, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Corals
  const t = Date.now() / 1000;
  ctx.globalAlpha = 0.3;
  for (const c of corals) {
    const cx = ga.x + ga.w * c.xRatio;
    const cy = ga.y + ga.h - floorH * 0.5;
    ctx.fillStyle = c.color;
    if (c.type === 0) {
      // Round coral cluster
      for (let j = 0; j < 4; j++) {
        const angle = j * 0.8 - 0.8;
        const cr = c.w * 0.3 + Math.sin(t * 0.5 + j) * 1;
        ctx.beginPath();
        ctx.arc(cx + Math.sin(angle) * c.w * 0.25, cy - c.h * 0.3 - Math.cos(angle) * c.h * 0.3, cr, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (c.type === 1) {
      // Branching coral
      for (let j = 0; j < 3; j++) {
        const angle = -Math.PI / 2 + (j - 1) * 0.5;
        const len = c.h * (0.8 + j * 0.1);
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = c.color;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * len * 0.6, cy + Math.sin(angle) * len);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx + Math.cos(angle) * len * 0.6, cy + Math.sin(angle) * len, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // Fan coral
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.quadraticCurveTo(cx - c.w * 0.5, cy - c.h, cx, cy - c.h * 1.2);
      ctx.quadraticCurveTo(cx + c.w * 0.5, cy - c.h, cx, cy);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Seaweed (animated, drawn from bottom)
  const st = Date.now() / 1000;
  ctx.globalAlpha = 0.25;
  for (const sw of seaweeds) {
    const sx = ga.x + ga.w * sw.xRatio;
    const sy = ga.y + ga.h - floorH * 0.3;
    ctx.strokeStyle = sw.color;
    ctx.lineWidth = sw.width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    for (let h = 0; h < sw.height; h += 3) {
      const sway = Math.sin(st * 0.7 + h * 0.06 + sw.phase) * (5 + h * 0.06);
      ctx.lineTo(sx + sway, sy - h);
    }
    ctx.stroke();
    // Leaves
    if (sw.leaves) {
      for (let lh = sw.height * 0.3; lh < sw.height * 0.9; lh += sw.height * 0.25) {
        const lsway = Math.sin(st * 0.7 + lh * 0.06 + sw.phase) * (5 + lh * 0.06);
        const lx = sx + lsway, ly = sy - lh;
        const side = (Math.floor(lh) % 2 === 0) ? 1 : -1;
        ctx.fillStyle = sw.color;
        ctx.beginPath();
        ctx.ellipse(lx + side * 6, ly, 5, 2.5, side * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
  ctx.lineCap = 'butt';

  // Small fish (swimming background)
  ctx.globalAlpha = 0.2;
  for (const f of fishes) {
    f.x += f.speed * f.dir * PHYSICS.fixedDt;
    if (f.x > 1.1) { f.x = -0.1; f.dir = 1; }
    if (f.x < -0.1) { f.x = 1.1; f.dir = -1; }
    const fx = ga.x + f.x * ga.w;
    const fy = ga.y + f.y * ga.h + Math.sin(st * 2 + f.wobble) * 4;
    const s = f.size;
    ctx.fillStyle = f.color;
    // Body
    ctx.beginPath();
    ctx.ellipse(fx, fy, s, s * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tail
    ctx.beginPath();
    ctx.moveTo(fx - f.dir * s, fy);
    ctx.lineTo(fx - f.dir * s * 1.8, fy - s * 0.5);
    ctx.lineTo(fx - f.dir * s * 1.8, fy + s * 0.5);
    ctx.closePath();
    ctx.fill();
    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(fx + f.dir * s * 0.4, fy - s * 0.1, s * 0.18, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Animated bubbles
  ctx.globalAlpha = 0.15;
  const time = Date.now() / 1000;
  for (const b of bubbles) {
    b.y -= b.speed * PHYSICS.fixedDt / ga.h;
    if (b.y < -0.05) { b.y = 1.05; b.x = Math.random(); }
    const bx = ga.x + b.x * ga.w + Math.sin(time * b.wobbleSpeed + b.wobble) * 8;
    const by = ga.y + b.y * ga.h;
    ctx.strokeStyle = '#7ec8e3';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(bx, by, b.r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Light rays from top
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < 3; i++) {
    const rx = ga.x + ga.w * (0.2 + i * 0.3);
    const rw = 30 + i * 15;
    const rayGrad = ctx.createLinearGradient(0, ga.y, 0, ga.y + ga.h * 0.7);
    rayGrad.addColorStop(0, '#7ec8e3');
    rayGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = rayGrad;
    ctx.beginPath();
    ctx.moveTo(rx - rw / 2, ga.y);
    ctx.lineTo(rx + rw / 2, ga.y);
    ctx.lineTo(rx + rw, ga.y + ga.h * 0.7);
    ctx.lineTo(rx - rw, ga.y + ga.h * 0.7);
    ctx.closePath();
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Glass tank walls
  const wallW = GAME.wallThickness + 1;
  // Left wall
  const lwGrad = ctx.createLinearGradient(ga.x, 0, ga.x + wallW + 4, 0);
  lwGrad.addColorStop(0, 'rgba(120, 180, 220, 0.25)');
  lwGrad.addColorStop(0.5, 'rgba(120, 180, 220, 0.08)');
  lwGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = lwGrad;
  ctx.fillRect(ga.x, ga.y, wallW + 4, ga.h);
  // Right wall
  const rwGrad = ctx.createLinearGradient(ga.x + ga.w - wallW - 4, 0, ga.x + ga.w, 0);
  rwGrad.addColorStop(0, 'transparent');
  rwGrad.addColorStop(0.5, 'rgba(120, 180, 220, 0.08)');
  rwGrad.addColorStop(1, 'rgba(120, 180, 220, 0.25)');
  ctx.fillStyle = rwGrad;
  ctx.fillRect(ga.x + ga.w - wallW - 4, ga.y, wallW + 4, ga.h);
  // Thin glass edge lines
  ctx.fillStyle = 'rgba(150, 200, 230, 0.15)';
  ctx.fillRect(ga.x, ga.y, 1, ga.h);
  ctx.fillRect(ga.x + ga.w - 1, ga.y, 1, ga.h);

  // Game over line — 3 states: normal / warning (approaching) / danger (crossed)
  const inDanger = game.gameOverTimer > 0;
  // Find closest STACKED turtle to the line (skip recently dropped ones)
  let minDist = 999;
  for (const body of world.bodies) {
    if (body.age < 0.8) continue; // skip freshly dropped turtles
    const topY = body.y - body.radius;
    const dist = topY - layout.gameOverLineY;
    if (dist < minDist) minDist = dist;
  }
  const warningZone = 250; // px threshold for warning
  const isWarning = !inDanger && minDist < warningZone && minDist >= 0;
  const isCritical = !inDanger && minDist < 0; // crossed but not yet game over (within 2s grace)
  const warningIntensity = isWarning ? 1 - (minDist / warningZone) : 0; // 0→1 as closer
  const pulse = inDanger ? 0.5 + Math.sin(Date.now() / 120) * 0.3 : (isWarning ? warningIntensity * 0.3 + Math.sin(Date.now() / 300) * 0.1 : 0);

  // Danger zone gradient band — scales with intensity
  const baseAlpha = isCritical ? 0.2 + pulse * 0.35 : (isWarning ? 0.03 + warningIntensity * warningIntensity * 0.25 : 0.02);
  const dangerGrad = ctx.createLinearGradient(0, layout.gameOverLineY - 20, 0, layout.gameOverLineY + 8);
  dangerGrad.addColorStop(0, 'transparent');
  dangerGrad.addColorStop(0.4, `rgba(255,50,50,${baseAlpha})`);
  dangerGrad.addColorStop(0.7, `rgba(255,50,50,${baseAlpha * 0.8})`);
  dangerGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = dangerGrad;
  ctx.fillRect(ga.x, layout.gameOverLineY - 20, ga.w, 28);

  // Main line — intensity scales with proximity, strongest just before crossing
  if (isCritical) {
    ctx.setLineDash([]);
    ctx.strokeStyle = `rgba(255,40,40,${0.8 + pulse * 0.2})`;
    ctx.lineWidth = 3;
  } else if (isWarning && warningIntensity > 0.7) {
    // Very close — strong flashing alert
    const urgentPulse = 0.5 + Math.sin(Date.now() / 100) * 0.3;
    ctx.setLineDash([]);
    ctx.strokeStyle = `rgba(255,50,40,${0.5 + urgentPulse * 0.4})`;
    ctx.lineWidth = 2.5;
  } else if (isWarning && warningIntensity > 0.4) {
    // Getting close — moderate warning
    ctx.setLineDash([4, 3]);
    ctx.strokeStyle = `rgba(255,70,50,${0.3 + warningIntensity * 0.35})`;
    ctx.lineWidth = 2;
  } else if (isWarning) {
    // Approaching — gentle hint
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = `rgba(255,80,60,${0.2 + warningIntensity * 0.2})`;
    ctx.lineWidth = 1.5;
  } else {
    ctx.setLineDash([8, 6]);
    ctx.strokeStyle = 'rgba(255,80,80,0.2)';
    ctx.lineWidth = 1;
  }
  ctx.beginPath(); ctx.moveTo(ga.x, layout.gameOverLineY); ctx.lineTo(ga.x + ga.w, layout.gameOverLineY);
  ctx.stroke(); ctx.setLineDash([]);
  ctx.lineWidth = 1;

  // Warning icons + label
  const lineAlpha = isCritical ? 0.8 + pulse * 0.2 : (isWarning ? 0.15 + warningIntensity * 0.2 : 0.15);
  ctx.fillStyle = `rgba(255,70,70,${lineAlpha})`;

  if (isCritical) {
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';  ctx.fillText('⚠', ga.x + 6, layout.gameOverLineY - 5);
    ctx.textAlign = 'right'; ctx.fillText('⚠', ga.x + ga.w - 6, layout.gameOverLineY - 5);
    ctx.textAlign = 'center'; ctx.font = 'bold 10px sans-serif';
    ctx.fillText('⚠ DANGER ⚠', ga.x + ga.w / 2, layout.gameOverLineY - 5);
  } else if (isWarning && warningIntensity > 0.7) {
    // Very close — urgent
    const urgA = 0.5 + Math.sin(Date.now() / 100) * 0.2;
    ctx.fillStyle = `rgba(255,50,50,${urgA})`;
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'left';  ctx.fillText('⚠', ga.x + 6, layout.gameOverLineY - 5);
    ctx.textAlign = 'right'; ctx.fillText('⚠', ga.x + ga.w - 6, layout.gameOverLineY - 5);
    ctx.textAlign = 'center';
    ctx.fillText('⚠ 危险！⚠', ga.x + ga.w / 2, layout.gameOverLineY - 5);
  } else if (isWarning && warningIntensity > 0.4) {
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚠ 注意！', ga.x + ga.w / 2, layout.gameOverLineY - 4);
  } else if (isWarning) {
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('注意', ga.x + ga.w / 2, layout.gameOverLineY - 4);
  } else {
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,80,80,0.1)';
    ctx.fillText('— — —', ga.x + ga.w / 2, layout.gameOverLineY - 4);
  }

  // Bodies
  for (const body of world.bodies) {
    drawTurtle(ctx, body.x, body.y, body.level, 1, body);
    game.discoveredLevels.add(body.level);
  }
  renderParticles(ctx);
}

function renderBottomBar(ctx) {
  const bb = layout.bottomBar;
  ctx.fillStyle = '#081320'; ctx.fillRect(bb.x, bb.y, bb.w, bb.h);

  const midY = bb.y + bb.h / 2;

  // Left: style toggle buttons (3 stacked vertically)
  const btnW = 36, btnH = 14, btnGap = 2;
  const btnX = 6;
  const totalBtnH = 3 * btnH + 2 * btnGap;
  const btnStartY = midY - totalBtnH / 2;
  const styles = ['classic', 'cartoon', 'crypto'];
  const labels = ['经典', '搞怪', '币圈'];

  game.styleBtns = [];
  styles.forEach((st, i) => {
    const by = btnStartY + i * (btnH + btnGap);
    const active = turtleStyle === st;
    ctx.fillStyle = active ? (st === 'crypto' ? '#3a3a1a' : '#2a5a3a') : '#1a2a3e';
    ctx.beginPath(); ctx.roundRect(btnX, by, btnW, btnH, 5); ctx.fill();
    if (active) { ctx.strokeStyle = st === 'crypto' ? '#F7931A' : '#4CAF50'; ctx.lineWidth = 1; ctx.stroke(); }
    ctx.fillStyle = active ? (st === 'crypto' ? '#F7931A' : '#8BC34A') : '#556';
    ctx.font = `${active ? 'bold ' : ''}9px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(labels[i], btnX + btnW / 2, by + 10.5);
    game.styleBtns.push({ x: btnX, y: by, w: btnW, h: btnH, style: st });
  });
  game.styleClassicBtn = game.styleBtns[0];
  game.styleCartoonBtn = game.styleBtns[1];
  game.styleCryptoBtn = game.styleBtns[2];

  // Right: turtle gallery (clip to bar bounds)
  ctx.save();
  ctx.beginPath();
  ctx.rect(bb.x, bb.y, bb.w, bb.h);
  ctx.clip();

  const galleryLeft = btnX + btnW + 8;
  const galleryW = bb.w - galleryLeft - 4;
  const iconScale = 0.22;
  const gap = 5;
  const widths = TURTLES.map(t => t.radius * iconScale * 2 + gap);
  const totalW = widths.reduce((sum, w) => sum + w, 0);
  // Scale down if doesn't fit
  const fitScale = totalW > galleryW ? galleryW / totalW : 1;
  let cx = galleryLeft + (galleryW - totalW * fitScale) / 2;
  TURTLES.forEach((t, i) => {
    const w = widths[i] * fitScale;
    ctx.globalAlpha = game.discoveredLevels.has(i) ? 1 : 0.25;
    drawTurtle(ctx, cx + w / 2, midY, i, iconScale * fitScale);
    cx += w;
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

// === COMBO DISPLAY ===
function renderComboDisplay(ctx) {
  if (!game.comboDisplay) return;
  const cd = game.comboDisplay;
  const alpha = Math.min(1, cd.timer / 0.3);
  const scale = 1 + (1 - cd.timer / cd.maxTimer) * 0.3;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(cd.x, cd.y);
  ctx.scale(scale, scale);

  // Glow
  const colors = ['', '', '#FFD54F', '#FFA726', '#FF7043', '#E53935', '#D500F9', '#651FFF', '#2196F3'];
  const color = colors[Math.min(cd.multiplier, 8)] || '#FFD54F';

  ctx.fillStyle = color;
  ctx.font = `bold ${18 + cd.multiplier * 2}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.strokeText(cd.text, 0, 0);
  ctx.fillText(cd.text, 0, 0);

  ctx.restore();
}

const unlockedAchievements = new Set(JSON.parse(localStorage.getItem('turtle_merge_achievements') || '[]'));
const sessionNewAchievements = []; // new achievements unlocked this game
let achievementPopup = null; // { achievement, timer }

function checkAchievements() {
  if (game.state !== 'playing') return;
  for (const a of ACHIEVEMENTS) {
    if (unlockedAchievements.has(a.id)) continue;
    if (a.check()) {
      unlockedAchievements.add(a.id);
      sessionNewAchievements.push(a);
      localStorage.setItem('turtle_merge_achievements', JSON.stringify([...unlockedAchievements]));
      achievementPopup = { achievement: a, timer: 2.5 };
    }
  }
}

function renderAchievementPopup(ctx, dt) {
  if (!achievementPopup) return;
  achievementPopup.timer -= dt;
  if (achievementPopup.timer <= 0) { achievementPopup = null; return; }

  const a = achievementPopup.achievement;
  const alpha = Math.min(1, achievementPopup.timer / 0.4, (2.5 - (2.5 - achievementPopup.timer)) > 2 ? 1 : achievementPopup.timer / 0.4);
  const slideY = Math.max(0, (2.5 - achievementPopup.timer) < 0.3 ? (0.3 - (2.5 - achievementPopup.timer)) * 100 : 0);

  const pw = 220, ph = 50;
  const px = (layout.width - pw) / 2;
  const py = layout.gameArea.y + 20 - slideY;

  ctx.save();
  ctx.globalAlpha = alpha;
  // Background
  ctx.fillStyle = '#0d2a4a';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 12); ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Icon
  ctx.font = '22px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(a.icon, px + 10, py + 33);

  // Title
  ctx.fillStyle = '#FFD54F';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillText(a.name, px + 40, py + 20);

  // Desc
  ctx.fillStyle = '#8ab0c4';
  ctx.font = '10px sans-serif';
  ctx.fillText(a.desc, px + 40, py + 36);

  // "成就解锁!" label
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 8px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('成就解锁!', px + pw - 10, py + 15);

  ctx.restore();
}

function renderGameOverPanel(ctx) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, layout.width, layout.height);

  if (game.showLeaderboard) {
    renderLeaderboardPanel(ctx);
    return;
  }

  const hasNewAch = sessionNewAchievements.length > 0;
  const pw = 280, ph = hasNewAch ? 300 : 240;
  const px = (layout.width - pw) / 2, py = (layout.height - ph) / 2;
  ctx.fillStyle = '#0d1f33'; ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.fill();
  ctx.strokeStyle = '#1a4a6a'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#c8dce8'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  if (turtleMascot.complete) ctx.drawImage(turtleMascot, px + pw / 2 - 20, py - 35, 40, 40);
  ctx.fillText('游戏结束', px + pw / 2, py + 38);
  ctx.fillStyle = '#FFD54F'; ctx.font = 'bold 36px sans-serif';
  ctx.fillText(game.score.toLocaleString(), px + pw / 2, py + 82);
  ctx.fillStyle = '#5a7a8a'; ctx.font = '13px sans-serif';
  ctx.fillText(`最高分: ${game.highScore.toLocaleString()}`, px + pw / 2, py + 105);

  // Stats line: rank + max combo
  const rank = game.leaderboard.findIndex(e => e.score === game.score) + 1;
  ctx.fillStyle = '#5a7a8a'; ctx.font = '11px sans-serif';
  let statsText = '';
  if (rank > 0 && rank <= 20) statsText += `🏆 第${rank}名  `;
  if (game.maxCombo >= 2) statsText += `🔥 最高${game.maxCombo}连击  `;
  statsText += `🔄 ${game.totalMerges}次合成`;
  ctx.fillText(statsText, px + pw / 2, py + 120);

  // New achievements this session
  let achOffset = 0;
  if (hasNewAch) {
    ctx.fillStyle = '#FFD700'; ctx.font = 'bold 10px sans-serif';
    ctx.fillText('✨ 新成就解锁 ✨', px + pw / 2, py + 138);
    const achPerRow = 4;
    const achSize = 28;
    const achStartX = px + (pw - Math.min(sessionNewAchievements.length, achPerRow) * achSize) / 2;
    sessionNewAchievements.slice(0, 8).forEach((a, i) => {
      const ax = achStartX + (i % achPerRow) * achSize;
      const ay = py + 145 + Math.floor(i / achPerRow) * achSize;
      ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(a.icon, ax + achSize / 2, ay + 20);
    });
    achOffset = 55;
  }

  // Buttons row 1: restart + share
  const btnY1 = py + 140 + achOffset;
  ctx.fillStyle = '#1a6b3a'; ctx.beginPath(); ctx.roundRect(px + 15, btnY1, 118, 36, 10); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif';
  ctx.fillText('再来一局', px + 74, btnY1 + 23);
  ctx.fillStyle = '#1565C0'; ctx.beginPath(); ctx.roundRect(px + 147, btnY1, 118, 36, 10); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.fillText('分享', px + 206, btnY1 + 23);

  // Button row 2: leaderboard
  const btnY2 = btnY1 + 48;
  ctx.fillStyle = '#4a3a1a'; ctx.beginPath(); ctx.roundRect(px + 15, btnY2, pw - 30, 36, 10); ctx.fill();
  ctx.fillStyle = '#FFD54F'; ctx.font = 'bold 14px sans-serif';
  ctx.fillText('🏆 排行榜', px + pw / 2, btnY2 + 23);

  game.restartBtn = { x: px + 15, y: btnY1, w: 118, h: 36 };
  game.shareBtn = { x: px + 147, y: btnY1, w: 118, h: 36 };
  game.leaderboardBtn = { x: px + 15, y: btnY2, w: pw - 30, h: 36 };
}

function turtleNameToLevel(name) {
  const idx = TURTLES.findIndex(t => t.name === name);
  return idx >= 0 ? idx : 0;
}

const DIFF_COLORS = { '简单': '#8BC34A', '普通': '#FFD54F', '困难': '#FF5252' };

function renderLeaderboardPanel(ctx) {
  const pw = Math.min(layout.width - 20, 360), ph = Math.min(layout.height * 0.82, 520);
  const px = (layout.width - pw) / 2, py = (layout.height - ph) / 2;
  ctx.fillStyle = '#0d1f33'; ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.fill();
  ctx.strokeStyle = '#1a4a6a'; ctx.lineWidth = 2; ctx.stroke();

  // Title
  ctx.fillStyle = '#FFD54F'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('🏆 排行榜', px + pw / 2, py + 32);

  // Column positions (relative to px)
  const col = { rank: 14, score: 42, turtle: 108, count: 148, diff: 200, date: pw - 14 };

  // Header
  ctx.fillStyle = '#5a7a8a'; ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('#', px + col.rank, py + 56);
  ctx.fillText('分数', px + col.score, py + 56);
  ctx.fillText('最高', px + col.turtle, py + 56);
  ctx.fillText('数量', px + col.count, py + 56);
  ctx.fillText('难度', px + col.diff, py + 56);
  ctx.textAlign = 'right'; ctx.fillText('日期', px + col.date, py + 56);

  // Divider
  ctx.strokeStyle = '#1a3a5a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px + 10, py + 62); ctx.lineTo(px + pw - 10, py + 62); ctx.stroke();

  // Entries
  const lb = game.leaderboard;
  const rowH = 26;
  const maxVisible = Math.min(lb.length, Math.floor((ph - 115) / rowH));
  const medals = ['🥇', '🥈', '🥉'];

  for (let i = 0; i < maxVisible; i++) {
    const e = lb[i];
    const ry = py + 82 + i * rowH;
    // Highlight current score
    if (e.score === game.score && i === lb.findIndex(x => x.score === game.score)) {
      ctx.fillStyle = 'rgba(255,213,79,0.08)';
      ctx.fillRect(px + 6, ry - 14, pw - 12, rowH);
    }
    // Rank
    ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillStyle = i < 3 ? '#FFD54F' : '#8ab0c4';
    ctx.fillText(i < 3 ? medals[i] : `${i + 1}`, px + col.rank, ry);
    // Score
    ctx.fillStyle = '#c8dce8'; ctx.font = 'bold 12px sans-serif';
    ctx.fillText(e.score.toLocaleString(), px + col.score, ry);
    // Max turtle — draw tiny turtle icon
    const tLvl = turtleNameToLevel(e.maxTurtle);
    drawTurtle(ctx, px + col.turtle + 8, ry - 3, tLvl, 0.14);
    // Max count
    ctx.fillStyle = '#8ab0c4'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(e.maxCount != null ? `${e.maxCount}只` : '-', px + col.count, ry);
    // Difficulty — colored text
    const dc = DIFF_COLORS[e.difficulty] || '#8ab0c4';
    ctx.fillStyle = dc; ctx.font = 'bold 11px sans-serif';
    ctx.fillText(e.difficulty, px + col.diff, ry);
    // Date
    ctx.fillStyle = '#5a7a8a'; ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(e.date, px + col.date, ry);
  }

  if (lb.length === 0) {
    ctx.fillStyle = '#5a7a8a'; ctx.font = '14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('还没有记录，快去玩一局吧！', px + pw / 2, py + ph / 2);
  }

  // Bottom buttons: clear + back
  const btnY = py + ph - 48;
  const btnGap = 10;
  const btnW = (pw - 30 - btnGap) / 2;
  // Clear button
  ctx.fillStyle = '#3a1a1a'; ctx.beginPath(); ctx.roundRect(px + 15, btnY, btnW, 36, 10); ctx.fill();
  ctx.fillStyle = '#FF5252'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('清除记录', px + 15 + btnW / 2, btnY + 23);
  game.leaderboardClearBtn = { x: px + 15, y: btnY, w: btnW, h: 36 };
  // Back button
  ctx.fillStyle = '#1a3a5a'; ctx.beginPath(); ctx.roundRect(px + 15 + btnW + btnGap, btnY, btnW, 36, 10); ctx.fill();
  ctx.fillStyle = '#c8dce8'; ctx.font = 'bold 13px sans-serif';
  ctx.fillText('返回', px + 15 + btnW + btnGap + btnW / 2, btnY + 23);
  game.leaderboardBackBtn = { x: px + 15 + btnW + btnGap, y: btnY, w: btnW, h: 36 };
}

function renderEncyclopediaPanel(ctx) {
  const pw = Math.min(layout.width - 10, 380), ph = Math.min(layout.height - 10, 640);
  const px = (layout.width - pw) / 2, py = (layout.height - ph) / 2;

  // Background panel
  ctx.fillStyle = '#0a1a2e'; ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 16); ctx.fill();
  ctx.strokeStyle = '#1a4a6a'; ctx.lineWidth = 2; ctx.stroke();

  // Title
  ctx.fillStyle = '#42A5F5'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('📖 乌龟图鉴', px + pw / 2, py + 30);
  ctx.fillStyle = '#5a8a9a'; ctx.font = '11px sans-serif';
  ctx.fillText('认识游戏中的9种真实乌龟', px + pw / 2, py + 48);

  // Content area with clipping
  const contentY = py + 58;
  const contentH = ph - 110;
  const cardH = 155;
  const cardGap = 10;
  const totalContentH = TURTLE_FACTS.length * (cardH + cardGap) - cardGap + 10;
  const maxScroll = Math.max(0, totalContentH - contentH);
  game.encyclopediaScroll = Math.max(0, Math.min(game.encyclopediaScroll, maxScroll));
  game.encyclopediaMaxScroll = maxScroll;

  ctx.save();
  ctx.beginPath();
  ctx.rect(px, contentY, pw, contentH);
  ctx.clip();

  const scrollY = game.encyclopediaScroll;

  for (let i = 0; i < TURTLE_FACTS.length; i++) {
    const t = TURTLE_FACTS[i];
    const cardTop = contentY + i * (cardH + cardGap) - scrollY + 4;

    // Skip cards outside visible area
    if (cardTop + cardH < contentY - 10 || cardTop > contentY + contentH + 10) continue;

    // Card background
    const cardColor = TURTLES[i].color;
    ctx.fillStyle = cardColor + '12';
    ctx.beginPath(); ctx.roundRect(px + 8, cardTop, pw - 16, cardH, 10); ctx.fill();
    ctx.strokeStyle = cardColor + '30'; ctx.lineWidth = 1; ctx.stroke();

    // Header row: badge + turtle icon + name, vertically centered
    const headerCY = cardTop + 22; // vertical center of header row

    // Level badge — fixed position
    ctx.fillStyle = cardColor + '30';
    ctx.beginPath(); ctx.roundRect(px + 14, headerCY - 9, 20, 18, 4); ctx.fill();
    ctx.fillStyle = cardColor; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${i}`, px + 24, headerCY + 4);

    // Turtle drawing — fixed 36x36 box, centered at px+52
    const maxVisualR = 16;
    const turtleScale = Math.min(0.45, maxVisualR / TURTLES[i].radius);
    drawTurtle(ctx, px + 52, headerCY, i, turtleScale);

    // Name + scientific name — fixed left edge
    const nameX = px + 74;
    ctx.textAlign = 'left';
    ctx.fillStyle = cardColor; ctx.font = 'bold 14px sans-serif';
    ctx.fillText(t.name, nameX, headerCY - 1);
    ctx.fillStyle = '#6a8a9a'; ctx.font = 'italic 9px sans-serif';
    ctx.fillText(t.sciName, nameX, headerCY + 12);

    // Rarity stars
    ctx.fillStyle = '#FFD54F'; ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(t.rarity, px + pw - 16, cardTop + 20);

    // Info lines
    ctx.textAlign = 'left';
    const infoY = cardTop + 50;
    const lineH = 13;
    ctx.font = '10px sans-serif';

    const infos = [
      ['别名', t.aka],
      ['栖息地', t.habitat],
      ['体型', t.size],
      ['寿命', t.lifespan],
      ['食性', t.diet],
    ];

    infos.forEach((info, j) => {
      ctx.fillStyle = '#5a8a9a'; ctx.font = 'bold 10px sans-serif';
      ctx.fillText(info[0] + '：', px + 16, infoY + j * lineH);
      ctx.fillStyle = '#8ab0c4'; ctx.font = '10px sans-serif';
      ctx.fillText(info[1], px + 50, infoY + j * lineH);
    });

    // Fun fact with word wrap
    ctx.fillStyle = '#5a8a9a'; ctx.font = 'bold 10px sans-serif';
    ctx.fillText('趣知识：', px + 16, infoY + 5 * lineH + 3);
    ctx.fillStyle = '#9ac0d0'; ctx.font = '10px sans-serif';
    const factMaxW = pw - 40;
    const factText = t.fact;
    let line = '', factY = infoY + 5 * lineH + 3;
    const maxFactLines = 3;
    let factLineCount = 0;
    for (let c = 0; c < factText.length; c++) {
      const testLine = line + factText[c];
      if (ctx.measureText(testLine).width > factMaxW) {
        factLineCount++;
        if (factLineCount >= maxFactLines) {
          ctx.fillText(line + '…', px + 16, factY);
          line = '';
          break;
        }
        ctx.fillText(line, px + 16, factY);
        factY += lineH;
        line = factText[c];
      } else {
        line = testLine;
      }
    }
    if (line) {
      ctx.fillText(line, px + 16, factY);
    }
  }

  ctx.restore();

  // Scroll indicator
  if (maxScroll > 0) {
    const trackH = contentH - 20;
    const thumbH = Math.max(30, trackH * (contentH / totalContentH));
    const thumbY = contentY + 10 + (trackH - thumbH) * (scrollY / maxScroll);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.roundRect(px + pw - 6, contentY + 10, 3, trackH, 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.roundRect(px + pw - 6, thumbY, 3, thumbH, 2); ctx.fill();
  }

  // Scroll hint
  if (maxScroll > 0 && scrollY < 5) {
    ctx.fillStyle = '#3a6a7a'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('↕ 上下滑动查看更多', px + pw / 2, py + ph - 58);
  }

  // Back button
  const btnW = 140, btnH = 38;
  const btnX = px + (pw - btnW) / 2, btnY = py + ph - 48;
  ctx.fillStyle = '#1a3a5a'; ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 10); ctx.fill();
  ctx.fillStyle = '#c8dce8'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('返回', px + pw / 2, btnY + 25);
  game.encyclopediaBackBtn = { x: btnX, y: btnY, w: btnW, h: btnH };
  game.encyclopediaArea = { x: px, y: contentY, w: pw, h: contentH };
}

// === TOAST NOTIFICATION ===
let toast = null; // { text, timer, maxTimer }

function showToast(text) {
  toast = { text, timer: 2.5, maxTimer: 2.5 };
  if (navigator.vibrate) navigator.vibrate(30);
}

function renderToast(ctx, dt) {
  if (!toast) return;
  toast.timer -= dt;
  if (toast.timer <= 0) { toast = null; return; }

  const fadeIn = Math.min(1, (toast.maxTimer - toast.timer) / 0.2);
  const fadeOut = Math.min(1, toast.timer / 0.3);
  const alpha = Math.min(fadeIn, fadeOut);
  const slideY = (1 - fadeIn) * 15;

  const cx = layout.width / 2;
  const cy = layout.height * 0.45 + slideY;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Background pill
  const tw = ctx.measureText(toast.text).width || 180;
  const pw = Math.max(tw + 40, 200), ph = 44;
  const px = cx - pw / 2, py = cy - ph / 2;

  ctx.fillStyle = 'rgba(30, 60, 40, 0.92)';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 22); ctx.fill();
  ctx.strokeStyle = '#4CAF50'; ctx.lineWidth = 1.5;
  ctx.stroke();

  // Text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(toast.text, cx, cy + 5);

  ctx.restore();
}

// === GAME LOOP ===
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (game.state === 'playing' && !game.showLeaderboard) {
    if (!game.canDrop) {
      game.dropCooldownTimer -= dt;
      if (game.dropCooldownTimer <= 0) game.canDrop = true;
    }
    physicsStep(dt);
    for (const body of world.bodies) body.age += dt;
    let anyAbove = false;
    for (const body of world.bodies) {
      if (body.age > 1.0 && body.y - body.radius < layout.gameOverLineY) { anyAbove = true; break; }
    }
    if (anyAbove) {
      game.gameOverTimer += dt;
      if (game.gameOverTimer >= GAME.gameOverDelay) {
        game.state = 'gameover';
        if (game.score > game.highScore) {
          game.highScore = game.score;
          localStorage.setItem('turtle_merge_high_score', game.highScore.toString());
        }
        // Save to leaderboard (top 20)
        const maxLvl = game.discoveredLevels.size > 0 ? Math.max(...game.discoveredLevels) : 0;
        game.leaderboard.push({ score: game.score, maxTurtle: TURTLES[maxLvl]?.name || '草龟', maxCount: game.maxLevelCount, difficulty: DIFFICULTY[game.difficulty]?.name || '普通', date: new Date().toLocaleDateString('zh-CN') });
        game.leaderboard.sort((a, b) => b.score - a.score);
        game.leaderboard = game.leaderboard.slice(0, 20);
        localStorage.setItem('turtle_merge_leaderboard', JSON.stringify(game.leaderboard));
        game.showLeaderboard = false;
        playGameOverSound();
        if (navigator.vibrate) navigator.vibrate(200);
      }
    } else {
      game.gameOverTimer = 0;
    }
  }

  // Update moods (cartoon expressions)
  if (turtleStyle === 'cartoon') updateMoods(dt);

  // Combo timer
  if (game.comboTimer > 0) {
    game.comboTimer -= dt;
    if (game.comboTimer <= 0) { game.combo = 0; game.comboTimer = 0; }
  }
  if (game.comboDisplay) {
    game.comboDisplay.timer -= dt;
    game.comboDisplay.y -= 20 * dt;
    if (game.comboDisplay.timer <= 0) game.comboDisplay = null;
  }

  updateParticles(dt);
  processKeyboardInput();

  ctx.clearRect(0, 0, layout.width, layout.height);
  renderHUD(ctx);
  renderPreview(ctx);
  renderDropZone(ctx);
  renderGameArea(ctx);
  renderComboDisplay(ctx);
  renderBottomBar(ctx);

  if (game.state === 'menu') renderMenuOverlay(ctx);
  if (game.state === 'gameover') renderGameOverPanel(ctx);
  // Achievements
  checkAchievements();
  renderAchievementPopup(ctx, dt);
  renderToast(ctx, dt);
  if (game.showLeaderboard && game.state !== 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, layout.width, layout.height);
    renderLeaderboardPanel(ctx);
  }

  if (game.showEncyclopedia) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, layout.width, layout.height);
    renderEncyclopediaPanel(ctx);
  }

  // Victory banner (shows temporarily, game continues)
  if (game.victoryBanner) {
    game.victoryBanner.timer -= dt;
    if (game.victoryBanner.timer <= 0) {
      game.victoryBanner = null;
    } else {
      renderVictoryBanner(ctx, game.victoryBanner);
    }
  }

  requestAnimationFrame(gameLoop);
}

const BANNER_THEMES = {
  gold:   { bg: '#2a1a00', border: '#FFD700', glow: 'rgba(255,215,0,0.3)',   title: '#FFD700', sub: '#ffe082', borderW: 3 },
  silver: { bg: '#1a1a2a', border: '#C0C0C0', glow: 'rgba(192,192,192,0.2)', title: '#E0E0E0', sub: '#a0b0c0', borderW: 2.5 },
  bronze: { bg: '#1a1510', border: '#CD7F32', glow: 'rgba(205,127,50,0.2)',  title: '#CD7F32', sub: '#a08060', borderW: 2 },
};

function renderVictoryBanner(ctx, banner) {
  const alpha = Math.min(1, banner.timer / 0.5);
  const y = layout.height * 0.3;
  const theme = BANNER_THEMES[banner.tier] || BANNER_THEMES.bronze;
  ctx.save();

  // Outer glow
  ctx.globalAlpha = alpha * 0.4;
  const bw = 290, bh = 76;
  const bx = (layout.width - bw) / 2;
  const glowSize = 8;
  ctx.shadowColor = theme.glow;
  ctx.shadowBlur = glowSize;
  ctx.fillStyle = theme.glow;
  ctx.beginPath(); ctx.roundRect(bx - glowSize / 2, y - bh / 2 - glowSize / 2, bw + glowSize, bh + glowSize, 20); ctx.fill();
  ctx.shadowBlur = 0;

  // Background
  ctx.globalAlpha = alpha * 0.9;
  ctx.fillStyle = theme.bg;
  ctx.beginPath(); ctx.roundRect(bx, y - bh / 2, bw, bh, 16); ctx.fill();
  ctx.strokeStyle = theme.border;
  ctx.lineWidth = theme.borderW;
  ctx.stroke();

  // Decorative corners for gold
  if (banner.tier === 'gold') {
    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = '#FFD700';
    const cs = 6;
    // Top-left & top-right small diamonds
    for (const cx of [bx + 16, bx + bw - 16]) {
      ctx.beginPath();
      ctx.moveTo(cx, y - bh / 2 + 10); ctx.lineTo(cx + cs, y - bh / 2 + 10 + cs);
      ctx.lineTo(cx, y - bh / 2 + 10 + cs * 2); ctx.lineTo(cx - cs, y - bh / 2 + 10 + cs);
      ctx.closePath(); ctx.fill();
    }
  }

  // Title text
  ctx.globalAlpha = alpha;
  ctx.fillStyle = theme.title;
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(banner.text, layout.width / 2, y + 2);

  // Subtitle
  ctx.fillStyle = theme.sub;
  ctx.font = '13px sans-serif';
  ctx.fillText(banner.subtitle || '继续合成，挑战更高分！', layout.width / 2, y + 22);
  ctx.restore();
}

// === INIT ===
game.difficulty = localStorage.getItem('turtle_merge_difficulty') || 'normal';
computeLayout();
game.state = 'menu';
requestAnimationFrame(gameLoop);
</script>
