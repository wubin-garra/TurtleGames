<h2>街头篮球 - 视觉风格</h2>
<p class="subtitle">选择你喜欢的画面风格</p>

<div class="cards">
  <div class="card" data-choice="cartoon" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #ff6b35, #f7c948); height: 220px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
      <!-- Cartoon style court -->
      <div style="position: absolute; bottom: 0; width: 100%; height: 60%; background: linear-gradient(0deg, #4a9e4a, #6bc46b); border-radius: 20px 20px 0 0;"></div>
      <div style="position: absolute; bottom: 50%; right: 25%; width: 8px; height: 80px; background: #888; border-radius: 4px;"></div>
      <div style="position: absolute; bottom: calc(50% + 55px); right: 15%; width: 60px; height: 45px; border: 5px solid #ff4444; border-radius: 0 0 50% 50%; border-top: none;"></div>
      <!-- Backboard -->
      <div style="position: absolute; bottom: calc(50% + 60px); right: 18%; width: 50px; height: 35px; background: rgba(255,255,255,0.9); border: 3px solid #333; border-radius: 6px;"></div>
      <!-- Ball -->
      <div style="position: absolute; bottom: 55%; left: 30%; width: 35px; height: 35px; background: radial-gradient(circle at 40% 35%, #ff8833, #cc5500); border-radius: 50%; border: 2px solid #994400;">
        <div style="position: absolute; top: 45%; left: 0; right: 0; height: 2px; background: #994400;"></div>
        <div style="position: absolute; left: 45%; top: 0; bottom: 0; width: 2px; background: #994400;"></div>
      </div>
      <!-- Character -->
      <div style="position: absolute; bottom: 50%; left: 25%;">
        <div style="width: 28px; height: 28px; background: #ffcc88; border-radius: 50%; border: 2px solid #cc8844; position: relative;">
          <div style="position: absolute; top: 8px; left: 5px; width: 4px; height: 4px; background: #333; border-radius: 50%;"></div>
          <div style="position: absolute; top: 8px; right: 5px; width: 4px; height: 4px; background: #333; border-radius: 50%;"></div>
          <div style="position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 10px; height: 4px; border-bottom: 2px solid #333; border-radius: 0 0 50% 50%;"></div>
        </div>
        <div style="width: 22px; height: 30px; background: #ff4466; border-radius: 8px; margin: -2px auto 0; border: 2px solid #cc2244;"></div>
      </div>
      <div style="position: absolute; top: 10px; left: 10px; font-size: 24px;">&#x2B50;</div>
      <div style="position: absolute; top: 15px; right: 15px; font-size: 20px;">&#x1F525;</div>
    </div>
    <div class="card-body">
      <h3>A. 卡通可爱风</h3>
      <p>圆润的角色、明亮的配色、夸张的动画效果，适合亲子游戏</p>
    </div>
  </div>

  <div class="card" data-choice="neon" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #0a0a2e, #1a1a4e); height: 220px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
      <!-- Neon grid floor -->
      <div style="position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(0deg, rgba(0,255,255,0.05), transparent); border-top: 2px solid rgba(0,255,255,0.4);"></div>
      <div style="position: absolute; bottom: 0; width: 100%; height: 50%; background: repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0,255,255,0.1) 30px, rgba(0,255,255,0.1) 31px);"></div>
      <!-- Neon hoop -->
      <div style="position: absolute; bottom: 45%; right: 25%; width: 6px; height: 70px; background: rgba(255,0,255,0.6); box-shadow: 0 0 10px #ff00ff;"></div>
      <div style="position: absolute; bottom: calc(45% + 50px); right: 15%; width: 55px; height: 40px; border: 3px solid #ff00ff; border-radius: 0 0 50% 50%; border-top: none; box-shadow: 0 0 15px #ff00ff;"></div>
      <div style="position: absolute; bottom: calc(45% + 55px); right: 18%; width: 45px; height: 30px; background: rgba(255,0,255,0.15); border: 2px solid rgba(255,0,255,0.6); border-radius: 4px; box-shadow: 0 0 10px rgba(255,0,255,0.3);"></div>
      <!-- Neon ball -->
      <div style="position: absolute; bottom: 50%; left: 35%; width: 30px; height: 30px; background: radial-gradient(circle at 40% 35%, #ffaa00, #ff6600); border-radius: 50%; box-shadow: 0 0 20px #ff8800, 0 0 40px rgba(255,136,0,0.3);"></div>
      <!-- Neon character silhouette -->
      <div style="position: absolute; bottom: 40%; left: 22%;">
        <div style="width: 24px; height: 24px; background: transparent; border: 2px solid #00ffff; border-radius: 50%; box-shadow: 0 0 10px #00ffff;"></div>
        <div style="width: 20px; height: 28px; background: transparent; border: 2px solid #00ffff; border-radius: 6px; margin: -2px auto 0; box-shadow: 0 0 10px #00ffff;"></div>
      </div>
      <!-- Glow effects -->
      <div style="position: absolute; top: 20px; left: 20px; color: #00ffff; font-family: monospace; font-size: 14px; text-shadow: 0 0 10px #00ffff;">SCORE: 2400</div>
      <div style="position: absolute; top: 20px; right: 20px; color: #ff00ff; font-family: monospace; font-size: 12px; text-shadow: 0 0 10px #ff00ff;">x3 COMBO</div>
    </div>
    <div class="card-body">
      <h3>B. 霓虹街头风</h3>
      <p>暗色背景 + 霓虹灯光效果，赛博朋克感，炫酷街头氛围</p>
    </div>
  </div>

  <div class="card" data-choice="graffiti" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #f5f0e8, #e8e0d0); height: 220px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;">
      <!-- Brick wall background -->
      <div style="position: absolute; top: 0; width: 100%; height: 55%; background: repeating-linear-gradient(0deg, #c4a882 0px, #c4a882 18px, #b09070 18px, #b09070 20px), repeating-linear-gradient(90deg, #c4a882 0px, #c4a882 38px, #b09070 38px, #b09070 40px); opacity: 0.6;"></div>
      <!-- Graffiti splashes -->
      <div style="position: absolute; top: 15px; left: 15px; font-family: 'Arial Black', sans-serif; font-size: 28px; font-weight: 900; color: #ff3366; transform: rotate(-8deg); text-shadow: 2px 2px 0 #333; letter-spacing: -1px;">BALL!</div>
      <div style="position: absolute; top: 50px; right: 20px; width: 40px; height: 40px; background: #44cc44; border-radius: 50%; opacity: 0.4;"></div>
      <div style="position: absolute; top: 30px; right: 50px; width: 25px; height: 25px; background: #ffcc00; border-radius: 50%; opacity: 0.5;"></div>
      <!-- Court floor -->
      <div style="position: absolute; bottom: 0; width: 100%; height: 40%; background: #8B7355;"></div>
      <div style="position: absolute; bottom: 40%; width: 100%; height: 3px; background: #fff; opacity: 0.3;"></div>
      <!-- Hoop -->
      <div style="position: absolute; bottom: 45%; right: 22%; width: 8px; height: 75px; background: #666;"></div>
      <div style="position: absolute; bottom: calc(45% + 55px); right: 14%; width: 55px; height: 40px; border: 4px solid #ff3300; border-radius: 0 0 50% 50%; border-top: none;"></div>
      <div style="position: absolute; bottom: calc(45% + 58px); right: 16%; width: 48px; height: 32px; background: #fff; border: 3px solid #444; border-radius: 4px;"></div>
      <!-- Sketchy ball -->
      <div style="position: absolute; bottom: 48%; left: 32%; width: 32px; height: 32px; background: #ff8833; border-radius: 50%; border: 3px solid #333;"></div>
      <!-- Stick figure player -->
      <div style="position: absolute; bottom: 40%; left: 23%;">
        <div style="width: 22px; height: 22px; border: 3px solid #333; border-radius: 50%; background: transparent;"></div>
        <div style="width: 3px; height: 25px; background: #333; margin: 0 auto;"></div>
        <div style="width: 30px; height: 3px; background: #333; margin-top: -18px; margin-left: -4px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 涂鸦手绘风</h3>
      <p>像在笔记本上画的涂鸦，手绘线条 + 喷漆色块，街头艺术感</p>
    </div>
  </div>
</div>
