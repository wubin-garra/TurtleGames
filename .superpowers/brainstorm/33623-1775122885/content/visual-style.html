<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏库 — 视觉风格</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    padding: 40px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 0%, #aaa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { color: #888; font-size: 15px; margin-bottom: 40px; }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    max-width: 1100px;
  }

  .card {
    border: 2px solid #1a1a2a;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s;
  }
  .card:hover {
    border-color: #0070d8;
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .card.selected {
    border-color: #0070d8;
    box-shadow: 0 0 30px rgba(0,112,216,0.2);
  }

  .card-preview {
    height: 220px;
    position: relative;
    overflow: hidden;
  }

  .card-info {
    padding: 16px 20px;
    background: #0a0a0a;
  }
  .card-info h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .card-info p { color: #777; font-size: 13px; line-height: 1.5; }
  .tag { display: inline-block; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-left: 8px; vertical-align: middle; }
  .tag-rec { background: #0070d8; color: #fff; }

  /* ===== Style A: PS5 深蓝经典 ===== */
  .style-ps5 {
    background: linear-gradient(180deg, #0a1628 0%, #000 100%);
    display: flex;
    flex-direction: column;
  }
  .style-ps5 .hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .style-ps5 .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(0,112,216,0.2) 0%, transparent 70%);
  }
  .style-ps5 .hero-text {
    z-index: 1;
    text-align: center;
  }
  .style-ps5 .hero-text .emoji { font-size: 36px; display: block; margin-bottom: 4px; }
  .style-ps5 .hero-text .name { font-size: 18px; font-weight: 800; }
  .style-ps5 .bar {
    height: 52px;
    background: rgba(0,20,50,0.8);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    border-top: 1px solid rgba(0,112,216,0.15);
  }
  .style-ps5 .thumb {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; background: rgba(0,50,100,0.5);
    border: 2px solid transparent;
  }
  .style-ps5 .thumb.active { border-color: #fff; }

  /* ===== Style B: 暗黑紫色赛博 ===== */
  .style-cyber {
    background: linear-gradient(135deg, #0a0014 0%, #1a0030 50%, #0a0014 100%);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .style-cyber::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(140,80,255,0.03) 2px, rgba(140,80,255,0.03) 4px);
    pointer-events: none;
  }
  .style-cyber .hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .style-cyber .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(140,80,255,0.2) 0%, transparent 60%);
  }
  .style-cyber .hero-text {
    z-index: 1;
    text-align: center;
  }
  .style-cyber .hero-text .emoji {
    font-size: 36px;
    display: block;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 10px rgba(140,80,255,0.5));
  }
  .style-cyber .hero-text .name {
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(90deg, #c084fc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .style-cyber .bar {
    height: 52px;
    background: rgba(10,0,20,0.8);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    border-top: 1px solid rgba(140,80,255,0.2);
    z-index: 1;
  }
  .style-cyber .thumb {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; background: rgba(60,0,100,0.5);
    border: 2px solid transparent;
  }
  .style-cyber .thumb.active { border-color: #a78bfa; box-shadow: 0 0 8px rgba(140,80,255,0.4); }

  /* ===== Style C: 深海蓝绿 ===== */
  .style-ocean {
    background: linear-gradient(180deg, #021a1a 0%, #001210 100%);
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .style-ocean .hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .style-ocean .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(0,200,150,0.12) 0%, transparent 70%);
  }
  .style-ocean .hero-text {
    z-index: 1;
    text-align: center;
  }
  .style-ocean .hero-text .emoji { font-size: 36px; display: block; margin-bottom: 4px; }
  .style-ocean .hero-text .name {
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(90deg, #4eeaac, #00b4d8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .style-ocean .bar {
    height: 52px;
    background: rgba(0,15,15,0.8);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    border-top: 1px solid rgba(78,234,172,0.15);
  }
  .style-ocean .thumb {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; background: rgba(0,50,50,0.5);
    border: 2px solid transparent;
  }
  .style-ocean .thumb.active { border-color: #4eeaac; box-shadow: 0 0 8px rgba(78,234,172,0.3); }

  /* ===== Style D: 纯黑极简 ===== */
  .style-minimal {
    background: #000;
    display: flex;
    flex-direction: column;
  }
  .style-minimal .hero {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border-bottom: 1px solid #1a1a1a;
  }
  .style-minimal .hero-text {
    text-align: center;
  }
  .style-minimal .hero-text .emoji { font-size: 36px; display: block; margin-bottom: 4px; }
  .style-minimal .hero-text .name { font-size: 18px; font-weight: 800; color: #eee; }
  .style-minimal .bar {
    height: 52px;
    background: #050505;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
  }
  .style-minimal .thumb {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; background: #111;
    border: 2px solid transparent;
  }
  .style-minimal .thumb.active { border-color: #fff; }
</style>
<script>
function toggleSelect(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.toggle('selected');
}
</script>
</head>
<body>

<h1>🎨 视觉风格选择</h1>
<p class="subtitle">选择游戏库的配色和氛围</p>

<div class="cards">

  <!-- Style A -->
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-preview style-ps5">
      <div class="hero">
        <div class="hero-text">
          <span class="emoji">🏁</span>
          <span class="name">乌龟赛跑</span>
        </div>
      </div>
      <div class="bar">
        <div class="thumb active">🏁</div>
        <div class="thumb">🐢</div>
      </div>
    </div>
    <div class="card-info">
      <h3>PS5 深蓝经典 <span class="tag tag-rec">推荐</span></h3>
      <p>深蓝色调，蓝色高光，最接近PS5原版的冷峻科技感</p>
    </div>
  </div>

  <!-- Style B -->
  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-preview style-cyber">
      <div class="hero">
        <div class="hero-text">
          <span class="emoji">🏁</span>
          <span class="name">乌龟赛跑</span>
        </div>
      </div>
      <div class="bar">
        <div class="thumb active">🏁</div>
        <div class="thumb">🐢</div>
      </div>
    </div>
    <div class="card-info">
      <h3>暗黑紫色赛博</h3>
      <p>紫色渐变 + 扫描线纹理，赛博朋克风，更有个性</p>
    </div>
  </div>

  <!-- Style C -->
  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-preview style-ocean">
      <div class="hero">
        <div class="hero-text">
          <span class="emoji">🏁</span>
          <span class="name">乌龟赛跑</span>
        </div>
      </div>
      <div class="bar">
        <div class="thumb active">🏁</div>
        <div class="thumb">🐢</div>
      </div>
    </div>
    <div class="card-info">
      <h3>深海蓝绿</h3>
      <p>青绿色调，呼应乌龟/海洋主题，与游戏风格统一</p>
    </div>
  </div>

  <!-- Style D -->
  <div class="card" data-choice="d" onclick="toggleSelect(this)">
    <div class="card-preview style-minimal">
      <div class="hero">
        <div class="hero-text">
          <span class="emoji">🏁</span>
          <span class="name">乌龟赛跑</span>
        </div>
      </div>
      <div class="bar">
        <div class="thumb active">🏁</div>
        <div class="thumb">🐢</div>
      </div>
    </div>
    <div class="card-info">
      <h3>纯黑极简</h3>
      <p>纯黑底色，白色高光，极简主义，让游戏内容成为焦点</p>
    </div>
  </div>

</div>

</body>
</html>
